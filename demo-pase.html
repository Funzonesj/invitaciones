<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demo Pase de Fotos</title>
<style>
  html,body{margin:0;background:#0f172a;font-family:Arial,Helvetica,sans-serif;}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px;}
  .phone{width:300px;background:#fff;border-radius:30px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);border:8px solid #111;}
  .top{background:#ec4899;color:#fff;text-align:center;padding:10px;font-weight:900;font-size:14px;}
  .tit{text-align:center;font-size:13px;font-weight:800;color:#ec4899;letter-spacing:.5px;margin:10px 0 8px;}
  .stage{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:#000;}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.1s ease-in-out;}
  .slide.on{opacity:1;}
  .slide img{width:100%;height:100%;object-fit:cover;}
  .slide.on img{animation:kb 4800ms ease-out both;}
  @keyframes kb{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.14) translate(-2%,-2%)}}
  .dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px;z-index:2;}
  .dot{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,.6);transition:all .3s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
  .dot.on{width:20px;background:#ec4899;}
  .cap{color:#cbd5e1;font-size:13px;text-align:center;max-width:320px;line-height:1.5;}
  .music{display:inline-flex;align-items:center;gap:6px;background:#1e293b;color:#fff;border-radius:99px;padding:6px 14px;font-size:12px;}
</style></head>
<body>
  <div class="wrap">
    <div class="phone">
      <div class="top">🎉 Invitación · Pase de Fotos</div>
      <div class="tit">📸 Mateo en fotos</div>
      <div class="stage" id="stage"></div>
    </div>
    <div class="music">🔊 con la música de la tarjeta</div>
    <div class="cap">Así se ven las fotos: van pasando solas, con un fundido suave y un zoom lento tipo cine (Ken Burns). Esto es un ejemplo con fotos genéricas.</div>
  </div>
<script>
  var fotos=[
    'https://picsum.photos/id/1062/600/600',
    'https://picsum.photos/id/1025/600/600',
    'https://picsum.photos/id/1074/600/600',
    'https://picsum.photos/id/177/600/600',
    'https://picsum.photos/id/1080/600/600'
  ];
  var stage=document.getElementById('stage');
  var slides=[],dots=[];
  var dotsWrap=document.createElement('div');dotsWrap.className='dots';
  fotos.forEach(function(src,i){
    var d=document.createElement('div');d.className='slide'+(i===0?' on':'');
    var im=document.createElement('img');im.src=src;d.appendChild(im);stage.appendChild(d);slides.push(d);
    var dt=document.createElement('span');dt.className='dot'+(i===0?' on':'');dotsWrap.appendChild(dt);dots.push(dt);
  });
  stage.appendChild(dotsWrap);
  var idx=0;
  setInterval(function(){
    slides[idx].className='slide';dots[idx].className='dot';
    idx=(idx+1)%fotos.length;
    slides[idx].className='slide on';dots[idx].className='dot on';
  },3600);
</script>
</body></html>
