<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demo Pase de Fotos</title>
<style>
  html,body{margin:0;background:#0f172a;font-family:Arial,Helvetica,sans-serif}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px}
  .phone{width:320px;background:#0f172a;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);border:8px solid #111}
  .top{background:#ec4899;color:#fff;text-align:center;padding:10px;font-weight:900;font-size:13px}
  .tit{text-align:center;font-size:12px;font-weight:800;color:#fff;margin:9px 0 7px}
  .stage{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:#0f172a}
  .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.1s ease-in-out;display:flex;align-items:center;justify-content:center}
  .slide.on{opacity:1}
  .slide.on img.kb{animation:kb 4800ms ease-out both}
  @keyframes kb{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.13) translate(-2%,-2%)}}
  .bg{width:100%;height:100%;object-fit:cover}
  .frase{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:26px;text-align:center;color:#fff;font-size:25px;font-weight:900;text-shadow:0 2px 14px rgba(0,0,0,.8);line-height:1.25}
  .marco{position:relative;background:#fff;padding:12px 12px 36px;border-radius:4px;box-shadow:0 10px 30px rgba(0,0,0,.55);transform:rotate(-2deg);width:76%}
  .marco .ph{width:100%;aspect-ratio:1;overflow:hidden;background:#000}
  .marco .name{position:absolute;bottom:9px;left:0;right:0;text-align:center;font-size:15px;color:#475569;font-weight:700;font-style:italic}
  .logo{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 10px rgba(0,0,0,.45);z-index:6}
  .dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:7}
  .dot{width:6px;height:6px;border-radius:99px;background:rgba(255,255,255,.6)}
  .dot.on{width:18px;background:#ec4899}
  .cap{color:#cbd5e1;font-size:13px;text-align:center;max-width:320px;line-height:1.5}
</style></head>
<body>
  <div class="wrap">
    <div class="phone"><div class="top">🎉 Invitación · Pase de Fotos</div><div class="tit">📸 Mateo en fotos</div><div class="stage" id="stage"></div></div>
    <div class="cap">Mini-video: arranca con una frase, las fotos pasan en un marco tipo foto instantánea con el logo del salón arriba, y cierra con otra frase. (Ejemplo con dibujitos.)</div>
  </div>
<script>
  function img(c1,c2,e,l){var s='<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+c1+'"/><stop offset="1" stop-color="'+c2+'"/></linearGradient></defs><rect width="600" height="600" fill="url(#g)"/><text x="300" y="300" font-size="210" text-anchor="middle">'+e+'</text><text x="300" y="450" font-size="52" font-family="Arial" font-weight="bold" fill="white" text-anchor="middle">'+l+'</text></svg>';return 'data:image/svg+xml;utf8,'+encodeURIComponent(s);}
  var logo='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" rx="60" fill="#7c3aed"/><text x="60" y="80" font-size="60" text-anchor="middle">🎪</text></svg>');
  var fotos=[img('#fb7185','#f43f5e','🎂','Foto 1'),img('#38bdf8','#2563eb','🎈','Foto 2'),img('#34d399','#059669','🎁','Foto 3')];
  var nombre='Mateo';
  var slides=[];
  slides.push({t:'intro',src:fotos[0],txt:'¡Hoy festejamos a '+nombre+'! 🎂'});
  fotos.forEach(function(s){slides.push({t:'foto',src:s});});
  slides.push({t:'cierre',src:fotos[fotos.length-1],txt:'¡Gracias por acompañarnos! 💕'});
  var stage=document.getElementById('stage');var els=[];
  var dw=document.createElement('div');dw.className='dots';var dots=[];
  slides.forEach(function(sl,i){
    var d=document.createElement('div');d.className='slide'+(i===0?' on':'');
    if(sl.t==='foto'){d.innerHTML='<div class="marco"><div class="ph"><img class="bg kb" src="'+sl.src+'"></div><div class="name">'+nombre+' 🎉</div></div><img class="logo" src="'+logo+'">';}
    else{d.innerHTML='<img class="bg kb" style="filter:brightness(.5)" src="'+sl.src+'"><div class="frase">'+sl.txt+'</div><img class="logo" src="'+logo+'">';}
    stage.appendChild(d);els.push(d);
    var dt=document.createElement('span');dt.className='dot'+(i===0?' on':'');dw.appendChild(dt);dots.push(dt);
  });
  stage.appendChild(dw);
  var idx=0;
  setInterval(function(){els[idx].className='slide';dots[idx].className='dot';idx=(idx+1)%slides.length;els[idx].className='slide on';dots[idx].className='dot on';},3600);
</script>
</body></html>
