/* ── Helpers DB (pasan por el PORTERO seguro /api/fichaje; plan B: acceso directo) ── */
let _FTOK = null;
try{ const _s=JSON.parse(localStorage.getItem('fichaje_sesion')||'null'); if(_s&&_s._token) _FTOK=_s._token; }catch(e){}
let _FGW = null;
async function gwPingF(){ if(_FGW!==null) return _FGW; try{ const r=await fetch('/api/fichaje',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'ping'})}); _FGW=(r.status!==503); }catch(e){ _FGW=false; } return _FGW; }
async function gwF(action,payload){ const h={'Content-Type':'application/json'}; if(_FTOK) h['x-fichaje-token']=_FTOK; const r=await fetch('/api/fichaje',{method:'POST',headers:h,body:JSON.stringify(Object.assign({action:action},payload||{}))}); if(!r.ok) throw new Error('gwF '+r.status); return r.json(); }
async function dbAll(tabla){
  if(await gwPingF()){ try{ const d=await gwF('all',{tabla:tabla}); if(d&&Array.isArray(d.rows)) return d.rows; }catch(e){} }
  if(!SB)return[]; try{const{data}=await SB.from(tabla).select('*');return data||[];}catch(e){return[];}
}
async function dbInsert(tabla,row){
  if(await gwPingF()){ try{ const d=await gwF('insert',{tabla:tabla,row:row}); if(d&&d.ok) return d.row; }catch(e){} }
  try{const{data,error}=await SB.from(tabla).insert(row).select();if(error)throw error;return data&&data[0];}catch(e){alert('Error al guardar: '+(e.message||e));return null;}
}
async function dbUpdate(tabla,id,row){
  if(await gwPingF()){ try{ const d=await gwF('update',{tabla:tabla,id:id,row:row}); if(d&&d.ok) return true; }catch(e){} }
  try{const{error}=await SB.from(tabla).update(row).eq('id',id);if(error)throw error;return true;}catch(e){alert('Error al actualizar: '+(e.message||e));return false;}
}
async function dbDelete(tabla,id){
  if(await gwPingF()){ try{ const d=await gwF('delete',{tabla:tabla,id:id}); if(d&&d.ok) return true; }catch(e){} }
  try{const{error}=await SB.from(tabla).delete().eq('id',id);if(error)throw error;return true;}catch(e){alert('Error al borrar: '+(e.message||e));return false;}
}
async function dbUpsert(tabla,row){
  if(await gwPingF()){ try{ const d=await gwF('upsert',{tabla:tabla,row:row}); if(d&&d.ok) return true; }catch(e){} }
  try{const{error}=await SB.from(tabla).upsert(row);if(error)throw error;return true;}catch(e){return false;}
}
async function subirFoto(dataUri){ try{const r=await fetch('/api/subir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:dataUri})});const d=await r.json().catch(()=>({}));return (r.ok&&d.url)?d.url:dataUri;}catch(e){return dataUri;} }
async function subirPDF(file){ try{ const r=await fetch('/api/subir-init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content_type:'application/pdf',ext:'pdf'})}); const d=await r.json().catch(()=>({})); if(!r.ok||!d.upload_url||!d.file_url)return null; const up=await fetch(d.upload_url,{method:'PUT',headers:{'Content-Type':'application/pdf'},body:file}); if(!up.ok)return null; return d.file_url; }catch(e){return null;} }
function distancia(la1,lo1,la2,lo2){const R=6371000,t=x=>x*Math.PI/180;const d1=t(la2-la1),d2=t(lo2-lo1);const a=Math.sin(d1/2)**2+Math.cos(t(la1))*Math.cos(t(la2))*Math.sin(d2/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function App(){

  const [sucActiva,setSucActiva]=useState(''); // para la dueña: '' = todas
  const [chatNL,setChatNL]=useState({});       // grupoId -> no leídos
  const [chatAviso,setChatAviso]=useState(null);
  const misGruposRef=useRef(new Set());
  const gruposNombreRef=useRef({});

  async function recargar(){
    const [su,em]=await Promise.all([dbAll('fichaje_sucursales'),dbAll('fichaje_empleados')]);
    setSucursales(su); setEmpleados(em);
  }
  useEffect(()=>{ (async()=>{ await recargar(); setBoot(false); })(); },[]);
  useEffect(()=>{ if(sesion) localStorage.setItem('fichaje_sesion',JSON.stringify(sesion)); else localStorage.removeItem('fichaje_sesion'); },[sesion]);

  async function marcarLeido(grupoId){
    setChatNL(p=>({...p,[grupoId]:0}));
    if(sesion) await SB.from('fichaje_chat_miembros').update({ultimo_leido_at:new Date().toISOString()}).eq('grupo_id',grupoId).eq('empleado_id',sesion.id);
  }

  // Chat: no leídos + aviso en tiempo real (vive aunque no estés en la pantalla de chat)
  useEffect(()=>{
    if(!sesion||!SB){ setChatNL({}); return; }
    let cancel=false;
    (async()=>{
      const {data}=await SB.from('fichaje_chat_miembros').select('grupo_id,ultimo_leido_at, g:fichaje_chat_grupos(nombre)').eq('empleado_id',sesion.id);
      const mios=data||[];
      misGruposRef.current=new Set(mios.map(m=>m.grupo_id));
      const nombres={}; mios.forEach(m=>{ if(m.g) nombres[m.grupo_id]=m.g.nombre; }); gruposNombreRef.current=nombres;
      const conteo={};
      await Promise.all(mios.map(async m=>{ const {count}=await SB.from('fichaje_chat_mensajes').select('id',{count:'exact',head:true}).eq('grupo_id',m.grupo_id).gt('created_at',m.ultimo_leido_at).neq('empleado_id',sesion.id); conteo[m.grupo_id]=count||0; }));
      if(!cancel) setChatNL(conteo);
    })();
    const canal=SB.channel('fznotif-'+sesion.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'fichaje_chat_mensajes'},(payload)=>{
      const m=payload.new;
      if(m.empleado_id===sesion.id) return;
      if(!misGruposRef.current.has(m.grupo_id)) return;
      if(fzChatActivo.id===m.grupo_id){ marcarLeido(m.grupo_id); return; }
      setChatNL(p=>({...p,[m.grupo_id]:(p[m.grupo_id]||0)+1}));
      const autor=fzNombreEmp(empleados,m.empleado_id), texto=fzPreview(m);
      setChatAviso({grupo_id:m.grupo_id,grupo:gruposNombreRef.current[m.grupo_id]||'Grupo',autor,texto});
      if(window.Notification && Notification.permission==='granted'){ try{ new Notification(autor,{body:texto}); }catch(e){} }
    }).subscribe();
    return ()=>{ cancel=true; SB.removeChannel(canal); };
  },[sesion]);

  function hacerLogin(ses){ if(ses&&ses._token){ _FTOK=ses._token; } setSesion(ses); recargar(); } // guarda token del portero y recarga con permisos
  function salir(){ _FTOK=null; try{ if(SB&&SB.auth) SB.auth.signOut(); }catch(e){} setSesion(null); setVista('dashboard'); }
  const chatTotal=Object.values(chatNL).reduce((a,b)=>a+b,0);

  if(boot) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><span className="spin"></span></div>;
  if(!SB) return <div style={{padding:24}}>No se pudo conectar a la base de datos.</div>;
  if(!sesion) return <Login empleados={empleados} onLogin={hacerLogin}/>;

  const rol = sesion.rol_sistema || 'empleado';
  const esDuena = rol==='dueno';
  // sucursal en contexto (empleado/encargada: la suya; dueña: la elegida o todas)
  const sucCtx = esDuena ? sucActiva : (sesion.sucursal_encargada || (sesion.sucursales&&sesion.sucursales[0]) || '');

  return (
    <div style={{minHeight:'100vh',paddingBottom:78}}>
      <AvisoChat aviso={chatAviso} onAbrir={()=>{ setVista('chat'); setChatAviso(null); }} onClose={()=>setChatAviso(null)}/>
      <Header sesion={sesion} esDuena={esDuena} sucursales={sucursales} sucActiva={sucActiva} setSucActiva={setSucActiva} onSalir={salir} onChat={()=>setVista('chat')} chatTotal={chatTotal} chatActivo={vista==='chat'}/>
      <div className="fade" style={{maxWidth:560,margin:'0 auto',padding:'14px 14px 0'}}>
        {vista==='dashboard'   && <Dashboard sesion={sesion} rol={rol} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx} setVista={setVista}/>}
        {vista==='chat'        && <ChatVista sesion={sesion} esDuena={esDuena} empleados={empleados} noLeidos={chatNL} marcarLeido={marcarLeido}/>}
        {vista==='fichar'      && <Fichar sesion={sesion} sucursales={sucursales}/>}
        {vista==='mishorarios' && <MisHorarios sesion={sesion}/>}
        {vista==='miplanilla'  && <MiPlanilla sesion={sesion} sucursales={sucursales}/>}
        {vista==='misencuestas'&& <MisEncuestas sesion={sesion} sucursales={sucursales}/>}
        {vista==='horarios'    && (esDuena||rol==='encargada') && <Horarios sesion={sesion} esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='registros'   && (esDuena||rol==='encargada') && <Registros esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='pagos'       && (esDuena||rol==='encargada') && <Pagos sesion={sesion} esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='alertas'     && (esDuena||rol==='encargada') && <Alertas esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='tareas'      && <Tareas sesion={sesion} esDuena={esDuena} sucursales={sucursales} sucCtx={sucCtx} empleados={empleados}/>}
        {vista==='verhorarios' && <HorariosSalones sucursales={sucursales}/>}
        {vista==='empleados'   && esDuena && <Empleados empleados={empleados} sucursales={sucursales} recargar={recargar}/>}
        {vista==='sucursales'  && esDuena && <Sucursales sucursales={sucursales} recargar={recargar}/>}
        {vista==='config'      && esDuena && <Configuracion sucursales={sucursales} empleados={empleados} recargar={recargar}/>}
      </div>
      <BottomNav rol={rol} vista={vista} setVista={setVista}/>
    </div>

}

/* ── Header ── */
function Header({sesion,esDuena,sucursales,sucActiva,setSucActiva,onSalir,onChat,chatTotal,chatActivo}){
  return (
    <div style={{position:'sticky',top:0,zIndex:50,background:C.bg,borderBottom:'1px solid '+C.bd,paddingTop:'env(safe-area-inset-top)'}}>
      <div style={{maxWidth:560,margin:'0 auto',padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:34,height:34,borderRadius:9,background:C.oro,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🕒</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,lineHeight:1.1}}>{sesion.nombre}</div>
          <div style={{fontSize:11,color:C.tx2}}>{sesion.rol_sistema==='dueno'?'Dueña':sesion.rol_sistema==='encargada'?'Encargada':'Empleado'}</div>
        </div>
        <button onClick={onChat} title="Chat" style={{position:'relative',background:chatActivo?C.oro:C.surf2,border:'1px solid '+C.bd,borderRadius:10,minHeight:0,padding:'7px 10px',cursor:'pointer',fontSize:17}}>
          💬
          {chatTotal>0 && <span style={{position:'absolute',top:-6,right:-6,minWidth:17,height:17,padding:'0 4px',borderRadius:9,background:C.rojo,color:'#fff',fontSize:10,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{chatTotal}</span>}
        </button>
        {esDuena && (
          <select value={sucActiva} onChange={e=>setSucActiva(e.target.value)} style={{...S.input,width:'auto',padding:'8px 10px',fontSize:13}}>
            <option value="">Todas</option>
            {sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
          </select>
        )}
        <button onClick={onSalir} style={{...S.btn,...S.btnGhost,padding:'8px 12px',minHeight:0,fontSize:13}}>Salir</button>
      </div>
    </div>
  );
}

/* ── TAREAS (estilo To-Do) por sucursal: listas, fotos VISIBLES, tildar hecho, borrar ── */
function TareaItem({t,subFoto,onToggle,onBorrar,onFoto,onVer,onPrioridad,puedeBorrar}){
  const p=t.prioridad||0; const pcol=p===2?'#ef4444':p===1?'#f59e0b':C.tx2;
  return (
   <div style={{...S.card,marginBottom:8,padding:12,borderLeft:(p?('4px solid '+pcol):('1px solid '+C.bd))}}>
     <div style={{display:'flex',alignItems:'flex-start',gap:9}}>
       <button onClick={()=>onToggle(t)} style={{width:24,height:24,borderRadius:'50%',border:'2px solid '+(t.hecha?C.verde:C.bd),background:t.hecha?C.verde:'transparent',color:'#fff',cursor:'pointer',flexShrink:0,fontSize:13,fontWeight:900,marginTop:1,lineHeight:1}}>{t.hecha?'✓':''}</button>
       <span style={{flex:1,minWidth:0,fontSize:14,wordBreak:'break-word',...(t.hecha?{textDecoration:'line-through',color:C.tx2}:{})}}>{t.texto}</span>
       {onPrioridad && <button onClick={()=>onPrioridad(t)} title={p===2?'Urgente':p===1?'Importante':'Marcar importancia'} style={{background:'none',border:'none',cursor:'pointer',fontSize:19,flexShrink:0,lineHeight:1,color:pcol}}>{p?'★':'☆'}</button>}
       <label style={{cursor:'pointer',fontSize:17,flexShrink:0,opacity:subFoto===t.id?.5:1}}>{subFoto===t.id?'⏳':'📷'}<input type="file" accept="image/*" style={{display:'none'}} onChange={e=>onFoto(t,e)}/></label>
       {puedeBorrar!==false && <button onClick={()=>onBorrar(t)} style={{background:'none',border:'none',cursor:'pointer',fontSize:15,color:C.rojo,flexShrink:0}}>🗑</button>}
     </div>
     {(t.fotos&&t.fotos.length>0)&&(
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:10,paddingLeft:34}}>
        {t.fotos.map((u,idx)=>(<img key={idx} src={u} alt="" onClick={()=>onVer({url:u,id:t.id,idx:idx})} style={{width:66,height:66,objectFit:'cover',borderRadius:8,cursor:'pointer',border:'1px solid '+C.bd}}/>))}
      </div>
     )}
   </div>
  );
}
function Tareas({sesion,esDuena,sucursales,sucCtx,empleados}){
  const [sucSel,setSucSel]=useState(sucCtx||(sucursales[0]&&sucursales[0].id)||'');
  const [listas,setListas]=useState([]); const [tareas,setTareas]=useState([]);

  const [nuevaLista,setNuevaLista]=useState(''); const [nuevaTarea,setNuevaTarea]=useState('');
  const [verComp,setVerComp]=useState(true); const [visor,setVisor]=useState(null); const [subFoto,setSubFoto]=useState(null); const [asignOpen,setAsignOpen]=useState(false);
  const rol=sesion.rol_sistema||'empleado';
  const esMant=rol==='mantenimiento';
  const esManager=esDuena||rol==='encargada';
  const emps=empleados||[];
  const sucNom=id=>{const s=sucursales.find(x=>x.id===id);return s?s.nombre:'';};
  async function cargar(){
    setCargando(true);
    const [ls,ts]=await Promise.all([dbAll('fichaje_tarea_listas'),dbAll('fichaje_tareas')]);
    setListas((ls||[]).sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||''))));
    setTareas(ts||[]); setCargando(false);
  }
  useEffect(()=>{cargar();},[]);
  async function crearLista(){const n=nuevaLista.trim();if(!n)return;const row=await dbInsert('fichaje_tarea_listas',{sucursal_id:sucSel,nombre:n});if(row){setNuevaLista('');await cargar();}}
  async function borrarLista(l,e){if(e)e.stopPropagation();if(!window.confirm('¿Borrar la lista "'+l.nombre+'" y TODAS sus tareas?'))return;await dbDelete('fichaje_tarea_listas',l.id);if(sel&&sel.id===l.id)setSel(null);await cargar();}
  async function renombrarLista(l,e){if(e)e.stopPropagation();const lst=l||sel;if(!lst)return;const n=window.prompt('Nuevo nombre de la lista:',lst.nombre||'');if(n==null)return;const nn=n.trim();if(!nn)return;await dbUpdate('fichaje_tarea_listas',lst.id,{nombre:nn});setListas(ls=>ls.map(x=>x.id===lst.id?{...x,nombre:nn}:x));setSel(s=>(s&&s.id===lst.id?{...s,nombre:nn}:s));}
  async function agregarTarea(){const t=nuevaTarea.trim();if(!t||!sel)return;const row=await dbInsert('fichaje_tareas',{lista_id:sel.id,texto:t,hecha:false,fotos:[]});if(row){setNuevaTarea('');await cargar();}}
  async function toggle(t){await dbUpdate('fichaje_tareas',t.id,{hecha:!t.hecha});await cargar();}

  async function borrarTarea(t){if(!window.confirm('¿Borrar esta tarea?'))return;await dbDelete('fichaje_tareas',t.id);await cargar();}
  function agregarFoto(t,e){const file=e.target.files[0];if(!file)return;e.target.value='';setSubFoto(t.id);const r=new FileReader();r.onload=async ev=>{const url=await subirFoto(ev.target.result);const fotos=[...(t.fotos||[]),url];await dbUpdate('fichaje_tareas',t.id,{fotos:fotos});setSubFoto(null);await cargar();};r.readAsDataURL(file);}
  async function quitarFoto(){if(!visor)return;const t=tareas.find(x=>x.id===visor.id);if(!t){setVisor(null);return;}const fotos=(t.fotos||[]).filter((_,i)=>i!==visor.idx);await dbUpdate('fichaje_tareas',t.id,{fotos:fotos});setVisor(null);await cargar();}

/* ── HORARIO DE SALONES (mantenimiento): solo lectura, horario + paquete, sin detalle ── */
function HorariosSalones({sucursales}){
  const [sucSel,setSucSel]=useState((sucursales[0]&&sucursales[0].id)||'');
  const [eventos,setEventos]=useState(null); const [verPasados,setVerPasados]=useState(false);
  useEffect(()=>{(async()=>{const ev=await dbAll('fichaje_eventos');setEventos(ev||[]);})();},[]);
  const sh=h=>String(h||'').replace(/:00$/,'');
  const evs=(eventos||[]).filter(e=>e.sucursal_id===sucSel);
  const porDia={}; evs.forEach(e=>{(porDia[e.fecha]=porDia[e.fecha]||[]).push(e);});
  Object.values(porDia).forEach(a=>a.sort((x,y)=>toMin(x.hora_inicio)-toMin(y.hora_inicio)));
  const _hoy=fechaHoyISO(); const _lunE=lunesDeSemana(_hoy,0); const _lunA=lunesDeSemana(_hoy,1);
  const _todos=Object.keys(porDia).sort(); const _diasV=_todos.filter(f=>verPasados?(f>=_lunA):(f>=_lunE)); const _nPas=_todos.filter(f=>f>=_lunA&&f<_lunE).length;
  const _fdm=iso=>iso.slice(8,10)+'/'+iso.slice(5,7);
  function _sem(dias){ const g={}; dias.forEach(f=>{const l=lunesDeSemana(f,0);(g[l]=g[l]||[]).push(f);}); return Object.keys(g).sort().map(l=>{const d2=new Date(l+'T12:00:00');d2.setDate(d2.getDate()+6);const dom=d2.getFullYear()+'-'+('0'+(d2.getMonth()+1)).slice(-2)+'-'+('0'+d2.getDate()).slice(-2);const dd=g[l].slice().sort();return {lunes:l,domingo:dom,dias:dd,total:dd.reduce((s,f)=>s+(porDia[f]?porDia[f].length:0),0)};}); }
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:4}}>🗓️ Horario de salones</h2>
      <p style={{fontSize:12,color:C.tx2,marginBottom:12}}>Elegí un salón para ver los horarios de cada día.</p>
      <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={{...S.input,marginBottom:12}}>{sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select>
      {eventos===null ? <div style={{textAlign:'center',padding:30}}><span className="spin"></span></div> :
       _diasV.length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:26}}>{(_nPas>0&&!verPasados)?<span>No hay horarios de esta semana en adelante.<br/><button onClick={()=>setVerPasados(true)} style={{...S.btn,...S.btnGhost,marginTop:10,fontSize:13}}>📋 Ver semana anterior ({_nPas})</button></span>:<span>No hay horarios cargados para este salón.</span>}</div> :
       <React.Fragment>
       {_nPas>0 && <button onClick={()=>setVerPasados(v=>!v)} style={{...S.btn,...S.btnGhost,marginBottom:12,fontSize:12,padding:'7px 12px',minHeight:0}}>{verPasados?'Ocultar semana anterior':'📋 Ver semana anterior ('+_nPas+')'}</button>}
       {_sem(_diasV).map(sem=>(
         <div key={sem.lunes} style={{marginBottom:14}}>
           <div style={{fontWeight:800,fontSize:13,color:C.tx,background:C.surf2,borderRadius:8,padding:'7px 11px',marginBottom:8}}>📅 Semana del {_fdm(sem.lunes)} al {_fdm(sem.domingo)} <span style={{color:C.oro}}>({sem.total} evento{sem.total!==1?'s':''})</span></div>
           {sem.dias.map(f=>(
             <div key={f} style={{...S.card,marginBottom:8,opacity:f<_hoy?.6:1}}>
               <div style={{fontWeight:700,fontSize:14,marginBottom:6,fontFamily:'Arial, Helvetica, sans-serif',color:f<_hoy?C.tx2:(f===_hoy?C.verde:C.oro)}}>{fechaLinda(f)}{f===_hoy?'  · HOY':''}</div>
               <div style={{display:'flex',flexDirection:'column',gap:5}}>
                 {porDia[f].map(ev=>(
                   <div key={ev.id} style={{display:'flex',alignItems:'center',gap:8,fontSize:14,background:C.surf2,borderRadius:8,padding:'8px 10px'}}>
                     <span style={{color:C.verde,fontWeight:700,fontFamily:'Arial, Helvetica, sans-serif',whiteSpace:'nowrap'}}>{sh(ev.hora_inicio)} a {sh(ev.hora_fin)}</span>
                     <span style={{flex:1,minWidth:0,fontWeight:700}}>{ev.paquete}</span>
                   </div>
                 ))}
               </div>
             </div>
           ))}
         </div>
       ))}
       </React.Fragment>
      }
    </div>
  );
}

/* ── Login ── */
function Login({empleados,onLogin}){
  const [u,setU]=useState(''); const [p,setP]=useState(''); const [err,setErr]=useState(''); const [showP,setShowP]=useState(false); const [recuMsg,setRecuMsg]=useState('');
  async function entrar(e){ e.preventDefault(); setErr(''); setRecuMsg('');
    const id=u.trim();
    // 1) Si es un EMAIL → DUEÑA por Supabase Auth (mismas credenciales del salón)
    if(id.indexOf('@')>=0 && SB){
      try{
        const {data,error}=await SB.auth.signInWithPassword({email:id,password:p});
        if(!error && data && data.session){
          const r=await fetch('/api/fichaje',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+data.session.access_token},body:JSON.stringify({action:'loginDuena'})});
          const d=await r.json().catch(()=>({}));
          if(d && d.ok && d.user){ onLogin(Object.assign({},d.user,{_token:d.token})); return; }
          setErr('Esa cuenta no es la dueña.'); return;
        }
        setErr('Email o contraseña incorrectos.'); return;
      }catch(ex){ setErr('No se pudo ingresar. Probá de nuevo.'); return; }
    }
    // 2) Empleado/encargada por el PORTERO (usuario/clave)
    if(await gwPingF()){
      try{ const d=await gwF('login',{usuario:id,clave:p}); if(d&&d.ok&&d.user){ onLogin(Object.assign({},d.user,{_token:d.token})); return; } if(d&&d.ok===false){ setErr('Usuario o contraseña incorrectos.'); return; } }catch(ex){}
    }
    // 3) plan B: chequeo local (mientras el portero no esté activo)
    const found=(empleados||[]).find(x=>x.activo!==false && ((x.usuario||'').toLowerCase()===id.toLowerCase()) && String(x.clave||'')===p);
    if(!found){ setErr('Usuario o contraseña incorrectos.'); return; }
    onLogin(found);
  }
  async function recuperar(){
    const id=u.trim(); setErr('');
    if(id.indexOf('@')<0){ setRecuMsg('Para recuperar tu clave escribí tu EMAIL de dueña arriba (en Usuario). Si sos empleado, pedile a la dueña que te la cambie en Empleados.'); return; }
    if(!SB){ setRecuMsg('No se pudo conectar. Probá más tarde.'); return; }
    try{ await SB.auth.resetPasswordForEmail(id,{redirectTo:'https://funzonepro.com'}); setRecuMsg('📧 Te enviamos un email a '+id+'. Abrilo para poner tu nueva contraseña (te sirve para las dos apps).'); }
    catch(ex){ setRecuMsg('No se pudo enviar el email. Probá de nuevo.'); }
  }
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <form onSubmit={entrar} className="fade" style={{width:'100%',maxWidth:360}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{fontSize:44}}>🕒</div>
          <h1 style={{fontSize:24,marginTop:6}}>Control de Horarios</h1>
          <div style={{color:C.tx2,fontSize:13,marginTop:4}}>Asistencia del personal</div>
        </div>
        <div style={{...S.card,display:'flex',flexDirection:'column',gap:12}}>
          <div><label style={S.label}>Usuario</label><input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} autoCapitalize="none" placeholder="usuario" required/></div>
          <div><label style={S.label}>Contraseña</label>
            <div style={{position:'relative'}}>
              <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="••••••" required/>
              <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:C.tx2}}>{showP?'🙈':'👁️'}</button>
            </div>
          </div>
          {err && <div style={{color:C.rojo,fontSize:13,fontWeight:500}}>{err}</div>}
          <button style={{...S.btn,...S.btnOro}}>Ingresar</button>
          <button type="button" onClick={recuperar} style={{background:'none',border:'none',color:C.oro,fontSize:13,cursor:'pointer',padding:4}}>¿Olvidaste tu contraseña?</button>
          {recuMsg && <div style={{fontSize:12,color:C.tx2,background:C.surf2,borderRadius:8,padding:'8px 10px',lineHeight:1.4}}>{recuMsg}</div>}
        </div>
        <p style={{color:C.tx2,fontSize:11,textAlign:'center',marginTop:14}}>Solo la dueña crea los usuarios. Si no tenés acceso, pedíselo a ella.</p>
      </form>
    </div>
  );
}

  const _DOW3=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const _lblD=f=>{const d=new Date(f+'T12:00:00');return _DOW3[d.getDay()]+' '+f.slice(8,10)+'/'+f.slice(5,7);};
  const _prox14=(()=>{const a=[];const d=new Date(fechaHoyISO()+'T12:00:00');for(let i=1;i<=14;i++){d.setDate(d.getDate()+1);a.push(d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2));}return a;})();
  const _sucsB=sucCtx?sucursales.filter(s=>s.id===sucCtx):sucursales;
  const _libres=evSet?_sucsB.map(s=>({suc:s,dias:_prox14.filter(f=>!evSet[s.id+'|'+f])})).filter(x=>x.dias.length):[];
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:4}}>Hola, {String(sesion.nombre||'').split(' ')[0]} 👋</h2>
      <p style={{color:C.tx2,fontSize:13,marginBottom:14}}>{rol==='dueno'?'Vista general':rol==='encargada'?'Tu sucursal':'Tu actividad'}</p>
      {(rol==='empleado'||rol==='mantenimiento') ? (
        <div style={{...S.card,textAlign:'center',padding:'26px 16px'}}>
          <div style={{fontSize:40}}>📍</div>
          <p style={{fontWeight:700,marginTop:8}}>{rol==='mantenimiento'?'¿Listo para marcar?':'¿Listo para fichar?'}</p>
          <p style={{color:C.tx2,fontSize:13,margin:'6px 0 14px'}}>Tocá el botón y seguí los pasos (ubicación + foto).</p>
          <button onClick={()=>setVista('fichar')} style={{...S.btn,...S.btnOro,width:'100%'}}>📍 {rol==='mantenimiento'?'Marcar ahora':'Fichar ahora'}</button>
        </div>
      ) : (
        <>
          {rol==='encargada' && (
            <div style={{...S.card,textAlign:'center',padding:'18px 16px',marginBottom:12}}>
              <div style={{fontSize:34}}>📍</div>
              <p style={{fontWeight:700,marginTop:4}}>Tu fichaje</p>
              <p style={{color:C.tx2,fontSize:12,margin:'4px 0 12px'}}>Fichá tu entrada y salida (ubicación + foto), igual que los empleados.</p>
              <button onClick={()=>setVista('fichar')} style={{...S.btn,...S.btnOro,width:'100%'}}>📍 Fichar entrada / salida</button>
            </div>
          )}
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <Metric n={empSuc.length} l="Empleados activos"/>
            <Metric n={sucCtx?1:sucursales.length} l={sucCtx?'Sucursal en foco':'Sucursales'} col={C.verde}/>
            <Metric n="0" l="Eventos hoy" col={C.amar}/>
            <Metric n="0" l="Alertas" col={C.rojo}/>
          </div>
          {evSet && _libres.length>0 && (
            <div style={{...S.card,marginTop:12,background:'#2a2418',border:'1px solid #4a3d1c'}}>
              <div style={{fontWeight:800,color:C.oro,fontSize:14,marginBottom:2}}>📣 Días sin eventos (próximas 2 semanas)</div>
              <div style={{fontSize:12,color:C.tx2,marginBottom:10}}>Buena oportunidad para hacer una promoción 😉</div>
              {_libres.map(x=>(
                <div key={x.suc.id} style={{marginBottom:8}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:5}}>{x.suc.nombre} <span style={{color:C.tx2,fontWeight:400}}>({x.dias.length} libre{x.dias.length!==1?'s':''})</span></div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{x.dias.map(f=><span key={f} style={{...S.chip,background:C.surf2,color:C.tx}}>{_lblD(f)}</span>)}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ── Sucursales (dueña) ── */
function Sucursales({sucursales,recargar}){
  const vacio={nombre:'',direccion:'',lat:'',lng:'',radio_metros:80,activa:true};
  const [form,setForm]=useState(vacio); const [editId,setEditId]=useState(null);
  const [geoMsg,setGeoMsg]=useState('');
  function editar(s){ setEditId(s.id); setForm({nombre:s.nombre||'',direccion:s.direccion||'',lat:s.lat??'',lng:s.lng??'',radio_metros:s.radio_metros||80,activa:s.activa!==false}); window.scrollTo(0,0); }
  function limpiar(){ setEditId(null); setForm(vacio); setGeoMsg(''); }
  function usarUbicacion(){
    if(!navigator.geolocation){ setGeoMsg('Este dispositivo no tiene GPS.'); return; }
    setGeoMsg('Obteniendo ubicación…');
    navigator.geolocation.getCurrentPosition(
      pos=>{ setForm(f=>({...f,lat:+pos.coords.latitude.toFixed(6),lng:+pos.coords.longitude.toFixed(6)})); setGeoMsg('✓ Ubicación tomada (precisión '+Math.round(pos.coords.accuracy)+' m). Hacelo parada en la puerta del salón.'); },
      err=>{ setGeoMsg('No se pudo: '+err.message); },
      {enableHighAccuracy:true,timeout:10000}
    );
  }
  async function guardar(){
    if(!form.nombre.trim()){ alert('Poné el nombre del salón.'); return; }
    const row={ nombre:form.nombre.trim(), direccion:form.direccion.trim(), lat:form.lat===''?null:+form.lat, lng:form.lng===''?null:+form.lng, radio_metros:+form.radio_metros||80, activa:form.activa };
    let ok;
    if(editId) ok=await dbUpdate('fichaje_sucursales',editId,row); else ok=!!(await dbInsert('fichaje_sucursales',row));
    if(ok){ await recargar(); limpiar(); }
  }
  async function borrar(s){ if(!window.confirm('¿Borrar '+s.nombre+'?'))return; if(await dbDelete('fichaje_sucursales',s.id)) await recargar(); }
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>🏢 Sucursales</h2>
      <div style={{...S.card,display:'flex',flexDirection:'column',gap:12,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14}}>{editId?'Editar salón':'Nuevo salón'}</div>
        <div><label style={S.label}>Nombre</label><input style={S.input} value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Fun Zone"/></div>
        <div><label style={S.label}>Dirección</label><input style={S.input} value={form.direccion} onChange={e=>setForm({...form,direccion:e.target.value})} placeholder="Calle 123, San Juan"/></div>
        <div style={{background:C.surf2,borderRadius:10,padding:12,border:'1px solid '+C.bd}}>
          <div style={{fontSize:12,color:C.tx2,marginBottom:8}}>📍 Ubicación (para validar el fichaje por GPS)</div>
          <button onClick={usarUbicacion} style={{...S.btn,...S.btnGhost,width:'100%',marginBottom:8}}>📍 Usar mi ubicación actual</button>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><label style={S.label}>Latitud</label><input style={S.input} value={form.lat} onChange={e=>setForm({...form,lat:e.target.value})} placeholder="(vacío)"/></div>
            <div style={{flex:1}}><label style={S.label}>Longitud</label><input style={S.input} value={form.lng} onChange={e=>setForm({...form,lng:e.target.value})} placeholder="(vacío)"/></div>
          </div>
          {geoMsg && <div style={{fontSize:11,color:C.verde,marginTop:8}}>{geoMsg}</div>}
        </div>
        <div><label style={S.label}>Radio permitido (metros)</label><input style={S.input} type="number" value={form.radio_metros} onChange={e=>setForm({...form,radio_metros:e.target.value})}/></div>
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:14}}><input type="checkbox" checked={form.activa} onChange={e=>setForm({...form,activa:e.target.checked})}/> Activa</label>
        <div style={{display:'flex',gap:8}}>
          <button onClick={guardar} style={{...S.btn,...S.btnOro,flex:1}}>{editId?'Guardar cambios':'Crear salón'}</button>
          {editId && <button onClick={limpiar} style={{...S.btn,...S.btnGhost}}>Cancelar</button>}
        </div>
      </div>
      {sucursales.map(s=>(
        <div key={s.id} style={{...S.card,marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700}}>{s.nombre} {s.activa===false&&<span style={{...S.chip,background:'#3a2020',color:C.rojo}}>inactiva</span>}</div>
            <div style={{fontSize:12,color:C.tx2}}>{s.direccion||'—'}</div>
            <div style={{fontSize:11,color:(s.lat!=null?C.verde:C.amar),marginTop:2}}>{s.lat!=null?('📍 GPS cargado · radio '+(s.radio_metros||80)+'m'):'⚠️ Sin GPS (cargalo parada en el salón)'}</div>
          </div>
          <button onClick={()=>editar(s)} style={{...S.btn,...S.btnGhost,padding:'8px 12px',minHeight:0,fontSize:13}}>Editar</button>
          <button onClick={()=>borrar(s)} style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'8px 11px',minHeight:0,fontSize:13}}>🗑</button>
        </div>
      ))}
    </div>
  );
}

/* ── Empleados (dueña) ── */
function Empleados({empleados,sucursales,recargar}){
  const vacio={legajo:'',nombre:'',rol_habitual:[],valor_hora:'',sucursales:[],foto_url:'',usuario:'',clave:'',rol_sistema:'empleado',sucursal_encargada:'',horario_fijo:[]};
  const [form,setForm]=useState(vacio); const [editId,setEditId]=useState(null); const [subiendo,setSubiendo]=useState(false);
  const parseRoles=v=>Array.isArray(v)?v:(v?String(v).split(',').map(s=>s.trim()).filter(Boolean):[]);
  function proximoLegajo(){ const usados=new Set((empleados||[]).map(e=>e.legajo).filter(x=>x!=null)); let n=1; while(usados.has(n))n++; return n; }
  useEffect(()=>{ if(editId===null && (form.legajo===''||form.legajo==null)) setForm(f=>({...f,legajo:proximoLegajo()})); },[empleados]);
  function editar(em){ setEditId(em.id); setForm({legajo:em.legajo??'',nombre:em.nombre||'',rol_habitual:parseRoles(em.rol_habitual),valor_hora:em.valor_hora??'',sucursales:em.sucursales||[],foto_url:em.foto_url||'',usuario:em.usuario||'',clave:em.clave||'',rol_sistema:em.rol_sistema||'empleado',sucursal_encargada:em.sucursal_encargada||'',horario_fijo:em.horario_fijo||[]}); window.scrollTo(0,0); }
  function limpiar(){ setEditId(null); setForm({...vacio,legajo:''}); }
  function toggleSuc(id){ setForm(f=>({...f,sucursales:(f.sucursales||[]).includes(id)?f.sucursales.filter(x=>x!==id):[...(f.sucursales||[]),id]})); }
  function toggleRol(r){ setForm(f=>({...f,rol_habitual:(f.rol_habitual||[]).includes(r)?f.rol_habitual.filter(x=>x!==r):[...(f.rol_habitual||[]),r]})); }
  function diaOn(dia){ return (form.horario_fijo||[]).some(x=>x.dia===dia); }
  function toggleDia(dia){ setForm(f=>{const hf=f.horario_fijo||[];return {...f,horario_fijo:hf.some(x=>x.dia===dia)?hf.filter(x=>x.dia!==dia):[...hf,{dia:dia,entrada:'09:00',salida:'18:00'}]};}); }
  function setHora(dia,campo,val){ setForm(f=>({...f,horario_fijo:(f.horario_fijo||[]).map(x=>x.dia===dia?{...x,[campo]:val}:x)})); }
  function repetirHoras(){ setForm(f=>{ const hf=f.horario_fijo||[]; if(hf.length<2)return f; const ord=[1,2,3,4,5,6,0]; const base=[...hf].sort((a,b)=>ord.indexOf(a.dia)-ord.indexOf(b.dia))[0]; return {...f,horario_fijo:hf.map(x=>({...x,entrada:base.entrada,salida:base.salida}))}; }); }
  async function elegirFoto(e){ const file=e.target.files[0]; if(!file)return; setSubiendo(true);
    const reader=new FileReader();
    reader.onload=async ev=>{ const url=await subirFoto(ev.target.result); setForm(f=>({...f,foto_url:url})); setSubiendo(false); };
    reader.readAsDataURL(file);
  }
  async function guardar(){
    if(!form.nombre.trim()){ alert('Poné el nombre.'); return; }
    if(!form.usuario.trim()||!form.clave){ alert('Poné usuario y contraseña para que pueda ingresar.'); return; }
    const row={ legajo:form.legajo===''?null:+form.legajo, nombre:form.nombre.trim(), rol_habitual:(form.rol_habitual||[]).join(', '), valor_hora:form.valor_hora===''?0:+form.valor_hora, sucursales:form.sucursales, foto_url:form.foto_url||null, usuario:form.usuario.trim(), clave:String(form.clave), rol_sistema:form.rol_sistema, sucursal_encargada:form.rol_sistema==='encargada'?(form.sucursal_encargada||null):null, horario_fijo:form.rol_sistema==='encargada'?(form.horario_fijo||[]):[], activo:true };
    let ok;
    if(editId) ok=await dbUpdate('fichaje_empleados',editId,row); else ok=!!(await dbInsert('fichaje_empleados',row));
    if(ok){ limpiar(); await recargar(); }
  }
  async function borrar(em){
    if(!window.confirm('¿Borrar a '+em.nombre+'? No se puede deshacer.'))return;
    // borrar primero lo que cuelga (fichajes y asignaciones) para que la base lo deje
    const fich=(await dbAll('fichaje_fichajes')).filter(x=>x.empleado_id===em.id);
    for(const x of fich) await dbDelete('fichaje_fichajes',x.id);
    const asg=(await dbAll('fichaje_evento_empleados')).filter(x=>x.empleado_id===em.id);
    for(const x of asg) await dbDelete('fichaje_evento_empleados',x.id);
    const ok=await dbDelete('fichaje_empleados',em.id);
    if(!ok) alert('No se pudo borrar. Probá de nuevo.');
    await recargar();
  }
  const sucNom=id=>{const s=sucursales.find(x=>x.id===id);return s?s.nombre:'';};
  const orden=[...empleados].sort((a,b)=>(a.legajo||999)-(b.legajo||999));
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>👥 Empleados</h2>
      <div style={{...S.card,display:'flex',flexDirection:'column',gap:12,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14}}>{editId?'Editar empleado':'Nuevo empleado'}</div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <div style={{width:64,height:64,borderRadius:12,background:C.surf2,border:'1px solid '+C.bd,overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {subiendo?<span className="spin"></span>:form.foto_url?<img src={form.foto_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:26}}>🙂</span>}
          </div>
          <label style={{...S.btn,...S.btnGhost,cursor:'pointer',fontSize:13,padding:'10px 14px'}}>📷 Foto<input type="file" accept="image/*" style={{display:'none'}} onChange={elegirFoto}/></label>
        </div>
        <div style={{display:'flex',gap:8}}>
          <div style={{width:90}}><label style={S.label}>Legajo N°</label><input style={S.input} type="number" value={form.legajo} onChange={e=>setForm({...form,legajo:e.target.value})} placeholder="1"/></div>
          <div style={{flex:1}}><label style={S.label}>Nombre completo</label><input style={S.input} value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Lorena Pérez"/></div>
        </div>
        <div>
          <label style={S.label}>Roles que puede hacer (tocá para sumar o quitar)</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {['Cocinero','Mozo','Auxiliar','Encargada','Mantenimiento'].map(r=>(
              <button type="button" key={r} onClick={()=>toggleRol(r)} style={{...S.btn,minHeight:0,padding:'8px 14px',fontSize:13,...((form.rol_habitual||[]).includes(r)?{background:C.oro,color:'#1A1A1A'}:S.btnGhost)}}>{r}{(form.rol_habitual||[]).includes(r)?'  ✕':''}</button>
            ))}
          </div>
        </div>
        <div><label style={S.label}>Valor hora ($)</label><input style={S.input} type="number" value={form.valor_hora} onChange={e=>setForm({...form,valor_hora:e.target.value})} placeholder="0"/></div>
        <div>
          <label style={S.label}>Sucursales donde trabaja (tocá para sumar o quitar)</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {sucursales.map(s=>(
              <button type="button" key={s.id} onClick={()=>toggleSuc(s.id)} style={{...S.btn,minHeight:0,padding:'8px 12px',fontSize:13,...((form.sucursales||[]).includes(s.id)?{background:C.oro,color:'#1A1A1A'}:S.btnGhost)}}>{s.nombre}{(form.sucursales||[]).includes(s.id)?'  ✕':''}</button>
            ))}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><label style={S.label}>Usuario (para login)</label><input style={S.input} value={form.usuario} onChange={e=>setForm({...form,usuario:e.target.value})} autoCapitalize="none" placeholder="lorena"/></div>
          <div style={{flex:1}}><label style={S.label}>Contraseña</label><input style={S.input} value={form.clave} onChange={e=>setForm({...form,clave:e.target.value})} placeholder="••••"/></div>
        </div>
        <div>
          <label style={S.label}>¿Qué puede hacer en la app? (permisos)</label>
          <select style={S.input} value={form.rol_sistema} onChange={e=>setForm({...form,rol_sistema:e.target.value})}>
            <option value="empleado">Empleado — solo fichar</option>
            <option value="encargada">Encargada — gestiona su salón</option>
            <option value="mantenimiento">Mantenimiento — marca y ve tareas</option>
            <option value="dueno">Dueña — acceso total</option>
          </select>
          <div style={{fontSize:11,color:C.tx2,marginTop:6,lineHeight:1.6}}>
            <b style={{color:C.tx}}>Empleado</b>: solo marca entrada y salida.<br/>
            <b style={{color:C.tx}}>Encargada</b>: ve y maneja los horarios, fichajes y pagos de su salón.<br/>
            <b style={{color:C.tx}}>Mantenimiento</b>: marca presencia (sin horario fijo) y ve las tareas de los dos salones.<br/>
            <b style={{color:C.tx}}>Dueña</b>: ve y maneja todo, los dos salones.
          </div>
        </div>
        {form.rol_sistema==='encargada' && (
          <div><label style={S.label}>Sucursal que maneja</label>
            <select style={S.input} value={form.sucursal_encargada} onChange={e=>setForm({...form,sucursal_encargada:e.target.value})}>
              <option value="">Elegí…</option>
              {sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
            </select>
          </div>
        )}
        {form.rol_sistema==='encargada' && (
          <div>
            <label style={S.label}>🗓️ Horario fijo (semanal)</label>
            <div style={{fontSize:11,color:C.tx2,marginBottom:8}}>Tocá los días que trabaja y poné entrada y salida. Queda fijo todas las semanas.</div>
            {[['Lunes',1],['Martes',2],['Miércoles',3],['Jueves',4],['Viernes',5],['Sábado',6],['Domingo',0]].map(([lbl,dia])=>{
              const on=diaOn(dia); const h=(form.horario_fijo||[]).find(x=>x.dia===dia)||{};
              return (
                <div key={dia} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <button type="button" onClick={()=>toggleDia(dia)} style={{...S.btn,minHeight:0,padding:'8px 10px',fontSize:12,width:104,textAlign:'left',flexShrink:0,...(on?{background:C.oro,color:'#1A1A1A'}:S.btnGhost)}}>{on?'✓ ':''}{lbl}</button>
                  {on ? (<>
                    <input type="time" value={h.entrada||'09:00'} onChange={e=>setHora(dia,'entrada',e.target.value)} style={{...S.input,flex:1,minWidth:0,marginBottom:0,padding:'8px 8px'}}/>
                    <span style={{color:C.tx2,fontSize:12,flexShrink:0}}>a</span>
                    <input type="time" value={h.salida||'18:00'} onChange={e=>setHora(dia,'salida',e.target.value)} style={{...S.input,flex:1,minWidth:0,marginBottom:0,padding:'8px 8px'}}/>
                  </>) : <span style={{fontSize:12,color:C.tx2}}>no trabaja</span>}
                </div>
              );
            })}
            {(form.horario_fijo||[]).length>1 && (
              <button type="button" onClick={repetirHoras} style={{...S.btn,...S.btnGhost,width:'100%',marginTop:6,fontSize:13}}>📋 Repetir el horario del 1° día en todos los marcados</button>
            )}
          </div>
        )}
        <div style={{display:'flex',gap:8}}>
          <button onClick={guardar} style={{...S.btn,...S.btnOro,flex:1}}>{editId?'Guardar cambios':'Crear empleado'}</button>
          {editId && <button onClick={limpiar} style={{...S.btn,...S.btnGhost}}>Cancelar</button>}
        </div>
      </div>
      {orden.map(em=>(
        <div key={em.id} style={{...S.card,marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:46,height:46,borderRadius:10,background:C.surf2,overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {em.foto_url?<img src={em.foto_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:20}}>🙂</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700}}>{em.legajo!=null&&<span className="num" style={{color:C.oro}}>#{em.legajo} </span>}{em.nombre}</div>

              <span style={{...S.chip,background:'#2a2418',color:C.oro,marginRight:4}}>{em.rol_sistema==='dueno'?'Dueña':em.rol_sistema==='encargada'?'Encargada':'Empleado'}</span>
              {(em.sucursales||[]).map(sucNom).filter(Boolean).join(' · ')}
            </div>
          </div>
          <button onClick={()=>editar(em)} style={{...S.btn,...S.btnGhost,padding:'8px 12px',minHeight:0,fontSize:13}}>Editar</button>

        </div>
      ))}
    </div>
  );
}

/* ════════ HORARIOS: lector de PDF + regla de ingreso ════════ */
function toMin(hhmm){ const m=String(hhmm||'').match(/(\d{1,2}):(\d{2})/); return m?(+m[1]*60+ +m[2]):0; }
function fmtMin(t){ t=((t%1440)+1440)%1440; const h=Math.floor(t/60),m=t%60; return ('0'+h).slice(-2)+':'+('0'+m).slice(-2); }
function restarMin(hhmm,min){ return fmtMin(toMin(hhmm)-min); }
const DOW=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
function fechaLinda(iso){ try{const[a,m,d]=iso.split('-');const dt=new Date(+a,+m-1,+d);return DOW[dt.getDay()]+' '+d+'/'+m;}catch(e){return iso;} }

// Lee el PDF (pdf.js) → líneas con su posición vertical (Y) y página, para poder separar eventos
async function leerLineasPdf(file){
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  const lineas=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const byY={};
    tc.items.forEach(it=>{ if(!it.transform)return; const y=Math.round(it.transform[5]); let key=y; for(const k in byY){ if(Math.abs(k-y)<=3){key=+k;break;} } (byY[key]=byY[key]||[]).push(it); });
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const t=byY[y].sort((a,b)=>a.transform[4]-b.transform[4]).map(i=>i.str).join(' ').replace(/\s+/g,' ').trim();
      if(t) lineas.push({t:t,y:y,p:p});
    });
  }
  return lineas;
}

// Interpreta las líneas → eventos. El PDF es una TABLA: cada línea trae "legajo + rol", y una
// línea (la del medio) trae paquete + horario (rango) + cliente. Los eventos se separan por el
// salto vertical: dentro de un evento las líneas están juntas (~9-20), entre eventos hay un salto grande (~37).
function parseHorarios(lineas,naLegajo){
  const reDia=/^(LUN|MAR|MI[EÉ]|JUE|VIE|S[AÁ]B|DOM)\.?\s/i;
  const reFecha=/(\d{2})\/(\d{2})\/(\d{4})/;
  const reRange=/(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/;            // horario del paquete (rango)
  const reRol=/(Cocinero|Mozo|Auxiliar)(\s*\d+\s*hs)?\s*-\s*\d{1,2}:\d{2}/i; // un rol + su hora de ingreso
  const reSkip=/Listado de horarios|Generado:|Indentif|Identif|Personal a/i;
  const GAP=26; // salto en Y que separa un evento del siguiente
  function parseCliente(txt,ev){
    if(!txt) return;
    const mm=txt.match(/^(.*?)\s*\((Madre|Padre|Tutor[a]?)\)\s*(.*)$/i);
    if(mm){ ev.cliente=mm[1].trim().replace(/^No registra adicionales\s*/i,''); ev.festejado=mm[3].replace(/,\s*$/,'').trim(); }
    else if(!/^No registra adicionales/i.test(txt) && !ev.cliente) ev.adicionales=txt.trim();
  }
  const eventos=[]; let dia=null, cur=null, prevY=null, forzar=false;
  function cerrar(){ if(cur && cur.hora_inicio && cur.roles.length) eventos.push(cur); cur=null; }
  for(const L of lineas){
    const ln=(L&&L.t)||'';
    if(reDia.test(ln)){ cerrar(); const m=ln.match(reFecha); if(m) dia=m[3]+'-'+m[2]+'-'+m[1]; prevY=null; forzar=true; continue; }
    if(reSkip.test(ln)){ forzar=true; prevY=null; continue; }   // título / cabecera repetida (cambio de página) → próximo evento nuevo
    if(!dia) continue;
    const nuevo = forzar || cur==null || (prevY!=null && (prevY-L.y)>GAP);
    forzar=false;
    if(nuevo){ cerrar(); cur={dia:dia,paquete:'',hora_inicio:'',hora_fin:'',cliente:'',festejado:'',adicionales:'',roles:[]}; }
    prevY=L.y;
    let resto=ln, leg=null;
    const mLeg=resto.match(/^(\d{1,3})\s+/);
    if(mLeg){ leg=+mLeg[1]; resto=resto.slice(mLeg[0].length); }
    else if(/^No Asignado/i.test(resto)){ leg=(naLegajo!=null?+naLegajo:null); resto=resto.replace(/^No Asignado\s*/i,''); }
    const mr=resto.match(reRange);
    if(mr){ // línea ancla: paquete + horario (a veces también un rol + el cliente)
      const pre=resto.slice(0,mr.index).trim(); if(pre) cur.paquete=pre;
      cur.hora_inicio=mr[1]; cur.hora_fin=mr[2];
      const tail=resto.slice(mr.index+mr[0].length).trim();
      const mRolA=tail.match(reRol);
      if(mRolA){ const rol=(mRolA[1]+(mRolA[2]||'')).replace(/\s+/g,' ').trim(); if(leg!=null) cur.roles.push({rol:rol,legajo:leg}); parseCliente(tail.slice(mRolA.index+mRolA[0].length).trim(),cur); }
      else parseCliente(tail,cur);
    } else { // línea de rol (legajo + rol) o suelta
      const mRol=resto.match(reRol);
      if(mRol){ const rol=(mRol[1]+(mRol[2]||'')).replace(/\s+/g,' ').trim(); if(leg!=null) cur.roles.push({rol:rol,legajo:leg}); }
      else parseCliente(resto,cur);
    }
  }
  cerrar();
  return eventos;
}

// Regla de ingreso: depende del EVENTO, no del empleado. Minutos configurables por posición.
// 1º evento del día → p1 antes · 2º → p2 antes · 3º y más → p3 antes.
function calcularIngresos(eventos, preps){
  const p1=+(preps&&preps.p1)||90, p2=+(preps&&preps.p2)||30, p3=+(preps&&preps.p3)||30;
  const byDia={}; eventos.forEach(e=>{(byDia[e.dia]=byDia[e.dia]||[]).push(e);});
  Object.values(byDia).forEach(list=>{
    list.sort((a,b)=>toMin(a.hora_inicio)-toMin(b.hora_inicio));
    list.forEach((e,idx)=>{
      e.orden_dia=idx+1;
      const mins = idx===0?p1 : idx===1?p2 : p3;
      e.roles.forEach(r=>{ r.ingreso=restarMin(e.hora_inicio,mins); });
    });
  });
  return eventos;
}

function Horarios({sesion,esDuena,sucursales,empleados,sucCtx}){
  const [tab,setTab]=useState('ver');
  const [sucSel,setSucSel]=useState(esDuena ? (sucCtx||(sucursales[0]||{}).id||'') : (sucCtx||''));
  const [eventos,setEventos]=useState([]); const [asign,setAsign]=useState([]); const [cargando,setCargando]=useState(false);
  const [previa,setPrevia]=useState(null); const [leyendo,setLeyendo]=useState(false); const [reempl,setReempl]=useState(null); const pdfFileRef=useRef(null); const [editEv,setEditEv]=useState(null);
  async function recomputarDia(fecha){
    const evsAll=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===sucSel&&e.fecha===fecha).sort((a,b)=>toMin(a.hora_inicio)-toMin(b.hora_inicio));
    const eeAll=await dbAll('fichaje_evento_empleados');
    for(let idx=0;idx<evsAll.length;idx++){ const ev=evsAll[idx]; const mins=idx===0?cfgGen.p1:idx===1?cfgGen.p2:cfgGen.p3; const ing=restarMin(ev.hora_inicio,mins); for(const a of eeAll.filter(x=>x.evento_id===ev.id)) await dbUpdate('fichaje_evento_empleados',a.id,{hora_ingreso_esperada:ing}); }
  }
  const [cfgGen,setCfgGen]=useState({p1:90,p2:30,p3:30,figuras:[],naLegajo:null});
  const [verPasados,setVerPasados]=useState(false);
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfgGen({p1:+g.data.prep_1||90,p2:+g.data.prep_2||30,p3:+g.data.prep_3||30,figuras:g.data.figuras_hora||[],naLegajo:(g.data.legajo_sin_id!=null?+g.data.legajo_sin_id:null)});})();},[]);
  const empByLegajo=l=>empleados.find(e=>e.legajo===l);
  const nomLegajo=l=>{const e=empByLegajo(l);return e?e.nombre:('#'+l+' (sin cargar)');};
  const sucNom=id=>{const s=sucursales.find(x=>x.id===id);return s?s.nombre:'';};

  async function cargar(){ if(!sucSel)return; setCargando(true);
    const ev=await dbAll('fichaje_eventos'); const ee=await dbAll('fichaje_evento_empleados');
    setEventos(ev.filter(e=>e.sucursal_id===sucSel).sort((a,b)=>(a.fecha+a.hora_inicio).localeCompare(b.fecha+b.hora_inicio)));
    setAsign(ee); setCargando(false);
  }
  useEffect(()=>{ if(tab==='ver') cargar(); },[tab,sucSel]);

  async function elegirPdf(e){ const file=e.target.files[0]; if(!file)return; setLeyendo(true); pdfFileRef.current=file;
    try{
      const lineas=await leerLineasPdf(file);
      let evs=parseHorarios(lineas,cfgGen.naLegajo);
      evs=calcularIngresos(evs,cfgGen);
      // autodetectar sucursal por paquetes
      const txt=evs.map(x=>x.paquete).join(' ').toLowerCase();
      let sucAuto=sucSel;
      if(/point/.test(txt)){ const pp=sucursales.find(s=>/play/i.test(s.nombre)); if(pp)sucAuto=pp.id; }
      else if(/estrella|deluxe|express/.test(txt)){ const fz=sucursales.find(s=>/fun/i.test(s.nombre)); if(fz)sucAuto=fz.id; }
      if(!evs.length){ alert('No pude leer eventos de ese PDF. Probá con la carga manual o avisame.'); }
      setPrevia({sucursal_id:sucAuto, eventos:evs}); setTab('pdf');
    }catch(err){ alert('No se pudo leer el PDF: '+(err.message||err)); }
    setLeyendo(false); e.target.value='';
  }

  async function guardarPrevia(){
    if(!previa||!previa.sucursal_id){ alert('Elegí la sucursal.'); return; }
    setCargando(true);
    // Antiduplicados: borrar los eventos de PDF ya cargados para esas mismas fechas y sucursal
    const fechasImp=[...new Set(previa.eventos.map(e=>e.dia).filter(Boolean))];
    if(fechasImp.length){
      const evPrev=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===previa.sucursal_id && e.origen==='pdf' && fechasImp.indexOf(e.fecha)>=0);
      if(evPrev.length){
        const eePrev=await dbAll('fichaje_evento_empleados');
        for(const e of evPrev){ for(const a of eePrev.filter(x=>x.evento_id===e.id)) await dbDelete('fichaje_evento_empleados',a.id); await dbDelete('fichaje_eventos',e.id); }
      }
    }
    for(const ev of previa.eventos){
      const row=await dbInsert('fichaje_eventos',{ sucursal_id:previa.sucursal_id, fecha:ev.dia, paquete:ev.paquete, hora_inicio:ev.hora_inicio, hora_fin:ev.hora_fin, orden_dia:ev.orden_dia||1, cliente:ev.cliente||null, festejado:ev.festejado||null, adicionales:ev.adicionales||null, origen:'pdf', creado_por:sesion.id });
      if(row){ for(const r of ev.roles){ const emp=empByLegajo(r.legajo); await dbInsert('fichaje_evento_empleados',{ evento_id:row.id, empleado_id:emp?emp.id:null, legajo:r.legajo, rol_en_evento:r.rol, hora_ingreso_esperada:r.ingreso||null }); } }
    }
    // Guardar el PDF en el historial (no reemplaza: queda la lista por semana)
    if(pdfFileRef.current){ try{ const url=await subirPDF(pdfFileRef.current); if(url){
      const fechas=previa.eventos.map(e=>e.dia).filter(Boolean).sort();
      const fmt=iso=>{try{const p=iso.split('-');return p[2]+'/'+p[1];}catch(e){return iso;}};
      const entry={url,subido:fechaHoyISO(),desde:fechas[0]?fmt(fechas[0]):'',hasta:fechas.length?fmt(fechas[fechas.length-1]):''};
      const cfgs=await dbAll('fichaje_config'); const ex=cfgs.find(c=>c.id==='pdf_'+previa.sucursal_id);
      let lista=(ex&&ex.data&&ex.data.lista)?ex.data.lista:((ex&&ex.data&&ex.data.url)?[{url:ex.data.url,subido:ex.data.subido}]:[]);
      lista=[entry,...lista].slice(0,8);
      await dbUpsert('fichaje_config',{id:'pdf_'+previa.sucursal_id,data:{lista}});
    } }catch(e){} pdfFileRef.current=null; }
    setCargando(false); setPrevia(null); setTab('ver');
    alert('✓ Horarios guardados');
  }

  async function borrarEvento(id){
    if(!window.confirm('¿Borrar este evento?'))return;
    setCargando(true);
    // borrar primero lo que cuelga del evento (fichajes y asignaciones), si no la base no deja borrarlo
    const fich=(await dbAll('fichaje_fichajes')).filter(x=>x.evento_id===id);
    for(const x of fich) await dbDelete('fichaje_fichajes',x.id);
    for(const a of asign.filter(a=>a.evento_id===id)) await dbDelete('fichaje_evento_empleados',a.id);
    const ok=await dbDelete('fichaje_eventos',id);
    setCargando(false);
    if(!ok) alert('No se pudo borrar el evento. Probá de nuevo.');
    cargar();
  }
  async function borrarTodos(){
    if(!eventos.length){ alert('No hay eventos para borrar.'); return; }
    if(!window.confirm('⚠️ Vas a BORRAR TODOS los eventos de '+sucNom(sucSel)+' ('+eventos.length+' eventos). ¿Seguir?'))return;
    if(!window.confirm('¿Estás segura? Esto borra TODOS los eventos de '+sucNom(sucSel)+' y NO se puede deshacer.'))return;
    setCargando(true);
    const ids=eventos.map(e=>e.id);
    const fich=(await dbAll('fichaje_fichajes')).filter(x=>ids.indexOf(x.evento_id)>=0);
    for(const x of fich) await dbDelete('fichaje_fichajes',x.id);
    for(const a of asign.filter(a=>ids.indexOf(a.evento_id)>=0)) await dbDelete('fichaje_evento_empleados',a.id);
    for(const id of ids) await dbDelete('fichaje_eventos',id);
    setCargando(false); cargar();
    alert('✓ Listo, se borraron todos los eventos de '+sucNom(sucSel)+'.');
  }
  async function hacerReemplazo(asgId, nuevoEmpId){ const emp=empleados.find(e=>e.id===nuevoEmpId); if(!emp)return; await dbUpdate('fichaje_evento_empleados',asgId,{empleado_id:emp.id,legajo:emp.legajo,fue_reemplazo:true}); setReempl(null); cargar(); }

  const tabBtn=(id,t)=>(<button onClick={()=>setTab(id)} style={{...S.btn,flex:1,minHeight:0,padding:'10px',fontSize:13,...(tab===id?S.btnOro:S.btnGhost)}}>{t}</button>);
  const porDia={}; eventos.forEach(e=>{(porDia[e.fecha]=porDia[e.fecha]||[]).push(e);});
  const _hoyISO=fechaHoyISO(); const _lunesEsta=lunesDeSemana(_hoyISO,0); const _lunesAnt=lunesDeSemana(_hoyISO,1);
  const _diasTodos=Object.keys(porDia).sort(); const _diasV=_diasTodos.filter(f=>verPasados?(f>=_lunesAnt):(f>=_lunesEsta)); const _nPasados=_diasTodos.filter(f=>f>=_lunesAnt&&f<_lunesEsta).length;
  const _fdm=iso=>iso.slice(8,10)+'/'+iso.slice(5,7);
  function _semanas(dias){ const g={}; dias.forEach(f=>{const lun=lunesDeSemana(f,0);(g[lun]=g[lun]||[]).push(f);}); return Object.keys(g).sort().map(lun=>{const d2=new Date(lun+'T12:00:00');d2.setDate(d2.getDate()+6);const dom=d2.getFullYear()+'-'+('0'+(d2.getMonth()+1)).slice(-2)+'-'+('0'+d2.getDate()).slice(-2);const dd=g[lun].slice().sort();return {lunes:lun,domingo:dom,dias:dd,total:dd.reduce((s,f)=>s+(porDia[f]?porDia[f].length:0),0)};}); }

  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>🗓️ Horarios</h2>
      {esDuena && (
        <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={{...S.input,marginBottom:12}}>
          {sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
        </select>
      )}
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>{tabBtn('ver','📅 Ver')}{tabBtn('pdf','📄 PDF')}{tabBtn('manual','✏️ Manual')}{tabBtn('encuestas','📝 Encuestas')}</div>
      {tab==='encuestas' && <EncuestasView esDuena={esDuena} sucCtx={sucCtx} sucursales={sucursales}/>}

      {tab==='ver' && (cargando ? <div style={{textAlign:'center',padding:30}}><span className="spin"></span></div> :
        _diasV.length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:'26px'}}>{(_nPasados>0&&!verPasados)?<span>No hay horarios de esta semana en adelante.<br/><button onClick={()=>setVerPasados(true)} style={{...S.btn,...S.btnGhost,marginTop:10,fontSize:13}}>📋 Ver semana anterior ({_nPasados})</button></span>:<span>No hay horarios cargados para {sucNom(sucSel)}.<br/>Subí un PDF o cargá manual.</span>}</div> :
        <React.Fragment>
        {_nPasados>0 && <button onClick={()=>setVerPasados(v=>!v)} style={{...S.btn,...S.btnGhost,marginBottom:12,fontSize:12,padding:'7px 12px',minHeight:0}}>{verPasados?'Ocultar semana anterior':'📋 Ver semana anterior ('+_nPasados+')'}</button>}
        {_semanas(_diasV).map(sem=>(
          <div key={sem.lunes} style={{marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:13,color:C.tx,background:C.surf2,borderRadius:8,padding:'7px 11px',marginBottom:8}}>📅 Semana del {_fdm(sem.lunes)} al {_fdm(sem.domingo)} <span style={{color:C.oro}}>({sem.total} evento{sem.total!==1?'s':''})</span></div>
            {sem.dias.map(f=>(
          <div key={f} style={{marginBottom:12,opacity:f<_hoyISO?.6:1}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:6,fontFamily:'Arial, Helvetica, sans-serif',color:f<_hoyISO?C.tx2:(f===_hoyISO?C.verde:C.oro)}}>{fechaLinda(f)} <span style={{color:C.tx2,fontWeight:600}}>({(porDia[f]||[]).length} evento{(porDia[f]||[]).length!==1?'s':''})</span>{f===_hoyISO?'  · HOY':(f<_hoyISO?'  · pasó':'')}</div>
            {porDia[f].map(ev=>{ const rs=asign.filter(a=>a.evento_id===ev.id); return (
              <div key={ev.id} style={{...S.card,marginBottom:8}}>

                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={()=>setEditEv({ev,rs})} style={{...S.btn,...S.btnGhost,padding:'6px 10px',minHeight:0,fontSize:12}}>✏️ Editar</button>
                    <button onClick={()=>borrarEvento(ev.id)} style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'6px 10px',minHeight:0,fontSize:12}}>🗑</button>
                  </div>
                </div>
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:5}}>
                  {rs.map(a=>(
                    <div key={a.id} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,background:C.surf2,borderRadius:8,padding:'7px 9px'}}>

              </div>

      {tab==='ver' && eventos.length>0 && (

      )}

      {tab==='pdf' && (
        !previa ? (
          <div style={{...S.card,textAlign:'center',padding:'28px 16px'}}>
            <div style={{fontSize:38}}>📄</div>
            <p style={{color:C.tx2,fontSize:13,margin:'10px 0 16px',lineHeight:1.5}}>Subí el PDF de horarios (Fun Zone o Play Point). Lo leo y te muestro todo para confirmar antes de guardar.</p>

          </div>

            <div style={{...S.card,marginBottom:12}}>
              <label style={S.label}>Guardar en sucursal</label>

/* ════════ B3: PAGO MANTENIMIENTO (por horas fichadas × valor hora, por rango) ════════ */
function PagoMantenimiento({esDuena,sucursales,empleados,sucCtx}){
  const [desde,setDesde]=useState(''); const [hasta,setHasta]=useState(''); const [empSel,setEmpSel]=useState('');
  const [res,setRes]=useState(null); const [cargando,setCargando]=useState(false); const [abierto,setAbierto]=useState({});
  const money=n=>'$'+Math.round(n).toLocaleString('es-AR');
  const fmtDia=d=>{try{const p=d.split('-');return p[2]+'/'+p[1];}catch(e){return d;}};
  const mants=empleados.filter(e=>e.rol_sistema==='mantenimiento').sort((a,b)=>(a.legajo||999)-(b.legajo||999));
  async function calcular(){
    if(!desde||!hasta){alert('Elegí el rango de fechas.');return;}
    setCargando(true); setRes(null);
    const fich=await dbAll('fichaje_fichajes');
    const filas=mants.map(emp=>{
      const fs=fich.filter(x=>x.empleado_id===emp.id && fechaDeTs(x.ts)>=desde && fechaDeTs(x.ts)<=hasta).sort((a,b)=>String(a.ts).localeCompare(String(b.ts)));
      const byDia={}; fs.forEach(f=>{const d=fechaDeTs(f.ts);(byDia[d]=byDia[d]||[]).push(f);});
      const dias=[]; let totalH=0;
      Object.keys(byDia).sort().forEach(d=>{
        const arr=byDia[d]; let h=0,inT=null,incompleto=false;
        arr.forEach(f=>{ if(f.tipo==='entrada'){inT=new Date(f.ts).getTime();} else if(f.tipo==='salida'){ if(inT!=null){h+=(new Date(f.ts).getTime()-inT)/3600000;inT=null;} } });
        if(inT!=null)incompleto=true;
        h=Math.max(0,h); dias.push({dia:d,horas:h,incompleto}); totalH+=h;
      });
      const vh=+(emp.valor_hora||0);
      return {emp,dias,totalH,vh,monto:totalH*vh,sinValor:vh===0};
    }).filter(f=>f.dias.length);
    setRes({filas,total:filas.reduce((s,f)=>s+f.monto,0)}); setAbierto({}); setCargando(false);
  }
  function exportarPDF(){
    if(!res)return; const {jsPDF}=window.jspdf; const doc=new jsPDF();
    const filas=empSel?res.filas.filter(f=>f.emp.id===empSel):res.filas; const total=filas.reduce((s,f)=>s+f.monto,0);
    let y=16; doc.setFontSize(15); doc.text('Pago Mantenimiento',14,y); y+=7; doc.setFontSize(10); doc.text('Período: '+desde+' al '+hasta,14,y); y+=8;
    filas.forEach(f=>{ if(y>270){doc.addPage();y=16;} doc.setFontSize(11); doc.text(f.emp.nombre+'  ('+money(f.vh)+'/h)',14,y); y+=5; doc.setFontSize(9);
      f.dias.forEach(d=>{ if(y>285){doc.addPage();y=16;} doc.text('  '+d.dia+'  '+d.horas.toFixed(2)+' hs'+(d.incompleto?' (sin salida)':''),16,y); y+=4.5; });
      doc.setFontSize(10); doc.text('  TOTAL: '+f.totalH.toFixed(2)+' hs = '+money(f.monto),16,y); y+=8; });
    if(y>275){doc.addPage();y=16;} doc.setFontSize(13); doc.text('TOTAL A PAGAR: '+money(total),14,y);
    doc.save('mantenimiento_'+desde+'_'+hasta+'.pdf');
  }
  return (
    <div>
      <div style={{...S.card,marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
        <select value={empSel} onChange={e=>setEmpSel(e.target.value)} style={S.input}><option value="">Todos (mantenimiento)</option>{mants.map(e=><option key={e.id} value={e.id}>{(e.legajo!=null?('#'+e.legajo+' '):'')+e.nombre}</option>)}</select>
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><label style={S.label}>Desde</label><input type="date" style={S.input} value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div style={{flex:1}}><label style={S.label}>Hasta</label><input type="date" style={S.input} value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
        </div>
        <button onClick={calcular} disabled={cargando} style={{...S.btn,...S.btnOro}}>{cargando?'Calculando…':'Calcular pago'}</button>
        <div style={{fontSize:11,color:C.tx2}}>Suma las horas entre entrada y salida de cada día × valor hora. Sirve para pagar por semana.</div>
      </div>
      {mants.length===0 && <div style={{...S.card,textAlign:'center',color:C.tx2,padding:24}}>No hay personal de mantenimiento cargado.</div>}
      {res && (()=>{ const filas=empSel?res.filas.filter(f=>f.emp.id===empSel):res.filas; const total=filas.reduce((s,f)=>s+f.monto,0); const uno=filas.length===1; return filas.length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:24}}>No hay marcas en ese rango.</div> : (
        <div>
          <div style={{...S.card,marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:12,color:C.tx2}}>Total a pagar</div><div className="num" style={{fontSize:26,color:C.verde}}>{money(total)}</div></div>
            <button onClick={exportarPDF} style={{...S.btn,...S.btnGhost}}>⬇ PDF</button>
          </div>
          {filas.map(f=>{ const op=uno||abierto[f.emp.id]; return (
            <div key={f.emp.id} style={{...S.card,marginBottom:10}}>
              <button onClick={()=>setAbierto(p=>({...p,[f.emp.id]:!op}))} style={{width:'100%',background:'none',border:'none',cursor:'pointer',color:C.tx,textAlign:'left',padding:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8}}>
                  <div style={{fontWeight:700}}>{f.emp.legajo!=null&&<span className="num" style={{color:C.oro}}>#{f.emp.legajo} </span>}{f.emp.nombre} <span style={{color:C.tx2,fontWeight:400,fontSize:13}}>{op?'▾':'▸'}</span></div>
                  <div className="num" style={{fontSize:18,color:C.verde}}>{money(f.monto)}</div>
                </div>
                <div style={{fontSize:11,color:C.tx2,marginTop:2,textAlign:'left'}}>{f.sinValor?<span style={{color:C.amar}}>⚠️ Falta cargar el valor hora</span>:(money(f.vh)+'/h · '+f.totalH.toFixed(2)+' hs')}</div>
              </button>
              {op && <div style={{display:'flex',flexDirection:'column',gap:3,marginTop:8,paddingTop:8,borderTop:'1px solid '+C.bd}}>
                {f.dias.map((d,i)=>(<div key={i} style={{fontSize:12,color:C.tx2,display:'flex',justifyContent:'space-between',gap:8}}><span>{fmtDia(d.dia)}{d.incompleto?' ⚠️ sin salida':''}</span><span style={{whiteSpace:'nowrap'}}>{d.horas.toFixed(2)} hs</span></div>))}
              </div>}
            </div>
          );})}
        </div>
      );})()}
    </div>
  );
}
function Pagos({sesion,esDuena,sucursales,empleados,sucCtx}){
  const [sucSel,setSucSel]=useState(esDuena?(sucCtx||(sucursales[0]||{}).id||''):(sucCtx||''));
  const [desde,setDesde]=useState(''); const [hasta,setHasta]=useState('');
  const [cfg,setCfg]=useState({horas_simple:4.5,horas_doble:8,horas_triple:12,gap_horas:2,bonus_excelente:7000});
  const [res,setRes]=useState(null); const [cargando,setCargando]=useState(false); const [tab,setTab]=useState('liq'); const [empSel,setEmpSel]=useState(''); const [abierto,setAbierto]=useState({});
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfg(v=>({...v,...g.data}));})();},[]);
  const sucNom=id=>{const s=sucursales.find(x=>x.id===id);return s?s.nombre:'';};
  const money=n=>'$'+Math.round(n).toLocaleString('es-AR');

  async function calcular(){
    if(!sucSel||!desde||!hasta){alert('Elegí sucursal y rango de fechas.');return;}
    setCargando(true); setRes(null);
    const evs=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===sucSel && e.fecha>=desde && e.fecha<=hasta);
    const ids=new Set(evs.map(e=>e.id)); const evById={}; evs.forEach(e=>evById[e.id]=e);
    const ee=(await dbAll('fichaje_evento_empleados')).filter(a=>ids.has(a.evento_id));
    const porEmp={}; ee.forEach(a=>{ const key=a.empleado_id||('leg:'+a.legajo); (porEmp[key]=porEmp[key]||[]).push(a); });
    // Bonus encuesta "Excelente": cruzar con las encuestas del salón (por fecha + hora + salón)
    const sucNombreSel=(sucNom(sucSel)||'').toLowerCase();
    const encs=await cargarEncuestasSalon();
    const excByKey={}; encs.forEach(e=>{ if((e._sucNombre||'').toLowerCase()!==sucNombreSel)return; const exc=e.encuesta&&(e.encuesta.personal==='excelente'||e.encuesta.encargada==='excelente'); if(!exc)return; const fecha=(e.anio||'')+'-'+_pad2(e.mes)+'-'+_pad2(e.dia); excByKey[fecha+'|'+String(e.hIni||'').trim()]=true; });
    const figMap={}; (cfg.figuras_hora||[]).forEach(f=>{ figMap[String(f.nombre||'').toLowerCase()]=!!f.bonus; });
    const bonusRolOk=rol=>{ if(!/\d+\s*hs/i.test(rol||''))return true; return figMap[String(rol||'').toLowerCase()]===true; };
    const bonusMonto=+cfg.bonus_excelente||0;
    // Penalización por llegadas tarde: cada día tarde no cobra ese día; a las N tardanzas del mes, suspensión de X días.
    const maxT=+cfg.tarde_max_mes||5, suspD=+cfg.tarde_suspension_dias||30;
    const allEv=await dbAll('fichaje_eventos'); const evDate={}; allEv.forEach(e=>evDate[e.id]=e.fecha);
    const fichajes=await dbAll('fichaje_fichajes');
    const lateByEmp={}; fichajes.forEach(f=>{ if(f.tipo==='entrada'&&f.estado==='tarde'){ const d=f.evento_id?evDate[f.evento_id]:fechaDeTs(f.ts); if(d)(lateByEmp[f.empleado_id]=lateByEmp[f.empleado_id]||[]).push(d); } });
    const _sumarDias=(iso,n)=>{const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);};
    function bonusBloqueado(empId,fecha){ const ds=lateByEmp[empId]||[]; if(ds.indexOf(fecha)>=0)return true; const byM={}; ds.forEach(d=>(byM[d.slice(0,7)]=byM[d.slice(0,7)]||[]).push(d)); return Object.values(byM).some(arr=>{ arr.sort(); if(arr.length<maxT)return false; const ini=arr[maxT-1]; return fecha>=ini && fecha<=_sumarDias(ini,suspD); }); }
    const filas=[];
    Object.keys(porEmp).forEach(key=>{
      const asigs=porEmp[key];
      const emp=empleados.find(e=>e.id===asigs[0].empleado_id)||empleados.find(e=>e.legajo===asigs[0].legajo);
      const valorHora=emp?+(emp.valor_hora||0):0;
      const nombre=emp?emp.nombre:('#'+asigs[0].legajo+' (sin cargar)');
      const byDia={}; asigs.forEach(a=>{ const e=evById[a.evento_id]; if(e)(byDia[e.fecha]=byDia[e.fecha]||[]).push({a,e}); });
      const detalle=[];
      Object.keys(byDia).sort().forEach(dia=>{
        const xhs=[], normal=[];
        byDia[dia].forEach(it=>{ const m=String(it.a.rol_en_evento||'').match(/(\d+)\s*hs/i); if(m)xhs.push({...it,horas:+m[1]}); else normal.push(it); });
        xhs.forEach(it=>detalle.push({dia,desc:it.a.rol_en_evento+' · '+it.e.paquete,horas:it.horas}));
        normal.sort((p,q)=>toMin(p.e.hora_inicio)-toMin(q.e.hora_inicio));
        let grupo=[], finPrev=null;
        const cerrar=()=>{ if(!grupo.length)return; const n=grupo.length; let horas=n===1?+cfg.horas_simple:n===2?+cfg.horas_doble:+cfg.horas_triple; const tipo=n===1?'Evento simple':n===2?'Evento doble':(n+' eventos'); const deluxe=grupo.filter(g=>/deluxe/i.test(g.e.paquete||'')).length; const extra=deluxe*(+cfg.horas_extra_deluxe||0); if(extra)horas+=extra; detalle.push({dia,desc:tipo+' ('+grupo.map(g=>g.e.paquete).join(' + ')+')'+(extra?(' +'+extra+'h Deluxe'):''),horas}); grupo=[]; };
        normal.forEach(it=>{ const ini=toMin(it.e.hora_inicio); if(finPrev!==null && (ini-finPrev)/60 >= +cfg.gap_horas) cerrar(); grupo.push(it); let fin=toMin(it.e.hora_fin); if(fin<ini)fin+=1440; finPrev=fin; });
        cerrar();
      });
      const horasTot=detalle.reduce((s,d)=>s+d.horas,0);
      let bonusCount=0, bonusPerdido=0; const empId=emp?emp.id:null;
      asigs.forEach(a=>{ const e=evById[a.evento_id]; if(!e)return; if(excByKey[e.fecha+'|'+String(e.hora_inicio||'').trim()] && bonusRolOk(a.rol_en_evento)){ if(empId && bonusBloqueado(empId,e.fecha)) bonusPerdido++; else bonusCount++; } });
      const bonusTot=bonusCount*bonusMonto;
      filas.push({key,nombre,legajo:asigs[0].legajo,valorHora,detalle,horasTot,montoHoras:horasTot*valorHora,bonusCount,bonusTot,bonusPerdido,monto:horasTot*valorHora+bonusTot,sinValor:valorHora===0});
    });
    filas.sort((a,b)=>(a.legajo||999)-(b.legajo||999));
    setRes({filas,total:filas.reduce((s,f)=>s+f.monto,0),totalBonus:filas.reduce((s,f)=>s+f.bonusTot,0)}); setCargando(false);
  }

  function exportarPDF(){

                {f.bonusTot>0 && <div style={{fontSize:12,color:C.oro,fontWeight:700,display:'flex',justifyContent:'space-between',gap:8}}><span>💜 Bonus encuesta Excelente ×{f.bonusCount}</span><span style={{whiteSpace:'nowrap'}}>+{money(f.bonusTot)}</span></div>}
                {f.bonusPerdido>0 && <div style={{fontSize:11,color:C.rojo,fontWeight:700}}>⏰ Perdió {f.bonusPerdido} bonus por llegadas tarde</div>}
              </div>}
            </div>
          );})}
          <div style={{...S.card,background:'#2a2418',border:'1px solid #4a3d1c',fontSize:12,color:C.tx2}}>💜 <b style={{color:C.oro}}>Bonus "Excelente"</b>: ${(+cfg.bonus_excelente).toLocaleString('es-AR')} por cada evento que el papá calificó Excelente. Total bonus del período: <b style={{color:C.oro}}>{money(res.totalBonus||0)}</b>. {(res.totalBonus===0)&&'(Si no aparece, revisá que la encuesta esté Excelente y que la fecha/hora del evento coincida con la cargada en el salón.)'}</div>

    const filas=Object.keys(porEmp).map(k=>{ const o=porEmp[k]; const total=o.items.length; const conObs=o.items.filter(it=>it.negs.length>0); return { key:k, nombre:o.emp?o.emp.nombre:('#'+o.legajo+' (sin cargar)'), legajo:o.emp?o.emp.legajo:o.legajo, total, obs:conObs.length, detalle:conObs }; });

/* ════════ COMPARACIÓN: sistema vs lo que declaró el empleado ════════ */
function Comparacion({esDuena,sucursales,empleados,sucCtx}){
  const [sucSel,setSucSel]=useState(esDuena?(sucCtx||(sucursales[0]||{}).id||''):(sucCtx||''));
  const [desde,setDesde]=useState(''); const [hasta,setHasta]=useState('');
  const [gapH,setGapH]=useState(2); const [res,setRes]=useState(null); const [cargando,setCargando]=useState(false); const [empSel,setEmpSel]=useState(''); const [abierto,setAbierto]=useState({});
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data&&g.data.gap_horas)setGapH(+g.data.gap_horas);})();},[]);
  const TL={simple:'Simple',doble:'Doble','2simples':'2 simples',triple:'Triple',varios:'Varios'};
  const tl=t=>t?TL[t]||t:'—';
  function tipoSistema(evs){
    const norm=evs.slice().sort((a,b)=>toMin(a.hora_inicio)-toMin(b.hora_inicio));
    const groups=[]; let cur=[],finPrev=null;
    norm.forEach(ev=>{const ini=toMin(ev.hora_inicio); if(finPrev!==null && (ini-finPrev)/60>=gapH){groups.push(cur);cur=[];} cur.push(ev); let fin=toMin(ev.hora_fin); if(fin<ini)fin+=1440; finPrev=fin;});
    if(cur.length)groups.push(cur);
    if(groups.length===0)return null;
    if(groups.length===1){const n=groups[0].length;return n===1?'simple':n===2?'doble':'triple';}
    if(groups.length===2&&groups[0].length===1&&groups[1].length===1)return '2simples';
    return 'varios';
  }
  async function calcular(){
    if(!sucSel||!desde||!hasta){alert('Elegí sucursal y rango de fechas.');return;}
    setCargando(true); setRes(null);
    const empById={}; empleados.forEach(e=>empById[e.id]=e);
    const evs=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===sucSel && e.fecha>=desde && e.fecha<=hasta);
    const evById={}; evs.forEach(e=>evById[e.id]=e); const ids=new Set(evs.map(e=>e.id));
    const ee=(await dbAll('fichaje_evento_empleados')).filter(a=>ids.has(a.evento_id));
    const cfgs=await dbAll('fichaje_config');
    const declByEmp={}; cfgs.forEach(c=>{ if(String(c.id).indexOf('auto_')===0&&c.data) declByEmp[String(c.id).slice(5)]=c.data; });
    const sys={}; // empId -> {fecha:[ev]}
    ee.forEach(a=>{ const e=evById[a.evento_id]; if(!e)return; const emp=empById[a.empleado_id]||empleados.find(x=>x.legajo===a.legajo); const key=emp?emp.id:('leg:'+a.legajo); const esFig=/\d+\s*hs/i.test(a.rol_en_evento||''); (sys[key]=sys[key]||{}); (sys[key][e.fecha]=sys[key][e.fecha]||[]); if(!esFig) sys[key][e.fecha].push({hora_inicio:e.hora_inicio,hora_fin:e.hora_fin}); });
    const keys=new Set([...Object.keys(sys),...Object.keys(declByEmp)]);
    const filas=[];
    keys.forEach(key=>{
      const emp=empById[key]; const nombre=emp?emp.nombre:(key.indexOf('leg:')===0?('#'+key.slice(4)+' (sin cargar)'):'(?)'); const legajo=emp?emp.legajo:null;
      const sDias=sys[key]||{}; const dDataAll=declByEmp[key]||{};
      const dDias={}; Object.keys(dDataAll).forEach(f=>{ if(f>=desde&&f<=hasta) dDias[f]=dDataAll[f]; });
      const fechas=[...new Set([...Object.keys(sDias),...Object.keys(dDias)])].sort();
      if(!fechas.length)return;
      const rows=fechas.map(f=>{ const st=sDias[f]?tipoSistema(sDias[f]):null; const dt=dDias[f]?dDias[f].tipo:null;
        let estado; if(st&&dt) estado=(st===dt)?'ok':'dif'; else if(st&&!dt) estado='noDecl'; else estado='noSis';
        return {f,st,dt,estado}; });
      const difs=rows.filter(r=>r.estado!=='ok').length;
      filas.push({key,nombre,legajo,rows,difs});
    });
    filas.sort((a,b)=>(b.difs-a.difs)||((a.legajo||999)-(b.legajo||999)));
    setRes(filas); setCargando(false);
  }
  const ic={ok:['✅',C.verde],dif:['⚠️',C.amar],noSis:['❓',C.rojo],noDecl:['〰️',C.tx2]};
  const txtEstado={ok:'Coincide',dif:'Distinto',noSis:'Dice que trabajó, no está cargado',noDecl:'Cargado, no lo confirmó'};
  return (
    <div>
      <div style={{...S.card,marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
        {esDuena && <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={S.input}>{sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select>}
        <select value={empSel} onChange={e=>setEmpSel(e.target.value)} style={S.input}><option value="">Todos los empleados</option>{empleados.filter(e=>!sucSel||((e.sucursales||[]).includes(sucSel))).sort((a,b)=>(a.legajo||999)-(b.legajo||999)).map(e=><option key={e.id} value={e.id}>{(e.legajo!=null?('#'+e.legajo+' '):'')+e.nombre}</option>)}</select>
        <div style={{display:'flex',gap:8}}>
