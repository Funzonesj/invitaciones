const _pad2=n=>('0'+(n||'')).slice(-2);
async function cargarEncuestasSalon(){
  try{
    const r=await SB.from('eventos').select('id,data'); const rows=r.data||[];
    const cfgSuc=(rows.find(x=>x.id==='__config_suc__')||{}).data||[];
    const nameById={}; (cfgSuc||[]).forEach(s=>{nameById[s.id]=s.nombre;});
    return rows.filter(x=>x.data&&x.data.encuesta&&!String(x.id).startsWith('__config'))
      .map(x=>({...x.data,_id:x.id,_sucNombre:nameById[x.data.sucId]||''}))
      .sort((a,b)=>((b.encuesta&&b.encuesta.ts)||0)-((a.encuesta&&a.encuesta.ts)||0));
  }catch(e){return [];}
}
function encuestaNegativos(q){ const o=[]; q=q||{};
  if(q.encargada==='mala')o.push('Encargada: Mala 😕'); else if(q.encargada==='buena')o.push('Encargada: Buena 🙂');
  if(q.personal==='mala')o.push('Atención del personal: Mala 😕'); else if(q.personal==='buena')o.push('Atención del personal: Buena 🙂');
  if(q.m1===false)o.push('No estuvieron atentos a los pedidos');
  if(q.m2===false)o.push('No estuvieron presentes todo el evento');
  if(q.m3===false)o.push('No hubo bebida constante (jarra de agua)');
  if(q.m4===false)o.push('Mesas no quedaron limpias/ordenadas');
  if(q.aux===false)o.push('Auxiliares no estuvieron presentes en los juegos');
  if(q.banos==='no')o.push('Los baños no estuvieron limpios');
  return o;
}
function EncuestaImg({ev,verPrivado}){
  const q=ev.encuesta||{};
  const cal=v=>v==='excelente'?['🤩 Excelente',C.verde]:v==='buena'?['🙂 Buena',C.amar]:v==='mala'?['😕 Mala',C.rojo]:['—',C.tx2];
  const sn=v=>v===true?['Sí',C.verde]:v===false?['No',C.rojo]:['—',C.tx2];
  const Row=({l,par})=>(<div style={{display:'flex',justifyContent:'space-between',gap:8,padding:'5px 0',borderBottom:'1px solid '+C.bd,fontSize:13}}><span style={{color:C.tx2}}>{l}</span><b style={{color:par[1]}}>{par[0]}</b></div>);
  const cab=(<div style={{fontSize:12,color:C.tx2,marginBottom:10}}>{ev.festejado||ev.nombre||''} · {q.fecha||((ev.dia||'')+'/'+(ev.mes||'')+'/'+(ev.anio||''))}{(verPrivado&&ev._sucNombre)?(' · '+ev._sucNombre):''}</div>);
  // Audio sin descarga (para el empleado)
  const audioMsg=(noDl)=>(q.agradecimientoAudio||(q.agradecimiento&&String(q.agradecimiento).trim()))?(
    <div style={{marginTop:8,background:'#2a2418',border:'1px solid #4a3d1c',borderRadius:8,padding:10}}>

      {q.agradecimientoAudio&&<audio src={q.agradecimientoAudio} controls controlsList={noDl?'nodownload noplaybackrate':undefined} onContextMenu={noDl?(e=>e.preventDefault()):undefined} style={{height:32,width:'100%',marginBottom:6}}></audio>}
      {q.agradecimiento&&<div style={{fontSize:13}}>{q.agradecimiento}</div>}
    </div>
  ):null;
  if(!verPrivado){
    // Vista para el EMPLEADO: solo fecha+horario + lo NEGATIVO (lo que no se cumplió / mala o buena) + mensajito (sin descarga)
    const negs=encuestaNegativos(q);
    return (
      <div style={{...S.card}}>
        <div style={{fontWeight:800,fontFamily:'Arial, Helvetica, sans-serif',fontSize:16,marginBottom:10}}>{q.fecha||((ev.dia||'')+'/'+(ev.mes||'')+'/'+(ev.anio||''))}{(ev.hIni||ev.hFin)?(' · '+(ev.hIni||'')+(ev.hFin?(' a '+ev.hFin):'')+' hs'):''}</div>
        {negs.length===0
          ? <div style={{color:C.verde,fontSize:13,fontWeight:700}}>✓ Todo bien, sin observaciones.</div>
          : <div>
              <div style={{fontSize:12,color:C.tx2,marginBottom:6}}>A tener en cuenta:</div>
              {negs.map((n,i)=><div key={i} style={{fontSize:13,color:C.amar,marginBottom:4}}>⚠️ {n}</div>)}
            </div>}
        {audioMsg(true)}
      </div>
    );
  }
  return (
    <div style={{...S.card}}>
      <div style={{fontWeight:800,fontFamily:'Arial, Helvetica, sans-serif',fontSize:16}}>📝 Encuesta del papá</div>
      {cab}
      <Row l="👩 Encargada" par={cal(q.encargada)}/>
      <Row l="🧑‍🍳 Mozos atentos" par={sn(q.m1)}/>
      <Row l="Presentes todo el evento" par={sn(q.m2)}/>
      <Row l="Bebida constante" par={sn(q.m3)}/>
      <Row l="Mesas limpias" par={sn(q.m4)}/>
      <Row l="🎮 Auxiliares presentes" par={sn(q.aux)}/>
      <Row l="🚻 Baños limpios" par={q.banos==='novisito'?['No los visitó',C.tx2]:sn(q.banos==='si')}/>
      <Row l="⭐ Atención del personal" par={cal(q.personal)}/>
      {q.pagoExtra==='si'&&<div style={{marginTop:8,fontSize:12.5,color:C.amar,fontWeight:700}}>💵 Abonó extra: ${q.pagoMonto!=null&&q.pagoMonto!==''?(+q.pagoMonto).toLocaleString('es-AR'):'?'}{q.pagoConcepto?(' ('+q.pagoConcepto+')'):''}</div>}
      {audioMsg(false)}
      {q.comentario&&String(q.comentario).trim()&&<div style={{marginTop:8,fontSize:12.5,color:C.tx2}}>💬 {q.comentario}</div>}
      {q.critica&&String(q.critica).trim()&&<div style={{marginTop:8,background:'#2a1a10',border:'1px solid #4a2d1c',borderRadius:8,padding:10,fontSize:12.5,color:'#fdba74'}}>🔒 Crítica (privada): {q.critica}</div>}
    </div>
  );
}

/* ════════ A3: CONTROL DE ENCARGADAS (horario fijo vs fichado: tarde + faltas) ════════ */
function ControlEncargadas({esDuena,sucursales,empleados,sucCtx}){
  const [sucSel,setSucSel]=useState(''); const [desde,setDesde]=useState(''); const [hasta,setHasta]=useState('');
  const [res,setRes]=useState(null); const [cargando,setCargando]=useState(false); const [abierto,setAbierto]=useState({});
  const miSuc=esDuena?sucSel:sucCtx;
  const DOW=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const fmtH=fmtHoraAR;
  const encs=empleados.filter(e=>e.rol_sistema==='encargada' && (e.horario_fijo||[]).length && (!miSuc || e.sucursal_encargada===miSuc || (e.sucursales||[]).includes(miSuc)));
  async function calcular(){
    if(!desde||!hasta){alert('Elegí el rango de fechas.');return;}
    setCargando(true); setRes(null);
    const fich=await dbAll('fichaje_fichajes');
    const filas=encs.map(enc=>{
      const dias=[]; let d=new Date(desde+'T00:00:00'); const end=new Date(hasta+'T00:00:00');
      while(d<=end){
        const iso=d.getFullYear()+'-'+_pad2(d.getMonth()+1)+'-'+_pad2(d.getDate()); const dow=d.getDay();
        const hf=(enc.horario_fijo||[]).find(h=>h.dia===dow);
        if(hf){
          const fe=fich.filter(x=>x.empleado_id===enc.id && x.tipo==='entrada' && fechaDeTs(x.ts)===iso).sort((a,b)=>String(a.ts).localeCompare(String(b.ts)));
          let estado='falta', hora='';
          if(fe.length){ const f0=fe[0]; hora=fmtH(f0.ts); estado=(f0.estado==='tarde')?'tarde':'ok'; }
          dias.push({fecha:iso,dow,hf,estado,hora});
        }
        d.setDate(d.getDate()+1);
      }
      return {enc,dias,faltas:dias.filter(x=>x.estado==='falta').length,tardes:dias.filter(x=>x.estado==='tarde').length};
    }).filter(f=>f.dias.length);
    setRes(filas); setAbierto({}); setCargando(false);
  }
  const estChip={ok:['En hora',C.verde],tarde:['Tarde',C.amar],falta:['Faltó',C.rojo]};
  return (
    <div>
      <div style={{...S.card,marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
        {esDuena && <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={S.input}><option value="">Todos los salones</option>{sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select>}
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><label style={S.label}>Desde</label><input type="date" style={S.input} value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div style={{flex:1}}><label style={S.label}>Hasta</label><input type="date" style={S.input} value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
        </div>
        <button onClick={calcular} disabled={cargando} style={{...S.btn,...S.btnOro}}>{cargando?'Revisando…':'🔎 Revisar'}</button>
        <div style={{fontSize:11,color:C.tx2}}>Compara el horario fijo de cada encargada con lo que fichó. Marca <b style={{color:C.amar}}>tarde</b> y <b style={{color:C.rojo}}>faltas</b> (días que tenía horario y no fichó).</div>
      </div>
      {encs.length===0 && <div style={{...S.card,textAlign:'center',color:C.tx2,padding:24}}>No hay encargadas con horario fijo cargado. Cargáselo en 👥 Empleados.</div>}
      {res && (res.length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:24}}>No hay días con horario en ese rango.</div> :
        res.map(f=>{ const op=res.length===1||abierto[f.enc.id]; return (
          <div key={f.enc.id} style={{...S.card,marginBottom:10}}>
            <button onClick={()=>setAbierto(p=>({...p,[f.enc.id]:!op}))} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer',color:C.tx,textAlign:'left',padding:0}}>
              <div style={{fontWeight:700}}>{f.enc.nombre} <span style={{color:C.tx2,fontWeight:400,fontSize:13}}>{op?'▾':'▸'}</span></div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
                {f.faltas>0&&<span style={{...S.chip,background:'#3a2020',color:C.rojo}}>{f.faltas} falta{f.faltas!==1?'s':''}</span>}
                {f.tardes>0&&<span style={{...S.chip,background:'#3a3320',color:C.amar}}>{f.tardes} tarde</span>}
                {f.faltas===0&&f.tardes===0&&<span style={{...S.chip,background:'#16331f',color:C.verde}}>✅ Todo OK</span>}
              </div>
            </button>
            {op && <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:8,paddingTop:8,borderTop:'1px solid '+C.bd}}>
              {f.dias.map((x,i)=>{ const e=estChip[x.estado]; return (
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:12,padding:'3px 0'}}>
                  <span style={{width:78,flexShrink:0,color:C.tx2}}>{DOW[x.dow]} {x.fecha.slice(8,10)}/{x.fecha.slice(5,7)}</span>
                  <span style={{flex:1,minWidth:0,color:C.tx2}}>Debe {x.hf.entrada}-{x.hf.salida}{x.hora?(' · fichó '+x.hora):''}</span>
                  <span style={{...S.chip,background:'#242424',color:e[1],border:'1px solid '+C.bd,flexShrink:0}}>{e[0]}</span>
                </div>
              );})}
            </div>}
          </div>
        );})
      )}
    </div>
  );
}
function Registros({esDuena,sucursales,empleados,sucCtx}){
  const [tab,setTab]=useState('fich');
  const [sucSel,setSucSel]=useState(''); const [empSel,setEmpSel]=useState(''); const [desde,setDesde]=useState(''); const [hasta,setHasta]=useState('');
  const [data,setData]=useState(null); const [cargando,setCargando]=useState(false); const [abierto,setAbierto]=useState({});
  const empNom=id=>{const e=empleados.find(x=>x.id===id);return e?((e.legajo!=null?('#'+e.legajo+' '):'')+e.nombre):'(empleado)';};
  const fmtTs=fmtTsAR;
  const estChip={en_hora:['En hora',C.verde],tarde:['Tarde',C.amar],sin_horario:['Sin horario',C.rojo],salida:['Salida',C.tx2],presente:['Presente',C.verde]};
  const miSuc=esDuena?sucSel:sucCtx;
  const empsFiltro=empleados.filter(e=>!miSuc||((e.sucursales||[]).includes(miSuc))).sort((a,b)=>(a.legajo||999)-(b.legajo||999));
  async function buscar(){ setCargando(true); setData(null);
    const f=await dbAll('fichaje_fichajes'); const evs=await dbAll('fichaje_eventos'); const evById={}; evs.forEach(e=>evById[e.id]=e);
    let list=f.slice();
    if(miSuc) list=list.filter(x=>x.sucursal_id===miSuc);
    if(empSel) list=list.filter(x=>x.empleado_id===empSel);
    if(desde) list=list.filter(x=>fechaDeTs(x.ts)>=desde);
    if(hasta) list=list.filter(x=>fechaDeTs(x.ts)<=hasta);
    list.sort((a,b)=>String(b.ts||'').localeCompare(String(a.ts||'')));
    setData({list,evById}); setAbierto({}); setCargando(false);
  }
  function exportarPDF(){
    if(!data||!data.list.length)return;
    const byEmp={}; data.list.forEach(x=>{(byEmp[x.empleado_id]=byEmp[x.empleado_id]||[]).push(x);});
    const sucNom=miSuc?((sucursales.find(s=>s.id===miSuc)||{}).nombre||''):'Todos los salones';
    let html='<html><head><meta charset=utf-8><title>Fichajes</title><style>body{font-family:Arial,sans-serif;padding:24px;color:#111}h1{font-size:20px;margin:0 0 2px}.sub{color:#555;font-size:12px;margin-bottom:16px}h2{font-size:15px;margin:18px 0 6px;border-bottom:2px solid #eee;padding-bottom:4px}table{width:100%;border-collapse:collapse;font-size:12px}td,th{text-align:left;padding:5px 8px;border-bottom:1px solid #eee}th{color:#555}</style></head><body>';
    html+='<h1>Fichajes</h1><div class=sub>'+sucNom+(desde?(' · desde '+desde):'')+(hasta?(' · hasta '+hasta):'')+'</div>';
    Object.keys(byEmp).sort((a,b)=>empNom(a).localeCompare(empNom(b))).forEach(eid=>{
      const items=byEmp[eid].slice().sort((a,b)=>String(a.ts||'').localeCompare(String(b.ts||'')));
      html+='<h2>'+empNom(eid)+' ('+items.length+')</h2><table><tr><th>Fecha y hora</th><th>Tipo</th><th>Estado</th><th>Cara</th></tr>';
      items.forEach(x=>{const est=(estChip[x.estado]||['—'])[0];html+='<tr><td>'+fmtTs(x.ts)+'</td><td>'+(x.tipo==='salida'?'Salida':'Entrada')+'</td><td>'+est+'</td><td>'+(x.facial_ok===true?'OK':x.facial_ok===false?'No':'—')+'</td></tr>';});
      html+='</table>';
    });
    html+='</body></html>';
    const w=window.open('','_blank'); if(!w){alert('Permití las ventanas emergentes para exportar el PDF.');return;}
    w.document.write(html); w.document.close(); setTimeout(()=>{try{w.focus();w.print();}catch(e){}},500);
  }
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:10}}>📋 Fichajes</h2>

                <span style={{fontSize:18}}>👤</span>
                <span style={{flex:1,minWidth:0,fontWeight:700,fontSize:14}}>{empNom(eid)}</span>
                <span style={{fontSize:12,color:C.tx2}}>{items.length} fichada{items.length===1?'':'s'}</span>
                <span style={{color:C.tx2,fontSize:13}}>{op?'▾':'▸'}</span>
              </button>
              {op && <div style={{padding:'0 12px 12px',display:'flex',flexDirection:'column',gap:6}}>
                {items.map(x=>{const ev=x.evento_id?data.evById[x.evento_id]:null;const est=estChip[x.estado]||['—',C.tx2];return (
                  <div key={x.id} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,background:C.surf2,borderRadius:8,padding:'8px 10px'}}>
                    <span>{x.tipo==='salida'?'⬅️':'➡️'}</span>
                    <div style={{flex:1,minWidth:0}}>{fmtTs(x.ts)} · {x.tipo==='salida'?'Salida':'Entrada'}{ev?(' · '+ev.paquete):''}</div>
                    <span style={{...S.chip,background:'#242424',color:est[1],border:'1px solid '+C.bd,flexShrink:0}}>{est[0]}</span>
                  </div>
                );})}
              </div>}
            </div>
          );})}
        </div>
        );})()
      )}
      </React.Fragment>)}
    </div>
  );
}

/* ════════ ALERTAS (encargada/dueña) ════════ */
function Alertas({esDuena,sucursales,empleados,sucCtx}){
  const [sucSel,setSucSel]=useState(''); const [alertas,setAlertas]=useState(null);
  async function cargar(){ const a=await dbAll('fichaje_alertas'); setAlertas(a.sort((x,y)=>String(y.created_at||'').localeCompare(String(x.created_at||'')))); }
  useEffect(()=>{cargar();},[]);
  const empNom=id=>{const e=empleados.find(x=>x.id===id);return e?e.nombre:'(empleado)';};
  async function marcarLeida(id){ await dbUpdate('fichaje_alertas',id,{leida:true}); cargar(); }
  async function borrar(id){ if(!window.confirm('¿Borrar esta alerta?'))return; await dbDelete('fichaje_alertas',id); cargar(); }
  const ic={tarde:['⏰',C.amar],sin_horario:['❓',C.rojo],ausente:['❌',C.rojo]};
  const fmtTs=fmtTsAR;
  let list=alertas||[];
  const miSuc = esDuena? sucSel : sucCtx;
  if(miSuc) list=list.filter(a=>a.sucursal_id===miSuc);
  const sinLeer=list.filter(a=>!a.leida).length;
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:4}}>🔔 Alertas</h2>
      <p style={{fontSize:12,color:C.tx2,marginBottom:12}}>Llegadas tarde y fichajes fuera de horario. {sinLeer>0?(sinLeer+' sin leer.'):'Todo al día. ✓'}</p>
      {esDuena && <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={{...S.input,marginBottom:12}}><option value="">Todos los salones</option>{sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select>}
      {alertas===null ? <div style={{textAlign:'center',padding:30}}><span className="spin"></span></div> :
        list.length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:26}}><div style={{fontSize:34,marginBottom:6}}>✅</div>No hay alertas.</div> :
        list.map(a=>{const I=ic[a.tipo]||['🔔',C.tx2];return (
          <div key={a.id} style={{...S.card,marginBottom:8,border:'1px solid '+(a.leida?C.bd:I[1]),opacity:a.leida?.6:1,display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{fontSize:22}}>{I[0]}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:a.leida?500:700}}>{a.descripcion||(empNom(a.empleado_id)+' — '+a.tipo)}</div>
              <div style={{fontSize:11,color:C.tx2,marginTop:2}}>{fmtTs(a.created_at)}{a.leida?' · leída':''}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
              {!a.leida&&<button onClick={()=>marcarLeida(a.id)} style={{...S.btn,background:C.surf2,color:C.verde,border:'1px solid '+C.bd,padding:'5px 8px',minHeight:0,fontSize:11}}>✓ Leída</button>}
              <button onClick={()=>borrar(a.id)} style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'5px 8px',minHeight:0,fontSize:11}}>🗑</button>
            </div>
          </div>
        );})
      }
    </div>
  );
}

/* ════════ FICHAJE (empleado: GPS + cámara + reconocimiento facial) ════════ */
// ── Hora de Argentina (San Juan, UTC-3) — todo el fichaje usa esta zona, no la del dispositivo ──
function _argP(d){ try{ const p={}; new Intl.DateTimeFormat('en-GB',{timeZone:'America/Argentina/Buenos_Aires',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).formatToParts(d).forEach(x=>{p[x.type]=x.value;}); return p; }catch(e){ return null; } }
function fechaHoyISO(){ const p=_argP(new Date()); return p?(p.year+'-'+p.month+'-'+p.day):''; }
function ahoraMin(){ const p=_argP(new Date()); return p?(+p.hour*60+ +p.minute):0; }
function fechaDeTs(ts){ if(!ts)return ''; const p=_argP(new Date(ts)); return p?(p.year+'-'+p.month+'-'+p.day):String(ts).slice(0,10); }
function fmtTsAR(ts){ if(!ts)return ''; const p=_argP(new Date(ts)); return p?(p.day+'/'+p.month+' '+p.hour+':'+p.minute):''; }
function fmtHoraAR(ts){ if(!ts)return ''; const p=_argP(new Date(ts)); return p?(p.hour+':'+p.minute):''; }
// Lunes de la semana (lun-dom) de una fecha ISO, 'atras' semanas hacia atrás (0=esta semana, 1=anterior)
function lunesDeSemana(iso,atras){ const d=new Date((iso||fechaHoyISO())+'T12:00:00'); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow-7*(atras||0)); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function cargarImg(url){ return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=()=>rej(new Error('img')); i.src=url; }); }
let _faceReady=false, _faceFail=false;
async function ensureFace(){ if(_faceReady)return true; if(_faceFail||!window.faceapi)return false;
  try{ const M='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    await faceapi.nets.tinyFaceDetector.loadFromUri(M);
    await faceapi.nets.faceLandmark68Net.loadFromUri(M);
    await faceapi.nets.faceRecognitionNet.loadFromUri(M);
    _faceReady=true; return true;
  }catch(e){ _faceFail=true; return false; }
}
async function descriptorDe(el){ try{ const d=await faceapi.detectSingleFace(el,new faceapi.TinyFaceDetectorOptions({inputSize:320,scoreThreshold:0.4})).withFaceLandmarks().withFaceDescriptor(); return d?d.descriptor:null; }catch(e){ return null; } }
async function verificarCara(canvas,fotoUrl){
  if(!fotoUrl) return {ok:null,msg:'Sin foto de perfil para comparar'};
  const ok=await ensureFace(); if(!ok) return {ok:null,msg:'Reconocimiento facial no disponible'};
  const live=await descriptorDe(canvas); if(!live) return {ok:false,msg:'No se detectó tu cara'};
  let reg=null; try{ const img=await cargarImg(fotoUrl); reg=await descriptorDe(img); }catch(e){}
  if(!reg) return {ok:null,msg:'No se pudo leer tu foto de perfil'};
  const dist=faceapi.euclideanDistance(live,reg);
  return {ok:dist<0.55, msg:dist<0.55?'Cara verificada ✓':'La cara no coincide'};
}
function Fichar({sesion,sucursales}){
  const [paso,setPaso]=useState('inicio'); const [tipo,setTipo]=useState('entrada'); const [msg,setMsg]=useState(''); const [res,setRes]=useState(null);
  const [cfg,setCfg]=useState({tarde_tolerancia_min:5,tarde_max_mes:5,tarde_suspension_dias:30});
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfg(v=>({...v,...g.data}));})();},[]);
  const sucOkRef=useRef(null); const geoRef=useRef(null); const videoRef=useRef(); const canvasRef=useRef(); const streamRef=useRef();
  const misSucs=(sesion.rol_sistema==='mantenimiento')?(sucursales||[]):[...new Set([...((sesion.sucursales)||[]),sesion.sucursal_encargada].filter(Boolean))].map(id=>sucursales.find(s=>s.id===id)).filter(Boolean);
  function pararCamara(){try{streamRef.current&&streamRef.current.getTracks().forEach(t=>t.stop());}catch(e){}}
  useEffect(()=>()=>pararCamara(),[]);
  function comenzar(t){ setTipo(t); setRes(null); setMsg('Obteniendo tu ubicación…'); setPaso('cargando');
    if(!navigator.geolocation){ setMsg('Tu teléfono no permite ubicación.'); setPaso('error'); return; }
    navigator.geolocation.getCurrentPosition(pos=>{
      const la=pos.coords.latitude, lo=pos.coords.longitude; geoRef.current={la,lo};
      let ok=null,best=1e12,hayCoords=false;
      misSucs.forEach(s=>{ if(s.lat==null||s.lng==null)return; hayCoords=true; const d=distancia(la,lo,s.lat,s.lng); if(d<=(s.radio_metros||80)&&d<best){best=d;ok=s;} });
      if(!hayCoords){ setMsg('El salón todavía no tiene la ubicación GPS cargada. Avisale a la dueña.'); setPaso('error'); return; }
      if(!ok){ setMsg('Estás lejos del salón 📍. Acercate para poder fichar.'); setPaso('error'); return; }
      sucOkRef.current=ok; abrirCamara();
    }, err=>{ setMsg('No pudimos obtener tu ubicación. Activá el GPS y dale permiso al navegador.'); setPaso('error'); }, {enableHighAccuracy:true,timeout:12000});
  }
  async function abrirCamara(){ setPaso('camara'); setMsg('');
    try{ const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false}); streamRef.current=st; setTimeout(()=>{ if(videoRef.current){videoRef.current.srcObject=st;videoRef.current.play().catch(()=>{});} },80); }
    catch(e){ setMsg('No pudimos abrir la cámara. Dale permiso a la cámara y probá de nuevo.'); setPaso('error'); }
  }
  async function capturar(){
    const v=videoRef.current,cv=canvasRef.current; if(!v||!cv)return;
    cv.width=v.videoWidth||320; cv.height=v.videoHeight||240; cv.getContext('2d').drawImage(v,0,0,cv.width,cv.height);
    const dataUrl=cv.toDataURL('image/jpeg',0.85);
    setPaso('procesando'); setMsg('Verificando tu cara…');
    let facialOk=null, facialMsg='';
    try{ const r=await verificarCara(cv,sesion.foto_url); facialOk=r.ok; facialMsg=r.msg; }catch(e){ facialOk=null; facialMsg='No se pudo verificar'; }
    if(facialOk===false){ pararCamara(); setMsg(facialMsg+'. Probá de nuevo, de frente y con buena luz.'); setPaso('error'); return; }
    pararCamara(); setMsg('Guardando…');
    let fotoUrl=dataUrl; try{ fotoUrl=await subirFoto(dataUrl); }catch(e){}
    const sucOk=sucOkRef.current; const hoy=fechaHoyISO(); const tol=+cfg.tarde_tolerancia_min||5;
    let eventoId=null, estado='sin_horario', coincide=false, eventoDesc='', ingreso='', minTarde=0;
    try{
      const evs=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===sucOk.id&&e.fecha===hoy);
      const ids=evs.map(e=>e.id); const evById={}; evs.forEach(e=>evById[e.id]=e);
      const mis=(await dbAll('fichaje_evento_empleados')).filter(a=>ids.indexOf(a.evento_id)>=0&&(a.empleado_id===sesion.id||(sesion.legajo!=null&&a.legajo===sesion.legajo)));
      if(mis.length){ coincide=true; const now=ahoraMin();
        mis.sort((a,b)=>Math.abs(toMin(a.hora_ingreso_esperada||evById[a.evento_id].hora_inicio)-now)-Math.abs(toMin(b.hora_ingreso_esperada||evById[b.evento_id].hora_inicio)-now));
        const a=mis[0]; eventoId=a.evento_id; const ev=evById[eventoId]; eventoDesc=ev.paquete+' '+ev.hora_inicio+'-'+ev.hora_fin; ingreso=a.hora_ingreso_esperada||'';
        if(tipo==='entrada'){ const esp=toMin(a.hora_ingreso_esperada||ev.hora_inicio); minTarde=Math.max(0,now-esp); estado=(minTarde<=tol)?'en_hora':'tarde'; } else { estado='salida'; }
      }
    }catch(e){}
    // Encargada (o quien tenga horario fijo): si no coincide con un evento, comparar con su HORARIO FIJO del día
    if(!coincide && (sesion.horario_fijo||[]).length){
      const dow=new Date(fechaHoyISO()+'T12:00:00').getDay();
      const hf=(sesion.horario_fijo||[]).find(h=>h.dia===dow);
      if(hf){ coincide=true; eventoDesc='Horario fijo '+(hf.entrada||'')+'-'+(hf.salida||''); ingreso=hf.entrada||'';
        if(tipo==='entrada'){ const esp=toMin(hf.entrada); minTarde=Math.max(0,ahoraMin()-esp); estado=(minTarde<=tol)?'en_hora':'tarde'; }
        else { estado='salida'; }
      }
    }
    // Mantenimiento: marca presencia, sin horario fijo (no cuenta tarde ni sin_horario)
    if(sesion.rol_sistema==='mantenimiento'){ coincide=true; eventoDesc='Mantenimiento'; estado=(tipo==='entrada')?'presente':'salida'; }
    await dbInsert('fichaje_fichajes',{empleado_id:sesion.id,sucursal_id:sucOk.id,evento_id:eventoId,tipo,lat:geoRef.current.la,lng:geoRef.current.lo,foto_url:fotoUrl,facial_ok:facialOk,estado});
    // penalización por tardanza
    let tardeInfo=null;
    if(estado==='tarde'){
      try{ const ym=hoy.slice(0,7); const fs=(await dbAll('fichaje_fichajes')).filter(x=>x.empleado_id===sesion.id&&x.tipo==='entrada'&&x.estado==='tarde'&&fechaDeTs(x.ts).slice(0,7)===ym);
        const cnt=fs.length, max=+cfg.tarde_max_mes||5, susp=+cfg.tarde_suspension_dias||30;
        tardeInfo={minTarde,cnt,max,susp,reach:cnt>=max,aviso:cnt===max-1};
      }catch(e){ tardeInfo={minTarde,cnt:0,max:+cfg.tarde_max_mes||5,susp:+cfg.tarde_suspension_dias||30}; }
    }
    if(tipo==='entrada'&&(estado==='tarde'||estado==='sin_horario')){ try{ await dbInsert('fichaje_alertas',{empleado_id:sesion.id,sucursal_id:sucOk.id,evento_id:eventoId,tipo:estado,descripcion:sesion.nombre+(estado==='tarde'?(' fichó '+minTarde+' min tarde'+(tardeInfo&&tardeInfo.reach?(' — '+tardeInfo.cnt+'ª tardanza del mes, suspende encuestas '+tardeInfo.susp+' días'):'')):(' fichó sin estar en el horario'))}); }catch(e){} }
    setRes({tipo,sucNombre:sucOk.nombre,facialOk,facialMsg,coincide,estado,eventoDesc,ingreso,fotoUrl,tardeInfo}); setPaso('listo');
  }
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>📍 Fichar</h2>
      {paso==='inicio' && (
        <div style={{...S.card,textAlign:'center',padding:'24px 16px'}}>
          <div style={{fontSize:40,marginBottom:8}}>🕒</div>
          <p style={{color:C.tx2,fontSize:13,marginBottom:16}}>Vas a fichar con tu ubicación y una foto (reconocimiento facial). Funciona desde cualquier teléfono — te reconoce por la cara.</p>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>comenzar('entrada')} style={{...S.btn,...S.btnOro,flex:1,padding:'15px'}}>➡️ Entrada</button>
            <button onClick={()=>comenzar('salida')} style={{...S.btn,background:C.surf2,color:C.tx,border:'1px solid '+C.bd,flex:1,padding:'15px'}}>⬅️ Salida</button>
          </div>
          {!sesion.foto_url && <div style={{fontSize:11,color:C.amar,marginTop:12}}>⚠️ No tenés foto de perfil cargada — la dueña debe cargarla para el reconocimiento facial.</div>}
        </div>
      )}
      {paso==='cargando' && <div style={{...S.card,textAlign:'center',padding:30}}><span className="spin"></span><p style={{color:C.tx2,fontSize:13,marginTop:12}}>{msg}</p></div>}
      {paso==='camara' && (
        <div style={{...S.card}}>
          <p style={{fontSize:13,color:C.tx2,marginBottom:10,textAlign:'center'}}>📍 Ubicación verificada · Poné tu cara en el centro</p>
          <div style={{borderRadius:14,overflow:'hidden',background:'#000',aspectRatio:'3/4',maxHeight:'56vh',margin:'0 auto'}}>
            <video ref={videoRef} playsInline muted autoPlay style={{width:'100%',height:'100%',objectFit:'cover',transform:'scaleX(-1)'}}></video>
          </div>
          <canvas ref={canvasRef} style={{display:'none'}}></canvas>
          <button onClick={capturar} style={{...S.btn,...S.btnOro,width:'100%',marginTop:12,padding:'15px',fontSize:16}}>📸 Sacar foto y fichar</button>
          <button onClick={()=>{pararCamara();setPaso('inicio');}} style={{...S.btn,background:C.surf2,color:C.tx2,width:'100%',marginTop:8}}>Cancelar</button>
        </div>
      )}
      {paso==='procesando' && <div style={{...S.card,textAlign:'center',padding:30}}><span className="spin"></span><p style={{color:C.tx2,fontSize:13,marginTop:12}}>{msg}</p></div>}
      {paso==='error' && (
        <div style={{...S.card,textAlign:'center',padding:'24px 16px'}}>
          <div style={{fontSize:38,marginBottom:8}}>⚠️</div>
          <p style={{color:C.tx,fontSize:14,marginBottom:16}}>{msg}</p>
          <button onClick={()=>setPaso('inicio')} style={{...S.btn,...S.btnOro,width:'100%'}}>Volver a intentar</button>
        </div>
      )}
      {paso==='listo' && res && (
        <div style={{...S.card,textAlign:'center'}}>
          <div style={{fontSize:46,marginBottom:6}}>{res.estado==='tarde'?'⚠️':'✅'}</div>
          <h3 style={{fontFamily:'Arial, Helvetica, sans-serif',fontSize:20}}>{res.tipo==='entrada'?'Entrada':'Salida'} registrada</h3>
          {res.fotoUrl&&<img src={res.fotoUrl} alt="" style={{width:80,height:80,borderRadius:'50%',objectFit:'cover',margin:'10px auto',display:'block',border:'2px solid '+C.oro}}/>}
          <div style={{textAlign:'left',background:C.surf2,borderRadius:12,padding:12,marginTop:8,fontSize:13,display:'flex',flexDirection:'column',gap:6}}>
            <div>📍 Ubicación: <b style={{color:C.verde}}>verificada ✓</b></div>
            <div>📸 Cara: <b style={{color:res.facialOk===true?C.verde:res.facialOk===false?C.rojo:C.tx2}}>{res.facialOk===true?'verificada ✓':res.facialMsg}</b></div>
            {res.coincide

/* ════════ MI PLANILLA (empleado: doble confirmación) ════════ */
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const TIPOS=[['simple','Simple','1 evento'],['doble','Doble','2 seguidos'],['2simples','2 simples','2 separados'],['triple','Triple','3 eventos']];
function tipoCorto(t){return t==='simple'?'S':t==='doble'?'D':t==='2simples'?'2S':t==='triple'?'T':'';}
function MiPlanilla({sesion,sucursales}){
  const hoy=new Date();
  const [y,setY]=useState(hoy.getFullYear()); const [m,setM]=useState(hoy.getMonth());
  const [data,setData]=useState({}); const [cfg,setCfg]=useState({horas_simple:4.5,horas_doble:8,horas_triple:12,bonus_excelente:7000});
  const [sel,setSel]=useState(null); const [encs,setEncs]=useState([]); const [verEnc,setVerEnc]=useState(null); const [asignF,setAsignF]=useState({}); const [exD,setExD]=useState(''); const [exH,setExH]=useState('');
  const cfgId='auto_'+sesion.id; const valorHora=+(sesion.valor_hora||0);
  const misSucNombres=((sesion.sucursales)||[]).map(id=>{const s=(sucursales||[]).find(x=>x.id===id);return s?s.nombre.toLowerCase():'';}).filter(Boolean);
  useEffect(()=>{(async()=>{
    const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfg(v=>({...v,...g.data}));const mine=c.find(x=>x.id===cfgId);if(mine&&mine.data)setData(mine.data);
    setEncs(await cargarEncuestasSalon());
    // eventos en los que participó el empleado (fecha -> horas)
    const evs=await dbAll('fichaje_eventos'); const evById={}; evs.forEach(e=>evById[e.id]=e);
    const ee=(await dbAll('fichaje_evento_empleados')).filter(a=>a.empleado_id===sesion.id||(sesion.legajo!=null&&a.legajo===sesion.legajo));
    const byF={}; ee.forEach(a=>{const e=evById[a.evento_id]; if(e){(byF[e.fecha]=byF[e.fecha]||[]).push(e.hora_inicio);}}); setAsignF(byF);
  })();},[]);
  // Solo encuestas de eventos en los que el empleado participó (mismo día + su salón; prefiere coincidencia de hora)
  const encDelDia=f=>{ const horas=asignF[f]; if(!horas)return null;
    const cands=encs.filter(e=>{ const d=(e.anio||'')+'-'+_pad2(e.mes)+'-'+_pad2(e.dia); if(d!==f)return false; if(misSucNombres.length && (e._sucNombre||'') && misSucNombres.indexOf((e._sucNombre||'').toLowerCase())<0)return false; return true; });
    return cands.find(e=>horas.indexOf(e.hIni)>=0)||cands[0]||null;
  };
  async function guardar(n){ setData(n); await dbUpsert('fichaje_config',{id:cfgId,data:n}); }
  function setTipo(f,tipo){ const n={...data}; const cur=n[f]||{}; n[f]={...cur,tipo,enc:cur.enc||0}; guardar(n); }
  function setEnc(f,enc){ const n={...data}; if(!n[f])return; n[f]={...n[f],enc}; guardar(n); }
  function setDeluxe(f,v){ const n={...data}; if(!n[f])return; n[f]={...n[f],deluxe:v}; guardar(n); }
  function borrarDia(f){ const n={...data}; delete n[f]; guardar(n); }
  const esFig=t=>typeof t==='string'&&t.indexOf('fig:')===0;
  function baseHoras(t){ if(esFig(t)){const f=(cfg.figuras_hora||[]).find(x=>('fig:'+x.nombre)===t);return f?+f.horas:0;} return t==='simple'?+cfg.horas_simple:t==='doble'?+cfg.horas_doble:t==='2simples'?2*+cfg.horas_simple:t==='triple'?+cfg.horas_triple:0; }
  function horasDia(d){ let h=baseHoras(d.tipo); if(!esFig(d.tipo)) h+=(+d.deluxe||0)*(+cfg.horas_extra_deluxe||0); return h; }
  const maxDx=t=>t==='simple'?1:(t==='doble'||t==='2simples')?2:t==='triple'?3:0;
  function montoDia(d){ return horasDia(d)*valorHora + (d.enc||0)*(+cfg.bonus_excelente); }
  const opciones=[...TIPOS, ...((cfg.figuras_hora||[]).map(f=>['fig:'+f.nombre, f.nombre, (f.horas)+' hs']))];
  const hoyISO=fechaHoyISO();
  const cutoff15=(()=>{const d=new Date();d.setDate(d.getDate()-15);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);})();
  const diaEditable=f=>f>=cutoff15&&f<=hoyISO;
  function tipoLabel(t){ if(esFig(t)){const f=(cfg.figuras_hora||[]).find(x=>('fig:'+x.nombre)===t);return f?f.nombre:'Figura';} return t==='simple'?'Simple':t==='doble'?'Doble':t==='2simples'?'2 simples':t==='triple'?'Triple':(t||'-'); }
  const DOWF=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const fechaLarga=iso=>{const p=iso.split('-');const dt=new Date(+p[0],+p[1]-1,+p[2]);return DOWF[dt.getDay()]+' '+(+p[2])+' de '+MESES[+p[1]-1].toLowerCase();};
  const fechaCorta=iso=>{const p=iso.split('-');return (+p[2])+' de '+MESES[+p[1]-1].toLowerCase();};
  function exportarPlanilla(){
    if(!exD||!exH){alert('Elegí desde y hasta.');return;}
    const dias=Object.keys(data).filter(f=>f>=exD&&f<=exH&&f>=cutoff15&&data[f]&&data[f].tipo).sort();

    doc.setFontSize(15); doc.text('Mi registro — '+(sesion.nombre||''),14,y); y+=7;

      doc.setFontSize(9);

    });
    y+=2; doc.line(14,y,200,y); y+=8; doc.setFontSize(13); doc.setFont(undefined,'bold'); doc.text('TOTAL: '+fmt(tot),X.to-30,y);
    doc.save('mi_registro_'+exD+'_'+exH+'.pdf');
  }
  const ymStr=y+'-'+('0'+(m+1)).slice(-2);
  let totMes=0; Object.keys(data).forEach(f=>{ if(f.indexOf(ymStr)===0) totMes+=montoDia(data[f]); });
  const ndias=new Date(y,m+1,0).getDate(); const off=new Date(y,m,1).getDay();
  const celdas=[]; for(let i=0;i<off;i++)celdas.push(null); for(let d=1;d<=ndias;d++)celdas.push(d);
  function fechaDe(d){ return ymStr+'-'+('0'+d).slice(-2); }
  function prevMes(){ if(m===0){setY(y-1);setM(11);}else setM(m-1); setSel(null); }
  function nextMes(){ if(m===11){setY(y+1);setM(0);}else setM(m+1); setSel(null); }
  const selData = sel?data[sel]:null;
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:4}}>📅 Mi planilla</h2>

            </button>);

          {encDelDia(sel) && <button onClick={()=>setVerEnc(encDelDia(sel))} style={{...S.btn,background:'#2a2418',color:C.oro,border:'1px solid #4a3d1c',width:'100%',marginBottom:10,fontSize:13,padding:'10px'}}>🖼️ Ver la encuesta que puso el papá</button>}
          <label style={S.label}>¿Qué trabajaste?</label>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {opciones.map(([v,l,sub])=>(
              <button key={v} onClick={()=>setTipo(sel,v)} style={{...S.btn,minHeight:0,padding:'8px 10px',fontSize:12,textAlign:'center',...((selData&&selData.tipo===v)?S.btnOro:S.btnGhost)}}>{l}<div style={{fontSize:9,opacity:.7}}>{sub}</div></button>
            ))}
          </div>
          {selData && selData.tipo && (
            <div>
              {!esFig(selData.tipo) && maxDx(selData.tipo)>0 && (
                <div style={{marginBottom:10}}>
                  <label style={S.label}>¿Cuántos fueron Deluxe? (+{cfg.horas_extra_deluxe||1}h cada uno)</label>
                  <div style={{display:'flex',gap:6}}>
                    {Array.from({length:maxDx(selData.tipo)+1},(_,n)=>(<button key={n} onClick={()=>setDeluxe(sel,n)} style={{...S.btn,minHeight:0,padding:'8px 14px',fontSize:13,...(((selData.deluxe||0)===n)?S.btnOro:S.btnGhost)}}>{n}</button>))}
                  </div>
                </div>
              )}
              <label style={S.label}>¿Cuántas encuestas salieron bien (Excelente)?</label>
              <div style={{display:'flex',gap:6,marginBottom:10}}>
                {[0,1,2,3].map(n=>(<button key={n} onClick={()=>setEnc(sel,n)} style={{...S.btn,minHeight:0,padding:'8px 14px',fontSize:13,...((selData.enc||0)===n?S.btnOro:S.btnGhost)}}>{n}</button>))}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:C.surf2,borderRadius:10,padding:'10px 12px'}}>

/* ════════ CONFIGURACIÓN (dueña) ════════ */
function Configuracion({sucursales,empleados,recargar}){
  const [cfg,setCfg]=useState({horas_simple:4.5,horas_doble:8,horas_triple:12,gap_horas:2,horas_extra_deluxe:1,bonus_excelente:7000,prep_1:90,prep_2:30,prep_3:30,figuras_hora:[],tarde_tolerancia_min:5,tarde_max_mes:5,tarde_suspension_dias:30});
  const [vh,setVh]=useState({}); const [msg,setMsg]=useState(''); const [guardando,setGuardando]=useState(false); const [vhOk,setVhOk]=useState(null);
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfg(v=>({...v,...g.data,figuras_hora:g.data.figuras_hora||[]}));})();},[]);
  useEffect(()=>{const o={};(empleados||[]).forEach(e=>{o[e.id]=e.valor_hora??'';});setVh(o);},[empleados]);
  async function guardarCfg(){ setGuardando(true); const ok=await dbUpsert('fichaje_config',{id:'general',data:cfg}); if(ok){ setMsg('✓ Configuración guardada'); setTimeout(()=>setMsg(''),2200);}else{alert('No se pudo guardar la configuración.');} setGuardando(false); }
  async function guardarValor(em){ const v=vh[em.id]; const ok=await dbUpdate('fichaje_empleados',em.id,{valor_hora:v===''?0:+v}); if(ok){setVhOk(em.id);setTimeout(()=>setVhOk(p=>p===em.id?null:p),1800);} if(recargar)recargar(); }
  async function borrarEmpleado(em){
    if(!window.confirm('¿Borrar a '+em.nombre+'? Se elimina el empleado y ya no podrá ingresar. Esto no se puede deshacer.'))return;
    // borrar primero lo que cuelga del empleado (fichajes y asignaciones) para que la base lo deje borrar
    const fich=(await dbAll('fichaje_fichajes')).filter(x=>x.empleado_id===em.id);
    for(const x of fich) await dbDelete('fichaje_fichajes',x.id);
    const asg=(await dbAll('fichaje_evento_empleados')).filter(x=>x.empleado_id===em.id);
    for(const x of asg) await dbDelete('fichaje_evento_empleados',x.id);
    const ok=await dbDelete('fichaje_empleados',em.id);
    if(!ok) alert('No se pudo borrar. Probá de nuevo.');
    if(recargar)recargar();
  }
  function setFig(i,k,val){ setCfg(c=>({...c,figuras_hora:c.figuras_hora.map((f,j)=>j===i?{...f,[k]:val}:f)})); }
  function addFig(){ setCfg(c=>({...c,figuras_hora:[...(c.figuras_hora||[]),{nombre:'Auxiliar 3 hs',horas:3,bonus:false}]})); }
  function delFig(i){ setCfg(c=>({...c,figuras_hora:c.figuras_hora.filter((_,j)=>j!==i)})); }
  const num=(k,lbl,step)=>(<div style={{flex:1}}><label style={S.label}>{lbl}</label><input style={S.input} type="number" step={step||'1'} value={cfg[k]} onChange={e=>setCfg({...cfg,[k]:e.target.value})}/></div>);
  const orden=[...empleados].sort((a,b)=>(a.legajo||999)-(b.legajo||999));
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>⚙️ Configuración</h2>

      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>💜 Bonus de encuesta "Excelente"</div>
        <div style={{fontSize:12,color:C.tx2,marginBottom:10}}>Lo que cobra cada empleado cuando el papá califica el evento como Excelente.</div>
        <label style={S.label}>Monto del bonus ($)</label>
        <input style={S.input} type="number" value={cfg.bonus_excelente} onChange={e=>setCfg({...cfg,bonus_excelente:e.target.value})}/>
      </div>

      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>🕐 Horas por tipo de evento</div>
        <div style={{fontSize:12,color:C.tx2,marginBottom:10}}>El monto = estas horas × el valor hora de cada empleado.</div>
        <div style={{display:'flex',gap:8}}>{num('horas_simple','Simple (hs)','0.5')}{num('horas_doble','Doble (hs)','0.5')}{num('horas_triple','Triple (hs)','0.5')}</div>
        <div style={{display:'flex',gap:8,marginTop:10}}>{num('gap_horas','Hueco p/ separar (hs)','0.5')}{num('horas_extra_deluxe','Extra por Deluxe (hs)','0.5')}</div>
        <div style={{fontSize:11,color:C.tx2,marginTop:6}}>Hueco: si entre dos eventos pasan ese tiempo o más, cuentan separados. Deluxe: si el evento es Deluxe, suma esas horas extra.</div>
      </div>

      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>⏱️ Minutos de ingreso antes del evento</div>
        <div style={{fontSize:12,color:C.tx2,marginBottom:10}}>Cuánto antes entra el personal según sea el 1°, 2° o 3° evento del día.</div>
        <div style={{display:'flex',gap:8}}>{num('prep_1','1° evento (min)')}{num('prep_2','2° evento (min)')}{num('prep_3','3° evento (min)')}</div>
      </div>

      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>➕ Figuras por hora (extra)</div>
        <div style={{fontSize:12,color:C.tx2,marginBottom:10}}>Personas que se suman a un evento y se pagan <b>por hora</b> (aparte del cocinero/mozo). Marcá si a cada una le suma el bonus de encuesta.</div>
        {(cfg.figuras_hora||[]).map((f,i)=>(
          <div key={i} style={{background:C.surf2,borderRadius:10,padding:10,marginBottom:8}}>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <input style={{...S.input,flex:1}} value={f.nombre} onChange={e=>setFig(i,'nombre',e.target.value)} placeholder="Auxiliar 3 hs"/>
              <input style={{...S.input,width:80}} type="number" step="0.5" value={f.horas} onChange={e=>setFig(i,'horas',+e.target.value)} placeholder="hs"/>
              <button onClick={()=>delFig(i)} style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'0 12px',minHeight:0}}>🗑</button>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
              <input type="checkbox" checked={!!f.bonus} onChange={e=>setFig(i,'bonus',e.target.checked)}/> ¿Le suma el bonus de encuesta?
            </label>
          </div>
        ))}
        <button onClick={addFig} style={{...S.btn,...S.btnGhost,fontSize:13,padding:'8px 12px',minHeight:0}}>+ Agregar figura</button>
      </div>

      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>⏰ Llegadas tarde y encuestas</div>
        <div style={{background:C.surf2,borderRadius:10,padding:12,fontSize:13,lineHeight:1.9,color:C.tx2,marginBottom:12}}>
          <div>• Se considera <b style={{color:C.tx}}>tarde</b> si llega más de <input type="number" value={cfg.tarde_tolerancia_min} onChange={e=>setCfg({...cfg,tarde_tolerancia_min:e.target.value})} style={{...S.input,width:56,display:'inline-block',padding:'4px 6px',marginBottom:0,textAlign:'center'}}/> min tarde.</div>
          <div>• <b style={{color:C.tx}}>Cada día</b> que llega tarde → ese día <b style={{color:C.tx}}>no cobra</b> el bonus de encuesta.</div>
          <div>• Al llegar a <input type="number" value={cfg.tarde_max_mes} onChange={e=>setCfg({...cfg,tarde_max_mes:e.target.value})} style={{...S.input,width:56,display:'inline-block',padding:'4px 6px',marginBottom:0,textAlign:'center'}}/> llegadas tarde en el mes → no cobra encuestas por <input type="number" value={cfg.tarde_suspension_dias} onChange={e=>setCfg({...cfg,tarde_suspension_dias:e.target.value})} style={{...S.input,width:64,display:'inline-block',padding:'4px 6px',marginBottom:0,textAlign:'center'}}/> días.</div>
          <div>• En la anteúltima ({(+cfg.tarde_max_mes||5)-1}ª) se le avisa al empleado al fichar.</div>
        </div>
      </div>

      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:18}}>
        <button onClick={guardarCfg} disabled={guardando} style={{...S.btn,...S.btnOro,flex:1}}>{guardando?'Guardando…':'Guardar configuración'}</button>
        {msg && <span style={{color:C.verde,fontWeight:700,fontSize:13}}>{msg}</span>}
      </div>

      <div style={{...S.card}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>💵 Valor hora por empleado</div>
        <div style={{fontSize:12,color:C.tx2,marginBottom:10}}>Cada empleado cobra su valor hora. Se guarda al salir de cada casillero.</div>
        {orden.length===0 ? <div style={{color:C.tx2,fontSize:13}}>Todavía no hay empleados cargados.</div> :
          orden.map(em=>(
          <div key={em.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid '+C.bd}}>
            <div style={{flex:1,minWidth:0,fontSize:14}}>{em.legajo!=null&&<span className="num" style={{color:C.oro}}>#{em.legajo} </span>}{em.nombre}</div>
            <span style={{color:C.tx2}}>$</span>
            <input style={{...S.input,width:84,marginBottom:0}} type="number" value={vh[em.id]===undefined?'':vh[em.id]} onChange={e=>setVh({...vh,[em.id]:e.target.value})} onBlur={()=>guardarValor(em)} placeholder="0"/>
            <span style={{fontSize:11,color:vhOk===em.id?C.verde:C.tx2,width:30}}>{vhOk===em.id?'✓':'/h'}</span>
            <button onClick={()=>borrarEmpleado(em)} title="Borrar empleado" style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'7px 9px',minHeight:0,fontSize:13,flexShrink:0}}>🗑</button>
          </div>
        ))}
      </div>
    </div>
  );
}

const CH = { bg:'#ECE5DD', mio:'#FFE7AE', otro:'#FFFFFF', txt:'#1A1A1A', gris:'#8a8a8a', comp:'#F0EDE7', bd:'#d9d2c8' };
const modalBg = { position:'fixed', inset:0, background:'rgba(0,0,0,.6)', zIndex:160, display:'flex', alignItems:'flex-end', justifyContent:'center' };
const modalBox = { background:C.surf, borderRadius:'16px 16px 0 0', padding:16, width:'100%', maxWidth:560, maxHeight:'85vh', overflowY:'auto' };
const chatIcon = { width:40, height:40, borderRadius:'50%', border:'1px solid '+CH.bd, background:'#fff', color:'#1A1A1A', fontSize:17, cursor:'pointer', flexShrink:0 };

function fzNombreEmp(empleados,id){ const e=(empleados||[]).find(x=>x.id===id); return e?e.nombre:'Alguien'; }
function fzHora(iso){ try{ return new Date(iso).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return ''; } }
function fzPreview(m){ return m.tipo==='texto'?(m.texto||''):m.tipo==='foto'?'📷 Foto':'🎤 Audio'; }
function fileADataURL(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.readAsDataURL(file); }); }
async function fzSubirAudio(blob,ext){
  try{
    const r=await fetch('/api/subir-init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content_type:blob.type||'audio/webm',ext:ext||'webm'})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.upload_url||!d.file_url) return null;
    const up=await fetch(d.upload_url,{method:'PUT',headers:{'Content-Type':blob.type||'audio/webm'},body:blob});
    if(!up.ok) return null;
    return d.file_url;
  }catch(e){ return null; }
}

function AvisoChat({aviso,onAbrir,onClose}){
  useEffect(()=>{ if(!aviso) return; const t=setTimeout(onClose,5000); return ()=>clearTimeout(t); },[aviso]);

  return (
    <div onClick={onAbrir} style={{position:'fixed',top:'calc(8px + env(safe-area-inset-top))',left:10,right:10,zIndex:200,background:C.surf2,border:'1px solid '+C.oro,borderRadius:14,padding:'10px 14px',boxShadow:'0 8px 24px rgba(0,0,0,.35)',cursor:'pointer',display:'flex',gap:10,alignItems:'center'}}>
      <span style={{fontSize:20}}>💬</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:14}}>{aviso.autor} <span style={{color:C.tx2,fontWeight:500}}>en {aviso.grupo}</span></div>
        <div style={{color:C.tx2,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{aviso.texto}</div>
      </div>
    </div>
  );
}

function ChatVista({sesion,esDuena,empleados,noLeidos,marcarLeido}){
  const [grupos,setGrupos]=useState([]);
  const [abierto,setAbierto]=useState(null);
  const [crear,setCrear]=useState(false);
  const [nombre,setNombre]=useState('');
  const [sel,setSel]=useState({});
  const [ultimos,setUltimos]=useState({});

  async function cargar(){
    const {data}=await SB.from('fichaje_chat_miembros').select('grupo_id, g:fichaje_chat_grupos(id,nombre,foto_url,created_at)').eq('empleado_id',sesion.id);
    const gs=(data||[]).filter(r=>r.g).map(r=>r.g);
    setGrupos(gs);
    const u={};
    await Promise.all(gs.map(async g=>{ const {data:m}=await SB.from('fichaje_chat_mensajes').select('texto,tipo,created_at').eq('grupo_id',g.id).order('created_at',{ascending:false}).limit(1); if(m&&m[0]) u[g.id]=m[0]; }));
    setUltimos(u);
  }
  useEffect(()=>{ cargar(); },[]);

  async function crearGrupo(){
    if(!nombre.trim()){ alert('Poné un nombre al grupo.'); return; }
    const g=await dbInsert('fichaje_chat_grupos',{nombre:nombre.trim(),creado_por:sesion.id});
    if(!g) return;
    const filas=[{grupo_id:g.id,empleado_id:sesion.id,puede_escribir:true}];
    empleados.forEach(e=>{ if(e.id!==sesion.id && sel[e.id] && sel[e.id].in) filas.push({grupo_id:g.id,empleado_id:e.id,puede_escribir:sel[e.id].habla!==false}); });
    await SB.from('fichaje_chat_miembros').insert(filas);
    setCrear(false); setNombre(''); setSel({});
    await cargar();
    setAbierto(g);
  }

  if(abierto) return <ChatConversacion grupo={abierto} sesion={sesion} esDuena={esDuena} empleados={empleados} onVolver={()=>{ setAbierto(null); cargar(); }} marcarLeido={marcarLeido}/>;

  return (
    <div className="fade">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <h2 style={{fontSize:20}}>Chats</h2>
        {esDuena && <button onClick={()=>{ setSel({}); setNombre(''); setCrear(true); }} style={{...S.btn,...S.btnOro,padding:'9px 14px',minHeight:0}}>+ Grupo</button>}
      </div>
      {grupos.length===0 ? <div style={{...S.card,color:C.tx2}}>{esDuena?'Creá tu primer grupo con "+ Grupo".':'Todavía no estás en ningún grupo.'}</div> :
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {grupos.map(g=>{ const n=noLeidos[g.id]||0; const u=ultimos[g.id];
            return (
            <div key={g.id} onClick={()=>setAbierto(g)} style={{...S.card,cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:46,height:46,borderRadius:'50%',background:C.oro,color:'#1A1A1A',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0}}>{(g.nombre||'·').slice(0,1).toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700}}>{g.nombre}</div>
                <div style={{color:C.tx2,fontSize:13,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u?fzPreview(u):'Sin mensajes todavía'}</div>
              </div>
              {n>0 && <span style={{minWidth:22,height:22,padding:'0 6px',borderRadius:11,background:C.oro,color:'#1A1A1A',fontWeight:800,fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>{n}</span>}
            </div>);
          })}
        </div>}

      {crear && (
        <div style={modalBg} onClick={()=>setCrear(false)}>
          <div style={modalBox} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontSize:17,marginBottom:10}}>Nuevo grupo</h3>
            <label style={S.label}>Nombre del grupo</label>
            <input style={{...S.input,marginBottom:12}} value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Equipo Fun Zone"/>
            <div style={{fontSize:12,color:C.tx2,marginBottom:6}}>¿Quiénes participan? (destildá "habla" = solo lectura)</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:230,overflowY:'auto'}}>
              {empleados.filter(e=>e.id!==sesion.id && e.activo!==false).map(e=>{ const s=sel[e.id]||{};
                return (
                <div key={e.id} style={{display:'flex',alignItems:'center',gap:8,background:C.surf2,border:'1px solid '+C.bd,borderRadius:10,padding:'9px 11px'}}>
                  <label style={{display:'flex',alignItems:'center',gap:9,flex:1,cursor:'pointer'}}>
                    <input type="checkbox" checked={!!s.in} onChange={ev=>setSel({...sel,[e.id]:{...s,in:ev.target.checked}})} style={{width:18,height:18}}/>
                    <span>{e.nombre}</span>
                  </label>
                  {s.in && <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontSize:12,color:C.tx2}}><input type="checkbox" checked={s.habla!==false} onChange={ev=>setSel({...sel,[e.id]:{...s,habla:ev.target.checked}})} style={{width:16,height:16}}/>habla</label>}
                </div>);
              })}
            </div>
            <div style={{display:'flex',gap:8,marginTop:14}}>
              <button onClick={()=>setCrear(false)} style={{...S.btn,...S.btnGhost,flex:1}}>Cancelar</button>
              <button onClick={crearGrupo} style={{...S.btn,...S.btnOro,flex:1}}>Crear grupo</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ChatConversacion({grupo,sesion,esDuena,empleados,onVolver,marcarLeido}){
  const [msgs,setMsgs]=useState([]);
  const [texto,setTexto]=useState('');
  const [puedeEscribir,setPuede]=useState(true);
  const [admin,setAdmin]=useState(false);
  const [fotoPrev,setFotoPrev]=useState(null);
  const [grabando,setGrabando]=useState(false);
  const [subiendo,setSubiendo]=useState(false);
  const listaRef=useRef(null), fileRef=useRef(null), recRef=useRef(null), chunksRef=useRef([]);

  function abajo(){ const el=listaRef.current; if(el) el.scrollTop=el.scrollHeight; }
  function agregar(m){ setMsgs(p=>p.some(x=>x.id===m.id)?p:[...p,m]); }
  useEffect(()=>{ abajo(); },[msgs]);

  useEffect(()=>{
    fzChatActivo.id=grupo.id;
    let vivo=true;
    (async()=>{
      const {data:ms}=await SB.from('fichaje_chat_mensajes').select('*').eq('grupo_id',grupo.id).order('created_at',{ascending:true}).limit(300);
      const {data:mi}=await SB.from('fichaje_chat_miembros').select('puede_escribir').eq('grupo_id',grupo.id).eq('empleado_id',sesion.id).maybeSingle();
      if(!vivo) return;
      setMsgs(ms||[]);
      setPuede(esDuena || !mi || mi.puede_escribir!==false);
      marcarLeido(grupo.id);
    })();
    const canal=SB.channel('fzgrupo-'+grupo.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'fichaje_chat_mensajes',filter:'grupo_id=eq.'+grupo.id},(payload)=>{
      agregar(payload.new);
      if(payload.new.empleado_id!==sesion.id) marcarLeido(grupo.id);
    }).subscribe();
    return ()=>{ vivo=false; fzChatActivo.id=null; SB.removeChannel(canal); };
  },[grupo.id]);

  async function mandar(obj){
    const row={grupo_id:grupo.id,empleado_id:sesion.id,texto:obj.texto||null,tipo:obj.tipo||'texto',adjunto_url:obj.adjunto_url||null};
    const {data,error}=await SB.from('fichaje_chat_mensajes').insert(row).select();
    if(error){ alert('No se pudo enviar: '+(error.message||'')); return; }
    if(data&&data[0]) agregar(data[0]);
  }
  async function enviarTexto(e){ e&&e.preventDefault(); const t=texto.trim(); if(!t) return; setTexto(''); await mandar({texto:t,tipo:'texto'}); }
  function elegirFoto(e){ const f=e.target.files&&e.target.files[0]; e.target.value=''; if(!f) return; setFotoPrev({file:f,url:URL.createObjectURL(f)}); }
  async function enviarFoto(){
    if(!fotoPrev) return; setSubiendo(true);
    try{ const dataUri=await fileADataURL(fotoPrev.file); const url=await subirFoto(dataUri); await mandar({tipo:'foto',adjunto_url:url}); URL.revokeObjectURL(fotoPrev.url); setFotoPrev(null); }
    catch(e){ alert('No se pudo enviar la foto'); }
    setSubiendo(false);
  }
  async function toggleGrabar(){
    if(grabando){ recRef.current&&recRef.current.stop(); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const tipos=['audio/mp4','audio/webm','audio/ogg'];
      const mime=tipos.find(t=>window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(t))||'';
      const rec=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);
      chunksRef.current=[];
      rec.ondataavailable=ev=>{ if(ev.data.size) chunksRef.current.push(ev.data); };
      rec.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop()); setGrabando(false);
        const tipoReal=rec.mimeType||mime||'audio/webm';
        const ext=tipoReal.indexOf('mp4')>=0?'m4a':tipoReal.indexOf('ogg')>=0?'ogg':'webm';
        const blob=new Blob(chunksRef.current,{type:tipoReal});
        if(!blob.size) return;
        setSubiendo(true);
        const url=await fzSubirAudio(blob,ext);
        if(url) await mandar({tipo:'audio',adjunto_url:url}); else alert('No se pudo enviar el audio');
        setSubiendo(false);
      };
      recRef.current=rec; rec.start(); setGrabando(true);
    }catch(e){ alert('No se pudo acceder al micrófono.'); }
  }

  return (
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:120,background:CH.bg,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',paddingTop:'calc(10px + env(safe-area-inset-top))',background:C.oro,color:'#1A1A1A',flexShrink:0}}>
        <button onClick={onVolver} style={{background:'none',border:'none',fontSize:26,color:'#1A1A1A',cursor:'pointer',lineHeight:1,width:28}}>‹</button>
        <div style={{width:36,height:36,borderRadius:'50%',background:'#1A1A1A',color:C.oro,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{(grupo.nombre||'·').slice(0,1).toUpperCase()}</div>
        <strong style={{flex:1}}>{grupo.nombre}</strong>
        {esDuena && <button onClick={()=>setAdmin(true)} style={{background:'none',border:'none',fontSize:20,color:'#1A1A1A',cursor:'pointer'}}>⚙</button>}
      </div>
      <div ref={listaRef} style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:6,padding:'12px 14px'}}>
        {msgs.length===0 ? <div style={{textAlign:'center',color:'#777',marginTop:20}}>Escribí el primer mensaje 👋</div> :
          msgs.map(m=>{ const mio=m.empleado_id===sesion.id;
            return (
            <div key={m.id} style={{alignSelf:mio?'flex-end':'flex-start',maxWidth:'80%'}}>
              <div style={{padding:'8px 11px',borderRadius:14,fontSize:15,lineHeight:1.35,boxShadow:'0 1px 1px rgba(0,0,0,.12)',background:mio?CH.mio:CH.otro,color:CH.txt,borderBottomRightRadius:mio?4:14,borderBottomLeftRadius:mio?14:4}}>
                {!mio && <div style={{fontSize:11,fontWeight:700,color:'#C77E1A',marginBottom:2}}>{fzNombreEmp(empleados,m.empleado_id)}</div>}
                {m.tipo==='foto'&&m.adjunto_url ? <a href={m.adjunto_url} target="_blank" rel="noreferrer"><img src={m.adjunto_url} alt="foto" style={{maxWidth:'100%',borderRadius:10,display:'block'}}/></a>
                  : m.tipo==='audio'&&m.adjunto_url ? <audio controls src={m.adjunto_url} style={{maxWidth:210}}/>
                  : <span style={{whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{m.texto}</span>}
                <span style={{fontSize:10,color:mio?'rgba(26,26,26,.55)':CH.gris,marginLeft:8,float:'right',marginTop:4}}>{fzHora(m.created_at)}</span>
              </div>
            </div>);
          })}
      </div>
      {!puedeEscribir ?
        <div style={{textAlign:'center',color:'#666',fontSize:13,padding:12,background:CH.comp,borderTop:'1px solid '+CH.bd,paddingBottom:'calc(12px + env(safe-area-inset-bottom))'}}>🔒 Solo lectura</div> :
        <form onSubmit={enviarTexto} style={{display:'flex',gap:6,alignItems:'center',padding:'8px 10px',background:CH.comp,borderTop:'1px solid '+CH.bd,flexShrink:0,paddingBottom:'calc(8px + env(safe-area-inset-bottom))'}}>
          <input ref={fileRef} type="file" accept="image/*" onChange={elegirFoto} style={{display:'none'}}/>
          <button type="button" onClick={()=>fileRef.current&&fileRef.current.click()} disabled={subiendo||grabando} style={chatIcon}>📷</button>
          <button type="button" onClick={toggleGrabar} disabled={subiendo} style={{...chatIcon,background:grabando?C.rojo:'#fff',color:grabando?'#fff':'#1A1A1A'}}>{grabando?'⏹':'🎤'}</button>
          <input value={texto} onChange={e=>setTexto(e.target.value)} placeholder={grabando?'Grabando… tocá ⏹':subiendo?'Subiendo…':'Mensaje…'} disabled={grabando} style={{flex:1,minHeight:44,background:'#fff',border:'1px solid '+CH.bd,borderRadius:22,color:'#1A1A1A',padding:'0 14px',fontSize:15,outline:'none'}}/>
          <button type="submit" disabled={!texto.trim()} style={{width:44,height:44,borderRadius:'50%',border:'none',background:C.oro,color:'#1A1A1A',fontSize:17,cursor:'pointer',flexShrink:0}}>➤</button>
        </form>}

      {fotoPrev && (
        <div style={modalBg} onClick={()=>{ URL.revokeObjectURL(fotoPrev.url); setFotoPrev(null); }}>
          <div style={modalBox} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontSize:17,marginBottom:10}}>Enviar foto</h3>
            <img src={fotoPrev.url} alt="previa" style={{maxWidth:'100%',maxHeight:'50vh',borderRadius:12,display:'block',margin:'0 auto'}}/>
            <div style={{display:'flex',gap:8,marginTop:14}}>
              <button onClick={()=>{ URL.revokeObjectURL(fotoPrev.url); setFotoPrev(null); }} style={{...S.btn,...S.btnGhost,flex:1}}>Cancelar</button>
              <button onClick={enviarFoto} disabled={subiendo} style={{...S.btn,...S.btnOro,flex:1}}>{subiendo?'Enviando…':'Enviar'}</button>
            </div>
          </div>
        </div>
      )}
      {admin && <AdminMiembros grupo={grupo} sesion={sesion} empleados={empleados} onCerrar={()=>setAdmin(false)}/>}
    </div>
  );
}

function AdminMiembros({grupo,sesion,empleados,onCerrar}){
  const [filas,setFilas]=useState([]);
  useEffect(()=>{ (async()=>{
    const {data}=await SB.from('fichaje_chat_miembros').select('empleado_id,puede_escribir').eq('grupo_id',grupo.id);
    const mapa={}; (data||[]).forEach(m=>mapa[m.empleado_id]=m.puede_escribir);
    setFilas((empleados||[]).filter(e=>e.activo!==false).map(e=>({id:e.id,nombre:e.nombre,inc:e.id in mapa,habla:mapa[e.id]!==false})));
  })(); },[]);
  function set(id,k,v){ setFilas(p=>p.map(f=>f.id===id?{...f,[k]:v}:f)); }
  async function guardar(){
    const fijos=[grupo.creado_por,sesion.id];
    const incluidos=filas.filter(f=>f.inc||fijos.indexOf(f.id)>=0);
    for(const f of incluidos){ await SB.from('fichaje_chat_miembros').upsert({grupo_id:grupo.id,empleado_id:f.id,puede_escribir:fijos.indexOf(f.id)>=0?true:f.habla},{onConflict:'grupo_id,empleado_id'}); }
    const quitar=filas.filter(f=>!f.inc&&fijos.indexOf(f.id)<0).map(f=>f.id);
    if(quitar.length) await SB.from('fichaje_chat_miembros').delete().eq('grupo_id',grupo.id).in('empleado_id',quitar);
    onCerrar();
  }
  return (
    <div style={modalBg} onClick={onCerrar}>
      <div style={modalBox} onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:17,marginBottom:10}}>Miembros del grupo</h3>
        <div style={{fontSize:12,color:C.tx2,marginBottom:8}}>Tildá quién está y si puede hablar.</div>
        <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:'55vh',overflowY:'auto'}}>
          {filas.map(f=>(
            <div key={f.id} style={{display:'flex',alignItems:'center',gap:8,background:C.surf2,border:'1px solid '+C.bd,borderRadius:10,padding:'9px 11px'}}>
              <label style={{display:'flex',alignItems:'center',gap:9,flex:1,cursor:'pointer'}}>
                <input type="checkbox" checked={f.inc||f.id===sesion.id} disabled={f.id===sesion.id} onChange={e=>set(f.id,'inc',e.target.checked)} style={{width:18,height:18}}/>
                <span>{f.nombre}{f.id===sesion.id?' (vos)':''}</span>
              </label>
              {(f.inc||f.id===sesion.id)&&f.id!==sesion.id && <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontSize:12,color:C.tx2}}><input type="checkbox" checked={f.habla} onChange={e=>set(f.id,'habla',e.target.checked)} style={{width:16,height:16}}/>habla</label>}
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:8,marginTop:14}}>
          <button onClick={onCerrar} style={{...S.btn,...S.btnGhost,flex:1}}>Cancelar</button>
          <button onClick={guardar} style={{...S.btn,...S.btnOro,flex:1}}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
