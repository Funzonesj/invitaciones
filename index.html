// ¿El acceso del evento está vencido? (2 días después de la fecha del evento)
function estaVencido(ev){
  if(!ev||!ev.anio||!ev.mes||!ev.dia) return false;
  const fF=new Date(+ev.anio,+ev.mes-1,+ev.dia);
  const fV=new Date(fF);fV.setDate(fF.getDate()+2);fV.setHours(0,0,0,0);
  const hoy=new Date();hoy.setHours(0,0,0,0);
  return hoy>=fV;
}
// Normaliza un celular argentino al formato internacional que necesita WhatsApp (54 9 + area + numero)
function waNum(n){
  let d=(n||'').toString().replace(/\D/g,'');     // dejar solo dígitos
  if(!d) return '';
  if(d.startsWith('549')) return d;                // ya está completo
  if(d.startsWith('54'))  return '549'+d.slice(2); // tiene país pero falta el 9 de celular
  if(d.startsWith('0'))   d=d.slice(1);            // sacar 0 inicial (ej: 0264...)
  return '549'+d;                                  // agregar código país Argentina + 9 móvil
}
// ¿Estamos en una compu (no celular)? Para abrir WhatsApp de la mejor forma en cada caso.
function esEscritorioWA(){ try{ return !/Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent); }catch(e){ return false; } }
// Abre WhatsApp con un mensaje (y opcionalmente un número). En la compu abre la app de
// escritorio DIRECTO (whatsapp://), sin la página intermedia de WhatsApp. En el celular usa wa.me.
function abrirWA(phone, text){
  const t = text ? encodeURIComponent(text) : '';
  const p = phone ? String(phone) : '';
  if(esEscritorioWA()){
    const url = 'whatsapp://send?'+(p?('phone='+p):'')+(p&&t?'&':'')+(t?('text='+t):'');
    try{ const a=document.createElement('a'); a.href=url; a.style.display='none'; document.body.appendChild(a); a.click(); setTimeout(()=>{try{a.remove();}catch(e){}},1500); }
    catch(e){ window.open('https://wa.me/'+p+(t?('?text='+t):''),'_blank'); }
  } else {
    window.open('https://wa.me/'+p+(t?('?text='+t):''),'_blank');
  }
}

}
// Redimensiona/comprime una imagen subida a un data URL liviano
function resizeImg(file, maxW, cb){
  const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width);const c=document.createElement('canvas');c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);try{cb(c.toDataURL('image/jpeg',0.82));}catch(e){cb(ev.target.result);}};img.onerror=()=>cb(ev.target.result);img.src=ev.target.result;};
  r.readAsDataURL(file);
}

// Ordena temáticas con las MÁS RECIENTES primero (por la fecha guardada en el id "t-<fecha>...",
// o por el campo .ts si existe; como desempate, lo último cargado va primero).
function ordenarRecientes(arr){
  return (arr||[]).map((t,i)=>[t,i]).sort((A,B)=>{
    const a=A[0],b=B[0];
    const fa=(a&&a.ts)||parseInt(String((a&&a.id)||'').replace(/^t-/,'').split('-')[0].replace(/[^0-9]/g,''))||0;
    const fb=(b&&b.ts)||parseInt(String((b&&b.id)||'').replace(/^t-/,'').split('-')[0].replace(/[^0-9]/g,''))||0;
    if(fb!==fa)return fb-fa;
    return B[1]-A[1];
  }).map(x=>x[0]);
}

// Arma la imagen de la tarjeta (portada + datos del evento) y la comparte/descarga — SIN link ni panel (ideal escuelas/admin)
function generarTarjetaImagen(ev, suc, tematicas, iaConfig, accion){
  if(!ev) return;
  const W=540,H=960;
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const fecha=ev.dia+' de '+(meses[(+ev.mes)-1]||'')+' de '+ev.anio;
  const nombre=ev.nombre||'';
  const col=(suc&&suc.color)||'#7c3aed';
  const F=fmtTipo(ev.tipo,iaConfig);
  const portadaImg=ev.portadaSrc||((((tematicas||[]).find(t=>t.id===ev.temId))||{}).img)||'';
  function dibujar(imgEl){
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
    if(imgEl){const iw=imgEl.width,ih=imgEl.height,sc=Math.max(W/iw,H/ih),dw=iw*sc,dh=ih*sc;ctx.drawImage(imgEl,(W-dw)/2,0,dw,dh);}
    else{const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#1e0a4e');g.addColorStop(1,col);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    const og=ctx.createLinearGradient(0,H*0.4,0,H);og.addColorStop(0,'rgba(0,0,0,0)');og.addColorStop(1,'rgba(0,0,0,0.88)');ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#f43f5e';ctx.beginPath();ctx.roundRect(W/2-90,40,180,40,20);ctx.fill();ctx.fillStyle='white';ctx.font='bold 18px Arial';ctx.fillText('TE INVITO!',W/2,67);
    let y=H-320;
    if(F.fmtNombre!==false&&nombre){ctx.fillStyle='#fff';ctx.font='bold 64px Arial';if(ctx.measureText(nombre).width>490)ctx.font='bold 44px Arial';ctx.fillText(nombre,W/2,y);y+=54;}
    const _u=(ev.edadUnidad||'años');
    const tipoTxt=(F.fmtEdad&&_u!=='noaplica'&&ev.edad)?((ev.tipo||'')+' · '+ev.edad+' '+(_u==='meses'?'meses':'años')):(ev.tipo||'');
    ctx.fillStyle='#fde68a';ctx.font='bold 24px Arial';ctx.fillText(tipoTxt,W/2,y);y+=46;
    ctx.fillStyle='#fff';ctx.font='22px Arial';ctx.fillText(fecha,W/2,y);y+=32;ctx.fillText((ev.hIni||'')+' a '+(ev.hFin||'')+' hs',W/2,y);y+=42;
    ctx.fillStyle='#fff';ctx.font='bold 26px Arial';ctx.fillText((suc&&suc.nombre)||'',W/2,y);y+=30;
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='16px Arial';const dir=(suc&&suc.direccion)||'';if(ctx.measureText(dir).width>490)ctx.font='13px Arial';ctx.fillText(dir,W/2,y);
    canvas.toBlob(function(blob){
      if(!blob){alert('No se pudo crear la imagen.');return;}
      const fname='tarjeta-'+((nombre||'evento').toLowerCase().replace(/[^a-z0-9]/g,'')||'evento')+'.jpg';
      const file=new File([blob],fname,{type:'image/jpeg'});
      if(accion==='compartir'&&/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Invitación',text:'¡Te invito!'}).catch(function(){});}
      else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);if(accion==='compartir')alert('📷 La tarjeta se descargó como imagen en tu compu. Ahora abrí WhatsApp (o WhatsApp Web) y adjuntá esa imagen para enviarla.');}
    },'image/jpeg',0.92);
  }
  if(portadaImg){fetch(portadaImg).then(function(r){return r.blob();}).then(function(b){const u=URL.createObjectURL(b);const im=new Image();im.onload=function(){dibujar(im);URL.revokeObjectURL(u);};im.onerror=function(){dibujar(null);};im.src=u;}).catch(function(){dibujar(null);});}
  else dibujar(null);
}

  }; const _iaSaved=loadLS('fz_iaconfig',null); return _iaSaved?{..._iaDef,..._iaSaved}:_iaDef; });

  const [invEvId,     setInvEvId]     = useState(INIT_INV_ID);
  const [vista,       setVista]       = useState(INIT_VISTA);
  const [menuOpen,    setMenuOpen]    = useState(false);
  const [dbReady,     setDbReady]     = useState(!SB);

  // Detect ?inv= param after mount as reliable fallback
  React.useEffect(()=>{
    const inv=new URLSearchParams(window.location.search).get('inv');
    if(inv){setInvEvId(inv);setVista('invitado-portada');}
  },[]);
  // Cargar eventos y confirmaciones desde la base de datos central (Supabase)
  React.useEffect(()=>{
    if(!SB){return;}
    (async()=>{
      // 1) Links de invitación/papá: traer SOLO ese evento primero (rápido) y mostrar ya
      const quickId=_INV_PARAM||_PAPA_PARAM;
      if(quickId){
        try{
          const one=await SB.from('eventos').select('data').eq('id',quickId);
          const ev=one.data&&one.data[0]&&one.data[0].data;
          if(ev){
            setEventos(prev=>prev.some(e=>e.id===ev.id)?prev:[ev,...prev]);
            if(_PAPA_PARAM && !_PAPA_DATA){
              if(estaVencido(ev)){setPapaAviso('El acceso para este evento ha vencido.');setVista('papa-login');}
              else{setPapaSesion(ev);setInvEvId(ev.id);setVista('papa-creador');}
            }
            setDbReady(true); // la invitación ya puede renderizar sin esperar lo pesado
          }
        }catch(e){}
      }
      // 2) Cargar el resto (puede tardar por imágenes guardadas) sin bloquear la pantalla
      const d=await sbLoadAll();
      if(d){
        setEventos(prev=>{
          const ids=new Set(d.eventos.map(e=>e.id));
          const extra=prev.filter(e=>!ids.has(e.id) && ((_INV_EV_DATA&&e.id===_INV_EV_DATA.id)||(_PAPA_DATA&&e.id===_PAPA_DATA.id)||e.id===quickId));
          return [...d.eventos, ...extra];
        });
        setConfs(d.confs);
        if(d.cfgIa)  setIaConfig(prev=>{const m={...prev,...d.cfgIa};if(!m.promptVideo||!String(m.promptVideo).includes('{frase}'))m.promptVideo=PROMPT_VIDEO_DEF;if(!m.fraseVideo)m.fraseVideo=FRASE_VIDEO_DEF;if(m.fraseVideo&&(m.fraseVideo.indexOf('vengo a invitarte')>=0||m.fraseVideo.indexOf('más divertido')>=0))m.fraseVideo=FRASE_VIDEO_DEF;return m;});
        if(d.cfgTem && d.cfgTem.length) setTematicas(d.cfgTem);
        if(d.cfgSuc && d.cfgSuc.length) setSucursales(d.cfgSuc);
        if(d.cfgUsr) setUsuarios(d.cfgUsr);
        if(d.cfgPed) setPedidos(d.cfgPed);
        if(_PAPA_PARAM && !_PAPA_DATA){
          const ev=d.eventos.find(e=>e.id===_PAPA_PARAM);
          if(ev && !estaVencido(ev)){setPapaSesion(ev);setInvEvId(ev.id);}
        }
      }
      setDbReady(true);
    })();

  React.useEffect(()=>{try{localStorage.setItem('fz_confs',JSON.stringify(confs));}catch(e){}; if(dbReady){confs.forEach(sbUpsertConf);}},[confs]);
  React.useEffect(()=>{try{localStorage.setItem('fz_tematicas',JSON.stringify(tematicas));}catch(e){}; if(dbReady){sbUpsertConfig('__config_tematicas__',tematicas);}},[tematicas]);
  React.useEffect(()=>{try{localStorage.setItem('fz_sucursales',JSON.stringify(sucursales));}catch(e){}; if(dbReady){sbUpsertConfig('__config_suc__',sucursales);}},[sucursales]);
  React.useEffect(()=>{try{localStorage.setItem('fz_iaconfig',JSON.stringify(iaConfig));}catch(e){}; if(dbReady){sbUpsertConfig('__config_ia__',iaConfig);}},[iaConfig]);
  React.useEffect(()=>{try{localStorage.setItem('fz_usuarios',JSON.stringify(usuarios));}catch(e){}; if(dbReady){sbUpsertConfig('__config_usuarios__',usuarios);}},[usuarios]);
  React.useEffect(()=>{try{localStorage.setItem('fz_pedidos',JSON.stringify(pedidos));}catch(e){}; if(dbReady){sbUpsertConfig('__config_pedidos__',pedidos);}},[pedidos]);
  async function refrescarPedidos(){ if(!SB)return; try{ const r=await SB.from('eventos').select('data').eq('id','__config_pedidos__').maybeSingle(); if(r&&r.data&&r.data.data) setPedidos(r.data.data); }catch(e){} }
  // Recordar sesión del admin/encargada en este dispositivo (no pedir contraseña cada vez)
  React.useEffect(()=>{try{if(adminSesion)localStorage.setItem('fz_admin_sesion',JSON.stringify(adminSesion));else localStorage.removeItem('fz_admin_sesion');}catch(e){}},[adminSesion]);
  // Recordar sesión del papá por 24hs
  React.useEffect(()=>{try{if(papaSesion)localStorage.setItem('fz_papa_sesion',JSON.stringify({ev:papaSesion,t:Date.now()}));else localStorage.removeItem('fz_papa_sesion');}catch(e){}},[papaSesion]);
  // Recordar el último panel usado (admin/papa) para volver al mismo al recargar
  React.useEffect(()=>{try{if(vista&&vista.indexOf('admin')===0)localStorage.setItem('fz_ultimo_modo','admin');else if(vista&&vista.indexOf('papa')===0)localStorage.setItem('fz_ultimo_modo','papa');}catch(e){}},[vista]);

  const sucAct   = sucursales.find(s=>s.id===sucActId)||sucursales[0];
  const esSA     = adminSesion?.rol==='superadmin';
  const evsLocal = eventos.filter(e=>e.sucId===sucActId);

  async function loginAdmin(u,p){
    // 1) Dueña: login seguro con Supabase Auth (email + contraseña verificados en servidor)
    if(SB){
      try{
        const {data,error}=await SB.auth.signInWithPassword({email:(u||'').trim(),password:p});
        if(!error && data && data.user){
          setAdminSesion({rol:'superadmin',nombre:'Administrador',usuario:u});
          setVista('admin-dashboard');
          return null;
        }
        if(error && /confirm/i.test(error.message||'')) return 'Tu usuario no está confirmado en Supabase.';
      }catch(e){}
    }
    // 2) Encargadas: login simple (usuario + clave de la lista). Solo rol encargada (sin puerta trasera de dueña).
    const usr=usuarios.find(x=>x.rol==='encargada' && x.usuario && x.usuario.toLowerCase()===(u||'').trim().toLowerCase() && x.clave===p);
    if(usr){
      setAdminSesion(usr);
      if(usr.sucursalId) setSucActId(usr.sucursalId);
      setVista('admin-dashboard');
      return null;
    }
    return 'Email o contraseña incorrectos.';
  }
  function logoutAdmin(){setAdminSesion(null);setVista('admin-login');}

  const isAdmin = ['admin-dashboard','admin-eventos','admin-tematicas','admin-excel','admin-asistencias','admin-remarketing','admin-usuarios','admin-menu','admin-formatos','admin-descargables','admin-ia','admin-catalogo','admin-catalogo-ia','admin-mejorador','admin-diseno','admin-config'].includes(vista);
  const isPapa  = ['papa-login','papa-creador'].includes(vista);

  // Mientras carga la base de datos en links de invitación/papá, mostrar cargando
  if(SB && !dbReady && (_INV_PARAM || _PAPA_PARAM)){
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'#0f172a',color:'white'}}>
        <div className="bounce" style={{fontSize:46}}>🎈</div>
        <div style={{fontWeight:800,fontSize:15}}>Cargando invitación...</div>
      </div>
    );
  }

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'#f7f9fc'}}>

      {/* HEADER */}
      {vista!=='invitado-portada'&&vista!=='invitado-web'&&(
        <header style={{background:'#ffffff',color:'#1e293b',padding:'10px 16px',position:'sticky',top:0,zIndex:100,borderBottom:'1px solid #eef2f7',boxShadow:'0 1px 10px rgba(15,23,42,.05)'}}>
          <div style={{maxWidth:900,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            {/* Logo */}
            <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
              {sucAct.logo?<img src={sucAct.logo} alt="" style={{width:34,height:34,borderRadius:10,objectFit:'cover'}}/>:<div style={{background:'linear-gradient(135deg,#7c3aed,#a855f7)',borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🎈</div>}

                <div style={{fontWeight:900,fontSize:13,lineHeight:1.1,color:'#0f172a'}}>FUN ZONE & PLAY POINT <span style={{background:'#f97316',color:'white',fontSize:9,padding:'2px 6px',borderRadius:99,fontWeight:900,marginLeft:4}}>PRO</span></div>

              </div>

          </div>
        </header>

            {adminSesion&&esSA&&(
              <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #334155'}}>
                <div style={{fontSize:10,color:'#64748b',fontWeight:700,marginBottom:8,paddingLeft:4}}>SUCURSAL</div>

                  <button key={s.id} onClick={()=>{setSucActId(s.id);setMenuOpen(false);}} style={{width:'100%',textAlign:'left',padding:'10px 14px',background:sucActId===s.id?'#1e293b':'transparent',border:'none',color:sucActId===s.id?'white':'#64748b',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:sucActId===s.id?900:400,marginBottom:2}}>{s.emoji} {s.nombre}</button>
                ))}
              </div>
            )}
            {adminSesion&&(
              <div style={{marginTop:'auto',paddingTop:20}}>
                <button onClick={()=>{logoutAdmin();setMenuOpen(false);}} style={{width:'100%',padding:'11px',background:'#1e293b',border:'1px solid #334155',color:'#f87171',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:700}}>⏻ Cerrar sesión</button>
              </div>
            )}
          </div>
        </div>
      )}

      <main style={{flex:1}}>
        {vista==='admin-login'       && <AdminLogin     onLogin={loginAdmin}/>}
        {vista==='admin-dashboard'   && <AdminDashboard setVista={setVista} sucAct={sucAct} evsLocal={evsLocal} tematicas={tematicas} esSA={esSA} iaConfig={iaConfig} setIaConfig={setIaConfig} pedidos={pedidos} setPedidos={setPedidos} refrescarPedidos={refrescarPedidos}/>}
        {vista==='admin-eventos'     && <AdminEventos   setVista={setVista} sucAct={sucAct} evsLocal={evsLocal} eventos={eventos} setEventos={setEventos} tematicas={tematicas} setInvEvId={setInvEvId} confs={confs} iaConfig={iaConfig} setIaConfig={setIaConfig} setPapaSesion={setPapaSesion}/>}

        {vista==='admin-asistencias' && <AdminAsistencias setVista={setVista} evsLocal={evsLocal} confs={confs}/>}
        {vista==='admin-remarketing' && <AdminRemarketing setVista={setVista} evsLocal={evsLocal} sucAct={sucAct}/>}
        {vista==='admin-usuarios'    && esSA && <AdminUsuarios  setVista={setVista} usuarios={usuarios} setUsuarios={setUsuarios} sucursales={sucursales} setSucursales={setSucursales}/>}

        {vista==='admin-catalogo'    && esSA && <AdminCatalogo setVista={setVista} tematicas={tematicas} setTematicas={setTematicas}/>}
        {vista==='admin-catalogo-ia' && esSA && <AdminCatalogoIA setVista={setVista} tematicas={tematicas} setTematicas={setTematicas}/>}
        {vista==='admin-papabotones' && esSA && <AdminPapaBotones setVista={setVista} iaConfig={iaConfig} setIaConfig={setIaConfig}/>}
        {vista==='admin-diseno'      && esSA && <AdminDisenoTarjeta setVista={setVista} sucAct={sucAct} iaConfig={iaConfig} setIaConfig={setIaConfig}/>}

        {vista==='admin-menu'        && esSA && <AdminMenu setVista={setVista} iaConfig={iaConfig} setIaConfig={setIaConfig}/>}

        {vista==='papa-creador'      && papaSesion&&<PapaCreador key={papaSesion.id} setVista={setVista} papaSesion={papaSesion} setPapaSesion={setPapaSesion} eventos={eventos} setEventos={setEventos} tematicas={tematicas} sucursales={sucursales} setInvEvId={setInvEvId} iaConfig={iaConfig} confs={confs} setConfs={setConfs} pedidos={pedidos} setPedidos={setPedidos}/>}

      {vista!=='invitado-portada'&&vista!=='invitado-web'&&(
        <footer style={{background:'#0f172a',color:'#475569',textAlign:'center',padding:'10px',fontSize:11,borderTop:'1px solid #1e293b'}}>
          © 2026 Fun Zone & Play Point · Sistema de Invitaciones Digitales

      )}

}

/* ── ADMIN GENERADOR DE CATÁLOGO (fal.ai) ────────────────── */
function AdminCatalogo({setVista,tematicas,setTematicas,modo}){
  const esMejorador = modo==='mejorador';
  const PURPLE='#534AB7';
  const [img,setImg]=useState('');
  const [opt,setOpt]=useState(esMejorador?'enhance':'3d');
  const [model,setModel]=useState(esMejorador?'fal-ai/flux-pro/kontext':'fal-ai/flux-pro/kontext/text-to-image');
  const [ratio,setRatio]=useState('9:16');
  const [cargando,setCargando]=useState(false);
  const [err,setErr]=useState('');
  const [resultUrl,setResultUrl]=useState('');
  const [prompt,setPrompt]=useState('');
  const [copiado,setCopiado]=useState(false);
  const [msg,setMsg]=useState('');
  const [guardarOpen,setGuardarOpen]=useState(false);
  const [gNombre,setGNombre]=useState('');
  const [gCats,setGCats]=useState(['TODOS']);
  const fileRef=useRef();
  function toggleGCat(c){setGCats(cs=>cs.includes(c)?cs.filter(x=>x!==c):[...cs,c]);}

  const prompt3D='Hyper realistic 3D render, NOT cartoon, NOT anime, NOT illustration, NOT 2D,\nphotorealistic 3D Pixar movie quality, cinematic lighting, ultra high quality,\n8K resolution, full body portrait, vertical 9:16 format,\nwarm welcoming smile, arms slightly open as if inviting someone for a hug,\nleave extra empty clean space at the top of the image for text overlay,\nno text, no watermark, clean background behind character.';
  const promptEnhance='Enhance this image quality only.\nKeep the exact same art style as the original.\nDo NOT change to 3D, do NOT change to photorealistic.\nDo NOT modify the art style in any way.\nKeep exact same character design, colors, pose and composition.\nOnly improve: sharpness, resolution, color vibrancy, lighting and details.\nRemove any noise, blur or artifacts.\nExtend background naturally to fill full vertical 9:16 portrait format.\nLeave extra empty clean space at the top for text overlay.\nUltra high quality, 8K resolution. No text, no watermark.';

  function selectOption(o){setOpt(o);setModel(o==='enhance'?'fal-ai/flux-pro/kontext':'fal-ai/flux-pro/kontext/text-to-image');}
  function onFile(e){const f=e.target.files[0];if(!f)return;resizeImg(f,1024,data=>setImg(data));}
  async function pegarImagen(){
    setErr('');
    try{
      const items=await navigator.clipboard.read();
      for(const it of items){
        const tipo=it.types.find(t=>t.startsWith('image/'));
        if(tipo){const blob=await it.getType(tipo);resizeImg(blob,1024,data=>setImg(data));return;}
      }
      setErr('No hay ninguna imagen en el portapapeles. Copiá una imagen primero.');
    }catch(e){setErr('No se pudo leer el portapapeles. Probá con Ctrl+V o subí el archivo.');}
  }
  // Pegar con Ctrl+V en cualquier parte de la sección
  useEffect(()=>{
    function onPaste(e){
      const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
      for(const it of items){if(it.type&&it.type.startsWith('image/')){const f=it.getAsFile();if(f){resizeImg(f,1024,data=>setImg(data));e.preventDefault();}break;}}
    }
    document.addEventListener('paste',onPaste);
    return ()=>document.removeEventListener('paste',onPaste);
  },[]);

  async function generar(){
    setErr('');setMsg('');
    if(!img){setErr('Subí una imagen primero');return;}
    const esTresD=opt==='3d';
    const p=esTresD?prompt3D:promptEnhance;
    setPrompt(p);setCargando(true);setResultUrl('');
    try{
      const size=ratio==='9:16'?{width:768,height:1366}:ratio==='1:1'?{width:1024,height:1024}:{width:1024,height:768};
      // 3D: describir la imagen + flux text-to-image (esquiva restricciones). Mejorar: flux imagen→imagen.
      const body=esTresD
        ?{prompt:p,image:img,model:'fal-ai/flux-pro/kontext/text-to-image',size,describir:true,isI2I:false}
        :{prompt:p,image:img,model:'fal-ai/flux-pro/kontext',size,isI2I:true};
      const resp=await fetch('/api/generar-catalogo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await resp.json().catch(()=>({error:'Respuesta inválida del servidor.'}));
      if(!resp.ok)throw new Error(data.error||'No se pudo generar.');
      if(!data.url)throw new Error('No se recibió imagen. Probá de nuevo.');
      setResultUrl(data.url);
    }catch(e){setErr(String((e&&e.message)||e));}
    finally{setCargando(false);}
  }
  function copiar(){if(navigator.clipboard)navigator.clipboard.writeText(prompt).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2000);});}
  function guardarEnCatalogo(){
    if(!gNombre.trim()){setErr('Poné un nombre para el personaje.');return;}
    const cats=gCats.includes('TODOS')?gCats:['TODOS',...gCats];
    setErr('');setMsg('Guardando…');
    // Bajar y achicar la imagen para guardarla liviana
    fetch(resultUrl).then(r=>r.blob()).then(blob=>{
      const burl=URL.createObjectURL(blob);const im=new Image();
      im.onload=()=>{try{const sc=Math.min(1,500/im.width);const cv=document.createElement('canvas');cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);const data=cv.toDataURL('image/jpeg',0.72);setTematicas(p=>[...p,{id:'t-'+Date.now(),nombre:gNombre.trim(),cats,img:data,emoji:'🎨',ia:true}]);setMsg('✅ Guardado en el Catálogo IA');flashOk('✓ ¡Guardado en el catálogo!');setGuardarOpen(false);setGNombre('');setGCats(['TODOS']);setTimeout(()=>setMsg(''),3500);}catch(err){setMsg('No se pudo guardar. Descargala y subila manualmente en Portadas.');}URL.revokeObjectURL(burl);};
      im.onerror=()=>{setMsg('No se pudo guardar. Descargala y subila manualmente en Portadas.');};
      im.src=burl;
    }).catch(()=>setMsg('No se pudo descargar la imagen. Usá el botón Descargar y subila en Portadas.'));
  }

  const optBtn=(o,emoji,titulo,desc)=>(
    <div onClick={()=>selectOption(o)} style={{flex:1,padding:'12px',borderRadius:12,cursor:'pointer',border:opt===o?('2px solid '+PURPLE):'1px solid #e2e8f0',background:opt===o?'#EEEDFE':'#fff',transition:'all .15s'}}>
      <div style={{fontSize:22,marginBottom:4}}>{emoji}</div>
      <div style={{fontSize:13,fontWeight:800,color:opt===o?'#3C3489':'#1e293b'}}>{titulo}</div>
      <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{desc}</div>
    </div>
  );

  return(
    <div className="fade-in" style={{maxWidth:560,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>{esMejorador?'🪄 Mejorador de imagen':'🎨 Generador de imagen IA'}</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:18}}>{esMejorador?'Subí una foto y mejorá su calidad (nitidez, color, resolución) con IA, sin cambiar el estilo.':'Subí un personaje y generá su versión en 3D estilo Pixar para el catálogo.'}</p>

      <label style={S.label}>Imagen del personaje</label>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFile}/>
      <div style={{position:'relative',border:img?('2px solid '+PURPLE):'2px dashed #cbd5e1',borderRadius:12,padding:img?0:'28px',textAlign:'center',cursor:'pointer',background:'#fff',marginBottom:14,overflow:'hidden'}} onClick={()=>{if(!img)fileRef.current.click();}}>
        {img
          ?<img src={img} alt="" style={{width:'100%',maxHeight:280,objectFit:'contain',borderRadius:10,display:'block'}}/>
          :<div><div style={{fontSize:34,marginBottom:6}}>🖼️</div><div style={{fontSize:14,color:'#64748b',fontWeight:700}}>Hacé clic para subir la imagen</div><div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>JPG, PNG, WEBP · o pegá con Ctrl+V</div></div>}
        {img&&<button type="button" onClick={(e)=>{e.stopPropagation();setImg('');setResultUrl('');setGuardarOpen(false);}} style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,.6)',color:'white',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center'}}>🗑</button>}
      </div>
      {img&&<button type="button" onClick={()=>{setImg('');setResultUrl('');setGuardarOpen(false);fileRef.current.click();}} style={{...S.btn,width:'100%',background:'#f1f5f9',color:'#334155',marginBottom:14}}>🔄 Cambiar por otra imagen</button>}
      <button type="button" onClick={pegarImagen} style={{...S.btn,width:'100%',background:'#f1f5f9',color:'#334155',marginBottom:14}}>📋 Pegar imagen del portapapeles</button>

      <label style={S.label}>¿Qué querés hacer?</label>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {optBtn('3d','🧊','Crear en 3D','Estilo Pixar HD')}
        {optBtn('enhance','✨','Mejorar calidad','Mantiene el estilo')}
      </div>

      <label style={{display:'block',marginBottom:14}}><span style={S.label}>Formato</span>
        <select value={ratio} onChange={e=>setRatio(e.target.value)} style={S.input}>
          <option value="9:16">9:16 vertical ✅</option>
          <option value="1:1">1:1 cuadrado</option>
          <option value="4:3">4:3 horizontal</option>
        </select>
      </label>

      {err&&<div style={{background:'#FCEBEB',border:'1px solid #F09595',color:'#a32d2d',padding:'10px 14px',borderRadius:10,fontSize:12,marginBottom:12}}>{err}</div>}
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:10,fontSize:12,marginBottom:12,fontWeight:700}}>{msg}</div>}

      <button onClick={generar} disabled={cargando||!img} style={{...S.btn,width:'100%',padding:14,fontSize:15,background:(cargando||!img)?'#cbd5e1':PURPLE,color:'white',marginBottom:14}}>
        {cargando?'⏳ Generando en fal.ai…':'✨ Generar imagen'}
      </button>

      {resultUrl&&(
        <div className="fade-in">
          <label style={S.label}>Resultado</label>
          <p style={{fontSize:11,color:'#94a3b8',textAlign:'center',marginBottom:6}}>⬆ Espacio libre arriba para el nombre del cumpleañero</p>
          <img src={resultUrl} alt="" style={{width:'100%',borderRadius:12,border:'1px solid #e2e8f0',marginBottom:12}}/>
          <div style={{background:'#f1f5f9',borderRadius:10,padding:12,marginBottom:12,position:'relative'}}>
            <pre style={{fontSize:11,color:'#334155',whiteSpace:'pre-wrap',wordBreak:'break-word',fontFamily:'monospace',lineHeight:1.5,margin:0,paddingRight:70}}>{prompt}</pre>
            <button onClick={copiar} style={{position:'absolute',top:8,right:8,...S.btn,padding:'5px 10px',fontSize:11,background:'#fff',border:'1px solid #e2e8f0',color:'#475569'}}>{copiado?'✓ Copiado':'📋 Copiar'}</button>
          </div>
          <button onClick={()=>{fetch(resultUrl).then(r=>r.blob()).then(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='personaje_catalogo.png';document.body.appendChild(a);a.click();document.body.removeChild(a);}).catch(()=>window.open(resultUrl,'_blank'));}} style={{...S.btn,width:'100%',background:'#fff',border:'1px solid #e2e8f0',color:'#1e293b',marginBottom:8}}>⬇️ Descargar imagen</button>
          {!guardarOpen&&<button onClick={()=>setGuardarOpen(true)} style={{...S.btn,width:'100%',background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white'}}>➕ Guardar en el catálogo</button>}
          {guardarOpen&&(
            <div style={{...S.card,marginTop:4,borderLeft:'4px solid '+PURPLE}}>
              <label style={{display:'block',marginBottom:10}}><span style={S.label}>Nombre del personaje</span>
                <input value={gNombre} onChange={e=>setGNombre(e.target.value)} style={S.input} placeholder="Ej: Sirenita" autoFocus/>
              </label>
              <span style={S.label}>Categorías (para que aparezca al filtrar)</span>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,margin:'6px 0 12px'}}>
                {CATS.map(c=><button key={c} type="button" onClick={()=>toggleGCat(c)} style={{padding:'4px 11px',borderRadius:99,fontSize:11,fontWeight:700,border:'none',cursor:'pointer',background:gCats.includes(c)?PURPLE:'#f1f5f9',color:gCats.includes(c)?'white':'#64748b'}}>{c}</button>)}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={guardarEnCatalogo} style={{...S.btn,flex:1,background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white'}}>✓ Guardar</button>
                <button onClick={()=>setGuardarOpen(false)} style={{...S.btn,background:'#f1f5f9',color:'#64748b'}}>Cancelar</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

  const [cat,setCat]=useState('TODOS');

            </div>
            <div style={{padding:'4px 6px',fontSize:8,color:'#64748b',textAlign:'center',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{(t.cats||[]).filter(c=>c!=='TODOS').join(' · ')||'Sin categoría'}</div>
            <div style={{display:'flex',borderTop:'1px solid #e2e8f0'}}>
              {[['f','♀ Voz','#db2777'],['m','♂ Voz','#2563eb']].map(([g,l,c])=>(
                <button key={g} onClick={()=>setTematicas(p=>p.map(x=>x.id===t.id?{...x,genero:(x.genero===g?'':g)}:x))} title="Género de la voz para el video" style={{flex:1,padding:5,background:t.genero===g?c:'none',border:'none',color:t.genero===g?'white':c,cursor:'pointer',fontSize:10,fontWeight:800}}>{l}</button>
              ))}
            </div>
            <button onClick={()=>setTematicas(p=>p.map(x=>x.id===t.id?{...x,ia:false}:x))} style={{width:'100%',padding:6,background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:11,fontWeight:700,borderTop:'1px solid #fee2e2'}}>✕ Quitar del Catálogo IA</button>

  );
}

/* ── ADMIN EVENTOS ───────────────────────────────────────── */
function AdminEventos({setVista,sucAct,evsLocal,eventos,setEventos,tematicas,setInvEvId,confs,iaConfig,setIaConfig,setPapaSesion}){
  function enviarCredsWA(ev){
    const salon=sucAct.nombre;
    const base=window.location.href.split('?')[0];
    const loginLink=base+'?papa='+ev.id;
    const lineas=[
      'Hola '+ev.nomPapa+'!',
      '',
      'Te enviamos el acceso a las *Invitaciones Digitales* de *'+salon+'*',
      'para el '+(ev.tipo||'Cumpleanos')+' de *'+ev.nombre+'*.',
      '',
      '*Ingresa con tu link personal:*',
      loginLink,
      '',
      '(Si el link no abre directo, ingresa manualmente:)',
      '*Usuario:* '+ev.user,
      '*Contrasena:* '+ev.pass,
      '',
      '_El acceso vence al dia siguiente del evento._',
      '- '+salon,
    ];
    abrirWA(waNum(ev.celPapa), lineas.join('\n'));
  }
  const ef={nombre:'',tipo:'Cumpleaños',edad:'',edadUnidad:'años',dia:'',mes:'',anio:String((iaConfig&&iaConfig.anioVigente)||2026),hIni:'',hFin:'',celPapa:'',dni:'',nomPapa:'',user:'',pass:'',temId:((iaConfig&&iaConfig.temDefault)||'t-3'),doble:false,nombre2:'',edad2:'',temId2:'t-1',nomPapa2:'',celPapa2:''};
  const [form,setForm]=useState(ef); const [editId,setEditId]=useState(null); const [open,setOpen]=useState(false);
  const [fMes,setFMes]=useState(''); const [fDia,setFDia]=useState(''); const [msgOk,setMsgOk]=useState('');
  const [busqTema,setBusqTema]=useState(''); const [catTema,setCatTema]=useState('TODOS'); const [temOpen,setTemOpen]=useState(false);

  function autoCredenciales(){
    if(!form.nombre) return alert('Ingresá primero el nombre del agasajado.');
    setForm(f=>({...f, user: genUser(f.nombre), pass: genPass(f.nombre)}));
  }
  const listFiltrada=evsLocal.filter(e=>(!fMes||e.mes===fMes)&&(!fDia||e.dia===fDia));

  const [alertaSup,setAlertaSup]=useState(null); // {ev, accion}
  const [borrarEv,setBorrarEv]=useState(null); // evento a borrar (pide confirmación)
  function confirmarBorrar(){ if(!borrarEv)return; const id=borrarEv.id; setEventos(eventos.filter(x=>x.id!==id)); sbDeleteEvento(id); setBorrarEv(null); flashOk('✓ Tarjeta borrada'); }
  function sub(e){
    e.preventDefault();
    // Detectar superposición de horarios en la misma sucursal y día
    const conflicto=eventos.find(x=>
      x.sucId===sucAct.id &&
      x.id!==editId &&
      x.dia===form.dia && x.mes===form.mes && x.anio===form.anio &&
      !(form.hFin<=x.hIni || form.hIni>=x.hFin)
    );
    if(conflicto){
      setAlertaSup({ev:conflicto,accion:()=>{
        guardarEvento();
        setAlertaSup(null);
      }});
      return;
    }
    guardarEvento();
  }
  function guardarEvento(){
    const fmt=fmtTipo(form.tipo,iaConfig);
    if(editId){setEventos(eventos.map(x=>x.id===editId?{...x,...form,...fmt}:x));setEditId(null);}
    else{setEventos(prev=>[...prev,{...form,...fmt,id:'ev-'+Date.now().toString(16),sucId:sucAct.id,creado:Date.now()}]);}
    setForm(ef);setOpen(false);setTemOpen(false);
    setMsgOk('✅ Se guardó correctamente');flashOk('✓ ¡Guardado!');setTimeout(()=>setMsgOk(''),3500);
    window.scrollTo(0,0);
  }
  function copiarLink(id){navigator.clipboard?.writeText(window.location.href.split('?')[0]+'?inv='+id);alert('¡Enlace copiado!');}
  function compartirLinkInv(ev){const link=window.location.href.split('?')[0]+'?inv='+ev.id;const txt='¡Te invito al '+(ev.tipo||'cumpleaños')+' de '+ev.nombre+'! Abrí la tarjeta acá: '+link;abrirWA('', txt);}

  return(
    <div className="fade-in" style={{maxWidth:900,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      {msgOk&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msgOk}</div>}
      <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:18}}>
        <div><h1 style={{fontWeight:900,fontSize:22}}>Eventos — {sucAct.nombre}</h1><p style={{fontSize:11,color:'#64748b'}}>{evsLocal.length} evento(s)</p></div>
        <button style={{...S.btn,background:'#06b6d4',color:'#0f172a'}} onClick={()=>{setOpen(!open);setEditId(null);setForm(ef);setTemOpen(false);}}>{open?'✕ Cancelar':'+ Cargar Evento'}</button>
      </div>

      {/* Filtros */}

/* ── ADMIN TEMATICAS ─────────────────────────────────────── */
function AdminTematicas({setVista,tematicas,setTematicas}){
  const [form,setForm]=useState({nombre:'',emoji:'🎨',imgs:[],cats:['TODOS']});
  const [nuevaCat,setNuevaCat]=useState('');
  const [urlInput,setUrlInput]=useState('');
  const [allCats,setAllCats]=useState([...CATS]);
  const [msg,setMsg]=useState('');
  const [editCat,setEditCat]=useState(null); // id de la imagen a la que se le editan categorías
  const [filtCat,setFiltCat]=useState('RECIENTES'); // filtro de la grilla
  const fRef=useRef();
  // Lista a mostrar: más nuevas primero. "RECIENTES" = 10, una por personaje.
  const _bn=n=>String(n||'').replace(/\s*\d+$/,'').trim();
  let listaMostrar=ordenarRecientes(tematicas);
  if(filtCat==='RECIENTES'){const seen=new Set();const out=[];for(const t of listaMostrar){const b=_bn(t.nombre);if(!seen.has(b)){seen.add(b);out.push(t);}if(out.length>=10)break;}listaMostrar=out;}
  else if(filtCat!=='TODOS'){listaMostrar=listaMostrar.filter(t=>(t.cats||[]).includes(filtCat));}

  // Carga MÚLTIPLE: varias imágenes del mismo personaje de una sola vez (achicadas para que se puedan guardar)
  function onFile(e){
    const files=Array.from(e.target.files||[]);if(!files.length)return;
    files.forEach(f=>resizeImg(f,520,data=>setForm(x=>({...x,imgs:[...x.imgs,data]}))));
  }
  function quitarImg(i){setForm(x=>({...x,imgs:x.imgs.filter((_,idx)=>idx!==i)}));}
  function addUrl(){const u=urlInput.trim();if(!u)return;setForm(x=>({...x,imgs:[...x.imgs,u]}));setUrlInput('');}
  function toggleCat(c){setForm(f=>({...f,cats:f.cats.includes(c)?f.cats.filter(x=>x!==c):[...f.cats,c]}))}

              </div>

              <div style={{display:'flex',gap:6,marginTop:6}}>

                <button type="button" onClick={addUrl} style={{...S.btn,background:'#7c3aed',color:'white',padding:'7px 12px'}}>+</button>
              </div>
              {form.imgs.length>0&&(

/* ── ADMIN EXCEL ─────────────────────────────────────────── */
function AdminExcel({setVista,sucActId,eventos,setEventos}){
  const [txt,setTxt]=useState(''); const [msg,setMsg]=useState('');
  function sub(e){
    e.preventDefault();
    if(!txt.trim()){setMsg('Pega el texto de tu planilla.');return;}
    const filas=txt.split('\n').filter(l=>l.trim());
    let n=0;const nuevo=[...eventos];
    filas.forEach((f,i)=>{
      const c=f.split(/\t|;/).map(x=>x.trim());
      const primera=(c[0]||'').toLowerCase();
      if(primera==='nombre'||primera==='nombre ') return; // saltear fila de titulos
      if(c.length>=3&&c[0]){
        nuevo.push({id:'ev-xl-'+Date.now()+i,sucId:sucActId,nombre:c[0],edad:c[1]||'5',dia:c[2],mes:c[3]||'05',anio:c[4]||'2026',hIni:c[5]||'17:00',hFin:c[6]||'22:00',nomPapa:c[7]||'',dni:c[8]||'',celPapa:c[9]||'',user:c[10]||(c[0].toLowerCase().replace(/\s/g,'')+'2026'),pass:c[11]||'1234',temId:'t-3',tipo:'Cumpleaños'});
        n++;
      }
    });
    setEventos(nuevo);setMsg(`✅ Se importaron ${n} cumpleaños.`);setTxt('');setTimeout(()=>setMsg(''),5000);
  }
  function descargarPlantilla(){
    const filas=[
      ['Nombre','Edad','Dia','Mes','Anio','Hora Inicio','Hora Fin','Padre/Madre','DNI','Celular','Usuario','Clave'],
      ['Mia Gonzalez','5','15','06','2026','17:00','21:00','Laura Gonzalez','30111222','2645522081','miagonzalez2026','1234'],
      ['Thiago Perez','7','22','06','2026','18:00','22:00','Marcos Perez','28999888','2644567890','thiagoperez2026','5678'],
    ];
    const csv='﻿'+filas.map(f=>f.join(';')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Plantilla_Eventos_FunZone.csv';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  return(
    <div className="fade-in" style={{maxWidth:620,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <div style={S.card}>
        <h1 style={{fontWeight:900,fontSize:20,marginBottom:6}}>📊 Carga Excel Semanal</h1>
        <p style={{fontSize:12,color:'#64748b',marginBottom:16}}>Copiá las filas de tu planilla y pegálas acá.</p>
        {msg&&<div style={{background:'#f0fdf4',color:'#166534',padding:12,borderRadius:12,fontSize:12,fontWeight:700,marginBottom:14}}>{msg}</div>}
        <div style={{background:'#f8fafc',borderRadius:12,padding:12,fontSize:11,color:'#64748b',marginBottom:12,border:'1px dashed #e2e8f0'}}>
          <b>Columnas:</b> Nombre · Edad · Día · Mes · Año · HoraInicio · HoraFin · Padre/Madre · DNI · Celular · Usuario · Clave
        </div>
        <button type="button" onClick={descargarPlantilla} style={{...S.btn,background:'#eef2ff',color:'#4338ca',width:'100%',padding:12,marginBottom:14,fontSize:13,fontWeight:800}}>⬇️ Descargar plantilla Excel</button>
        <p style={{fontSize:11,color:'#94a3b8',marginBottom:14,lineHeight:1.5}}>💡 Descargá la plantilla, completála en Excel, después copiá las filas (sin los títulos) y pegálas acá abajo.</p>
        <form onSubmit={sub}>
          <textarea rows={7} value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Pegá las filas acá..." style={{...S.input,fontFamily:'monospace',resize:'vertical'}}/>
          <button type="submit" style={{...S.btn,background:'#10b981',color:'white',width:'100%',padding:14,marginTop:12,fontSize:14}}>📤 Importar Fiestas</button>
        </form>
      </div>
    </div>
  );
}

              <option value=''>— Todos los meses —</option>
              {MESES.slice(1).map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
            </select>
            <input value={fAnio} onChange={e=>setFAnio(e.target.value)} placeholder="Año" maxLength={4} style={{...S.input,width:80,padding:'8px 10px'}}/>
          </div>
          <p style={{fontSize:11,color:'#64748b',marginBottom:10,fontWeight:700}}>{targets.length} contacto(s)</p>
          <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:320,overflowY:'auto'}} className="scrollbar-none">
            {targets.length===0?<p style={{color:'#94a3b8',textAlign:'center',padding:20,fontSize:12}}>Sin contactos para ese período.</p>
              :targets.map(ev=>(
                <div key={ev.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#f8fafc',borderRadius:12,padding:'10px 14px',gap:8}}>
                  <div><div style={{fontWeight:800,fontSize:13}}>{ev.nomPapa}</div><div style={{fontSize:10,color:'#64748b'}}>Cumple de {ev.nombre} · {ev.dia}/{ev.mes}</div></div>
                  <button onClick={()=>enviar(ev)} style={{...S.btn,background:'#22c55e',color:'white',padding:'7px 14px',fontSize:11,whiteSpace:'nowrap'}}>💬 Enviar</button>
                </div>
              ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ADMIN USUARIOS ──────────────────────────────────────── */

  }

                            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const file=e.target.files[0];if(!file)return;resizeImg(file,640,data=>{const f=[...(ed.fotos||['','','',''])];f[i]=data;setEd({...ed,fotos:f});});}}/>

                    </div>
                  </div>

        </div>
      </div>
    </div>
  );

/* ── ADMIN IA & PRECIOS ──────────────────────────────────── */
function AdminIA({setVista,iaConfig,setIaConfig}){
  const [cfg,setCfg]=useState(iaConfig);
  const [msg,setMsg]=useState('');
  const [editando,setEditando]=useState(false);
  const [saldo,setSaldo]=useState(null);   // {balance,currency} | null
  const [saldoErr,setSaldoErr]=useState('');
  const [saldoCargando,setSaldoCargando]=useState(true);
  function cargarSaldo(){setSaldoCargando(true);setSaldoErr('');fetch('/api/saldo').then(r=>r.json()).then(d=>{if(d&&typeof d.balance==='number'){setSaldo(d);}else{setSaldoErr((d&&d.error)||'No disponible');}}).catch(()=>setSaldoErr('No se pudo consultar')).finally(()=>setSaldoCargando(false));}
  React.useEffect(()=>{cargarSaldo();},[]);
  const [vozMsg,setVozMsg]=useState('');
  function probarVoz(g){setVozMsg('Probando la voz…');fetch('/api/voz',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'Hola, soy una prueba de voz para Fun Zone. ¡Va a ser una fiesta increíble!',genero:g})}).then(async r=>{const d=await r.json().catch(()=>({}));if(r.ok&&d&&d.audio){try{const a=new Audio(d.audio);a.play();}catch(e){}setVozMsg('✅ Voz '+(g==='f'?'femenina':'masculina')+' OK — deberías escucharla. ¡ElevenLabs anda!');}else if(d&&d.configured===false){setVozMsg('⚠️ Falta cargar ELEVENLABS_API_KEY en Vercel y hacer Redeploy.');}else{setVozMsg('⚠️ '+((d&&d.error)||'No funcionó. Fijate que la clave tenga permiso de "Texto a voz".'));}}).catch(()=>setVozMsg('⚠️ No se pudo consultar el servicio de voz.'));}

  const base=iaConfig.menuConfig||{prompt:'',ninos:[],adultos:[],snacks:[],postres:[],bebidas:[]};
  const [cfg,setCfg]=useState(base);
  const [nuevo,setNuevo]=useState({});

  const cats=[['ninos','🧒 Niños'],['adultos','🧑 Adultos'],['snacks','🍿 Snacks'],['postres','🍰 Postres'],['bebidas','🥤 Bebidas']];
  function guardar(){setIaConfig(c=>({...c,menuConfig:cfg}));setMsg('✓ Menú guardado');setTimeout(()=>setMsg(''),2500);}
  function quitar(cat,id){setCfg(c=>({...c,[cat]:(c[cat]||[]).filter(i=>i.id!==id)}));}
  function agregar(cat){
    const n=nuevo[cat]||{}; if(!n.nombre||!n.nombre.trim())return;

    setNuevo(x=>({...x,[cat]:{nombre:'',emoji:''}}));
  }
  return(
    <div className="fade-in" style={{maxWidth:700,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>🍽️ Menú Interactivo</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:18}}>Administrá el cálculo de comida y las opciones que ve el papá.</p>
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msg}</div>}

      <div style={{...S.card,marginBottom:14}}>
        <h3 style={{fontWeight:900,fontSize:14,marginBottom:4}}>🤖 Prompt de cálculo de comida</h3>
        <p style={{fontSize:11,color:'#64748b',marginBottom:10}}>Instrucción para calcular las cantidades según invitados, horas y estación.</p>
        <textarea value={cfg.prompt||''} onChange={e=>setCfg(c=>({...c,prompt:e.target.value}))} rows={5} style={{...S.input,resize:'vertical',fontFamily:'inherit'}} placeholder="Ej: Calculá las cantidades considerando estación, horas de fiesta y tipo de menú. Niños consumen más dulce que salado..."/>
      </div>

      {cats.map(([k,lbl])=>(
        <div key={k} style={{...S.card,marginBottom:14}}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:10}}>{lbl}</h3>
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>

              <span key={it.id} style={{display:'inline-flex',alignItems:'center',gap:6,background:'#f1f5f9',borderRadius:99,padding:'6px 10px',fontSize:12,fontWeight:700}}>
                <span>{it.emoji}</span>{it.nombre}
                <button onClick={()=>quitar(k,it.id)} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:13,fontWeight:900,padding:0,lineHeight:1}}>✕</button>
              </span>
            ))}
            {(!cfg[k]||cfg[k].length===0)&&<span style={{fontSize:11,color:'#94a3b8'}}>Sin opciones todavía.</span>}
          </div>
          <div style={{display:'flex',gap:6}}>
            <input value={(nuevo[k]||{}).emoji||''} onChange={e=>setNuevo(x=>({...x,[k]:{...(x[k]||{}),emoji:e.target.value}}))} placeholder="🍕" style={{...S.input,width:56,textAlign:'center'}} maxLength={2}/>
            <input value={(nuevo[k]||{}).nombre||''} onChange={e=>setNuevo(x=>({...x,[k]:{...(x[k]||{}),nombre:e.target.value}}))} placeholder="Nombre de la comida" style={{...S.input,flex:1}}/>
            <button onClick={()=>agregar(k)} style={{...S.btn,background:'#f59e0b',color:'#0f172a',whiteSpace:'nowrap'}}>+ Agregar</button>

  );

function PapaLogin({setVista,eventos,setPapaSesion,setInvEvId,aviso,adminSesion,sucAct}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [showP,setShowP]=useState(false);
  function sub(e){
    e.preventDefault();
    const uu=u.trim().toLowerCase(), pp=p.trim().toLowerCase();
    // Buscar en la lista local (usuario y clave sin distinguir mayúsculas)
    let ev=eventos.find(x=>x.user&&x.user.toLowerCase()===uu&&x.pass&&x.pass.toLowerCase()===pp);
    // Si no, probar con el link ?papa= (credenciales codificadas, formato viejo)
    if(!ev){
      try{
        const papaParam=new URLSearchParams(window.location.search).get('papa');
        if(papaParam){const d=JSON.parse(atob(papaParam));if(d.user&&d.user.toLowerCase()===uu&&d.pass&&String(d.pass).toLowerCase()===pp)ev=d;}
      }catch(ex){}
    }
    if(!ev){setErr('Datos incorrectos. Verificá usuario y contraseña.');return;}
    if(estaVencido(ev)){setErr('El acceso para este evento ha vencido.');return;}
    setPapaSesion(ev);setInvEvId(ev.id);setVista('papa-creador');
  }
  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'80vh',padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,boxShadow:'0 8px 32px rgba(0,0,0,0.10)'}}>
        <div style={{textAlign:'center',marginBottom:22}}><div style={{fontSize:48}}>🎂</div>
          <h2 style={{fontWeight:900,fontSize:20,marginTop:8}}>Acceso para Padres</h2>
          <p style={{color:'#64748b',fontSize:12,marginTop:4}}>Personalizá tu invitación digital</p>
        </div>
        {adminSesion&&(
          <div style={{background:'#0f172a',borderRadius:12,padding:12,marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:800,color:'#fbbf24',marginBottom:8}}>👑 Sos admin — entrá sin contraseña:</div>
            <select onChange={e=>{const ev=eventos.find(x=>x.id===e.target.value);if(ev){setPapaSesion({...ev,optinWA:true});setInvEvId(ev.id);setVista('papa-creador');}}} defaultValue="" style={{...S.input,color:'#1e293b'}}>
              <option value="">Elegí un evento…</option>
              {eventos.filter(ev=>String(ev.id).indexOf('__')!==0&&(!sucAct||ev.sucId===sucAct.id)).map(ev=><option key={ev.id} value={ev.id}>{ev.nombre} · {ev.dia}/{ev.mes}/{ev.anio}</option>)}
            </select>
          </div>
        )}
        {(err||aviso)&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:12,fontSize:12,marginBottom:12}}>{err||aviso}</div>}
        <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
          <input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} placeholder="Usuario" autoComplete="username" required/>
          <div style={{position:'relative'}}>
            <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="Contraseña" autoComplete="current-password" required/>
            <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8'}}>
              {showP?'🙈':'👁️'}
            </button>
          </div>
          <button style={{...S.btn,background:'#f97316',color:'white',padding:14,fontSize:14}}>Ingresar</button>
        </form>
      </div>
    </div>
  );
}

function IAUploadSection({tipo,precio,resultados,onPagar,onDescartar,onUsar,selIdx,fotoNino,setFotoNino,personaje,setPersonaje,tematicas=[],nombre='',edad='',personajeNombre='',restantesIA,onVerTarjeta,onBorrar,videoUrl='',usarVideo=true,setUsarVideo,onGenerarVideo,videoFreeOk=false,iaVideos=[],onUsarVideo,onPedir}){
  const fotoRef=useRef();
  const persRef=useRef();
  function guardarFoto(src){
    const baseN=((nombre||'fiesta').toLowerCase().replace(/[^a-z0-9]/g,'')||'fiesta')+'-'+Math.floor(performance.now());
    fetch(src).then(r=>r.blob()).then(blob=>{
      const t=blob.type||'';
      const ext=t.includes('video')||tipo==='video'?'mp4':(t.includes('png')?'png':'jpg');
      const fname=(tipo==='video'?'video-':'imagen-')+baseN+'.'+ext;
      const file=new File([blob],fname,{type:blob.type||(tipo==='video'?'video/mp4':'image/png')});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'Imagen',text:'¡Mirá la imagen!'}).catch(()=>{});
      }else{
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
      }
    }).catch(()=>alert('No se pudo preparar la imagen.'));
  }

/* ── GENERADOR IA ─────────────────────────────────────────── */
function GeneradorIA({tipo,nombre,tematica,prompt,prompt2,promptComposite,frase,modelA,modelB,cantidad,fotoNino,personaje,personajeNombre,genero,salon,edad,startImage,onResultado,onCerrar}){
  const [paso,setPaso]=useState('generando'); // generando | listo | error
  const [progreso,setProgreso]=useState(0);
  const [resultados,setResultados]=useState([]);
  const [hechas,setHechas]=useState(0);
  const [errMsg,setErrMsg]=useState('');
  const [mini,setMini]=useState(false); // minimizado: seguir usando la app mientras genera
  const totalGen=tipo==='imagen'?Math.max(1,Math.min(cantidad||6,6)):2;

  // Animación de progreso (sube hasta 90% mientras espera la respuesta real)
  useEffect(()=>{
    if(paso!=='generando')return;
    const t=setInterval(()=>{setProgreso(p=>p<90?p+(p<60?3:1):p);},300);
    return()=>clearInterval(t);
  },[paso]);

  // Generación real
  useEffect(()=>{
    let cancel=false;
    (async()=>{
      try{
        if(tipo==='imagen'){
          if(!fotoNino||!personaje) throw new Error('Faltan la foto del niño/a o el personaje.');
          const persNom=personajeNombre||tematica||'el personaje';
          const repl=s=>(s||'').replace(/\{nombre\}/g,nombre||'').replace(/\{edad\}/g,edad||'').replace(/\{tematica\}/g,persNom).replace(/\{personaje\}/g,persNom).replace(/\{salon\}/g,salon||'');
          // Prompt A: el personaje abrazando al niño/a (medio cuerpo)
          const composedA=repl(prompt)+' Usá las DOS imágenes adjuntas: conservá EXACTAMENTE la cara y el parecido de la persona de la PRIMERA imagen (no la cambies ni la estilices), y combinala con el/los personaje(s) de la SEGUNDA imagen. ENCUADRE: retrato de MEDIO CUERPO, de la CINTURA PARA ARRIBA, de ambos; los dos centrados, a la misma altura, del mismo tamaño y la misma escala (mismo plano de cámara). El personaje ABRAZANDO a la persona, con un brazo alrededor de su hombro, bien juntos y en contacto. Integrá a ambos en UNA SOLA escena cohesiva y realista, con la MISMA iluminación, sombras y estilo, de modo que NO parezca dos fotos pegadas o superpuestas, sino una sola foto tomada juntos. El fondo es el mundo/escenario del personaje; el personaje en estilo 3D animado; imagen vertical, alegre y apta para todo público. ENCUADRE CERRADO: ambos ocupan casi toda la altura de la imagen, con las CABEZAS cerca del borde SUPERIOR y MUY POCO espacio vacío arriba (nada de cielo/techo de relleno), pero SIN recortar ni cortar las cabezas. PROHIBIDO TODO TEXTO Y TODO CARTEL: la imagen NO debe contener ninguna letra, palabra, número ni símbolo escrito, en ningún idioma. NADIE sostiene ni muestra carteles, papeles, tarjetas, cartas, invitaciones, pancartas, pizarras, libros ni ningún objeto con escritura; las manos quedan abrazando o libres, SIN sostener ningún papel ni cartel. Sin logos ni marcas de agua. ANATOMÍA CORRECTA Y COMPLETA: cada persona con exactamente dos brazos, dos manos (con cinco dedos cada una) y una sola cabeza; PROHIBIDO agregar extremidades, manos o dedos de más, duplicados o deformados; no recortes manos ni brazos en el borde; respetá la proporción y el tamaño entre ambos.';
          // Prompt B: segundo estilo configurable (ej: transformar al niño/a en el personaje)
          const composedB=(prompt2&&prompt2.trim())?(repl(prompt2)+'\nUse the TWO attached images: Image 1 is the child (preserve the real face exactly), Image 2 is the character/costume reference. Vertical image, close framing with the heads near the TOP edge and very little empty space above (do NOT cut the heads). ABSOLUTELY NO text, letters, words, numbers or captions anywhere in any language, and NO signs, cards, papers, posters, banners, letters or any object with writing; nobody holds any sign or paper, hands are empty or hugging. No logo, no watermark.'):composedA;

          const mA=modelA||'fal-ai/nano-banana/edit';
          const mB=modelB||'fal-ai/nano-banana/edit';
          const lista=[];for(let i=0;i<n;i++)lista.push(i<nA?{p:composedA,m:mA}:{p:composedB,m:mB});
          // Generar todas en paralelo, tolerando fallos individuales
          const calls=lista.map(it=>fetch('/api/generar-catalogo',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({prompt:it.p,images:[fotoNino,personaje],model:it.m,aspect_ratio:'9:16'})
          }).then(async r=>{const d=await r.json().catch(()=>({}));if(!cancel)setHechas(h=>h+1);return (r.ok&&d.url)?d.url:null;}).catch(()=>{if(!cancel)setHechas(h=>h+1);return null;}));
          const settled=await Promise.all(calls);
          if(cancel)return;
          const urls=settled.filter(Boolean);
          if(!urls.length) throw new Error('No se pudo generar ninguna imagen. Probá de nuevo.');
          // Listo: enviamos las imágenes directo a la galería (sin pantalla intermedia)
          setProgreso(100);onResultado(urls);
        } else {
          // Video con IA (Kling v3 Pro). Si viene startImage, animamos ESA imagen; si no, primero armamos la base.
          const persNom=personajeNombre||tematica||'el personaje';
          const repl=s=>(s||'').replace(/\{nombre\}/g,nombre||'').replace(/\{edad\}/g,edad||'').replace(/\{tematica\}/g,persNom).replace(/\{personaje\}/g,persNom).replace(/\{salon\}/g,salon||'');
          let baseImg=startImage||'';
          if(!baseImg){
            if(!fotoNino||!personaje) throw new Error('Subí la foto del niño/a y elegí el personaje.');
            // 1) Imagen base del video: el PERSONAJE mira a la cámara (va a hablar); el niño/a lo mira a ÉL (de costado, boca cerrada) para que el lip-sync no le mueva la boca al niño.
            const baseImgPrompt=(repl(promptComposite)||'')+' Usá las DOS imágenes adjuntas: conservá EXACTAMENTE la cara y el parecido del niño/a de la PRIMERA imagen (no la cambies). El PERSONAJE '+persNom+' de la SEGUNDA imagen está de CUERPO ENTERO, de FRENTE MIRANDO A LA CÁMARA (es el que va a hablar). El niño/a está al lado, de cuerpo entero, MIRANDO AL PERSONAJE (vista de 3/4 o perfil, la cara del niño NO mira a la cámara), con una sonrisa de BOCA CERRADA. Ambos en el mundo/escenario del personaje; UNA SOLA escena cohesiva y realista, misma iluminación; imagen vertical 9:16; sin texto ni letras.';
            const ir=await fetch('/api/generar-catalogo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:baseImgPrompt,images:[fotoNino,personaje],model:'fal-ai/nano-banana/edit',aspect_ratio:'9:16'})});
            const idata=await ir.json().catch(()=>({}));
            if(!ir.ok||!idata.url) throw new Error((idata&&idata.error)||'No se pudo crear la imagen base del video.');
            if(cancel)return;
            baseImg=idata.url;
          }
          setProgreso(15);
          // Imagen ELEGIDA por el papá (nene + personaje). El video se hace CON esa foto.
          let talkImg=startImage||personaje||baseImg||'';
          if(talkImg&&talkImg.indexOf('data:')===0){
            try{const ur=await fetch('/api/subir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:talkImg})});const ud=await ur.json().catch(()=>({}));if(ur.ok&&ud.url)talkImg=ud.url;}catch(e){}
          }
          if(!talkImg) throw new Error('Falta la imagen del personaje para el video.');
          // El texto que va a decir (con nombre/salón ya reemplazados). Se ajusta desde el panel (Frase de saludo).
          const fraseSaludo=repl(frase||'');
          // Kling habla DIRECTO (voz nativa) animando la FOTO ELEGIDA (nene + personaje): habla SOLO el personaje, el nene queda igual.
          let pr='The image shows a real child together with a cartoon/animated character, both facing the camera, happy, smiling and excited. Both stay happy and smiling, facing the camera, WITHOUT walking away or moving back and forth. The cartoon character starts talking ALMOST IMMEDIATELY (within the first second) and keeps talking continuously, at a lively pace, until the whole message is FULLY finished WELL BEFORE the video ends. ONLY the cartoon character speaks: it looks straight at the camera and speaks in neutral Latin American Spanish with a natural Argentine (Rioplatense) accent — NOT Spain Spanish — at a slightly faster, fun, upbeat and playful pace, full of energy, with accurate natural lip sync, pronouncing every word clearly and understandably. It says this complete message first and in full: "'+fraseSaludo+'". This main message is the PRIORITY and must ALWAYS be said completely. Right after it, only as expendable closing words, the character cheerfully adds "... ¡Nos vemos!" — these closing words CAN be cut off if there is no time, but the main message must ALWAYS finish completely. VERY IMPORTANT: only the cartoon character talks and moves its mouth; the real child does NOT talk and keeps the mouth closed, just smiling happily next to the character. CRITICAL: the real child face, hair, skin tone and features must stay EXACTLY identical to the original photo at all times, do NOT change, morph, distort, age, swap or beautify the child face; the child must always look like the same real kid from the photo. Keep both the child and the character identical to the image. Same background, same lighting and same art style as the image. Neither of them holds anything in their hands; nobody holds any sign, card, paper, poster or invitation. Do NOT add any sign, card, paper, poster, banner, letters, numbers, written text or watermark anywhere in the video, in any language.';
          if(genero==='f') pr+=' The cartoon character speaks with a clearly female voice. After fully finishing the whole sentence, as the final action, the character and the child happily wave goodbye with their hands.'; else if(genero==='m') pr+=' The cartoon character speaks with a clearly male voice. After fully finishing the whole sentence, as the final action, the character and the child happily high-five each other.'; else pr+=' After fully finishing the whole sentence, as the final action, they happily wave goodbye with their hands.';
          pr+=' VERY IMPORTANT: the character does NOT wave, greet or do any hand gesture WHILE talking; it keeps talking with the message until the very last word. The greeting / wave / high-five happens ONLY at the end, AFTER the last word is completely spoken, never before.';
          const s=await fetch('/api/generar-video',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:talkImg,prompt:pr,duration:10,generate_audio:true})});
          const sj=await s.json().catch(()=>({}));
          if(!s.ok) throw new Error(sj.error||'No se pudo iniciar el video.');
          if(!sj.statusUrl||!sj.responseUrl) throw new Error('No se pudo iniciar el video.');
          let urlVid='';
          for(let i=0;i<60;i++){
            await new Promise(r=>setTimeout(r,6000));
            if(cancel)return;
            try{const ps=await fetch('/api/generar-video',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'status',statusUrl:sj.statusUrl,responseUrl:sj.responseUrl})});const pd=await ps.json().catch(()=>({}));if(pd&&pd.done&&pd.url){urlVid=pd.url;break;}}catch(e){}
            setProgreso(p=>p<96?p+2:p);
          }
          if(cancel)return;
          if(!urlVid) throw new Error('El video está tardando más de lo normal. Probá de nuevo en un rato.');
          setProgreso(100);onResultado([urlVid]);
        }
      }catch(e){ if(cancel)return; setErrMsg(String((e&&e.message)||e));setPaso('error'); }
    })();
    return()=>{cancel=true;};
  },[]);

  if(paso==='generando') return mini ? (
    <div style={{position:'fixed',left:0,right:0,bottom:14,zIndex:999,display:'flex',justifyContent:'center',padding:'0 12px',pointerEvents:'none'}}>

        <p style={{fontSize:10,color:'#94a3b8',marginTop:8}}>{tipo==='imagen'?('Estamos creando '+totalGen+' imágenes. Puede tardar 1 a 3 minutos.'):'El video puede tardar unos minutos.'}</p>
        <div style={{marginTop:16,background:'#fef2f2',border:'1px solid #fecaca',borderRadius:12,padding:'12px',color:'#b91c1c',fontSize:13,fontWeight:800,lineHeight:1.45}}>⚠️ No cierres ni recargues esta página mientras se genera{tipo==='video'?' — el video puede tardar unos minutos, esperá acá 🙏':'. Es rápido, esperá acá 🙏'}</div>
      </div>
    </div>
  );
  if(paso==='error') return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16,overflowY:'auto'}}>
      <div className="fade-in" style={{...S.card,maxWidth:460,width:'100%',padding:24,margin:'auto'}}>

        <p style={{fontSize:11,color:'#64748b',textAlign:'center',marginBottom:16}}>Se generaron {resultados.length} opciones. Tocá "Usar estas" y después elegí tu favorita.</p>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(resultados.length,3)},1fr)`,gap:10,marginBottom:16}}>

            <div key={i} style={{aspectRatio:'9/16',borderRadius:10,overflow:'hidden',width:'100%',maxHeight:200,border:'2px solid #e2e8f0'}}>

                ?<img src={src} alt={`resultado ${i+1}`} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                :<div style={{width:'100%',height:'100%',background:'#0f172a',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>

            </div>
          ))}
        </div>
        <button onClick={()=>onResultado(resultados)} style={{...S.btn,background:'#7c3aed',color:'white',width:'100%',marginBottom:8}}>✓ Usar estas opciones</button>
        <button onClick={onCerrar} style={{...S.btn,background:'#f1f5f9',color:'#64748b',width:'100%'}}>Cancelar</button>
      </div>
    </div>
  );
}

/* ── PAPA CREADOR ────────────────────────────────────────── */

    }).catch(()=>alert('No se pudo preparar el video.'));
  }
  const [invGuardada,setInvGuardada]=useState(false);

  function tarjetaImagen(accion){
    const W=540,H=960;
    const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const fecha=papaSesion.dia+' de '+(meses[(+papaSesion.mes)-1]||'')+' de '+papaSesion.anio;

    function dibujar(imgEl){
      const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
      ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
      if(imgEl){const iw=imgEl.width,ih=imgEl.height,sc=Math.max(W/iw,H/ih),dw=iw*sc,dh=ih*sc;ctx.drawImage(imgEl,(W-dw)/2,0,dw,dh);}
      else{const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#1e0a4e');g.addColorStop(1,col);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
      const og=ctx.createLinearGradient(0,H*0.4,0,H);og.addColorStop(0,'rgba(0,0,0,0)');og.addColorStop(1,'rgba(0,0,0,0.88)');ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.fillStyle='#f43f5e';ctx.beginPath();ctx.roundRect(W/2-90,40,180,40,20);ctx.fill();ctx.fillStyle='white';ctx.font='bold 18px Arial';ctx.fillText('TE INVITO!',W/2,67);
      let y=H-320;
      if(F.fmtNombre!==false&&nombre){ctx.fillStyle='#fff';ctx.font='bold 64px Arial';if(ctx.measureText(nombre).width>490)ctx.font='bold 44px Arial';ctx.fillText(nombre,W/2,y);y+=54;}
      const _u=(papaSesion.edadUnidad||'años');
      const tipoTxt=(F.fmtEdad&&_u!=='noaplica'&&(form.edad||papaSesion.edad))?((form.tipo||'')+' · '+(form.edad||papaSesion.edad)+' '+(_u==='meses'?'meses':'años')):(form.tipo||'');
      ctx.fillStyle='#fde68a';ctx.font='bold 24px Arial';ctx.fillText(tipoTxt,W/2,y);y+=46;
      ctx.fillStyle='#fff';ctx.font='22px Arial';ctx.fillText(fecha,W/2,y);y+=32;ctx.fillText(papaSesion.hIni+' a '+papaSesion.hFin+' hs',W/2,y);y+=42;
      ctx.fillStyle='#fff';ctx.font='bold 26px Arial';ctx.fillText(suc.nombre,W/2,y);y+=30;
      ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='16px Arial';const dir=suc.direccion||'';if(ctx.measureText(dir).width>490)ctx.font='13px Arial';ctx.fillText(dir,W/2,y);
      canvas.toBlob(function(blob){
        if(!blob){alert('No se pudo crear la imagen.');return;}
        const fname='tarjeta-'+((nombre||'evento').toLowerCase().replace(/[^a-z0-9]/g,'')||'evento')+'.jpg';
        const file=new File([blob],fname,{type:'image/jpeg'});
        if(accion==='compartir'&&/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Invitación',text:'¡Te invito!'}).catch(function(){});}
        else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);if(accion==='compartir')alert('📷 La tarjeta se descargó como imagen en tu compu. Ahora abrí WhatsApp (o WhatsApp Web) y adjuntá esa imagen para enviarla.');}
      },'image/jpeg',0.92);
    }
    if(portadaImg){fetch(portadaImg).then(function(r){return r.blob();}).then(function(b){const u=URL.createObjectURL(b);const im=new Image();im.onload=function(){dibujar(im);URL.revokeObjectURL(u);};im.onerror=function(){dibujar(null);};im.src=u;}).catch(function(){dibujar(null);});}
    else dibujar(null);
  }

  function calcularMenu(){

      // Helper: calc per item
      function addItems(cat,items,baseN,baseA,unit){
        const sel=(menuSel[cat]||{});
        const selItems=items.filter(i=>sel[i.id]);
        if(!selItems.length)return;
        const perItem=selItems.length;
        selItems.forEach(item=>{
          const rawN=n*(baseN/perItem)*hMult;
          const rawA=a*(baseA/perItem)*hMult;
          const total=Math.ceil(rawN+rawA);
          results.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:unit,cat});
          shopping.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:unit});
        });
      }
      addItems('ninos',cfg.ninos||[]  , 2.5, 0.5, 'unidades');
      addItems('adultos',cfg.adultos||[], 0.5, 2.0, 'unidades');
      addItems('snacks',cfg.snacks||[]  , 0.3, 0.2, 'kg');

    },2500);
