// ¿El acceso del evento está vencido? (2 días después de la fecha del evento)
function estaVencido(ev){
  if(!ev||!ev.anio||!ev.mes||!ev.dia) return false;
  const fF=new Date(+ev.anio,+ev.mes-1,+ev.dia);
  const fV=new Date(fF);fV.setDate(fF.getDate()+2);fV.setHours(0,0,0,0);
  const hoy=new Date();hoy.setHours(0,0,0,0);
  return hoy>=fV;
}
// Normaliza un celular argentino al formato internacional que necesita WhatsApp (54 9 + area + numero)
function waNum(n){
  let d=(n||'').toString().replace(/\D/g,'');     // dejar solo dígitos
  if(!d) return '';
  if(d.startsWith('549')) return d;                // ya está completo
  if(d.startsWith('54'))  return '549'+d.slice(2); // tiene país pero falta el 9 de celular
  if(d.startsWith('0'))   d=d.slice(1);            // sacar 0 inicial (ej: 0264...)
  return '549'+d;                                  // agregar código país Argentina + 9 móvil
}
// Devuelve el formato de tarjeta (mostrar edad, título, dirigido) según el tipo de evento
function fmtTipo(tipo, iaConfig){
  const t=((iaConfig&&iaConfig.tiposEvento)||[]).find(x=>x.nombre===tipo);

}
// Redimensiona/comprime una imagen subida a un data URL liviano
function resizeImg(file, maxW, cb){
  const r=new FileReader();
  r.onload=ev=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width);const c=document.createElement('canvas');c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);try{cb(c.toDataURL('image/jpeg',0.82));}catch(e){cb(ev.target.result);}};img.onerror=()=>cb(ev.target.result);img.src=ev.target.result;};
  r.readAsDataURL(file);
}

/* ── ADMIN LOGIN ─────────────────────────────────────────── */
function AdminLogin({onLogin}){
  const [u,setU]=useState(''); const [p,setP]=useState(''); const [err,setErr]=useState(''); const [showP,setShowP]=useState(false); const [cargando,setCargando]=useState(false);
  async function sub(e){e.preventDefault();setCargando(true);const r=await onLogin(u,p);setCargando(false);if(r)setErr(r);}
  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'80vh',padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,boxShadow:'0 8px 32px rgba(0,0,0,0.10)'}}>
        <div style={{textAlign:'center',marginBottom:24}}><div style={{fontSize:48}}>🔐</div>
          <h2 style={{fontWeight:900,fontSize:22,marginTop:8}}>Panel Administrativo</h2>
          <p style={{color:'#64748b',fontSize:12,marginTop:4}}>Ingreso seguro</p>
        </div>
        {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:12,fontSize:12,marginBottom:14}}>{err}</div>}
        <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
          <input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} placeholder="Email (dueña) o usuario (encargada)" autoComplete="username" required/>
          <div style={{position:'relative'}}>
            <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="Contraseña" autoComplete="current-password" required/>
            <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8'}}>
              {showP?'🙈':'👁️'}
            </button>
          </div>
          <button disabled={cargando} style={{...S.btn,background:cargando?'#94a3b8':'linear-gradient(135deg,#06b6d4,#7c3aed)',color:'white',padding:'13px',fontSize:14}}>{cargando?'Ingresando...':'Ingresar al Sistema'}</button>
        </form>
        <p style={{color:'#94a3b8',fontSize:11,marginTop:14,lineHeight:1.5,textAlign:'center'}}>👑 <b>Dueña:</b> entrá con tu <b>email</b> y contraseña.<br/>🧑‍💼 <b>Encargada:</b> entra con el <b>usuario</b> que le creó la dueña.</p>
      </div>
    </div>
  );
}

/* ── ADMIN GENERADOR DE CATÁLOGO (fal.ai) ────────────────── */
function AdminCatalogo({setVista,tematicas,setTematicas,modo}){
  const esMejorador = modo==='mejorador';
  const PURPLE='#534AB7';
  const [img,setImg]=useState('');
  const [opt,setOpt]=useState(esMejorador?'enhance':'3d');
  const [model,setModel]=useState(esMejorador?'fal-ai/flux-pro/kontext':'fal-ai/flux-pro/kontext/text-to-image');
  const [ratio,setRatio]=useState('9:16');
  const [cargando,setCargando]=useState(false);
  const [err,setErr]=useState('');
  const [resultUrl,setResultUrl]=useState('');
  const [prompt,setPrompt]=useState('');
  const [copiado,setCopiado]=useState(false);
  const [msg,setMsg]=useState('');
  const fileRef=useRef();

  const prompt3D='Hyper realistic 3D render, NOT cartoon, NOT anime, NOT illustration, NOT 2D,\nphotorealistic 3D Pixar movie quality, cinematic lighting, ultra high quality,\n8K resolution, full body portrait, vertical 9:16 format,\nwarm welcoming smile, arms slightly open as if inviting someone for a hug,\nleave extra empty clean space at the top of the image for text overlay,\nno text, no watermark, clean background behind character.';
  const promptEnhance='Enhance this image quality only.\nKeep the exact same art style as the original.\nDo NOT change to 3D, do NOT change to photorealistic.\nDo NOT modify the art style in any way.\nKeep exact same character design, colors, pose and composition.\nOnly improve: sharpness, resolution, color vibrancy, lighting and details.\nRemove any noise, blur or artifacts.\nExtend background naturally to fill full vertical 9:16 portrait format.\nLeave extra empty clean space at the top for text overlay.\nUltra high quality, 8K resolution. No text, no watermark.';

  function selectOption(o){setOpt(o);setModel(o==='enhance'?'fal-ai/flux-pro/kontext':'fal-ai/flux-pro/kontext/text-to-image');}
  function onFile(e){const f=e.target.files[0];if(!f)return;resizeImg(f,1024,data=>setImg(data));}
  async function pegarImagen(){
    setErr('');
    try{
      const items=await navigator.clipboard.read();
      for(const it of items){
        const tipo=it.types.find(t=>t.startsWith('image/'));
        if(tipo){const blob=await it.getType(tipo);resizeImg(blob,1024,data=>setImg(data));return;}
      }
      setErr('No hay ninguna imagen en el portapapeles. Copiá una imagen primero.');
    }catch(e){setErr('No se pudo leer el portapapeles. Probá con Ctrl+V o subí el archivo.');}
  }
  // Pegar con Ctrl+V en cualquier parte de la sección
  useEffect(()=>{
    function onPaste(e){
      const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
      for(const it of items){if(it.type&&it.type.startsWith('image/')){const f=it.getAsFile();if(f){resizeImg(f,1024,data=>setImg(data));e.preventDefault();}break;}}
    }
    document.addEventListener('paste',onPaste);
    return ()=>document.removeEventListener('paste',onPaste);
  },[]);

  async function generar(){
    setErr('');setMsg('');
    if(!img){setErr('Subí una imagen primero');return;}
    const esTresD=opt==='3d';
    const p=esTresD?prompt3D:promptEnhance;
    setPrompt(p);setCargando(true);setResultUrl('');
    try{
      const size=ratio==='9:16'?{width:768,height:1366}:ratio==='1:1'?{width:1024,height:1024}:{width:1024,height:768};
      // 3D: describir la imagen + flux text-to-image (esquiva restricciones). Mejorar: flux imagen→imagen.
      const body=esTresD
        ?{prompt:p,image:img,model:'fal-ai/flux-pro/kontext/text-to-image',size,describir:true,isI2I:false}
        :{prompt:p,image:img,model:'fal-ai/flux-pro/kontext',size,isI2I:true};
      const resp=await fetch('/api/generar-catalogo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await resp.json().catch(()=>({error:'Respuesta inválida del servidor.'}));
      if(!resp.ok)throw new Error(data.error||'No se pudo generar.');
      if(!data.url)throw new Error('No se recibió imagen. Probá de nuevo.');
      setResultUrl(data.url);
    }catch(e){setErr(String((e&&e.message)||e));}
    finally{setCargando(false);}
  }
  function copiar(){if(navigator.clipboard)navigator.clipboard.writeText(prompt).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2000);});}
  function agregarATematicas(){
    const nombre=window.prompt('¿Nombre del personaje para el catálogo?');
    if(!nombre||!nombre.trim())return;
    setMsg('Procesando imagen…');
    // Bajar y achicar la imagen para guardarla liviana
    fetch(resultUrl).then(r=>r.blob()).then(blob=>{
      const burl=URL.createObjectURL(blob);const im=new Image();
      im.onload=()=>{try{const sc=Math.min(1,500/im.width);const cv=document.createElement('canvas');cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);const data=cv.toDataURL('image/jpeg',0.72);setTematicas(p=>[...p,{id:'t-'+Date.now(),nombre:nombre.trim(),cats:['TODOS'],img:data,emoji:'🎨'}]);setMsg('✅ Agregado a Portadas/Temáticas');setTimeout(()=>setMsg(''),3000);}catch(err){setMsg('No se pudo agregar. Descargala y subila manualmente en Portadas.');}URL.revokeObjectURL(burl);};
      im.onerror=()=>{setMsg('No se pudo agregar. Descargala y subila manualmente en Portadas.');};
      im.src=burl;
    }).catch(()=>setMsg('No se pudo descargar la imagen. Usá el botón Descargar y subila en Portadas.'));
  }

  const optBtn=(o,emoji,titulo,desc)=>(
    <div onClick={()=>selectOption(o)} style={{flex:1,padding:'12px',borderRadius:12,cursor:'pointer',border:opt===o?('2px solid '+PURPLE):'1px solid #e2e8f0',background:opt===o?'#EEEDFE':'#fff',transition:'all .15s'}}>
      <div style={{fontSize:22,marginBottom:4}}>{emoji}</div>
      <div style={{fontSize:13,fontWeight:800,color:opt===o?'#3C3489':'#1e293b'}}>{titulo}</div>
      <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{desc}</div>
    </div>
  );

  return(
    <div className="fade-in" style={{maxWidth:560,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>{esMejorador?'🪄 Mejorador de imagen':'🎨 Generador de Catálogo'}</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:18}}>{esMejorador?'Subí una foto y mejorá su calidad (nitidez, color, resolución) con IA, sin cambiar el estilo.':'Subí un personaje y generá su versión para el catálogo (3D o mejorada) con fal.ai.'}</p>

      <label style={S.label}>Imagen del personaje</label>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFile}/>
      <div onClick={()=>fileRef.current.click()} style={{border:img?('2px solid '+PURPLE):'2px dashed #cbd5e1',borderRadius:12,padding:img?0:'28px',textAlign:'center',cursor:'pointer',background:'#fff',marginBottom:14,overflow:'hidden'}}>
        {img
          ?<img src={img} alt="" style={{width:'100%',maxHeight:280,objectFit:'contain',borderRadius:10,display:'block'}}/>
          :<div><div style={{fontSize:34,marginBottom:6}}>🖼️</div><div style={{fontSize:14,color:'#64748b',fontWeight:700}}>Hacé clic para subir la imagen</div><div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>JPG, PNG, WEBP · o pegá con Ctrl+V</div></div>}
      </div>
      <button type="button" onClick={pegarImagen} style={{...S.btn,width:'100%',background:'#f1f5f9',color:'#334155',marginBottom:14}}>📋 Pegar imagen del portapapeles</button>

      <label style={S.label}>¿Qué querés hacer?</label>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {optBtn('3d','🧊','Crear en 3D','Estilo Pixar HD')}
        {optBtn('enhance','✨','Mejorar calidad','Mantiene el estilo')}
      </div>

      <label style={{display:'block',marginBottom:14}}><span style={S.label}>Formato</span>
        <select value={ratio} onChange={e=>setRatio(e.target.value)} style={S.input}>
          <option value="9:16">9:16 vertical ✅</option>
          <option value="1:1">1:1 cuadrado</option>
          <option value="4:3">4:3 horizontal</option>
        </select>
      </label>

      {err&&<div style={{background:'#FCEBEB',border:'1px solid #F09595',color:'#a32d2d',padding:'10px 14px',borderRadius:10,fontSize:12,marginBottom:12}}>{err}</div>}
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:10,fontSize:12,marginBottom:12,fontWeight:700}}>{msg}</div>}

      <button onClick={generar} disabled={cargando||!img} style={{...S.btn,width:'100%',padding:14,fontSize:15,background:(cargando||!img)?'#cbd5e1':PURPLE,color:'white',marginBottom:14}}>
        {cargando?'⏳ Generando en fal.ai…':'✨ Generar imagen'}
      </button>

      {resultUrl&&(
        <div className="fade-in">
          <label style={S.label}>Resultado</label>
          <p style={{fontSize:11,color:'#94a3b8',textAlign:'center',marginBottom:6}}>⬆ Espacio libre arriba para el nombre del cumpleañero</p>
          <img src={resultUrl} alt="" style={{width:'100%',borderRadius:12,border:'1px solid #e2e8f0',marginBottom:12}}/>
          <div style={{background:'#f1f5f9',borderRadius:10,padding:12,marginBottom:12,position:'relative'}}>
            <pre style={{fontSize:11,color:'#334155',whiteSpace:'pre-wrap',wordBreak:'break-word',fontFamily:'monospace',lineHeight:1.5,margin:0,paddingRight:70}}>{prompt}</pre>
            <button onClick={copiar} style={{position:'absolute',top:8,right:8,...S.btn,padding:'5px 10px',fontSize:11,background:'#fff',border:'1px solid #e2e8f0',color:'#475569'}}>{copiado?'✓ Copiado':'📋 Copiar'}</button>
          </div>
          <a href={resultUrl} download="personaje_catalogo.png" target="_blank" rel="noopener" style={{...S.btn,display:'block',textAlign:'center',background:'#fff',border:'1px solid #e2e8f0',color:'#1e293b',marginBottom:8,textDecoration:'none'}}>⬇️ Descargar imagen</a>
          <button onClick={agregarATematicas} style={{...S.btn,width:'100%',background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white'}}>➕ Agregar a Portadas/Temáticas</button>
        </div>
      )}
    </div>
  );
}

/* ── ADMIN EVENTOS ───────────────────────────────────────── */
function AdminEventos({setVista,sucAct,evsLocal,eventos,setEventos,tematicas,setInvEvId,confs,iaConfig}){
  function enviarCredsWA(ev){
    const salon=sucAct.nombre;
    const base=window.location.href.split('?')[0];
    const loginLink=base+'?papa='+ev.id;
    const lineas=[
      'Hola '+ev.nomPapa+'!',
      '',
      'Te enviamos el acceso a las *Invitaciones Digitales* de *'+salon+'*',
      'para el '+(ev.tipo||'Cumpleanos')+' de *'+ev.nombre+'*.',
      '',
      '*Ingresa con tu link personal:*',
      loginLink,
      '',
      '(Si el link no abre directo, ingresa manualmente:)',
      '*Usuario:* '+ev.user,
      '*Contrasena:* '+ev.pass,
      '',
      '_El acceso vence al dia siguiente del evento._',
      '- '+salon,
    ];
    window.open('https://wa.me/'+waNum(ev.celPapa)+'?text='+encodeURIComponent(lineas.join('\n')),'_blank');
  }
  const ef={nombre:'',tipo:'Cumpleaños',edad:'',edadUnidad:'años',dia:'',mes:'',anio:String((iaConfig&&iaConfig.anioVigente)||2026),hIni:'',hFin:'',celPapa:'',dni:'',nomPapa:'',user:'',pass:'',temId:'t-3',doble:false,nombre2:'',edad2:'',temId2:'t-1',nomPapa2:'',celPapa2:''};
  const [form,setForm]=useState(ef); const [editId,setEditId]=useState(null); const [open,setOpen]=useState(false);
  const [fMes,setFMes]=useState(''); const [fDia,setFDia]=useState(''); const [msgOk,setMsgOk]=useState('');

  function autoCredenciales(){
    if(!form.nombre) return alert('Ingresá primero el nombre del agasajado.');
    setForm(f=>({...f, user: genUser(f.nombre), pass: genPass(f.nombre)}));
  }
  const listFiltrada=evsLocal.filter(e=>(!fMes||e.mes===fMes)&&(!fDia||e.dia===fDia));

  const [alertaSup,setAlertaSup]=useState(null); // {ev, accion}
  function sub(e){
    e.preventDefault();
    // Detectar superposición de horarios en la misma sucursal y día
    const conflicto=eventos.find(x=>
      x.sucId===sucAct.id &&
      x.id!==editId &&
      x.dia===form.dia && x.mes===form.mes && x.anio===form.anio &&
      !(form.hFin<=x.hIni || form.hIni>=x.hFin)
    );
    if(conflicto){
      setAlertaSup({ev:conflicto,accion:()=>{
        guardarEvento();
        setAlertaSup(null);
      }});
      return;
    }
    guardarEvento();
  }
  function guardarEvento(){
    const fmt=fmtTipo(form.tipo,iaConfig);
    if(editId){setEventos(eventos.map(x=>x.id===editId?{...x,...form,...fmt}:x));setEditId(null);}
    else{setEventos(prev=>[...prev,{...form,...fmt,id:'ev-'+Date.now().toString(16),sucId:sucAct.id}]);}
    setForm(ef);setOpen(false);
    setMsgOk('✅ Se guardó correctamente');setTimeout(()=>setMsgOk(''),3500);
    window.scrollTo(0,0);
  }
  function copiarLink(id){navigator.clipboard?.writeText(window.location.href.split('?')[0]+'?inv='+id);alert('¡Enlace copiado!');}

  return(
    <div className="fade-in" style={{maxWidth:900,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      {msgOk&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msgOk}</div>}
      <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:18}}>
        <div><h1 style={{fontWeight:900,fontSize:22}}>Eventos — {sucAct.nombre}</h1><p style={{fontSize:11,color:'#64748b'}}>{evsLocal.length} evento(s)</p></div>
        <button style={{...S.btn,background:'#06b6d4',color:'#0f172a'}} onClick={()=>{setOpen(!open);setEditId(null);setForm(ef);}}>{open?'✕ Cancelar':'+ Cargar Evento'}</button>
      </div>

      {/* Filtros */}
      <div style={{...S.card,display:'flex',gap:12,flexWrap:'wrap',alignItems:'center',marginBottom:14,padding:'10px 16px'}}>
        <span style={{fontSize:11,fontWeight:700,color:'#64748b'}}>🔍 Filtrar:</span>
        <select value={fMes} onChange={e=>setFMes(e.target.value)} style={{padding:'6px 10px',border:'1px solid #e2e8f0',borderRadius:10,fontSize:12,fontWeight:700}}>
          <option value=''>— Todos los meses —</option>
          {MESES.slice(1).map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
        </select>
        <input placeholder="Día" value={fDia} onChange={e=>setFDia(e.target.value)} style={{...S.input,width:90,padding:'6px 10px'}}/>
        <span style={{fontSize:11,color:'#94a3b8'}}>{listFiltrada.length} resultado(s)</span>
      </div>

      {/* Formulario */}
      {open&&(
        <div className="fade-in" style={{...S.card,border:'2px solid #06b6d4',marginBottom:18}}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:14}}>{editId?'✏️ Editar Evento':'+ Nuevo Evento'}</h3>
          <form onSubmit={sub}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:14}}>
              {[['Nombre','nombre','text','']].map(([l,k,t,ph])=>(
                <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} autoComplete="off" onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input} required/></label>
              ))}
              <label><span style={S.label}>Edad</span>
                <div style={{display:'flex',gap:4}}>
                  <input type="number" value={form.edad} autoComplete="off" disabled={form.edadUnidad==='noaplica'} required={form.edadUnidad!=='noaplica'} onChange={e=>setForm({...form,edad:e.target.value})} style={{...S.input,flex:1,background:form.edadUnidad==='noaplica'?'#f1f5f9':'#f8fafc'}} placeholder={form.edadUnidad==='noaplica'?'—':''}/>
                  <select value={form.edadUnidad||'años'} onChange={e=>setForm({...form,edadUnidad:e.target.value,edad:e.target.value==='noaplica'?'':form.edad})} style={{...S.input,flex:1}}>
                    <option value="años">años</option>
                    <option value="meses">meses</option>
                    <option value="noaplica">no aplica</option>
                  </select>
                </div>
              </label>
              <label><span style={S.label}>Día</span><input type="number" placeholder="" value={form.dia} autoComplete="off" onChange={e=>setForm({...form,dia:e.target.value})} style={S.input} required/></label>
              <label><span style={S.label}>Mes</span>
                <select value={form.mes} onChange={e=>setForm({...form,mes:e.target.value})} style={{...S.input}} required>
                  <option value="">Mes</option>
                  {MESES.slice(1).map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
                </select>
              </label>
              <label><span style={S.label}>Año</span><input type="number" placeholder="" value={form.anio} autoComplete="off" onChange={e=>setForm({...form,anio:e.target.value})} style={S.input} required/></label>
              {[['Hora Inicio','hIni','text',''],['Hora Fin','hFin','text',''],['Celular papá','celPapa','text',''],['DNI papá','dni','text',''],['Nombre padre/madre','nomPapa','text',''],['Usuario papás','user','text','']].map(([l,k,t,ph])=>(
                <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} autoComplete="off" onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input} required={['hIni','hFin','celPapa','dni'].includes(k)}/></label>
              ))}
              <label><span style={S.label}>Tipo</span>
                <select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})} style={{...S.input}}>
                  {((iaConfig&&iaConfig.tiposEvento)||[]).map(t=><option key={t.id||t.nombre} value={t.nombre}>{t.nombre}</option>)}
                </select>
              </label>
              <label><span style={S.label}>Temática inicial</span>
                <select value={form.temId} onChange={e=>setForm({...form,temId:e.target.value})} style={{...S.input}}>
                  {tematicas.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.nombre}</option>)}
                </select>
              </label>
            </div>
            {/* Credenciales con auto-generador */}
            <div style={{background:'#f0fdf4',borderRadius:12,padding:12,border:'1px solid #bbf7d0',marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:700,color:'#166534'}}>🔐 Credenciales del Papá</span>
                <button type="button" onClick={autoCredenciales} style={{...S.btn,background:'#16a34a',color:'white',padding:'5px 12px',fontSize:11}}>✨ Auto-generar seguras</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <label><span style={S.label}>Usuario</span><input value={form.user} onChange={e=>setForm({...form,user:e.target.value})} style={S.input} placeholder="Se genera automático" required/></label>
                <label><span style={S.label}>Contraseña</span><input value={form.pass} onChange={e=>setForm({...form,pass:e.target.value})} style={S.input} placeholder="Se genera automático" required/></label>
              </div>
              {form.user&&form.pass&&<p style={{fontSize:10,color:'#15803d',marginTop:6,fontWeight:600}}>✓ Credenciales listas — vencen al día siguiente del cumpleaños</p>}
            </div>
            {/* ── Cumpleaños Doble ── */}
            <label style={{display:'flex',alignItems:'center',gap:10,background:'#fefce8',border:'1px solid #fde68a',borderRadius:12,padding:'10px 14px',marginBottom:12,cursor:'pointer'}}>
              <input type="checkbox" checked={form.doble} onChange={e=>setForm({...form,doble:e.target.checked})} style={{width:18,height:18,accentColor:'#f97316',cursor:'pointer'}}/>
              <div>
                <span style={{fontWeight:800,fontSize:13,color:'#92400e'}}>🎂🎂 Cumpleaños Doble</span>
                <div style={{fontSize:10,color:'#a16207'}}>Dos homenajeados en el mismo evento — se generarán dos tarjetas y listas de asistencia independientes</div>
              </div>
            </label>
            {form.doble&&(
              <div className="fade-in" style={{background:'#fff7ed',border:'2px solid #fb923c',borderRadius:14,padding:14,marginBottom:12}}>
                <div style={{fontWeight:900,fontSize:13,color:'#c2410c',marginBottom:12}}>🎉 Segundo Cumpleañero/a</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:10}}>
                  {[['Nombre','nombre2','text',''],['Edad','edad2','number',''],['Nombre padre/madre','nomPapa2','text',''],['Celular papá','celPapa2','text','']].map(([l,k,t,ph])=>(
                    <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input}/></label>
                  ))}
                  <label><span style={S.label}>Temática</span>
                    <select value={form.temId2} onChange={e=>setForm({...form,temId2:e.target.value})} style={{...S.input}}>
                      {tematicas.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.nombre}</option>)}
                    </select>
                  </label>
                </div>
                <div style={{background:'#fff',borderRadius:10,padding:10,border:'1px solid #fed7aa',fontSize:11,color:'#92400e'}}>
                  <span style={{fontSize:13}}>🔐</span> <b>Acceso compartido:</b> El papá/mamá del segundo cumpleañero ingresa con las <b>mismas credenciales</b> del primer evento. En su panel podrá alternar entre las dos tarjetas con un botón.
                </div>
              </div>
            )}
            <button type="submit" style={{...S.btn,background:'#06b6d4',color:'#0f172a'}}>{editId?'✓ Guardar Cambios':'✓ Registrar'}</button>
          </form>
        </div>
      )}
      {/* ── Modal Alerta Superposición ── */}
      {alertaSup&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
          <div className="fade-in" style={{...S.card,maxWidth:420,width:'100%',padding:28}}>
            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{fontSize:48,marginBottom:8}}>⚠️</div>
              <h3 style={{fontWeight:900,fontSize:18,color:'#dc2626',marginBottom:4}}>¡Superposición de Turnos!</h3>
              <p style={{fontSize:12,color:'#64748b'}}>Se detectó un conflicto de horario con otro cumpleaños</p>
            </div>
            <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:12,padding:14,marginBottom:18}}>
              <p style={{fontSize:12,color:'#1e293b',marginBottom:6}}><b>Evento existente:</b></p>
              <p style={{fontSize:14,fontWeight:900,color:'#dc2626'}}>{alertaSup.ev.nombre} · {alertaSup.ev.dia}/{alertaSup.ev.mes}/{alertaSup.ev.anio}</p>
              <p style={{fontSize:12,color:'#64748b'}}>{alertaSup.ev.hIni} a {alertaSup.ev.hFin} hs</p>
              <p style={{fontSize:11,color:'#ef4444',marginTop:8}}>⚠️ El horario que querés cargar se superpone con este evento. La encargada fue notificada.</p>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setAlertaSup(null)} style={{...S.btn,flex:1,background:'#f1f5f9',color:'#64748b',padding:12}}>← Corregir horario</button>
              <button onClick={alertaSup.accion} style={{...S.btn,flex:1,background:'#dc2626',color:'white',padding:12,fontSize:12}}>Registrar igual</button>
            </div>
          </div>
        </div>
      )}

      {/* Tarjetas */}
      {listFiltrada.length===0
        ?<div style={{textAlign:'center',color:'#94a3b8',padding:48}}>No hay cumpleaños para esa fecha.</div>
        :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:16}}>
          {listFiltrada.map(ev=>{
            const tem=tematicas.find(t=>t.id===ev.temId)||tematicas[0];
            const cnt=confs.filter(c=>c.evId===ev.id).length;
            return(
              <div key={ev.id} style={{background:'#fff',borderRadius:20,overflow:'hidden',border:'1px solid #e2e8f0',display:'flex',flexDirection:'column'}}>
                <div style={{background:'linear-gradient(135deg,#0088cc,#06b6d4)',padding:'14px 16px',color:'white',position:'relative'}}>
                  <div style={{position:'absolute',right:14,top:12,background:'rgba(255,255,255,.2)',backdropFilter:'blur(8px)',borderRadius:12,width:46,height:46,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',border:'1px solid rgba(255,255,255,.3)'}}>

                  </div>
                  <div style={{fontWeight:900,fontSize:20,marginTop:4}}>{ev.nombre}{ev.doble&&ev.nombre2?<span style={{fontSize:13,fontWeight:600,opacity:.85}}> & {ev.nombre2}</span>:''}</div>

                </div>
                <div style={{padding:'10px 14px',fontSize:11,flex:1}}>
                  <p><b>Papá/Mamá:</b> {ev.nomPapa}</p>
                  <p><b>Celular:</b> {ev.celPapa}</p>
                  <div style={{background:'#f8fafc',borderRadius:10,padding:'6px 10px',display:'flex',justifyContent:'space-between',marginTop:6}}>
                    <span>👤 <b>{ev.user}</b></span><span>🔑 <b>{ev.pass}</b></span>
                  </div>
                </div>
                <div style={{borderTop:'1px solid #f1f5f9',padding:'8px 12px',display:'flex',gap:6,justifyContent:'space-around',background:'#fafafa'}}>

            <label><span style={S.label}>Emoji</span><input value={form.emoji} onChange={e=>setForm({...form,emoji:e.target.value})} maxLength={2} style={{...S.input,width:60,fontSize:24,textAlign:'center'}}/></label>
            <div>

              <div onClick={()=>fRef.current.click()} style={{border:'2px dashed #c4b5fd',borderRadius:12,padding:14,textAlign:'center',cursor:'pointer',background:'#faf5ff'}}>
                {form.prev

                  :<div style={{color:'#7c3aed',fontSize:12,fontWeight:700}}>📤 Subir imagen<br/><span style={{fontSize:10,color:'#94a3b8',fontWeight:400}}>1080×1920px ideal · 9:16</span></div>}

/* ── ADMIN EXCEL ─────────────────────────────────────────── */
function AdminExcel({setVista,sucActId,eventos,setEventos}){
  const [txt,setTxt]=useState(''); const [msg,setMsg]=useState('');
  function sub(e){
    e.preventDefault();
    if(!txt.trim()){setMsg('Pega el texto de tu planilla.');return;}
    const filas=txt.split('\n').filter(l=>l.trim());
    let n=0;const nuevo=[...eventos];
    filas.forEach((f,i)=>{
      const c=f.split(/\t|;/).map(x=>x.trim());
      const primera=(c[0]||'').toLowerCase();
      if(primera==='nombre'||primera==='nombre ') return; // saltear fila de titulos
      if(c.length>=3&&c[0]){
        nuevo.push({id:'ev-xl-'+Date.now()+i,sucId:sucActId,nombre:c[0],edad:c[1]||'5',dia:c[2],mes:c[3]||'05',anio:c[4]||'2026',hIni:c[5]||'17:00',hFin:c[6]||'22:00',nomPapa:c[7]||'',dni:c[8]||'',celPapa:c[9]||'',user:c[10]||(c[0].toLowerCase().replace(/\s/g,'')+'2026'),pass:c[11]||'1234',temId:'t-3',tipo:'Cumpleaños'});
        n++;
      }
    });
    setEventos(nuevo);setMsg(`✅ Se importaron ${n} cumpleaños.`);setTxt('');setTimeout(()=>setMsg(''),5000);
  }
  function descargarPlantilla(){
    const filas=[
      ['Nombre','Edad','Dia','Mes','Anio','Hora Inicio','Hora Fin','Padre/Madre','DNI','Celular','Usuario','Clave'],
      ['Mia Gonzalez','5','15','06','2026','17:00','21:00','Laura Gonzalez','30111222','2645522081','miagonzalez2026','1234'],
      ['Thiago Perez','7','22','06','2026','18:00','22:00','Marcos Perez','28999888','2644567890','thiagoperez2026','5678'],
    ];
    const csv='﻿'+filas.map(f=>f.join(';')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Plantilla_Eventos_FunZone.csv';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  return(
    <div className="fade-in" style={{maxWidth:620,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <div style={S.card}>
        <h1 style={{fontWeight:900,fontSize:20,marginBottom:6}}>📊 Carga Excel Semanal</h1>
        <p style={{fontSize:12,color:'#64748b',marginBottom:16}}>Copiá las filas de tu planilla y pegálas acá.</p>
        {msg&&<div style={{background:'#f0fdf4',color:'#166534',padding:12,borderRadius:12,fontSize:12,fontWeight:700,marginBottom:14}}>{msg}</div>}
        <div style={{background:'#f8fafc',borderRadius:12,padding:12,fontSize:11,color:'#64748b',marginBottom:12,border:'1px dashed #e2e8f0'}}>
          <b>Columnas:</b> Nombre · Edad · Día · Mes · Año · HoraInicio · HoraFin · Padre/Madre · DNI · Celular · Usuario · Clave
        </div>
        <button type="button" onClick={descargarPlantilla} style={{...S.btn,background:'#eef2ff',color:'#4338ca',width:'100%',padding:12,marginBottom:14,fontSize:13,fontWeight:800}}>⬇️ Descargar plantilla Excel</button>
        <p style={{fontSize:11,color:'#94a3b8',marginBottom:14,lineHeight:1.5}}>💡 Descargá la plantilla, completála en Excel, después copiá las filas (sin los títulos) y pegálas acá abajo.</p>
        <form onSubmit={sub}>
          <textarea rows={7} value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Pegá las filas acá..." style={{...S.input,fontFamily:'monospace',resize:'vertical'}}/>

        </form>
      </div>
    </div>
  );
}

            <div style={{display:'flex',gap:8}}>
              <button type="submit" style={{...S.btn,background:'#0f172a',color:'white',padding:'10px',flex:1}}>{editUid?'✓ Guardar cambios':'+ Crear encargada'}</button>
              {editUid&&<button type="button" onClick={()=>{setFu(eu);setEditUid(null);}} style={{...S.btn,background:'#f1f5f9',color:'#64748b',padding:'10px'}}>Cancelar</button>}
            </div>
          </form>
          <div style={{marginTop:18,borderTop:'1px solid #f1f5f9',paddingTop:14}}>
            <p style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:10}}>Encargadas</p>

            {usuarios.map(u=>{
              const suc=sucursales.find(s=>s.id===u.sucursalId);
              return(
              <div key={u.id} style={{padding:'8px 0',borderBottom:'1px solid #f8fafc',fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                  <div><b>{u.nombre}</b> <span style={{color:'#94a3b8',fontSize:10}}>· {u.usuario}{suc?' · '+suc.nombre:''}</span></div>
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button onClick={()=>{setFu({nombre:u.nombre,usuario:u.usuario,clave:u.clave,rol:'encargada',sucursalId:u.sucursalId||''});setEditUid(u.id);window.scrollTo(0,0);}} style={{background:'#f1f5f9',border:'none',borderRadius:8,padding:'4px 10px',cursor:'pointer',fontSize:11,fontWeight:700}}>Editar</button>
                    <button onClick={()=>setUsuarios(usuarios.filter(x=>x.id!==u.id))} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:14}}>🗑</button>

                <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>

            {[['Nombre del salon','nombre'],['Direccion','direccion'],['Sitio web o Instagram','web'],['Telefono WhatsApp','tel']].map(([l,k])=>(

                  <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const file=e.target.files[0];if(!file)return;resizeImg(file,260,data=>setFs(prev=>({...prev,logo:data})));}}/>

                {fs.logo&&<button type="button" onClick={()=>setFs(prev=>({...prev,logo:''}))} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>🗑</button>}
              </div>
            </div>
            <button type="submit" style={{...S.btn,background:'#7c3aed',color:'white',padding:'10px'}}>+ Crear Sucursal</button>
          </form>
          <div style={{marginTop:18,borderTop:'1px solid #f1f5f9',paddingTop:14}}>
            {sucursales.map(s=>{
              const [editing,setEditing]=React.useState(false);
              const [ed,setEd]=React.useState(s);
              return(
              <div key={s.id} style={{borderBottom:'1px solid #f8fafc',paddingBottom:10,marginBottom:10}}>
                {!editing?(
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{width:32,height:32,borderRadius:8,background:s.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{s.emoji}</div>
                      <div><b style={{fontSize:13}}>{s.nombre}</b><p style={{fontSize:10,color:'#94a3b8',margin:0}}>{s.direccion}</p></div>
                    </div>
                    <div style={{display:'flex',gap:6}}>
                      <button onClick={()=>{setEd(s);setEditing(true);}} style={{background:'#f1f5f9',border:'none',borderRadius:8,padding:'5px 10px',cursor:'pointer',fontSize:11,fontWeight:700}}>Editar</button>
                      {sucursales.length>1&&<button onClick={()=>setSucursales(sucursales.filter(x=>x.id!==s.id))} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>🗑</button>}
                    </div>
                  </div>
                ):(
                  <div style={{background:'#f8fafc',borderRadius:12,padding:14}}>
                    <div style={{fontWeight:900,fontSize:13,marginBottom:14,color:'#1e293b'}}>Editando: {s.nombre}</div>

                    {/* Datos generales */}
                    <div style={{background:'white',borderRadius:10,padding:12,marginBottom:12,border:'1px solid #e2e8f0'}}>
                      <div style={{fontWeight:800,fontSize:11,color:'#64748b',marginBottom:10,textTransform:'uppercase'}}>Datos del salon</div>
                      {[['Nombre','nombre'],['Direccion','direccion'],['Sitio web','web'],['Instagram (link o @usuario)','instagram'],['Telefono WhatsApp','tel']].map(([l,k])=>(
                        <label key={k} style={{display:'block',marginBottom:6}}><span style={S.label}>{l}</span><input value={ed[k]||''} onChange={e=>setEd({...ed,[k]:e.target.value})} style={S.input}/></label>
                      ))}
                      <div style={{display:'flex',gap:10,alignItems:'flex-end',marginTop:4}}>
                        <label style={{width:84}}><span style={S.label}>Icono</span><input value={ed.emoji||''} onChange={e=>setEd({...ed,emoji:e.target.value})} maxLength={2} style={{...S.input,fontSize:22,textAlign:'center'}}/></label>
                        <div style={{flex:1}}>
                          <span style={S.label}>Logo (imagen)</span>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            {ed.logo?<img src={ed.logo} alt="" style={{width:42,height:42,objectFit:'cover',borderRadius:'50%',border:'2px solid #e2e8f0',flexShrink:0}}/>:<div style={{width:42,height:42,borderRadius:'50%',background:'#f1f5f9',flexShrink:0}}></div>}
                            <label style={{...S.btn,background:'#0f172a',color:'white',padding:'8px 12px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>📷 Subir
                              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const file=e.target.files[0];if(!file)return;resizeImg(file,260,data=>setEd(prev=>({...prev,logo:data})));}}/>
                            </label>
                            {ed.logo&&<button type="button" onClick={()=>setEd(prev=>({...prev,logo:''}))} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>🗑</button>}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* PRIMERA PORTADA */}
                    <div style={{background:'white',borderRadius:10,padding:12,marginBottom:12,border:'2px solid '+(ed.color||'#f97316')}}>
                      <div style={{fontWeight:800,fontSize:11,color:'#64748b',marginBottom:10,textTransform:'uppercase'}}>Primera Portada</div>
                      <label style={{display:'block',marginBottom:10}}>
                        <span style={S.label}>Frase de bienvenida</span>
                        <input value={ed.portadaFrase||''} onChange={e=>setEd({...ed,portadaFrase:e.target.value})} style={S.input} placeholder="Recibiste una invitacion de"/>
                      </label>
                      {/* Preview mini */}
                      <div style={{background:ed.color||'#f97316',borderRadius:10,padding:'10px 14px',marginBottom:12,textAlign:'center'}}>
                        <p style={{color:'rgba(255,255,255,.9)',fontSize:10,margin:'0 0 2px',letterSpacing:1}}>{ed.portadaFrase||'Recibiste una invitacion de'}</p>
                        <p style={{color:'white',fontSize:16,fontWeight:900,margin:0}}>Nombre del festejado</p>
                      </div>
                      <span style={S.label}>Color de fondo</span>
                      {/* Paleta de colores predefinidos */}
                      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
                        {['#f97316','#ef4444','#ec4899','#a855f7','#7c3aed','#3b82f6','#06b6d4','#10b981','#84cc16','#eab308','#f59e0b','#0f172a'].map(c=>(
                          <button key={c} onClick={()=>setEd({...ed,color:c})} style={{width:32,height:32,borderRadius:'50%',background:c,border:(ed.color||'#f97316')===c?'3px solid #1e293b':'3px solid transparent',cursor:'pointer',boxShadow:'0 2px 6px rgba(0,0,0,.2)'}}></button>
                        ))}
                      </div>
                      <label style={{display:'flex',alignItems:'center',gap:10}}>
                        <span style={{...S.label,margin:0}}>Color personalizado:</span>
                        <input type="color" value={ed.color||'#f97316'} onChange={e=>setEd({...ed,color:e.target.value})} style={{width:44,height:36,border:'none',borderRadius:8,cursor:'pointer'}}/>
                        <span style={{fontSize:11,color:'#64748b'}}>{ed.color||'#f97316'}</span>
                      </label>
                    </div>

                    {/* Fotos */}
                    <div style={{background:'white',borderRadius:10,padding:12,marginBottom:12,border:'1px solid #e2e8f0'}}>
                      <div style={{fontWeight:800,fontSize:11,color:'#64748b',marginBottom:10,textTransform:'uppercase'}}>Fotos del salon (hasta 4)</div>
                      {[0,1,2,3].map(i=>{
                        const foto=(ed.fotos||['','','',''])[i]||'';
                        return(
                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                          {foto?<img src={foto} alt="" style={{width:46,height:46,objectFit:'cover',borderRadius:8,flexShrink:0}}/>:<div style={{width:46,height:46,borderRadius:8,background:'#f1f5f9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'#94a3b8',flexShrink:0}}>{i+1}</div>}
                          <label style={{...S.btn,background:'#0f172a',color:'white',padding:'8px 12px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>📷 {foto?'Cambiar':'Subir'}
                            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const file=e.target.files[0];if(!file)return;resizeImg(file,640,data=>{const f=[...(ed.fotos||['','','',''])];f[i]=data;setEd({...ed,fotos:f});});}}/>
                          </label>
                          {foto&&<button type="button" onClick={()=>{const f=[...(ed.fotos||['','','',''])];f[i]='';setEd({...ed,fotos:f});}} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>🗑</button>}
                        </div>
                        );
                      })}
                    </div>

                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>{setSucursales(sucursales.map(x=>x.id===s.id?{...x,...ed}:x));setEditing(false);}} style={{...S.btn,background:'#16a34a',color:'white',flex:1,padding:'10px'}}>Guardar</button>
                      <button onClick={()=>setEditing(false)} style={{...S.btn,background:'#f1f5f9',color:'#64748b',padding:'10px'}}>Cancelar</button>
                    </div>
                  </div>
                )}
              </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ADMIN IA & PRECIOS ──────────────────────────────────── */
function AdminIA({setVista,iaConfig,setIaConfig}){
  const [cfg,setCfg]=useState(iaConfig);
  const [msg,setMsg]=useState('');
  const [editando,setEditando]=useState(false);
  function set(k,v){setCfg(c=>({...c,[k]:v}));}
  function guardar(){setIaConfig(cfg);setEditando(false);setMsg('✓ Cambios guardados');setTimeout(()=>setMsg(''),2500);}
  const lockStyle=editando?{}:{background:'#f1f5f9',color:'#475569',cursor:'not-allowed'};
  const servicio=(titulo,emoji,kPrompt,kApi,kPrecio,phPrompt)=>(
    <div style={{...S.card,marginBottom:14}}>
      <h3 style={{fontWeight:900,fontSize:15,marginBottom:12}}>{emoji} {titulo}</h3>
      <label style={{display:'block',marginBottom:10}}><span style={S.label}>Prompt (instrucción para la IA)</span>
        <textarea value={cfg[kPrompt]||''} readOnly={!editando} onChange={e=>set(kPrompt,e.target.value)} rows={4} style={{...S.input,resize:'vertical',fontFamily:'inherit',...lockStyle}} placeholder={phPrompt}/>
        <span style={{fontSize:10,color:'#94a3b8'}}>Variables disponibles: {'{nombre}'}, {'{edad}'}, {'{personaje}'}. <b>No hace falta pedir el cartel ni el formato</b>: el sistema lo agrega solo.</span>
      </label>
      <label style={{display:'block',marginBottom:10}}><span style={S.label}>🔑 API Key</span>
        <input value={cfg[kApi]||''} onChange={e=>set(kApi,e.target.value)} style={S.input} placeholder="Pegá aquí la API key del servicio" autoComplete="off"/>
      </label>
      <label style={{display:'block',maxWidth:220}}><span style={S.label}>💲 Precio al papá ($)</span>
        <input type="number" value={cfg[kPrecio]||0} onChange={e=>set(kPrecio,+e.target.value)} style={S.input}/>
      </label>
    </div>
  );
  return(
    <div className="fade-in" style={{maxWidth:700,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>🤖 IA & Precios</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:18}}>Prompts, API keys y precios de los servicios de IA</p>
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msg}</div>}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,background:editando?'#fef9c3':'#f1f5f9',border:'1px solid '+(editando?'#fde047':'#e2e8f0'),borderRadius:12,padding:'10px 14px',marginBottom:14}}>
        <span style={{fontSize:12,fontWeight:700,color:editando?'#854d0e':'#64748b'}}>{editando?'✏️ Modo edición activado — ya podés modificar los prompts.':'🔒 Los prompts están protegidos para que no se borren sin querer.'}</span>
        <button onClick={()=>setEditando(e=>!e)} style={{...S.btn,background:editando?'#64748b':'#0ea5e9',color:'white',padding:'7px 14px',fontSize:12,whiteSpace:'nowrap'}}>{editando?'🔒 Bloquear':'✏️ Editar'}</button>
      </div>

      {servicio('Imagen IA','🖼️','promptImagen','apiImagen','precioImagen','Una fotografía de {nombre}, {edad} años, con temática {tematica}...')}
      {servicio('Video IA','🎬','promptVideo','apiVideo','precioVideo','Video corto del personaje {tematica} saludando a {nombre}...')}

      <div style={{...S.card,marginBottom:14}}>
        <h3 style={{fontWeight:900,fontSize:15,marginBottom:4}}>🪄 Mejorador de foto</h3>
        <p style={{fontSize:11,color:'#64748b',marginBottom:12}}>Gratis para el papá. Puede ver la foto <b>original</b> y la <b>mejorada</b>, y elegir cuál usar.</p>
        <label style={{display:'block',marginBottom:10}}><span style={S.label}>Prompt (instrucción para la IA)</span>
          <textarea value={cfg.promptMejora||''} readOnly={!editando} onChange={e=>set('promptMejora',e.target.value)} rows={3} style={{...S.input,resize:'vertical',fontFamily:'inherit',...lockStyle}} placeholder="Mejorá la foto: color, brillo y nitidez..."/>
        </label>
        <label style={{display:'block'}}><span style={S.label}>🔑 API Key</span>
          <input value={cfg.apiMejora||''} onChange={e=>set('apiMejora',e.target.value)} style={S.input} placeholder="Pegá aquí la API key del servicio" autoComplete="off"/>
        </label>
        <p style={{fontSize:10,color:'#16a34a',marginTop:8,fontWeight:700}}>✓ Sin precio — incluido en el servicio</p>
      </div>

      <div style={{...S.card,marginBottom:14}}>
        <h3 style={{fontWeight:900,fontSize:15,marginBottom:4}}>💳 Cobros (Mercado Pago)</h3>
        <p style={{fontSize:11,color:'#64748b',marginBottom:10}}>Datos para cobrar los servicios de IA a los papás.</p>
        <label style={{display:'block',marginBottom:10}}><span style={S.label}>Link de pago</span>
          <input value={cfg.mpLink||''} onChange={e=>set('mpLink',e.target.value)} style={S.input} placeholder="https://mpago.la/..." autoComplete="off"/>
        </label>
        <label style={{display:'block'}}><span style={S.label}>Public Key</span>
          <input value={cfg.mpPublicKey||''} onChange={e=>set('mpPublicKey',e.target.value)} style={S.input} placeholder="APP_USR-..." autoComplete="off"/>
        </label>
      </div>

      <button onClick={guardar} style={{...S.btn,background:'linear-gradient(135deg,#8b5cf6,#7c3aed)',color:'white',padding:'13px 28px',fontSize:14}}>✓ Guardar cambios</button>
    </div>
  );
}

/* ── ADMIN CONFIGURACIÓN ─────────────────────────────────── */
function AdminConfig({setVista,iaConfig,setIaConfig}){
  const [cfg,setCfg]=useState(iaConfig);
  const [msg,setMsg]=useState('');
  function set(k,v){setCfg(c=>({...c,[k]:v}));}
  function guardar(){setIaConfig(cfg);setMsg('✓ Configuración guardada');setTimeout(()=>setMsg(''),2500);}
  const anios=[];for(let y=2025;y<=2030;y++)anios.push(y);
  return(
    <div className="fade-in" style={{maxWidth:700,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>🛠️ Configuración</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:18}}>Ajustes generales del sistema</p>
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msg}</div>}

      <div style={{...S.card,marginBottom:14}}>
        <h3 style={{fontWeight:900,fontSize:14,marginBottom:4}}>🗓️ Año vigente</h3>
        <p style={{fontSize:11,color:'#64748b',marginBottom:10}}>Se usa por defecto al cargar nuevos cumpleaños.</p>
        <select value={cfg.anioVigente||2026} onChange={e=>set('anioVigente',+e.target.value)} style={{...S.input,maxWidth:160}}>
          {anios.map(y=><option key={y} value={y}>{y}</option>)}
        </select>
      </div>

      <div style={{...S.card,marginBottom:14}}>

function PapaLogin({setVista,eventos,setPapaSesion,setInvEvId,aviso}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [showP,setShowP]=useState(false);
  function sub(e){
    e.preventDefault();
    const uu=u.trim().toLowerCase(), pp=p.trim().toLowerCase();
    // Buscar en la lista local (usuario y clave sin distinguir mayúsculas)
    let ev=eventos.find(x=>x.user&&x.user.toLowerCase()===uu&&x.pass&&x.pass.toLowerCase()===pp);
    // Si no, probar con el link ?papa= (credenciales codificadas, formato viejo)
    if(!ev){
      try{
        const papaParam=new URLSearchParams(window.location.search).get('papa');
        if(papaParam){const d=JSON.parse(atob(papaParam));if(d.user&&d.user.toLowerCase()===uu&&d.pass&&String(d.pass).toLowerCase()===pp)ev=d;}
      }catch(ex){}
    }
    if(!ev){setErr('Datos incorrectos. Verificá usuario y contraseña.');return;}
    if(estaVencido(ev)){setErr('El acceso para este evento ha vencido.');return;}
    setPapaSesion(ev);setInvEvId(ev.id);setVista('papa-creador');
  }
  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'80vh',padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,boxShadow:'0 8px 32px rgba(0,0,0,0.10)'}}>
        <div style={{textAlign:'center',marginBottom:22}}><div style={{fontSize:48}}>🎂</div>
          <h2 style={{fontWeight:900,fontSize:20,marginTop:8}}>Acceso para Padres</h2>
          <p style={{color:'#64748b',fontSize:12,marginTop:4}}>Personalizá tu invitación digital</p>
        </div>
        {(err||aviso)&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:12,fontSize:12,marginBottom:12}}>{err||aviso}</div>}
        <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
          <input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} placeholder="Usuario" autoComplete="username" required/>
          <div style={{position:'relative'}}>
            <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="Contraseña" autoComplete="current-password" required/>
            <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8'}}>
              {showP?'🙈':'👁️'}
            </button>
          </div>
          <button style={{...S.btn,background:'#f97316',color:'white',padding:14,fontSize:14}}>Ingresar</button>
        </form>
      </div>
    </div>
  );
}

/* ── GENERADOR IA ─────────────────────────────────────────── */
function GeneradorIA({tipo,nombre,tematica,prompt,fotoNino,personaje,personajeNombre,edad,onResultado,onCerrar}){
  const [paso,setPaso]=useState('generando'); // generando | listo | error
  const [progreso,setProgreso]=useState(0);
  const [resultados,setResultados]=useState([]);
  const [errMsg,setErrMsg]=useState('');

  // Animación de progreso (sube hasta 90% mientras espera la respuesta real)
  useEffect(()=>{
    if(paso!=='generando')return;
    const t=setInterval(()=>{setProgreso(p=>p<90?p+(p<60?3:1):p);},300);
    return()=>clearInterval(t);
  },[paso]);

  // Generación real
  useEffect(()=>{
    let cancel=false;
    (async()=>{
      try{
        if(tipo==='imagen'){
          if(!fotoNino||!personaje) throw new Error('Faltan la foto del niño/a o el personaje.');
          const persNom=personajeNombre||tematica||'el personaje';
          const base=(prompt||'').replace(/\{nombre\}/g,nombre||'').replace(/\{edad\}/g,edad||'').replace(/\{tematica\}/g,persNom).replace(/\{personaje\}/g,persNom);
          const composed=base+' Usá las DOS imágenes adjuntas: conservá EXACTAMENTE la cara y el parecido de la persona de la PRIMERA imagen (no la cambies ni la estilices), y juntala con el/los personaje(s) de la SEGUNDA imagen. Ambos de cuerpo completo, del mismo tamaño y altura, parados juntos lado a lado; el fondo es el mundo/escenario del personaje; la persona lleva una remera estampada del personaje; el personaje en estilo 3D animado; imagen vertical, alegre y apta para todo público; sin texto ni letras.';
          // fal.ai nano-banana: combina las dos imágenes manteniendo la cara real
          const resp=await fetch('/api/generar-catalogo',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({prompt:composed,images:[fotoNino,personaje],model:'fal-ai/nano-banana/edit',aspect_ratio:'9:16'})
          });
          const data=await resp.json().catch(()=>({error:'Respuesta inválida del servidor.'}));
          if(!resp.ok) throw new Error(data.error||'No se pudo generar la imagen.');
          if(cancel)return;
          if(!data.url) throw new Error('No se recibió imagen.');
          setResultados([data.url]);setProgreso(100);setPaso('listo');
        } else {
          // Video con IA: todavía no integrado → demostración
          await new Promise(r=>setTimeout(r,2200));
          if(cancel)return;
          setResultados([
            'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=600&fit=crop',
            'https://images.unsplash.com/photo-1464349153735-7db50ed83c84?w=600&fit=crop',
          ]);
          setProgreso(100);setPaso('listo');
        }
      }catch(e){ if(cancel)return; setErrMsg(String((e&&e.message)||e));setPaso('error'); }
    })();
    return()=>{cancel=true;};
  },[]);

  if(paso==='generando') return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:380,width:'100%',padding:28,textAlign:'center'}}>
        <div style={{fontSize:44,marginBottom:12}}>{tipo==='imagen'?'🖼️':'🎬'}</div>
        <h3 style={{fontWeight:900,fontSize:17,marginBottom:6}}>Generando con IA...</h3>
        <p style={{fontSize:12,color:'#64748b',marginBottom:8}}>Creando la magia para <b>{nombre}</b> ✨</p>
        <div style={{height:8,background:'#e2e8f0',borderRadius:99,overflow:'hidden',marginBottom:8}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#7c3aed,#a855f7)',borderRadius:99,width:progreso+'%',transition:'width .3s'}}></div>
        </div>
        <p style={{fontSize:11,color:'#7c3aed',fontWeight:700}}>{progreso}%</p>
        <p style={{fontSize:10,color:'#94a3b8',marginTop:8}}>Esto puede tardar entre 20 y 40 segundos. No cierres esta ventana.</p>
      </div>
    </div>
  );
  if(paso==='error') return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:400,width:'100%',padding:28,textAlign:'center'}}>
        <div style={{fontSize:44,marginBottom:12}}>😕</div>
        <h3 style={{fontWeight:900,fontSize:17,marginBottom:6}}>No se pudo generar</h3>
        <p style={{fontSize:12,color:'#dc2626',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:10,marginBottom:16}}>{errMsg}</p>
        <button onClick={onCerrar} style={{...S.btn,background:'#f1f5f9',color:'#334155',width:'100%'}}>Cerrar e intentar de nuevo</button>
      </div>
    </div>
  );
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16,overflowY:'auto'}}>
      <div className="fade-in" style={{...S.card,maxWidth:460,width:'100%',padding:24,margin:'auto'}}>
        <h3 style={{fontWeight:900,fontSize:17,marginBottom:4,textAlign:'center'}}>🎉 ¡{tipo==='imagen'?'Imágenes':'Videos'} listas!</h3>
        <p style={{fontSize:11,color:'#64748b',textAlign:'center',marginBottom:16}}>Se generaron {resultados.length} opciones. Tocá "Usar estas" y después elegí tu favorita.</p>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(resultados.length,3)},1fr)`,gap:10,marginBottom:16}}>
          {resultados.map((src,i)=>(
            <div key={i} style={{aspectRatio:'9/16',borderRadius:10,overflow:'hidden',width:'100%',maxHeight:200,border:'2px solid #e2e8f0'}}>
              {tipo==='imagen'
                ?<img src={src} alt={`resultado ${i+1}`} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                :<div style={{width:'100%',height:'100%',background:'#0f172a',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
                  <span style={{fontSize:28}}>🎬</span><p style={{color:'#94a3b8',fontSize:9}}>Video {i+1}</p>
                </div>}
            </div>
          ))}
        </div>
        <button onClick={()=>onResultado(resultados)} style={{...S.btn,background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white',width:'100%',marginBottom:8}}>✓ Usar estas opciones</button>
        <button onClick={onCerrar} style={{...S.btn,background:'#f1f5f9',color:'#64748b',width:'100%'}}>Cancelar</button>
      </div>
    </div>
  );
}

  const cssFilter=`brightness(${mejora.brillo}%) contrast(${mejora.contraste}%) saturate(${mejora.saturacion}%) sepia(${mejora.calidez}%)`;

  function descargarInvitacion(){
    const W=540,H=960;
    const canvas=document.createElement('canvas');
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');
    const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const fecha=papaSesion.dia+' de '+(meses[(+papaSesion.mes)-1]||'')+' de '+papaSesion.anio;
    // Fondo degradado (no depende de imágenes externas)
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,'#1e0a4e');
    grad.addColorStop(0.5,'#7c3aed');
    grad.addColorStop(1,'#c2410c');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Círculos decorativos
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.beginPath();ctx.arc(W*0.8,H*0.2,180,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(W*0.1,H*0.7,140,0,Math.PI*2);ctx.fill();
    // Badge superior
    ctx.fillStyle='#f43f5e';
    ctx.beginPath();ctx.roundRect(W/2-90,44,180,40,20);ctx.fill();
    ctx.fillStyle='white';ctx.font='bold 18px Arial';ctx.textAlign='center';
    ctx.fillText('TE INVITO!',W/2,71);
    // Salon name
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='16px Arial';
    ctx.fillText(suc.nombre,W/2,140);
    // Nombre del festejado
    const nombre=form.nombre||papaSesion.nombre||'';
    ctx.fillStyle='#fef9c3';ctx.font='bold 70px Arial';ctx.textAlign='center';
    // Wrap if long
    if(ctx.measureText(nombre).width>480){ctx.font='bold 50px Arial';}
    ctx.fillText(nombre,W/2,H/2-60);
    // tipo + edad
    ctx.fillStyle='white';ctx.font='bold 26px Arial';
    const _u=(papaSesion.edadUnidad||form.edadUnidad||'años');
    ctx.fillText((fmtTipo(form.tipo,iaConfig).fmtEdad && _u!=='noaplica' && (form.edad||papaSesion.edad)) ? ((form.tipo||'Cumpleanos')+' · '+(form.edad||papaSesion.edad)+' '+(_u==='meses'?'meses':'anos')) : (form.tipo||'Evento'),W/2,H/2);
    // Línea divisora
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(60,H/2+30,W-120,1);
    // Detalles del evento
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='22px Arial';
    ctx.fillText(fecha,W/2,H/2+80);
    ctx.fillText(papaSesion.hIni+' a '+papaSesion.hFin+' hs',W/2,H/2+115);
    // Caja lugar
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath();ctx.roundRect(40,H/2+148,W-80,100,20);ctx.fill();
    ctx.fillStyle='white';ctx.font='bold 24px Arial';
    ctx.fillText(suc.nombre,W/2,H/2+195);
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='17px Arial';
    const dir=suc.direccion||'';
    if(ctx.measureText(dir).width>440){ctx.font='14px Arial';}
    ctx.fillText(dir,W/2,H/2+225);
    // Footer
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='13px Arial';
    ctx.fillText('Invitaciones Digitales · '+suc.nombre,W/2,H-30);
    // Descargar
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',0.93);
    a.download='invitacion-'+(nombre||'evento').replace(/\s/g,'-')+'.jpg';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function calcularMenu(){
    const a=+menuAdultos||0;const n=+menuNinos||0;const t=a+n;
    if(!t)return alert('Ingresá la cantidad de adultos y niños.');
    const h=+menuHoras||4;
    const cfg=iaConfig.menuConfig||{};
    // Season multipliers
    const bMult=menuEstacion==='Verano'?1.3:menuEstacion==='Invierno'?0.8:1.0;
    const hMult=h<=3?0.85:h===4?1.0:h===5?1.15:1.3;
    setMenuGen(true);
    setTimeout(()=>{
      const results=[];
      const shopping=[];
      // Helper: calc per item
      function addItems(cat,items,baseN,baseA,unit){
        const sel=(menuSel[cat]||{});
        const selItems=items.filter(i=>sel[i.id]);
        if(!selItems.length)return;
        const perItem=selItems.length;
        selItems.forEach(item=>{
          const rawN=n*(baseN/perItem)*hMult;
          const rawA=a*(baseA/perItem)*hMult;
          const total=Math.ceil(rawN+rawA);
          results.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:unit,cat});
          shopping.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:unit});
        });
      }
      addItems('ninos',cfg.ninos||[]  , 2.5, 0.5, 'unidades');
      addItems('adultos',cfg.adultos||[], 0.5, 2.0, 'unidades');
      addItems('snacks',cfg.snacks||[]  , 0.3, 0.2, 'kg');
      addItems('postres',cfg.postres||[], 0.15,0.1, 'porción');
      // Bebidas with season multiplier
      const bSel=(menuSel.bebidas||{});
      const bItems=(cfg.bebidas||[]).filter(i=>bSel[i.id]);
      bItems.forEach(item=>{
        const total=Math.ceil(t*0.35*bMult*hMult);
        results.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:'litros',cat:'bebidas'});
        shopping.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:'litros'});
      });
      setMenuResult({items:results,shopping,adultos:a,ninos:n,horas:h,estacion:menuEstacion});
      setMenuGen(false);
    },2500);
  }

                <div style={{background:m.de==='user'?'#7c3aed':'white',color:m.de==='user'?'white':'#1e293b',borderRadius:14,padding:'10px 14px',maxWidth:'78%',fontSize:13,lineHeight:1.4,border:m.de==='ia'?'1px solid #e2e8f0':'none'}}>
                  {m.txt}
                </div>
              </div>
            );})}
            {faqTyping&&(
