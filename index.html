/* ── ADMIN MÚSICA DE TARJETAS ─────────────────────────────── */
function AdminMusica({setVista,tematicas,setTematicas,iaConfig,setIaConfig,sucursales,setSucursales,sucAct}){
  const [busq,setBusq]=useState('');
  const [selSuc,setSelSuc]=useState((sucAct&&sucAct.id)||(sucursales&&sucursales[0]&&sucursales[0].id)||'');
  const sucSel=(sucursales||[]).find(s=>s.id===selSuc)||{};
  const gen=(sucSel.musicaGen&&sucSel.musicaGen.length)?sucSel.musicaGen:['',''];
  function setGen(i,url){setSucursales(p=>p.map(s=>{if(s.id!==selSuc)return s;const g=((s.musicaGen&&s.musicaGen.length)?s.musicaGen:['','']).slice();g[i]=url;return {...s,musicaGen:g};}));}
  function setTemMus(id,url){setTematicas(p=>p.map(t=>t.id===id?{...t,musica:url}:t));flashOk('✓ Guardado');}
  // Biblioteca de música para el PASE DE FOTOS — POR SUCURSAL (cada salón la suya)
  const pase=(sucSel.musicaPase&&sucSel.musicaPase.length)?sucSel.musicaPase:[];
  function setSucPase(updater){setSucursales(p=>p.map(s=>{if(s.id!==selSuc)return s;return {...s,musicaPase:updater(s.musicaPase||[])};}));}
  function addPase(url,nombre){setSucPase(cur=>[...cur,{id:'mp-'+Date.now().toString(16),nombre:(nombre&&nombre.trim())||('Tema '+(cur.length+1)),url}]);flashOk('✓ Música agregada');}
  function updPaseNom(id,nombre){setSucPase(cur=>cur.map(m=>m.id===id?{...m,nombre}:m));}
  function delPase(id){setSucPase(cur=>cur.filter(m=>m.id!==id));}
  // Frases del pase (la mamá elige). frasesPaseIni / frasesPaseFin = [texto]
  const frasesIni=(iaConfig.frasesPaseIni&&iaConfig.frasesPaseIni.length)?iaConfig.frasesPaseIni:[];

  function delFrase(campo,i){setIaConfig(c=>({...c,[campo]:((c[campo])||[]).filter((_,k)=>k!==i)}));}

  const portadas=(iaConfig.portadasPase&&iaConfig.portadasPase.length)?iaConfig.portadasPase:[];
  function delPortada(i){setIaConfig(c=>({...c,portadasPase:((c.portadasPase)||[]).filter((_,k)=>k!==i)}));}
  function comprimirAdmin(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const M=1200;let w=img.width,h=img.height;if(w>h&&w>M){h=Math.round(h*M/w);w=M;}else if(h>=w&&h>M){w=Math.round(w*M/h);h=M;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.85));};img.onerror=rej;img.src=ev.target.result;};r.onerror=rej;r.readAsDataURL(file);});}
  async function subirPortadas(files){
    const arr=Array.from(files||[]);if(!arr.length)return;flashOk('Subiendo portadas…');
    const urls=[];
    for(const f of arr){try{const du=await comprimirAdmin(f);let u=du;try{const r=await fetch('/api/subir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:du})});const d=await r.json().catch(()=>({}));if(r.ok&&d.url)u=d.url;}catch(e){}urls.push(u);}catch(e){}}
    setIaConfig(c=>({...c,portadasPase:[...((c.portadasPase)||[]),...urls]}));flashOk('✓ '+urls.length+' portada(s) subida(s)');
  }

    try{flashOk('Subiendo música…');const ext=(String(file.name).split('.').pop()||'mp3').toLowerCase();const ct=file.type||'audio/mpeg';
      const r=await fetch('/api/subir-init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content_type:ct,ext})});

// Encuesta del papá: textos editables (se guardan en iaConfig.encuestaCfg). La estructura es fija; la dueña edita el texto de cada pregunta.
const ENCUESTA_DEF={
  titulo:'📝 Encuesta de satisfacción',
  subtitulo:'Tu opinión nos interesa 💜',
  tEncargada:'👩 Atención de la Encargada',
  tMozos:'🧑‍🍳 Atención de los mozos',
  m1:'1) Estuvieron atentos a los pedidos',
  m2:'2) Estuvieron presentes durante todo el evento',

  banos:'6) ¿Los baños estuvieron limpios?',

  dAgrad:'Dejales unas palabras lindas a los chicos que trabajaron. Podés grabar un audio 🎤 o escribirlo ✍️ (o las dos cosas). Queda guardado para el salón.',

  dCritica:'Algo que podamos mejorar. Esto lo ve solo la encargada del salón — no los chicos.',

};
function AdminEncuestas({setVista,eventos,setEventos,sucursales,iaConfig,setIaConfig}){
  const [tab,setTab]=useState('respuestas');
  const [fSuc,setFSuc]=useState('');
  const [fBusca,setFBusca]=useState(''); const [fFecha,setFFecha]=useState('');
  const [abrir,setAbrir]=useState(null); // evento abierto en vista completa
  const _pad=n=>('0'+(n||'')).slice(-2);
  const EC={...ENCUESTA_DEF,...((iaConfig&&iaConfig.encuestaCfg)||{})};
  const [cfg,setCfg]=useState(EC);
  const [msgCfg,setMsgCfg]=useState('');
  const sucName=id=>{const s=(sucursales||[]).find(x=>x.id===id);return s?s.nombre:'';};
  const calTxt=v=>v==='excelente'?'🤩 Excelente':v==='buena'?'🙂 Buena':v==='mala'?'😕 Mala':'—';
  const calCol=v=>v==='excelente'?'#16a34a':v==='buena'?'#b45309':v==='mala'?'#dc2626':'#94a3b8';
  const snTxt=v=>v===true?'Sí':v===false?'No':'—';
  const snCol=v=>v===false?'#dc2626':v===true?'#16a34a':'#94a3b8';
  const banTxt=v=>v==='novisito'?'No los visitó':v==='si'?'Sí':v==='no'?'No':'—';
  const banCol=v=>v==='no'?'#dc2626':v==='si'?'#16a34a':'#94a3b8';
  const hayMalo=q=>(q.encargada&&q.encargada!=='excelente')||(q.personal&&q.personal!=='excelente')||q.m1===false||q.m2===false||q.m3===false||q.m4===false||q.aux===false||q.banos==='no';
  const V=({t,c})=>(<b style={{color:c}}>{t}</b>);

// ── Info del Salón (admin): Reglas + Adicionales + Preguntas Frecuentes (por sucursal) ──
const FAQ_PROMPT_DEF='Sos el asistente de este salón. Respondé las preguntas del cliente usando ÚNICAMENTE la información del salón que te paso. Si la respuesta no está en esa información, respondé exactamente: "No tengo esa información, consultá directamente con el salón." No inventes ni supongas nada. Respondé en español, de forma completa, clara y amable, sin cambiar los datos.';
function AdminSalon({setVista,sucursales,setSucursales,iaConfig,setIaConfig}){
  const [selSuc,setSelSuc]=useState(((sucursales[0]||{}).id)||'sz-1');
  const suc=sucursales.find(s=>s.id===selSuc)||sucursales[0]||{};
  const [msg,setMsg]=useState('');
  const [copyDest,setCopyDest]=useState('');
  function flash(t){setMsg(t);flashOk(t);setTimeout(()=>setMsg(''),2200);}
  function comprimir(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const M=1000;let w=img.width,h=img.height;if(w>h&&w>M){h=Math.round(h*M/w);w=M;}else if(h>=w&&h>M){w=Math.round(w*M/h);h=M;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.85));};img.onerror=rej;img.src=ev.target.result;};r.onerror=rej;r.readAsDataURL(file);});}
  async function subirImg(file){const du=await comprimir(file);let u=du;try{const r=await fetch('/api/subir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:du})});const d=await r.json().catch(()=>({}));if(r.ok&&d.url)u=d.url;}catch(e){}return u;}
  function updSuc(field,value){setSucursales(p=>p.map(s=>s.id===selSuc?{...s,[field]:value}:s));}
  const adic=suc.adicionales||[];
  function setAdic(arr){updSuc('adicionales',arr);}
  function addAdic(){setAdic([...adic,{id:'ad-'+Math.floor(Math.random()*1e6),titulo:'Nuevo adicional',desc:'',foto:'',precio:''}]);}
  function updAdic(id,k,v){setAdic(adic.map(a=>a.id===id?{...a,[k]:v}:a));}
  function delAdic(id){setAdic(adic.filter(a=>a.id!==id));}
  async function fotoAdic(id,file){if(!file)return;flash('Subiendo foto…');const u=await subirImg(file);updAdic(id,'foto',u);flash('✓ Foto lista');}
  async function subirVideoF(file){if(!file)return null;const ext=(String(file.name).split('.').pop()||'mp4').toLowerCase();const ct=file.type||'video/mp4';try{const r=await fetch('/api/subir-init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content_type:ct,ext})});const d=await r.json().catch(()=>({}));if(!r.ok||!d.upload_url||!d.file_url)return null;const up=await fetch(d.upload_url,{method:'PUT',headers:{'Content-Type':ct},body:file});if(!up.ok)return null;return d.file_url;}catch(e){return null;}}
  // Comprime SOLO si puede garantizar MP4 (compatible con todos los celus). Si no, devuelve null y se sube el original.
  async function comprimirVideoCompat(file,onProg){
    try{
      if(!window.MediaRecorder||!MediaRecorder.isTypeSupported)return null;
      const mp4Type=['video/mp4;codecs=avc1','video/mp4'].find(t=>MediaRecorder.isTypeSupported(t));
      if(!mp4Type)return null;
      const url=URL.createObjectURL(file);
      const v=document.createElement('video');v.src=url;v.playsInline=true;v.preload='auto';
      await new Promise((res,rej)=>{v.onloadedmetadata=res;v.onerror=rej;});
      const dur=v.duration; if(!dur||dur===Infinity){URL.revokeObjectURL(url);return null;}
      let w=v.videoWidth,h=v.videoHeight; if(!w||!h){URL.revokeObjectURL(url);return null;}
      const M=720; if(w>h&&w>M){h=Math.round(h*M/w);w=M;}else if(h>=w&&h>M){w=Math.round(w*M/h);h=M;}
      const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');
      const cs=c.captureStream(30);
      let audioCtx=null,dest=null;
      try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();const sn=audioCtx.createMediaElementSource(v);dest=audioCtx.createMediaStreamDestination();sn.connect(dest);}catch(e){audioCtx=null;dest=null;}
      const stream=new MediaStream([...cs.getVideoTracks(),...(dest?dest.stream.getAudioTracks():[])]);
      const chunks=[];const rec=new MediaRecorder(stream,{mimeType:mp4Type,videoBitsPerSecond:2200000});
      rec.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data);};
      const stopped=new Promise(res=>{rec.onstop=res;});
      let raf;function draw(){try{ctx.drawImage(v,0,0,w,h);}catch(e){}if(onProg&&dur)onProg(Math.min(99,Math.round((v.currentTime/dur)*100)));raf=requestAnimationFrame(draw);}
      if(audioCtx&&audioCtx.state==='suspended'){try{await audioCtx.resume();}catch(e){}}
      rec.start(200);try{v.currentTime=0;}catch(e){}await v.play();draw();
      await new Promise(res=>{v.onended=res;});
      cancelAnimationFrame(raf);try{rec.stop();}catch(e){}await stopped;
      try{v.pause();}catch(e){}URL.revokeObjectURL(url);if(audioCtx){try{audioCtx.close();}catch(e){}}
      const blob=new Blob(chunks,{type:'video/mp4'});
      if(!blob.size||blob.size>=file.size)return null;
      return new File([blob],(file.name||'video').replace(/\.[^.]+$/,'')+'.mp4',{type:'video/mp4'});
    }catch(e){return null;}
  }

function calcMenuG(cfg,inp){
  cfg=cfg||MENUG_DEF; const al=cfg.alimentos||[];
  const M=+inp.mujeres||0,H=+inp.hombres||0,N=+inp.ninos||0;
  const adultos=M+H,pers=M+H+N;
  const sal=cfg.salado||MENUG_DEF.salado, dul=cfg.dulce||MENUG_DEF.dulce;
  const fS=inp.horario==='merienda'?(+cfg.meriendaFactor||0.8):1;
  const sel=inp.sel||{};
  const eleg=al.filter(a=>sel[a.id]);
  const out={salado:[],nino:[],dulce:[],pernil:null,torta:null,snacks:[],bebidaL:0,bebidaPP:0};
  // Cómo se muestra/compra cada ítem: por unidad, docena, media docena o personalizado (paquete/bolsón).
  const paquete=(u,a)=>{
    const m=a.compra||'u';
    if(m==='docena'){const c=Math.ceil(u/12);return {cant:c,u:'docena'+(c===1?'':'s')};}
    if(m==='media'){const c=Math.ceil(u/6);return {cant:c,u:'½ doc.'};}
    if(m==='custom'){const p=(+a.pack>0)?+a.pack:1;return {cant:Math.ceil(u/p),u:a.compraU||('paq. x'+p)};}
    return {cant:u,u:'u'};
  };
  const repartir=(lista,total,destino)=>{
    const suma=lista.reduce((s,a)=>s+(+a.gusto||0),0);
    if(suma<=0)return;
    lista.forEach(a=>{const g=total*(+a.gusto||0)/suma;const un=Math.ceil(g/((+a.g)||1));const pk=paquete(un,a);destino.push({nombre:a.nombre,emoji:a.emoji,unidades:un,g:Math.round(g),cant:pk.cant,u:pk.u});});
  };
  // SALADO adultos
  let saladoTot=(M*(+sal.mujer||450)+H*(+sal.hombre||700))*fS;
  const saladoSel=eleg.filter(a=>a.grupo==='salado');
  const pernilSel=saladoSel.find(a=>a.especial==='pernil');
  if(pernilSel&&adultos>0){ saladoTot=Math.max(0,saladoTot-adultos*(+cfg.pernilG||160)); out.pernil={nombre:pernilSel.nombre,emoji:pernilSel.emoji,paraPers:Math.round(adultos*0.7)}; }
  repartir(saladoSel.filter(a=>a.especial!=='pernil'),saladoTot,out.salado);
  // NIÑO
  repartir(eleg.filter(a=>a.grupo==='nino'),N*(+sal.nino||300)*fS,out.nino);
  // DULCE
  let dulceTot=M*(+dul.mujer||200)+H*(+dul.hombre||150)+N*(+dul.nino||150);
  const dulceSel=eleg.filter(a=>a.grupo==='dulce');

}

          {res.snacks.length>0&&<div style={{marginTop:8}}><div style={{fontSize:11,color:'#64748b',marginBottom:4}}>Snacks aparte:</div>{res.snacks.map((s,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#64748b'}}><span>{s.emoji} {s.nombre}</span><span>{s.disp}</span></div>))}</div>}

          {(!res.salado.length&&!res.nino.length&&!res.dulce.length&&!res.pernil&&!res.torta)&&<p style={{fontSize:12,color:'#94a3b8'}}>Cargá la gente y elegí algún plato para ver el cálculo.</p>}

            <label style={{fontSize:12}}>🧒 <input type="number" value={cfg.salado.nino} onChange={e=>setG('salado','nino',e.target.value)} style={nip}/></label>
          </div>
          <div style={{fontSize:12,fontWeight:800,color:'#334155',marginBottom:4}}>Dulce (g) — incluye la torta</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <label style={{fontSize:12}}>👩 <input type="number" value={cfg.dulce.mujer} onChange={e=>setG('dulce','mujer',e.target.value)} style={nip}/></label>
            <label style={{fontSize:12}}>👨 <input type="number" value={cfg.dulce.hombre} onChange={e=>setG('dulce','hombre',e.target.value)} style={nip}/></label>
            <label style={{fontSize:12}}>🧒 <input type="number" value={cfg.dulce.nino} onChange={e=>setG('dulce','nino',e.target.value)} style={nip}/></label>
          </div>
        </div>
        <div style={{...S.card,marginBottom:14}}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:10}}>🎂🍖🕐 Especiales y bebida</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8,fontSize:12}}>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🎂 Torta: gramos por persona</span><input type="number" value={cfg.tortaG} onChange={e=>setNum('tortaG',e.target.value)} style={nip}/></label>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🍖 Pernil: reserva por persona (g)</span><input type="number" value={cfg.pernilG} onChange={e=>setNum('pernilG',e.target.value)} style={nip}/></label>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🍰 Tarde/merienda: factor del salado</span><input type="number" step="0.05" value={cfg.meriendaFactor} onChange={e=>setNum('meriendaFactor',e.target.value)} style={nip}/></label>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🥤 Bebida: litros por persona (3 hs)</span><input type="number" step="0.1" value={cfg.bebidaL} onChange={e=>setNum('bebidaL',e.target.value)} style={nip}/></label>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🥤 Bebida: +litros por cada hora extra</span><input type="number" step="0.1" value={cfg.bebidaExtraL} onChange={e=>setNum('bebidaExtraL',e.target.value)} style={nip}/></label>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🍟 Papas: g por persona (todos)</span><input type="number" value={cfg.snackPapasAd} onChange={e=>setNum('snackPapasAd',e.target.value)} style={nip}/></label>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🥜 Maní: g por adulto</span><input type="number" value={cfg.snackManiAd} onChange={e=>setNum('snackManiAd',e.target.value)} style={nip}/></label>
            <label style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span>🍿 Snack salado: g por niño</span><input type="number" value={cfg.snackNino} onChange={e=>setNum('snackNino',e.target.value)} style={nip}/></label>
          </div>
        </div>
        {grupos.map(([g,l])=>(
          <div key={g} style={{...S.card,marginBottom:14}}>
            <h3 style={{fontWeight:900,fontSize:14,marginBottom:8}}>{l}</h3>
            <Rows lista={cfg.alimentos.filter(a=>a.grupo===g)}/>
            <button onClick={()=>addAl(g)} style={{...S.btn,background:'#0ea5e9',color:'white',padding:'8px 14px',fontSize:12,fontWeight:800,marginTop:10}}>+ Agregar alimento</button>
          </div>
        ))}
      </React.Fragment>)}

      <button onClick={guardar} style={{...S.btn,background:'linear-gradient(135deg,#16a34a,#22c55e)',color:'white',width:'100%',padding:14,fontSize:14,fontWeight:900,marginTop:8}}>💾 Guardar calculador</button>
    </div>
  );
}
function AdminMenu({setVista,iaConfig,setIaConfig}){
  const base=iaConfig.menuConfig||{prompt:'',ninos:[],adultos:[],snacks:[],postres:[],bebidas:[],descartables:[]};
  const [cfg,setCfg]=useState(base);
  const [nuevo,setNuevo]=useState({});
  const [msg,setMsg]=useState('');
  // Si la config llega/actualiza desde la base después de abrir el panel, refrescamos lo que se muestra.
  React.useEffect(()=>{ if(iaConfig.menuConfig) setCfg(iaConfig.menuConfig); },[iaConfig.menuConfig]);
  const cats=[['ninos','🧒 Niños'],['adultos','🧑 Adultos'],['snacks','🍿 Snacks'],['postres','🍰 Postres'],['bebidas','🥤 Bebidas'],['descartables','🍽️ Descartables']];
  // Valores de arranque por categoría: cuánto come/toma 1 niño y 1 adulto (editables)
  const DEF_RATE={ninos:{pn:4,pa:1,u:'u'},adultos:{pn:1,pa:6,u:'porc.'},snacks:{pn:0.02,pa:0.02,u:'bolsa'},postres:{pn:1,pa:1,u:'porción'},bebidas:{pn:0.4,pa:0.4,u:'L'},descartables:{pn:1,pa:1,u:'u'}};
  function guardar(){setIaConfig(c=>({...c,menuConfig:cfg}));setMsg('✓ Menú guardado');flashOk('✓ ¡Menú guardado!');setTimeout(()=>setMsg(''),2500);}
  function quitar(cat,id){setCfg(c=>({...c,[cat]:(c[cat]||[]).filter(i=>i.id!==id)}));}
  function updItem(cat,id,k,v){setCfg(c=>({...c,[cat]:(c[cat]||[]).map(i=>i.id===id?{...i,[k]:v}:i)}));}
  const [openIng,setOpenIng]=useState(null);
  function addIng(cat,id){setCfg(c=>({...c,[cat]:(c[cat]||[]).map(i=>i.id===id?{...i,ingredientes:[...(i.ingredientes||[]),{nombre:'',cantidad:1,cada:1,u:'u'}]}:i)}));}
  function updIng(cat,id,idx,k,v){setCfg(c=>({...c,[cat]:(c[cat]||[]).map(i=>{if(i.id!==id)return i;const ing=(i.ingredientes||[]).slice();ing[idx]={...ing[idx],[k]:v};return {...i,ingredientes:ing};})}));}
  function delIng(cat,id,idx){setCfg(c=>({...c,[cat]:(c[cat]||[]).map(i=>{if(i.id!==id)return i;return {...i,ingredientes:(i.ingredientes||[]).filter((_,x)=>x!==idx)};})}));}
  const TOPE_DEF={ninos:{tn:8,ta:4},adultos:{tn:4,ta:20},snacks:{tn:0,ta:0},postres:{tn:0,ta:0},bebidas:{tn:0.75,ta:0.85}};
  const topeDe=cat=>Object.assign({tn:0,ta:0},TOPE_DEF[cat]||{},((cfg.topes||{})[cat]||{}));
  function updTope(cat,k,v){setCfg(c=>{const tp=Object.assign({},c.topes||{});tp[cat]=Object.assign({tn:0,ta:0},TOPE_DEF[cat]||{},tp[cat]||{},{[k]:v===''?0:+v});return {...c,topes:tp};});}
  const AJ_DEF={veranoBeb:30,inviernoBeb:20,comidaFuerte:15,tardeSalado:30,tardeDulce:25};
  const aj=Object.assign({},AJ_DEF,cfg.ajustes||{});
  function updAj(k,v){setCfg(c=>({...c,ajustes:Object.assign({},AJ_DEF,c.ajustes||{},{[k]:v===''?'':+v})}));}
  function agregar(cat){
    const n=nuevo[cat]||{}; if(!n.nombre||!n.nombre.trim())return;
    const dr=DEF_RATE[cat]||{pn:1,pa:1,u:'u'};
    const item={id:cat+'-'+Math.floor(Math.random()*1e6),nombre:n.nombre.trim(),emoji:(n.emoji||'🍽️').trim(),pn:dr.pn,pa:dr.pa,u:dr.u};
    if(cat==='snacks'){item.cada=50;item.u='bolsa';}
    if(cat==='bebidas'){item.refL=1;item.refP=1;item.refH=3;item.envase=2.25;}
    setCfg(c=>({...c,[cat]:[...(c[cat]||[]),item]}));
    setNuevo(x=>({...x,[cat]:{nombre:'',emoji:''}}));
  }
  return(
    <div className="fade-in" style={{maxWidth:700,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>🍽️ Menú Interactivo</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:12}}>Administrá el cálculo de comida y las opciones que ve el papá.</p>
      <button onClick={()=>{
        const cats2=[['ninos','🧒 Niños'],['adultos','🧑 Adultos'],['snacks','🍿 Snacks'],['postres','🎂 Torta y Postres'],['bebidas','🥤 Bebidas']];
        let filas='';
        cats2.forEach(([c,l])=>{
          const its=(cfg[c]||[]);
          if(!its.length)return;
          filas+='<tr><td colspan="4" class="sec">'+l+'</td></tr>';
          its.forEach(it=>{ filas+='<tr><td>'+(it.emoji||'')+' '+(it.nombre||'')+'</td><td></td><td></td><td></td></tr>'; });
        });
        // filas en blanco extra
        for(let i=0;i<4;i++) filas+='<tr><td>&nbsp;</td><td></td><td></td><td></td></tr>';
        const html='<html><head><meta charset="utf-8"><title>Planilla de consumo</title><style>'+
          'body{font-family:Arial,sans-serif;padding:22px;color:#0f172a}'+
          'h1{font-size:19px;margin:0 0 2px}.sub{font-size:12px;color:#555;margin-bottom:12px}'+
          '.datos{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:13px}'+
          '.datos td{border:1px solid #cbd5e1;padding:7px 8px}'+
          '.datos .lbl{background:#f1f5f9;font-weight:bold;width:120px}'+
          'table.t{width:100%;border-collapse:collapse;font-size:13px}'+
          'table.t th{background:#0ea5e9;color:#fff;padding:8px;border:1px solid #0ea5e9;text-align:left}'+
          'table.t td{border:1px solid #cbd5e1;padding:9px 8px;height:26px}'+
          'table.t td.sec{background:#ede9fe;font-weight:bold;color:#5b21b6}'+
          '.tip{font-size:11px;color:#555;margin-top:12px}'+
          '</style></head><body>'+
          '<h1>📋 Planilla de consumo del evento</h1>'+
          '<div class="sub">Empleados: completá los datos y, por cada artículo, cuánto se LLEVÓ a la mesa y cuánto SOBRÓ.</div>'+
          '<table class="datos"><tr><td class="lbl">Evento</td><td></td><td class="lbl">Fecha</td><td></td></tr>'+
          '<tr><td class="lbl">Cant. niños</td><td></td><td class="lbl">Cant. adultos</td><td></td></tr>'+
          '<tr><td class="lbl">Horario</td><td>☐ Mediodía  ☐ Tarde  ☐ Noche</td><td class="lbl">Duración</td><td>____ hs</td></tr></table>'+
          '<table class="t"><tr><th>Artículo</th><th>Cantidad llevada</th><th>Cuánto sobró</th><th>Observaciones</th></tr>'+filas+'</table>'+
          '<div class="tip">💡 Tip: anotar en la misma unidad (docena, unidad, kg, litros, bidón…). Si falta un artículo, agregalo en las filas en blanco.</div>'+
          '</body></html>';
        const w=window.open('','_blank');
        if(!w){alert('Permití las ventanas emergentes para abrir la planilla.');return;}
        w.document.write(html);w.document.close();w.focus();
        setTimeout(()=>{try{w.print();}catch(e){}},500);
      }} style={{...S.btn,background:'#0ea5e9',color:'white',padding:'10px 16px',fontSize:13,fontWeight:900,marginBottom:16}}>🖨️ Planilla para empleados (imprimir / PDF)</button>
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msg}</div>}

      <div style={{...S.card,marginBottom:14}}>
        <h3 style={{fontWeight:900,fontSize:14,marginBottom:4}}>🤖 Prompt de cálculo de comida</h3>
        <p style={{fontSize:11,color:'#64748b',marginBottom:10}}>Instrucción para calcular las cantidades según invitados, horas y estación.</p>
        <textarea value={cfg.prompt||''} onChange={e=>setCfg(c=>({...c,prompt:e.target.value}))} rows={5} style={{...S.input,resize:'vertical',fontFamily:'inherit'}} placeholder="Ej: Calculá las cantidades considerando estación, horas de fiesta y tipo de menú. Niños consumen más dulce que salado..."/>
      </div>


      <div style={{...S.card,marginBottom:14}}>
        <h3 style={{fontWeight:900,fontSize:14,marginBottom:4}}>⚙️ Ajustes automáticos (%)</h3>
        <p style={{fontSize:11,color:'#64748b',marginBottom:10}}>Según la época y el horario, el sistema suma o resta solo. Editá los porcentajes a tu gusto.</p>
        {[['veranoBeb','☀️ Verano: más bebida','+'],['inviernoBeb','❄️ Invierno: menos bebida','−'],['comidaFuerte','🌞🌙 Mediodía/Noche: más comida','+'],['tardeSalado','🧁 Tarde: menos salado','−'],['tardeDulce','🍰 Tarde: más dulce/torta','+']].map(([k,l,sg])=>(
          <div key={k} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
            <span style={{fontSize:12,fontWeight:700,color:'#334155',flex:1}}>{l}</span>
            <span style={{fontSize:13,fontWeight:900,color:sg==='+'?'#16a34a':'#dc2626'}}>{sg}</span>
            <input type="number" step="any" min="0" value={aj[k]} onChange={e=>updAj(k,e.target.value)} style={{...S.input,width:64,padding:'6px 8px',fontSize:13,textAlign:'center'}}/>
            <span style={{fontSize:12,color:'#64748b'}}>%</span>
          </div>
        ))}
      </div>

      {cats.map(([k,lbl])=>(
        <div key={k} style={{...S.card,marginBottom:14}}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:4}}>{lbl}</h3>
          <div style={{fontSize:10,color:'#94a3b8',marginBottom:8}}>{k==='ninos'?'Cuántas unidades come 1 NIÑO de cada comida (esta comida es solo para niños).':k==='adultos'?'Cuántas unidades come 1 ADULTO de cada comida (solo para adultos).':k==='snacks'?'Poné el TAMAÑO de la bolsa (ej: bolsa 500g, bolsa 1kg) y cada cuántas personas alcanza 1. Ej: 1 bolsa 500g cada 50 personas.':k==='bebidas'?'Regla por bebida: [X] L alcanzan para [Y] personas en [Z] hs. El sistema saca el consumo por persona/hora y lo aplica a tu evento. "env" = litros por envase (botella 2L, bidón 5L; 0 = solo litros).':k==='postres'?'Cada postre: elegí "x persona" (cantidad por persona; la unidad puede ser g, kg, porción…) o "1 cada X" (ej: 1 tarta cada 25 personas).':'Cuánto consume 1 niño 👶 y 1 adulto 🧑 (lo comen los dos).'} {(k!=='snacks'&&k!=='bebidas')&&<React.Fragment>La casilla del medio es la <b>unidad</b> (porción, u, g, kg…).</React.Fragment>}</div>
          {(k==='ninos'||k==='adultos'||k==='postres')&&<div style={{fontSize:10,color:'#0369a1',marginBottom:8,background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:8,padding:'6px 8px'}}>📦 <b>Cómo sale en la lista de compras</b>: elegí en el desplegable → <b>por unidad</b>, <b>por docena</b>, <b>de a 8</b> (pizza/tarta), o <b>personalizado</b> (ej: nuggets por <b>kg</b> → rinde 50; <b>pernil</b> → rinde 20, con porción 1 por adulto). "Automático" usa la unidad (u→docena, porción→de a 8).</div>}
          {(k==='ninos'||k==='adultos'||k==='postres')&&<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:8,padding:'6px 8px',flexWrap:'wrap'}}>

            {k!=='ninos'&&<span style={{fontSize:11}}>🧑</span>}

function PapaLogin({setVista,eventos,setPapaSesion,setInvEvId,aviso,adminSesion,sucAct}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [showP,setShowP]=useState(false);
  function sub(e){
    e.preventDefault();
    const uu=u.trim().toLowerCase(), pp=p.trim().toLowerCase();
    // Buscar en la lista local (usuario y clave sin distinguir mayúsculas)
    let ev=eventos.find(x=>x.user&&x.user.toLowerCase()===uu&&x.pass&&x.pass.toLowerCase()===pp);
    // Si no, probar con el link ?papa= (credenciales codificadas, formato viejo)
    if(!ev){
      try{
        const papaParam=new URLSearchParams(window.location.search).get('papa');
        if(papaParam){const d=JSON.parse(atob(papaParam));if(d.user&&d.user.toLowerCase()===uu&&d.pass&&String(d.pass).toLowerCase()===pp)ev=d;}
      }catch(ex){}
    }
    if(!ev){setErr('Datos incorrectos. Verificá usuario y contraseña.');return;}
    if(estaVencido(ev)){setErr('El acceso para este evento ha vencido.');return;}
    setPapaSesion(ev);setInvEvId(ev.id);setVista('papa-creador');
  }
  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'80vh',padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,boxShadow:'0 8px 32px rgba(0,0,0,0.10)'}}>
        <div style={{textAlign:'center',marginBottom:22}}><div style={{fontSize:48}}>🎂</div>
          <h2 style={{fontWeight:900,fontSize:20,marginTop:8}}>Acceso para Padres</h2>
          <p style={{color:'#64748b',fontSize:12,marginTop:4}}>Personalizá tu invitación digital</p>
        </div>
        {adminSesion&&(
          <div style={{background:'#0f172a',borderRadius:12,padding:12,marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:800,color:'#fbbf24',marginBottom:8}}>👑 Sos admin — entrá sin contraseña:</div>
            <select onChange={e=>{const ev=eventos.find(x=>x.id===e.target.value);if(ev){setPapaSesion({...ev,optinWA:true});setInvEvId(ev.id);setVista('papa-creador');}}} defaultValue="" style={{...S.input,color:'#1e293b'}}>
              <option value="">Elegí un evento…</option>
              {eventos.filter(ev=>String(ev.id).indexOf('__')!==0&&(!sucAct||ev.sucId===sucAct.id)).map(ev=><option key={ev.id} value={ev.id}>{ev.nombre} · {ev.dia}/{ev.mes}/{ev.anio}</option>)}
            </select>
          </div>
        )}
        {(err||aviso)&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:12,fontSize:12,marginBottom:12}}>{err||aviso}</div>}
        <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
          <input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} placeholder="Usuario" autoComplete="username" required/>
          <div style={{position:'relative'}}>
            <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="Contraseña" autoComplete="current-password" required/>
            <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8'}}>
              {showP?'🙈':'👁️'}
            </button>
          </div>
          <button style={{...S.btn,background:'#f97316',color:'white',padding:14,fontSize:14}}>Ingresar</button>
        </form>
      </div>
    </div>
  );
}

  const fotoRef=useRef();

  function guardarFoto(src){
    const baseN=((nombre||'fiesta').toLowerCase().replace(/[^a-z0-9]/g,'')||'fiesta')+'-'+Math.floor(performance.now());
    fetch(src).then(r=>r.blob()).then(blob=>{
      const t=blob.type||'';
      const ext=t.includes('video')||tipo==='video'?'mp4':(t.includes('png')?'png':'jpg');
      const fname=(tipo==='video'?'video-':'imagen-')+baseN+'.'+ext;
      const file=new File([blob],fname,{type:blob.type||(tipo==='video'?'video/mp4':'image/png')});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'Imagen',text:'¡Mirá la imagen!'}).catch(()=>{});
      }else{
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
      }
    }).catch(()=>alert('No se pudo preparar la imagen.'));
  }

        navigator.share({files:[file],title:'Invitación',text:'¡Mirá la invitación!'}).catch(()=>{});

                <button onClick={()=>guardarFoto(src)} style={{...S.btn,background:'#f1f5f9',color:'#334155',padding:'9px',fontSize:12,fontWeight:800}}>⬇️ Descargar</button>

                <video src={src} controls playsInline style={{width:'100%',borderRadius:12,background:'#000',maxHeight:'60vh'}}></video>

          {/* Confirmación: tarjeta lista + opciones (ver / video) */}
          {tipo==='imagen'&&selIdx===null&&(

          {tipo==='imagen'&&selIdx!==null&&resultados[selIdx]&&(

              {videoFreeOk
                ? <React.Fragment>

              {onVerTarjeta&&<button onClick={onVerTarjeta} style={{...S.btn,width:'100%',background:'#7c3aed',color:'white',padding:'14px',fontSize:15,fontWeight:900,marginBottom:8}}>👁 Ver mi tarjeta</button>}
              {onVolverPanel&&!videoUrl&&!(iaVideos&&iaVideos.length)&&<button onClick={onVolverPanel} style={{...S.btn,width:'100%',background:'#16a34a',color:'white',padding:'13px',fontSize:14,fontWeight:900,marginBottom:8,boxShadow:'0 4px 12px rgba(22,163,74,.3)'}}>💾 Guardar y volver al panel de edición</button>}
              {videoFreeOk&&onGenerarVideo&&<button onClick={onGenerarVideo} style={{...S.btn,width:'100%',background:'#e11d48',color:'white',padding:'13px',fontSize:14,fontWeight:900}}>{videoUrl?'🎬 Generar otro video (gratis)':'🎬 Generar mi video (gratis)'}</button>}
            </div>
          )}
          {tipo==='imagen'&&onDescartar&&(

          </div>
          {onBorrar&&(
            <button onClick={(e)=>{e.stopPropagation();if(window.confirm('¿Borrar esta imagen?')){onBorrar(zoom.i);setZoom(null);}}} style={{marginTop:12,background:'rgba(220,38,38,.85)',border:'none',borderRadius:10,color:'white',fontSize:13,fontWeight:800,cursor:'pointer',padding:'9px 18px'}}>🗑 Borrar esta imagen</button>
          )}
          <button onClick={(e)=>{e.stopPropagation();setZoom(null);}} style={{marginTop:10,background:'none',border:'none',color:'rgba(255,255,255,.8)',fontSize:14,fontWeight:700,cursor:'pointer',textDecoration:'underline'}}>Cerrar</button>
        </div>
      )}

      {/* Botón FLOTANTE: ver la tarjeta (acceso rápido al elegir una imagen) */}
      {tipo==='imagen'&&onVerTarjeta&&selIdx!==null&&resultados[selIdx]&&!zoom&&!fabClosed&&(
        <div style={{position:'fixed',left:0,right:0,bottom:14,zIndex:900,display:'flex',justifyContent:'center',padding:'0 12px',pointerEvents:'none'}}>
          <div style={{pointerEvents:'auto',display:'flex',alignItems:'center',gap:4,background:'linear-gradient(135deg,#7c3aed,#a855f7)',borderRadius:99,padding:'4px 4px 4px 6px',boxShadow:'0 10px 30px rgba(0,0,0,.35)',maxWidth:420,width:'100%'}}>

              <span style={{fontSize:20}}>👁</span> Ver mi tarjeta

            <button onClick={()=>setFabClosed(true)} title="Cerrar" style={{flexShrink:0,background:'rgba(255,255,255,.25)',border:'none',color:'white',borderRadius:'50%',width:38,height:38,fontSize:17,cursor:'pointer'}}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PAGO MERCADOPAGO (simulado) ─────────────────────────── */
function PagoMP({tipo, precio, nombre, tematica, onPagado, onCancelar}){
  const [paso,setPaso]=useState('resumen'); // resumen | pagando | aprobado
  useEffect(()=>{
    if(paso==='pagando'){
      // Simula redirección y vuelta de MP en 3 segundos
      const t=setTimeout(()=>setPaso('aprobado'),3000);
      return()=>clearTimeout(t);
    }
  },[paso]);
  if(paso==='resumen') return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:400,width:'100%',padding:28}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:44,marginBottom:8}}>{tipo==='imagen'?'🖼️':'🎬'}</div>
          <h2 style={{fontWeight:900,fontSize:19}}>Generar {tipo==='imagen'?'Imagen':'Video'} con IA</h2>
          <p style={{fontSize:12,color:'#64748b',marginTop:4}}>Personalizado para <b>{nombre}</b> · Temática <b>{tematica}</b></p>
        </div>
        <div style={{background:'#f8fafc',borderRadius:14,padding:16,marginBottom:18,border:'1px solid #e2e8f0'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:13,color:'#64748b'}}>Generación IA {tipo==='imagen'?'imagen':'video'}</span>
            <span style={{fontSize:18,fontWeight:900,color:'#1e293b'}}>${precio.toLocaleString('es-AR')}</span>
          </div>
          {tipo==='imagen'&&<p style={{fontSize:11,color:'#94a3b8'}}>• Imagen en formato 9:16 · Alta resolución<br/>• Sin modificación de rostro<br/>• Lista en segundos</p>}
          {tipo==='video'&&<p style={{fontSize:11,color:'#94a3b8'}}>• Video animado 5 segundos<br/>• Personaje del entorno elegido<br/>• Descargable en MP4</p>}
        </div>
        <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,padding:12,marginBottom:16,fontSize:11,color:'#92400e'}}>
          <b>⚠️ Aviso:</b> Vas a ser redirigido a MercadoPago para completar el pago de forma segura. Una vez aprobado, volvés automáticamente a generar tu {tipo==='imagen'?'imagen':'video'}.
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancelar} style={{...S.btn,flex:1,background:'#f1f5f9',color:'#64748b',padding:'12px'}}>Cancelar</button>
          <button onClick={()=>setPaso('pagando')} style={{...S.btn,flex:2,background:'linear-gradient(135deg,#009ee3,#0070ba)',color:'white',padding:'12px',fontSize:14}}>
            💳 Pagar con MercadoPago
          </button>
        </div>
      </div>
    </div>
  );
  if(paso==='pagando') return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,textAlign:'center'}}>
        <div style={{width:60,height:60,borderRadius:'50%',background:'linear-gradient(135deg,#009ee3,#0070ba)',margin:'0 auto 16px',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:28}} className="spin">⚙️</span>
        </div>
        <h3 style={{fontWeight:900,fontSize:16,marginBottom:8}}>Procesando pago en MercadoPago...</h3>
        <p style={{fontSize:12,color:'#64748b'}}>No cierres esta ventana. Estamos verificando tu pago.</p>
        <div style={{marginTop:16,height:4,background:'#e2e8f0',borderRadius:99,overflow:'hidden'}}>
          <div style={{height:'100%',background:'#009ee3',borderRadius:99,animation:'progreso 3s linear forwards'}}></div>
        </div>
        <style>{`@keyframes progreso{from{width:0%}to{width:100%}}`}</style>
      </div>
    </div>
  );
  if(paso==='aprobado') return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:380,width:'100%',padding:28,textAlign:'center'}}>
        <div style={{width:64,height:64,borderRadius:'50%',background:'#dcfce7',margin:'0 auto 14px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32}}>✅</div>
        <h3 style={{fontWeight:900,fontSize:18,color:'#16a34a',marginBottom:6}}>¡Pago Aprobado!</h3>
        <p style={{fontSize:12,color:'#64748b',marginBottom:20}}>Tu pago fue procesado correctamente. Ahora vamos a generar tu {tipo==='imagen'?'imagen':'video'} con IA.</p>
        <button onClick={onPagado} style={{...S.btn,background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white',width:'100%',padding:'13px',fontSize:14}}>
          🤖 Generar {tipo==='imagen'?'Imagen':'Video'} ahora
        </button>
      </div>
    </div>
  );
  return null;
}

/* ── GENERADOR IA ─────────────────────────────────────────── */
function GeneradorIA({tipo,nombre,tematica,prompt,prompt2,promptComposite,frase,modelA,modelB,cantidad,fotoNino,personaje,personajeNombre,genero,salon,edad,startImage,onResultado,onCerrar}){
  const [paso,setPaso]=useState('generando'); // generando | listo | error
  const [progreso,setProgreso]=useState(0);
  const [resultados,setResultados]=useState([]);

  async function grabarAgrad(){

  function calcularMenu(){
    const a=+menuAdultos||0;const n=+menuNinos||0;const t=a+n;
    if(!t)return alert('Ingresá la cantidad de adultos y niños.');
    const h=+menuHoras||4;
    const cfg=iaConfig.menuConfig||{};
    // Ajustes automáticos (porcentajes editables desde el admin). Valores por defecto si no se configuró.
    const AJ=Object.assign({veranoBeb:30,inviernoBeb:20,comidaFuerte:15,tardeSalado:30,tardeDulce:25},(cfg&&cfg.ajustes)||{});
    const esSalado=cat=>(cat==='ninos'||cat==='adultos'||cat==='snacks');
    // Bebida según estación (verano se toma más; invierno menos).
    const bMult=menuEstacion==='Verano'?(1+(+AJ.veranoBeb||0)/100):menuEstacion==='Invierno'?(1-(+AJ.inviernoBeb||0)/100):1.0;
    const hMult=h<=4?1.0:h===5?1.15:1.3; // base = 3 a 4 hs (igual); 5 hs +15%, 6+ +30%
    const DEFR={ninos:{pn:4,pa:1,u:'u'},adultos:{pn:1,pa:6,u:'porc.'},snacks:{pn:0.02,pa:0.02,u:'bolsa'},postres:{pn:1,pa:1,u:'porción'},bebidas:{pn:0.4,pa:0.4,u:'L'},descartables:{pn:1,pa:1,u:'u'}};
    // Multiplicador por franja: mediodía/noche = comida fuerte (se come más); tarde (merienda) = menos salado y más dulce.
    function frMult(cat){
      const comida=(cat==='ninos'||cat==='adultos'); // los snacks van igual siempre
      if(menuFranja==='tarde'){ if(cat==='postres')return 1+(+AJ.tardeDulce||0)/100; if(comida)return 1-(+AJ.tardeSalado||0)/100; return 1; }
      if(comida)return 1+(+AJ.comidaFuerte||0)/100; // mediodía / noche
      return 1;
    }
    setMenuGen(true);
    setTimeout(()=>{
      const results=[];
      const shopping=[];
      // Tope por persona por categoría: máximo que come/toma 1 persona. Si eligen varias cosas, ese tope se REPARTE (proporcional). 0 = sin tope.
      const TOPE_DEF={ninos:{tn:8,ta:4},adultos:{tn:4,ta:20},snacks:{tn:0,ta:0},postres:{tn:0,ta:0},bebidas:{tn:0.75,ta:0.85}};
      const topeDe=cat=>Object.assign({tn:0,ta:0},TOPE_DEF[cat]||{},((cfg.topes||{})[cat]||{}));
      function addItems(cat){
        const items=cfg[cat]||[];
        const sel=(menuSel[cat]||{});
        const selItems=(cat==='descartables')?items.filter(i=>i.verPapa!==false):items.filter(i=>sel[i.id]&&i.verPapa!==false);
        if(!selItems.length)return;
        const dr=DEFR[cat]||{pn:1,pa:1,u:'u'};
        const fm=frMult(cat);
        const season=(cat==='bebidas')?bMult:1;
        // SNACKS: modo "1 unidad cada X personas" (entero, fácil).
        if(cat==='snacks'){
          selItems.forEach(item=>{
            const cada=(item.cada!=null&&item.cada!=='')?+item.cada:50;
            const unit=(item.u!=null&&item.u!=='')?item.u:'bolsa';
            const total=cada>0?Math.ceil((n+a)/cada*hMult):0;
            results.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:unit,cat});
            shopping.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:unit});
          });
          return;
        }
        // Reparto por tope: si la suma de lo elegido supera lo que come 1 persona, se achica proporcional.
        const cap=topeDe(cat);
        const sumN=selItems.reduce((s,i)=>s+((i.pn!=null&&i.pn!=='')?+i.pn:dr.pn),0);
        const sumA=selItems.reduce((s,i)=>s+((i.pa!=null&&i.pa!=='')?+i.pa:dr.pa),0);
        const scN=(cap.tn>0&&sumN>cap.tn)?cap.tn/sumN:1;
        const scA=(cap.ta>0&&sumA>cap.ta)?cap.ta/sumA:1;
        selItems.forEach(item=>{
          const pn=((item.pn!=null&&item.pn!=='')?+item.pn:dr.pn)*scN;
          const pa=((item.pa!=null&&item.pa!=='')?+item.pa:dr.pa)*scA;
          const unit=(item.u!=null&&item.u!=='')?item.u:dr.u;
          // BEBIDAS: calcula los litros y los convierte en CANTIDAD DE BOTELLAS del envase elegido.
          if(cat==='bebidas'){
            // Regla: "refL litros alcanzan para refP personas en refH horas" -> consumo por persona/hora.
            const refL=(item.refL!=null&&item.refL!=='')?+item.refL:1;      // litros de referencia
            const refP=(item.refP!=null&&item.refP!=='')?+item.refP:1;      // para cuántas personas
            const refH=(item.refH!=null&&item.refH!=='')?+item.refH:3;      // en cuántas horas
            const tasa=(refP>0&&refH>0)?(refL/(refP*refH)):0;               // L por persona por hora
            const litros=tasa*(n+a)*h*season;                              // h = horas reales del evento
            const envase=(item.envase!=null&&item.envase!=='')?+item.envase:0;
            const litE=Math.ceil(litros);
            const bot=envase>0?Math.ceil(litros/envase):0;
            const u=envase>0?('L  ('+bot+' de '+envase+' L)'):'L';
            results.push({emoji:item.emoji,nombre:item.nombre,cant:litE,u:u,cat});
            shopping.push({emoji:item.emoji,nombre:item.nombre,cant:litE,u:u});
            return;
          }
          // Postre en modo "1 cada X personas" (ej: 1 tarta para 25).
          if(cat==='postres'&&item.modo==='cada'){
            const cada=(item.cada!=null&&item.cada!=='')?+item.cada:25;
            const totC=cada>0?Math.ceil((n+a)/cada*hMult*fm):0;
            results.push({emoji:item.emoji,nombre:item.nombre,cant:totC,u:unit,cat});
            shopping.push({emoji:item.emoji,nombre:item.nombre,cant:totC,u:unit});
            return;
          }
          // Comida de niños la comen SOLO niños; comida de adultos SOLO adultos.
          const aporteN=(cat==='adultos')?0:(n*pn);
          const aporteA=(cat==='ninos')?0:(a*pa);
          const consumo=(aporteN+aporteA)*hMult*fm*season; // total de porciones/unidades que se comen
          // Cómo sale en la lista de compras, según lo elegido en el desplegable de cada comida.
          const modo=item.compra||'auto';
          let pack=1,compraU=unit;
          if(modo==='u'){pack=1;compraU='u';}
          else if(modo==='docena'){pack=12;compraU='docena';}
          else if(modo==='media'){pack=6;compraU='½ doc.';}
          else if(modo==='porc8'){pack=8;compraU=item.compraU||'de 8 porc.';}
          else if(modo==='custom'){pack=(item.pack!=null&&item.pack>0)?+item.pack:1;compraU=item.compraU||'u';}
          else { const uu=(unit||'').toLowerCase(); if(uu==='u'||uu==='unidad'||uu==='unidades'){pack=12;compraU='docena';} else if(uu.indexOf('porc')===0){pack=8;compraU='de 8 porc.';} else {pack=1;compraU=unit;} }
          const total=Math.ceil(consumo/(pack>0?pack:1));
          const u2=compraU||unit;
          results.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:u2,cat});
          shopping.push({emoji:item.emoji,nombre:item.nombre,cant:total,u:u2});
          // INSUMOS/INGREDIENTES de esta comida: "cantidad cada X unidades del producto". Se suman a la lista.
          (item.ingredientes||[]).forEach(g=>{
            const cadaG=(g.cada!=null&&g.cada!=='')?+g.cada:1;
            const cantG=(g.cantidad!=null&&g.cantidad!=='')?+g.cantidad:0;
            if(!cantG||cadaG<=0||!g.nombre)return;
            const tg=Math.ceil(consumo/cadaG*cantG);
            results.push({emoji:'🧂',nombre:g.nombre+' ('+item.nombre+')',cant:tg,u:g.u||'u',cat:'insumos'});
            shopping.push({emoji:'🧂',nombre:g.nombre,cant:tg,u:g.u||'u'});
          });
        });
      }
      addItems('ninos');
      addItems('adultos');
      addItems('snacks');
      addItems('postres');
      addItems('descartables');
      addItems('bebidas');
      setMenuResult({items:results,shopping,adultos:a,ninos:n,horas:h,estacion:menuEstacion,franja:menuFranja});
      setMenuGen(false);
    },2500);
  }

FreeDisponible:false,videoPagado:true,usarVideo:true}:e));return n;});setGenActivo(null);}}} onCerrar={()=>{setGenActivo(null);setVideoStartImg(null);}}/>}

/* ── PASE DE FOTOS (mini-video: intro → fotos en marco instantánea con logo → cierre) ── */
function PaseFotos({fotos,col,logo,nombre,fraseIni,fraseFin,portada,portadaFin,portadaColor,portadaFinColor,fondo,fotoNino,onEnd}){
  const base=(fotos||[]).filter(Boolean);
  // Secuencia (por regla): intro (frase) → foto del niño/personaje → fotos del cumple → cierre (frase)
  const slides=[];
  if(base.length||fotoNino){
    const bgIni=portada||fotoNino||(base[0]?albUrl(base[0]):'');
    const bgFin=portadaFin||portada||(base.length?albUrl(base[base.length-1]):'')||fotoNino;
    slides.push({tipo:'intro',src:bgIni,color:portadaColor||'',texto:(fraseIni&&fraseIni.trim())||('¡Hoy festejamos a '+(nombre||'')+'!')});
    if(fotoNino && albUrl(bgIni)!==fotoNino) slides.push({tipo:'foto',src:fotoNino});
    base.forEach(s=>slides.push({tipo:'foto',src:s}));
    slides.push({tipo:'cierre',src:bgFin,color:portadaFinColor||'',texto:(fraseFin&&fraseFin.trim())||'¡Gracias por acompañarnos! 💕'});
  }
  const [idx,setIdx]=React.useState(0);
  const DUR_FOTO=4000;   // fotos: 4 segundos
  const DUR_FRASE=7000;  // pantallas de frase (inicio y cierre): 7 segundos
  const DUR=DUR_FOTO;
  const slideDur=(j)=>{const t=slides[j]&&slides[j].tipo;return (t==='intro'||t==='cierre')?DUR_FRASE:DUR_FOTO;};
  const finRef=React.useRef(false);
  // Pasa UNA vez y se detiene en la última (cierre). La última foto se muestra con música,
  // y recién después de su tiempo se corta la música (onEnd).
  React.useEffect(()=>{
    if(slides.length<2)return;
    const d=slideDur(idx);
    if(idx>=slides.length-1){ const t=setTimeout(()=>{ if(!finRef.current){finRef.current=true; if(onEnd)onEnd();} }, d+800); return ()=>clearTimeout(t); }
    const t=setTimeout(()=>setIdx(i=>i+1),d);
    return ()=>clearTimeout(t);
  },[idx,slides.length]);
  if(!slides.length)return null;
  const Logo=logo?(<img src={logo} alt="" style={{position:'absolute',top:8,right:8,width:70,height:70,borderRadius:'50%',objectFit:'cover',border:'3px solid rgba(255,255,255,.95)',boxShadow:'0 3px 12px rgba(0,0,0,.5)',opacity:.97,zIndex:8}}/>):null;
  return (
    <div style={{padding:'8px 0 4px',background:'transparent'}}>
      <div style={{position:'relative',width:'100%',aspectRatio:'1',overflow:'hidden',background:fondo?'transparent':'#0f172a'}}>
        {slides.map((sl,i)=>{
          const on=i===idx;
          if(sl.tipo==='foto'){
            return (
              <div key={i} style={{position:'absolute',inset:0,opacity:on?1:0,transition:'opacity 1.1s ease-in-out',display:'flex',alignItems:'center',justifyContent:'center',background:fondo?'transparent':'#0f172a'}}>
                <div style={{position:'relative',background:'#fff',padding:'10px 10px 32px',borderRadius:4,boxShadow:'0 10px 30px rgba(0,0,0,.55)',transform:'rotate(-2deg)',width:fondo?'82%':'90%'}}>
                  <div style={{width:'100%',aspectRatio:'1',overflow:'hidden',background:'#000'}}>
                    <img src={albUrl(sl.src)} alt="" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:albPos(sl.src)+'% '+albPos(sl.src)+'%',filter:'contrast(1.08) saturate(1.14) brightness(1.04)',animation:on?((i%2?'kenburns2':'kenburns')+' '+(DUR+700)+'ms ease-out both'):'none'}}/>
                  </div>
                  {nombre&&<div style={{position:'absolute',bottom:8,left:0,right:0,textAlign:'center',fontSize:15,color:'#475569',fontWeight:700,fontStyle:'italic'}}>{nombre} 🎉</div>}
                </div>
                {Logo}
              </div>
            );
          }
          const claro=sl.color&&(sl.color.toLowerCase()==='#ffffff'||sl.color.toLowerCase()==='#fff'||sl.color.toLowerCase()==='#facc15');
          // Inicio y cierre: también dentro del marquito blanco, con la frase encima.
          return (
            <div key={i} style={{position:'absolute',inset:0,opacity:on?1:0,transition:'opacity 1.1s ease-in-out',display:'flex',alignItems:'center',justifyContent:'center',background:fondo?'transparent':'#0f172a'}}>
              <div style={{position:'relative',background:'#fff',padding:'10px 10px 32px',borderRadius:4,boxShadow:'0 10px 30px rgba(0,0,0,.55)',transform:'rotate(-2deg)',width:fondo?'82%':'90%'}}>
                <div style={{position:'relative',width:'100%',aspectRatio:'1',overflow:'hidden',background:sl.color||'#000'}}>
                  {!sl.color&&<img src={albUrl(sl.src)} alt="" style={{width:'105%',height:'105%',marginLeft:'-2.5%',marginTop:'-2.5%',objectFit:'cover',objectPosition:albPos(sl.src)+'% '+albPos(sl.src)+'%',filter:'brightness(.7) blur(1.5px)',animation:on?((i%2?'kenburns2':'kenburns')+' '+(DUR_FRASE+800)+'ms ease-out both'):'none'}}/>}
                  <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',padding:'12px',background:sl.color?'transparent':'radial-gradient(circle, rgba(0,0,0,.35) 0%, rgba(0,0,0,.55) 100%)'}}>
                    <div style={{textAlign:'center',color:claro?'#0f172a':'#fff',fontSize:21,fontWeight:900,textShadow:claro?'none':'0 2px 6px rgba(0,0,0,1), 0 0 18px rgba(0,0,0,.9)',lineHeight:1.25}}>{sl.texto}</div>
                  </div>
                </div>
              </div>
              {Logo}
            </div>
          );
        })}
        {slides.length>1&&(
          <div style={{position:'absolute',bottom:10,left:0,right:0,display:'flex',justifyContent:'center',gap:5,zIndex:7}}>
            {slides.map((_,i)=>(<span key={i} style={{width:i===idx?18:6,height:6,borderRadius:99,background:i===idx?col:'rgba(255,255,255,.6)',transition:'all .3s',boxShadow:'0 1px 3px rgba(0,0,0,.4)'}}/>))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Generadores comunes del recuerdo (los usan la mamá Y el invitado) ── */
function _cargarImg(url){return new Promise(res=>{ let done=false; const fin=v=>{if(!done){done=true;res(v);}}; setTimeout(()=>fin(null),9000); fetch(url).then(r=>r.blob()).then(b=>{const fr=new FileReader();fr.onload=()=>{const im=new Image();im.onload=()=>fin(im);im.onerror=()=>fin(null);im.src=fr.result;};fr.onerror=()=>fin(null);fr.readAsDataURL(b);}).catch(()=>{const im=new Image();im.crossOrigin='anonymous';im.onload=()=>fin(im);im.onerror=()=>fin(null);im.src=url;}); });}
// Álbum PDF (A4 horizontal). opts: {fotos, nombre, fondoUrl, portUrl}
async function genAlbumPDF(opts){
  const fotos=(opts.fotos||[]).filter(Boolean); const nombre=opts.nombre||'';
  if(!(window.jspdf&&window.jspdf.jsPDF)){alert('La librería de PDF aún se está cargando, probá de nuevo.');return;}
  const W=297,H=210,PPM=6,CW=Math.round(W*PPM),CH=Math.round(H*PPM);
  const LAYOUTS={1:[[148,104,128,-4]],2:[[90,104,102,-7],[206,103,98,6]],3:[[74,82,80,-8],[164,116,90,6],[226,82,74,-3]],4:[[72,68,78,-6],[218,66,80,6],[74,136,76,5],[216,136,82,-5]]};
  const {jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const fondoImg=opts.fondoUrl?await _cargarImg(opts.fondoUrl):null;
  function dibFondo(ctx){ if(fondoImg){const cr=CW/CH,ir=fondoImg.width/fondoImg.height;let sw,sh,sx,sy;if(ir>cr){sh=fondoImg.height;sw=sh*cr;sx=(fondoImg.width-sw)/2;sy=0;}else{sw=fondoImg.width;sh=sw/cr;sx=0;sy=(fondoImg.height-sh)/2;}ctx.drawImage(fondoImg,sx,sy,sw,sh,0,0,CW,CH);} else {ctx.fillStyle='#f7f7fb';ctx.fillRect(0,0,CW,CH);} }
  function dibPolaroid(ctx,im,cxmm,cymm,wmm,ang,caption){ const cardW=wmm*PPM,bord=cardW*0.05,photo=cardW-2*bord,bottom=cardW*0.20,cardH=bord+photo+bottom; ctx.save();ctx.translate(cxmm*PPM,cymm*PPM);ctx.rotate((ang||0)*Math.PI/180); ctx.shadowColor='rgba(0,0,0,0.30)';ctx.shadowBlur=cardW*0.05;ctx.shadowOffsetY=cardW*0.02; ctx.fillStyle='#fff';ctx.fillRect(-cardW/2,-cardH/2,cardW,cardH); ctx.shadowColor='transparent'; if(im){const ir=im.width/im.height;let sw,sh,sx,sy;if(ir>1){sh=im.height;sw=sh;sx=(im.width-sw)/2;sy=0;}else{sw=im.width;sh=sw;sx=0;sy=(im.height-sh)*0.22;}ctx.save();try{ctx.filter='contrast(1.08) saturate(1.14) brightness(1.04)';}catch(e){}ctx.drawImage(im,sx,sy,sw,sh,-cardW/2+bord,-cardH/2+bord,photo,photo);ctx.restore();} if(caption){const cy2=-cardH/2+bord+photo+bottom*0.55;let fs=bottom*0.62;ctx.fillStyle='#334155';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='bold '+fs+'px "Comic Sans MS","Segoe Script",cursive';while(ctx.measureText(caption).width>cardW*0.88&&fs>10){fs-=2;ctx.font='bold '+fs+'px "Comic Sans MS","Segoe Script",cursive';}ctx.fillText(caption,0,cy2);ctx.textBaseline='alphabetic';} ctx.restore(); }
  function hoja(canvas,primera){ if(!primera)doc.addPage(); doc.addImage(canvas.toDataURL('image/jpeg',0.85),'JPEG',0,0,W,H); }
  const tc=document.createElement('canvas');tc.width=CW;tc.height=CH;const tx=tc.getContext('2d'); dibFondo(tx);
  const pim=opts.portUrl?await _cargarImg(opts.portUrl):(fotos[0]?await _cargarImg(albUrl(fotos[0])):null);
  dibPolaroid(tx,pim,148,104,120,-4,nombre); hoja(tc,true);
  const patron=[2,3,4];let pi=0,i=0;
  while(i<fotos.length){ let n=Math.min(patron[pi%patron.length],fotos.length-i);pi++; const pc=document.createElement('canvas');pc.width=CW;pc.height=CH;const px=pc.getContext('2d'); dibFondo(px); const L=LAYOUTS[n]||LAYOUTS[4]; for(let k=0;k<n;k++){const p=L[k];const im=await _cargarImg(albUrl(fotos[i]));dibPolaroid(px,im,p[0],p[1],p[2],p[3]);i++;} hoja(pc,false); }
  doc.save('Recuerdos-'+((nombre||'cumple').replace(/[^a-zA-Z0-9]/g,'_'))+'.pdf');
}
// Graba el VIDEO del recuerdo. opts:{fotos,nombre,ninoUrl,portIni,portFin,fraseIni,fraseFin,colIni,colFin,fondoUrl,musUrl}. Devuelve {url,ext,name}.
async function grabarVideoArchivo(opts,onProg){
  if(typeof MediaRecorder==='undefined'||typeof HTMLCanvasElement.prototype.captureStream!=='function')throw new Error('no-rec');
  const album=(opts.fotos||[]).filter(Boolean); const esClaro=c=>c&&(c.toLowerCase()==='#ffffff'||c.toLowerCase()==='#fff'||c.toLowerCase()==='#facc15');
  const fondoImg=opts.fondoUrl?await _cargarImg(opts.fondoUrl):null;
  const DF=5000,DP=3000; const slides=[];

  const S=1080;const cv=document.createElement('canvas');cv.width=S;cv.height=S;const cx=cv.getContext('2d');cx.imageSmoothingEnabled=true;cx.imageSmoothingQuality='high';
  function dFondo(){ if(fondoImg){const ir=fondoImg.width/fondoImg.height;let sw,sh,sx,sy;if(ir>1){sh=fondoImg.height;sw=sh;sx=(fondoImg.width-sw)/2;sy=0;}else{sw=fondoImg.width;sh=sw;sx=0;sy=(fondoImg.height-sh)/2;}cx.drawImage(fondoImg,sx,sy,sw,sh,0,0,S,S);} else {cx.fillStyle='#0f172a';cx.fillRect(0,0,S,S);} }

  const _musGenF=(((suc&&suc.musicaGen&&suc.musicaGen.length)?suc.musicaGen:((iaConfig&&iaConfig.musicaGen)||[]))).filter(Boolean);
  const musTrack=(ev&&ev.albumMusica)||(tem&&tem.musica)||(_musGenF.length?_musGenF[(parseInt(String((ev&&ev.id)||'0').replace(/[^0-9]/g,''))||0)%_musGenF.length]:'');

  const musRef=React.useRef(null);

  function toggleMus(){
    const v=vidRef.current; const el=musRef.current;
    // Si el video está sonando, este botón silencia/activa el VIDEO.
    if(v&&!v.ended){const nm=!v.muted;v.muted=nm;setVidMuted(nm);if(!nm){try{v.play();}catch(e){}}return;}
    if(!el)return;
    if(musOn){el.pause();setMusOn(false);}else{el.volume=0.5;try{el.play();}catch(e){}setMusOn(true);}
  }
  // Auto-arranque de música RECIÉN cuando el invitado baja cierto desplazamiento (no al toque). Si hay video sin terminar, espera.
  React.useEffect(()=>{
    if(!musTrack)return; let done=false;
    function tryStart(){ if(done)return; const v=vidRef.current; if(v&&!v.ended)return; const y=window.scrollY||document.documentElement.scrollTop||0; if(y<300)return; const el=musRef.current; if(!el)return; el.volume=0.5; const pr=el.play(); if(pr&&pr.then){pr.then(()=>{done=true;setMusOn(true);cleanup();}).catch(()=>{});} else {done=true;setMusOn(true);cleanup();} }
    function cleanup(){window.removeEventListener('scroll',tryStart);window.removeEventListener('touchmove',tryStart);}
    window.addEventListener('scroll',tryStart,{passive:true});
    window.addEventListener('touchmove',tryStart,{passive:true});
    return cleanup;
  },[musTrack]);
  // Al tocar "ver el video": lo monta y lo reproduce con sonido (gesto del usuario), y baja la música.
  React.useEffect(()=>{
    if(!vidPlay)return;
    const v=vidRef.current;
    if(v){ v.muted=false; try{v.currentTime=0;}catch(_){ } const p=v.play(); if(p&&p.catch)p.catch(function(){}); }
    const m=musRef.current; if(m&&!m.paused){try{m.volume=0.12;}catch(_){ }}
  },[vidPlay]);
  const col=suc.color||'#f97316';

  const diaStr=ev?(ev.dia+'/'+ev.mes+'/'+ev.anio):'';

      {musTrack&&<audio ref={musRef} src={musTrack} preload="auto"></audio>}

        }} style={{width:'100%',maxWidth:420,background:col,color:'white',border:'none',borderRadius:16,padding:'15px 18px',fontSize:16,fontWeight:900,cursor:'pointer',boxShadow:'0 8px 22px rgba(0,0,0,.22)'}}>📅 ¡No te lo pierdas! Agendá el cumple</button>
        <p style={{fontSize:11,color:'#94a3b8',marginTop:7}}>Se guarda en tu calendario y te avisa el día 🎉</p>
      </div>}

      {/* (El Generador de Recuerdos NO va dentro de la invitación: tiene su propio link ?rec=) */}

      {/* 9. FOTOS 2x2 */}
      {fotos.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,margin:'3px 0'}}>
          {fotos.slice(0,4).map((f,i)=>(
            <div key={i} style={{aspectRatio:'1',overflow:'hidden',background:'#e2e8f0'}}>
              <img src={f} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            </div>
          ))}
        </div>
      )}

      {/* 10. DIRECCIÓN */}
      <div style={{padding:'20px',textAlign:'center',borderBottom:'1px solid #f0f0f0'}}>
        <p style={{color:'#888',fontSize:14,margin:'0 0 4px'}}>{T.ubicadoEn||'se encuentra ubicado en'}</p>
        <a href={'https://maps.google.com/?q='+encodeURIComponent(suc.direccion||'')} target="_blank"
          style={{color:'#1e293b',fontSize:17,fontWeight:700,textDecoration:'underline',textDecorationColor:col,display:'block'}}>
          {suc.direccion}
        </a>
      </div>

      {/* 11. BOTONES */}
      <div style={{padding:'16px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        <button onClick={()=>document.getElementById('conf-form-'+ev.id)&&document.getElementById('conf-form-'+ev.id).scrollIntoView({behavior:'smooth'})}
          style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'👥'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>CONFIRMAR</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>ASISTENCIA</span>
        </button>
        <a href={'https://maps.google.com/?q='+encodeURIComponent(suc.direccion||'')} target="_blank"
          style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,textDecoration:'none',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'📍'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>COMO</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>LLEGAR</span>
        </a>
        <button onClick={()=>{
            if(suc.web){window.open(suc.web,'_blank');}
            else{alert(suc.nombre+'\n'+suc.direccion+(suc.tel?'\nTel: '+suc.tel:''));}
          }} style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'🎪'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>INFO DEL</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>SALON</span>
        </button>
      </div>

      {/* 11b. RECIBIR NOVEDADES (opt-in: el papá nos escribe primero → permiso válido para promos) */}
      {suc.tel&&(
        <div style={{padding:'0 16px 16px'}}>
          <a href={'https://wa.me/'+waNum(suc.tel)+'?text='+encodeURIComponent('¡Hola '+suc.nombre+'! 🎉 Quiero recibir la invitación y las novedades por WhatsApp.')} target="_blank" rel="noopener" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'#25d366',color:'white',borderRadius:14,padding:'13px',fontSize:13.5,fontWeight:900,textDecoration:'none'}}>
            📲 Recibir novedades y promos de {suc.nombre}
          </a>
          <p style={{fontSize:10,color:'#94a3b8',textAlign:'center',marginTop:6}}>Te abre WhatsApp para escribirnos. ¡Así te enterás de las promos! 🎁</p>
        </div>
      )}

      {/* 12. CONFIRMAR ASISTENCIA */}
      <div style={{margin:'0 16px 12px',border:'2px dashed '+col,borderRadius:18,padding:'16px',textAlign:'center'}}>
        <p style={{fontSize:24,fontWeight:900,color:'#1e293b',margin:'0 0 4px'}}>{T.confTitulo||'Confirmar tu asistencia'}</p>
        <p style={{fontSize:14,color:'#888',margin:0}}>{T.confSub||'es muy importante. ¡Muchas gracias!'}</p>
      </div>

      {/* 13. FORM */}
      <div id={'conf-form-'+ev.id} style={{margin:'0 16px 16px',background:'#fff',borderRadius:18,padding:16,border:'1px solid '+col+'44'}}>
        <p style={{fontSize:13,fontWeight:900,textAlign:'center',marginBottom:12,textTransform:'uppercase',color:col}}>Registra tu Asistencia</p>
        {ok?(
          <div style={{background:'#f0fdf4',color:'#166534',padding:12,borderRadius:12,textAlign:'center',fontSize:13,fontWeight:700}}>Asistencia registrada! Gracias!</div>
        ):(
          <form onSubmit={conf} style={{display:'flex',flexDirection:'column',gap:8}}>
            <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Tu nombre" required style={{...S.input,border:'1px solid '+col+'66',fontSize:14}}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div><label style={{fontSize:11,color:'#888',display:'block',marginBottom:2}}>Ninos</label>
                <input type="number" value={ni} onChange={e=>setNi(e.target.value)} min={0} placeholder="0" style={{...S.input,border:'1px solid '+col+'66',textAlign:'center',fontSize:14}}/></div>
              <div><label style={{fontSize:11,color:'#888',display:'block',marginBottom:2}}>Adultos</label>
                <input type="number" value={ad} onChange={e=>setAd(e.target.value)} min={0} placeholder="0" style={{...S.input,border:'1px solid '+col+'66',textAlign:'center',fontSize:14}}/></div>
            </div>
            <input value={cel} onChange={e=>setCel(e.target.value)} placeholder="Tu celular" required style={{...S.input,border:'1px solid '+col+'66',fontSize:14}}/>
            <button type="submit" style={{...S.btn,background:col,color:'white',padding:12,fontSize:14,width:'100%'}}>Confirmar Asistencia</button>
          </form>
        )}
      </div>

      {/* 14. COMPARTIR */}
      <div style={{margin:'0 16px 16px'}}>
        <button onClick={()=>{
          const baseUrl2=(window.location.href.split('?')[0]);
          const evData2={id:ev.id,sucId:ev.sucId,nombre:ev.nombre,tipo:ev.tipo||'Cumpleanos',edad:ev.edad,dia:ev.dia,mes:ev.mes,anio:ev.anio,hIni:ev.hIni,hFin:ev.hFin,celPapa:ev.celPapa,nomPapa:ev.nomPapa,temId:ev.temId};
          const link=baseUrl2+'?inv='+ev.id;
          const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
          const fecha=ev.dia+' de '+(meses[(+ev.mes)-1]||'')+' de '+ev.anio;
          const lineas=[ev.nombre+' te invita a su '+ev.tipo,'El dia '+fecha,'en '+suc.nombre,'','Abri la invitacion:',link];
          abrirWA('', lineas.join('\n'));
        }} style={{...S.btn,width:'100%',background:'#25d366',color:'white',padding:12,fontSize:14}}>
          Compartir por WhatsApp
        </button>
      </div>

      {/* 14b. REDES (Instagram / WhatsApp del salón) */}
      {(suc.instagram||suc.tel)&&(
        <div style={{display:'flex',justifyContent:'center',gap:18,padding:'20px 16px 4px'}}>
          {suc.instagram&&<a href={igUrl(suc.instagram)} target="_blank" title="Instagram" style={{width:54,height:54,borderRadius:'50%',background:'linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5)',display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none',boxShadow:'0 3px 10px rgba(0,0,0,.18)'}}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>}
          {suc.tel&&<a href={'https://wa.me/'+waNum(suc.tel)} target="_blank" title="WhatsApp" style={{width:54,height:54,borderRadius:'50%',background:'#25d366',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,textDecoration:'none',boxShadow:'0 3px 10px rgba(0,0,0,.18)'}}>💬</a>}
        </div>
      )}

      {/* 15. FOOTER */}
      <div style={{background:col,color:'white',padding:'20px 16px',textAlign:'center'}}>
        <p style={{fontSize:12,fontWeight:700,margin:'0 0 4px',opacity:.9}}>Invitaciones Virtuales Interactivas</p>
        <p style={{fontSize:14,fontWeight:900,margin:0}}>{'by '+suc.nombre+'®'}</p>
      </div>

    </div>
  );
}

/* ── RENDER ──────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
