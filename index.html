                <span style={{fontSize:13}}>{'🤖'}</span>
                <span style={{width:7,height:7,background:'#94a3b8',borderRadius:'50%',display:'inline-block'}}></span>
                <span style={{width:7,height:7,background:'#94a3b8',borderRadius:'50%',display:'inline-block'}}></span>
                <span style={{width:7,height:7,background:'#94a3b8',borderRadius:'50%',display:'inline-block'}}></span>
              </div>
            )}
          </div>
          <form onSubmit={enviarFaq} style={{...S.card,padding:'10px 12px',display:'flex',gap:8,alignItems:'center'}}>
            <input value={faqQ} onChange={e=>setFaqQ(e.target.value)} placeholder="Escribi tu pregunta..." style={{...S.input,flex:1,marginBottom:0}} required/>
            <button type="submit" style={{...S.btn,background:'#7c3aed',color:'white',padding:'10px 18px',flexShrink:0}}>Enviar</button>
          </form>
          {faqChat.length>0&&<button onClick={()=>setFaqChat([])} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:11,marginTop:8}}>Limpiar chat</button>}
        </div>
      )}

      {/* ══ ADICIONALES ══ */}
      {seccion==='adicionales'&&(
        <div className="fade-in" style={S.card}>
          <h2 style={{fontWeight:900,fontSize:18,marginBottom:4}}>➕ Contratar Adicionales</h2>
          <p style={{fontSize:12,color:'#64748b',marginBottom:16}}>Servicios extras para hacer tu evento aún más especial</p>
          {(iaConfig.adicionales||[]).length===0?(
            <div style={{textAlign:'center',padding:'32px 16px',color:'#94a3b8'}}>
              <div style={{fontSize:40,marginBottom:8}}>🛍️</div>
              <p style={{fontWeight:700}}>El salón aún no configuró adicionales</p>
            </div>
          ):(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
              {(iaConfig.adicionales||[]).map((ad,i)=>(
                <div key={ad.id||i} style={{...S.card,padding:18,border:'1px solid #e2e8f0',display:'flex',flexDirection:'column',gap:10}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:48,height:48,borderRadius:14,background:'#ede9fe',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{ad.emoji||'✨'}</div>
                    <div><div style={{fontWeight:900,fontSize:14}}>{ad.nombre}</div><div style={{fontSize:20,fontWeight:900,color:'#7c3aed'}}>${(+ad.precio).toLocaleString('es-AR')}</div></div>
                  </div>
                  <p style={{fontSize:12,color:'#64748b',margin:0}}>{ad.desc}</p>
                  <button onClick={()=>{const t=`Hola! Quiero contratar: *${ad.nombre}* para el ${papaSesion.tipo||'Cumpleaños'} de ${papaSesion.nombre} el ${papaSesion.dia}/${papaSesion.mes}/${papaSesion.anio} en ${suc.nombre}. ¿Podemos coordinarlo? 🎉`;window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,'_blank');}} style={{...S.btn,background:'#22c55e',color:'white',width:'100%',padding:'10px',fontSize:12}}>💬 Consultar por WhatsApp</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Modales */}
      {pagoActivo&&<PagoMP tipo={pagoActivo} precio={pagoActivo==='imagen'?iaConfig.precioImagen:iaConfig.precioVideo} nombre={form.nombre} tematica={temA.nombre} onPagado={()=>{setGenActivo(pagoActivo);setPagoActivo(null);}} onCancelar={()=>setPagoActivo(null)}/>}
      {genActivo&&<GeneradorIA tipo={genActivo} nombre={form.nombre} tematica={temA.nombre} edad={form.edad} prompt={genActivo==='imagen'?iaConfig.promptImagen:iaConfig.promptVideo} fotoNino={genActivo==='imagen'?form.fotoNinoIA:form.fotoNinoIAV} personaje={genActivo==='imagen'?form.personajeIA:form.personajeIAV} personajeNombre={(tematicas.find(t=>t.img===(genActivo==='imagen'?form.personajeIA:form.personajeIAV))||{}).nombre||temA.nombre} onResultado={imgs=>{if(genActivo==='imagen'){setForm(f=>({...f,iaImagenes:imgs,iaImagenSel:null}));setPapaSesion(ps=>{const n={...ps,iaGenCount:((ps&&ps.iaGenCount)||0)+1};setEventos(evs=>evs.map(e=>e.id===n.id?{...e,iaGenCount:n.iaGenCount}:e));return n;});}else setForm(f=>({...f,iaVideos:imgs,iaVideoSel:null}));setGenActivo(null);}} onCerrar={()=>setGenActivo(null)}/>}
    </div>
  );
}


/* ── INVITADO PORTADA ────────────────────────────────────── */
function InvPortada({setVista,eventos,invEvId,sucursales,volverInv}){
  const ev=eventos.find(e=>e.id===invEvId)||eventos[0];
  const suc=sucursales.find(s=>s.id===ev?.sucId)||sucursales[0];
  const col=suc.color||'#f97316';
  React.useEffect(()=>{
    const container=document.getElementById('confetti-container');
    if(!container)return;
    const colors=['#fff','#fde68a','#fed7aa','#fecdd3','#ffffff','#fef3c7'];
    for(let i=0;i<60;i++){
      const el=document.createElement('div');
      const size=Math.random()*8+4;
      el.style.cssText='position:absolute;width:'+size+'px;height:'+size+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:'+(Math.random()>0.5?'50%':'2px')+';left:'+Math.random()*100+'%;top:-20px;opacity:0;animation:fall '+(Math.random()*3+2)+'s '+(Math.random()*3)+'s infinite;';
      container.appendChild(el);
    }
    const style=document.createElement('style');
    style.textContent='@keyframes fall{0%{top:-20px;opacity:1;transform:rotate(0deg) translateX(0)}100%{top:110%;opacity:0;transform:rotate(360deg) translateX('+(Math.random()>0.5?'':'-')+'50px)}}';
    document.head.appendChild(style);
    return()=>{if(container)container.innerHTML='';};
  },[]);
  return(
    <div style={{minHeight:'100vh',background:col,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',position:'relative',overflow:'hidden'}}>
      {volverInv&&<button onClick={()=>setVista(volverInv)} style={{position:'fixed',top:12,left:12,zIndex:20,background:'rgba(0,0,0,.55)',color:'white',border:'none',borderRadius:99,padding:'8px 14px',fontSize:13,fontWeight:800,cursor:'pointer'}}>← Volver al panel</button>}
      <div id="confetti-container" style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:0}}></div>
      <div style={{position:'absolute',top:'10%',left:'10%',width:200,height:200,borderRadius:'50%',background:'rgba(255,255,255,.12)',filter:'blur(40px)'}}></div>
      <div style={{position:'absolute',bottom:'15%',right:'5%',width:160,height:160,borderRadius:'50%',background:'rgba(255,255,255,.10)',filter:'blur(30px)'}}></div>
      <div style={{position:'relative',zIndex:1}}>
        {suc.logo?<img src={suc.logo} alt={suc.nombre} style={{width:90,height:90,borderRadius:'50%',objectFit:'cover',border:'4px solid white',boxShadow:'0 4px 20px rgba(0,0,0,.2)',marginBottom:24}}/>:<div style={{fontSize:52,marginBottom:20}}>{'🎉'}</div>}
        <p style={{color:'rgba(255,255,255,.9)',fontSize:13,fontWeight:600,letterSpacing:2,textTransform:'uppercase',margin:'0 0 10px'}}>{suc.portadaFrase||'Recibiste una invitacion de'}</p>
        <h1 style={{color:'white',fontSize:40,fontWeight:900,margin:'0 0 24px',textShadow:'0 2px 16px rgba(0,0,0,.25)',lineHeight:1.1}}>{ev?ev.nombre:'...'}</h1>
        <p style={{color:'rgba(255,255,255,.8)',fontSize:15,margin:'0 0 28px'}}>Descubri donde es el evento?</p>
        <button onClick={()=>setVista('invitado-web')} style={{background:'white',color:col,fontWeight:800,fontSize:16,border:'none',borderRadius:99,padding:'16px 48px',cursor:'pointer',boxShadow:'0 8px 32px rgba(0,0,0,.15)'}}>
          Abrir Invitacion
        </button>
        <p style={{marginTop:36,color:'rgba(255,255,255,.35)',fontSize:11}}>{'by '+suc.nombre+' - Invitaciones Digitales'}</p>
      </div>
    </div>
  );
}

/* ── INVITADO WEB ─────────────────────────────────────────── */
function InvWeb({setVista,eventos,invEvId,sucursales,tematicas,confs,setConfs,volverInv}){
  const ev=eventos.find(e=>e.id===invEvId)||eventos[0];
  const suc=sucursales.find(s=>s.id===ev?.sucId)||sucursales[0];
  const tem=tematicas.find(t=>t.id===ev?.temId)||tematicas[0];
  const col=suc.color||'#f97316';
  // Formato según tipo de evento (viaja guardado en el evento)
  const fEdad = (ev && ev.fmtEdad!==undefined) ? ev.fmtEdad : true;
  const fTitulo = (ev && ev.fmtTitulo) ? ev.fmtTitulo.replace(/\{nombre\}/g, ev.nombre||'') : 'Quiero invitarte a festejar mi cumple!';
  const fDirigido = (ev && ev.fmtDirigido) || '';
  const fUnidad = (ev && ev.edadUnidad) || 'años';
  const fMostrarEdad = fEdad && fUnidad!=='noaplica' && ev && ev.edad!=='' && ev.edad!==undefined && ev.edad!==null;
  const fotos=(suc.fotos||[]).filter(f=>f&&f.length>0);
  const [nom,setNom]=useState('');
  const [ad,setAd]=useState(1);
  const [ni,setNi]=useState(1);
  const [cel,setCel]=useState('');
  const [ok,setOk]=useState(false);
  const [countdown,setCountdown]=useState({dias:0,horas:0,mins:0,segs:0,llego:false});

  React.useEffect(()=>{
    function calcular(){
      if(!ev)return;
      const hoy=new Date();
      const fecha=new Date(ev.anio,ev.mes-1,ev.dia,+(ev.hFin||'23').split(':')[0],0,0);
      const diff=fecha-hoy;
      if(diff<=0){setCountdown({dias:0,horas:0,mins:0,segs:0,llego:true});return;}
      const dias=Math.floor(diff/86400000);
      const horas=Math.floor((diff%86400000)/3600000);
      const mins=Math.floor((diff%3600000)/60000);
      const segs=Math.floor((diff%60000)/1000);
      setCountdown({dias,horas,mins,segs,llego:false});
    }
    calcular();
    const t=setInterval(calcular,1000);
    return()=>clearInterval(t);
  },[ev]);

  function conf(e){
    e.preventDefault();
    setConfs(prev=>{
      const updated=[...prev,{id:'c-'+Date.now(),evId:ev.id,invitado:nom,adultos:ad,ninos:ni,cel}];
      try{localStorage.setItem('fz_confs',JSON.stringify(updated));}catch(err){}
      return updated;
    });
    setOk(true);
    const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const fecha=ev.dia+' de '+(meses[(+ev.mes)-1]||'')+' de '+ev.anio;
    const link=window.location.href;
    const lineas=[
      'Hola '+ev.nomPapa+'!',
      '',
      nom+' confirma asistencia al '+ev.tipo+' de '+ev.nombre,
      'Fecha: '+fecha,
      '',
      'Asistimos: '+ni+' ninos y '+ad+' adultos',
      '',
      'Invitacion: '+link,
    ];
    setTimeout(()=>{
      window.open('https://wa.me/'+waNum(ev.celPapa)+'?text='+encodeURIComponent(lineas.join('\n')),'_blank');
      setNom('');setCel('');setAd(1);setNi(1);setOk(false);
    },1800);
  }

  const diaStr=ev?(ev.dia+'/'+ev.mes+'/'+ev.anio):'';
  const horario=ev?('de '+ev.hIni+' a '+ev.hFin+'hs'):'';

  return(
    <div style={{background:'white',minHeight:'100vh',fontFamily:'Arial,sans-serif',maxWidth:480,margin:'0 auto'}}>
      {volverInv&&<button onClick={()=>setVista(volverInv)} style={{position:'fixed',top:12,left:12,zIndex:20,background:'rgba(0,0,0,.6)',color:'white',border:'none',borderRadius:99,padding:'8px 14px',fontSize:13,fontWeight:800,cursor:'pointer'}}>← Volver al panel</button>}

      {/* 1. IMAGEN TEMATICA FULL */}
      <div style={{position:'relative',width:'100%'}}>
        <img src={tem.img} alt={tem.nombre} style={{width:'100%',display:'block',maxHeight:500,objectFit:'cover'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 55%)'}}></div>
        <span style={{position:'absolute',top:14,left:14,background:'#f43f5e',color:'white',fontSize:12,padding:'5px 16px',borderRadius:99,fontWeight:900,letterSpacing:1}}>TE INVITO!</span>
      </div>

      {/* 2. LOGO centrado sobre la imagen */}
      <div style={{display:'flex',justifyContent:'center',marginTop:-50,marginBottom:8,position:'relative',zIndex:2}}>
        {suc.logo?(
          <div style={{width:100,height:100,borderRadius:'50%',border:'5px solid '+col,overflow:'hidden',background:'white',boxShadow:'0 4px 20px rgba(0,0,0,.18)'}}>
            <img src={suc.logo} alt={suc.nombre} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          </div>
        ):(
          <div style={{width:100,height:100,borderRadius:'50%',border:'5px solid '+col,background:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,boxShadow:'0 4px 20px rgba(0,0,0,.18)'}}>
            {suc.emoji||'🎪'}
          </div>
        )}
      </div>

      {/* 3. NOMBRE */}
      <div style={{textAlign:'center',padding:'0 20px 12px'}}>
        <h1 style={{color:col,fontSize:44,fontWeight:900,margin:'0 0 8px',lineHeight:1}}>{ev?ev.nombre:''}</h1>

        {/* 4. FRASE (según formato del tipo de evento) */}
        {fDirigido&&<p style={{color:'#888',fontSize:15,margin:'0 0 4px',fontWeight:700}}>{fDirigido}</p>}
        <p style={{color:'#333',fontSize:18,margin:'0 0 8px'}}>{fTitulo}</p>

        {/* 5. EDAD (según formato y unidad: años/meses/no aplica) */}
        {fMostrarEdad&&(
          <div style={{margin:'0 0 8px'}}>
            <p style={{color:col,fontSize:72,fontWeight:900,margin:0,lineHeight:1}}>{ev.edad}</p>
            <p style={{color:col,fontSize:15,fontWeight:800,margin:0,textTransform:'uppercase',letterSpacing:1}}>{fUnidad==='meses'?'meses':'años'}</p>
          </div>
        )}

        {/* 6. FECHA */}
        <p style={{color:'#555',fontSize:17,margin:'0 0 2px'}}>Te espero el dia</p>
        <p style={{color:'#1e293b',fontSize:22,fontWeight:900,margin:'0 0 2px'}}>{diaStr}</p>
        <p style={{color:'#555',fontSize:16,margin:'0 0 20px'}}>{horario}</p>

        {/* 7. COUNTDOWN o LLEGO EL DIA */}
        {countdown.llego?(
          <div className="bounce" style={{textAlign:'center',padding:'16px 0'}}>
            <p style={{color:col,fontSize:32,fontWeight:900,margin:0,animation:'pulse 0.8s infinite alternate'}}>LLEGO EL DIA!</p>
          </div>
        ):(
          <div style={{background:'#f8fafc',borderRadius:16,padding:'14px 10px',marginBottom:8}}>
            <p style={{fontSize:12,color:'#888',margin:'0 0 8px',fontWeight:600}}>Cuenta regresiva</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
              {[['dias',countdown.dias],['horas',countdown.horas],['min',countdown.mins],['seg',countdown.segs]].map(([lbl,val])=>(
                <div key={lbl} style={{background:'white',borderRadius:12,padding:'10px 4px',boxShadow:'0 2px 8px rgba(0,0,0,.08)'}}>
                  <div style={{fontSize:28,fontWeight:900,color:col,lineHeight:1}}>{String(val).padStart(2,'0')}</div>
                  <div style={{fontSize:10,color:'#888',marginTop:2}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 8. FESTEJO EN EL SALON */}
      <div style={{textAlign:'center',padding:'16px 20px',borderTop:'1px solid #f0f0f0',borderBottom:'1px solid #f0f0f0'}}>
        <p style={{color:'#333',fontSize:22,margin:'0 0 4px',fontWeight:400}}>Festejo en el salon</p>
        <p style={{color:col,fontSize:28,fontWeight:900,margin:0,textTransform:'uppercase'}}>{suc.nombre}</p>
      </div>

      {/* 9. FOTOS 2x2 */}
      {fotos.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,margin:'3px 0'}}>
          {fotos.slice(0,4).map((f,i)=>(
            <div key={i} style={{aspectRatio:'1',overflow:'hidden',background:'#e2e8f0'}}>
              <img src={f} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            </div>
          ))}
        </div>
      )}

      {/* 10. DIRECCIÓN */}
      <div style={{padding:'20px',textAlign:'center',borderBottom:'1px solid #f0f0f0'}}>
        <p style={{color:'#888',fontSize:14,margin:'0 0 4px'}}>se encuentra ubicado en</p>
        <a href={'https://maps.google.com/?q='+encodeURIComponent(suc.direccion||'')} target="_blank"
          style={{color:'#1e293b',fontSize:17,fontWeight:700,textDecoration:'underline',textDecorationColor:col,display:'block'}}>
          {suc.direccion}
        </a>
      </div>

      {/* 11. BOTONES */}
      <div style={{padding:'16px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        <button onClick={()=>document.getElementById('conf-form-'+ev.id)&&document.getElementById('conf-form-'+ev.id).scrollIntoView({behavior:'smooth'})}
          style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'👥'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>CONFIRMAR</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>ASISTENCIA</span>
        </button>
        <a href={'https://maps.google.com/?q='+encodeURIComponent(suc.direccion||'')} target="_blank"
          style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,textDecoration:'none',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'📍'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>COMO</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>LLEGAR</span>
        </a>
        <button onClick={()=>{
            if(suc.web){window.open(suc.web,'_blank');}
            else{alert(suc.nombre+'\n'+suc.direccion+(suc.tel?'\nTel: '+suc.tel:''));}
          }} style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'🎪'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>INFO DEL</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>SALON</span>
        </button>
      </div>

      {/* 12. CONFIRMAR ASISTENCIA */}
      <div style={{margin:'0 16px 12px',border:'2px dashed '+col,borderRadius:18,padding:'16px',textAlign:'center'}}>
        <p style={{fontSize:24,fontWeight:900,color:'#1e293b',margin:'0 0 4px'}}>Confirmar tu asistencia</p>
        <p style={{fontSize:14,color:'#888',margin:0}}>es muy importante. Muchas Gracias.</p>
      </div>

      {/* 13. FORM */}
      <div id={'conf-form-'+ev.id} style={{margin:'0 16px 16px',background:'#fff',borderRadius:18,padding:16,border:'1px solid '+col+'44'}}>
        <p style={{fontSize:13,fontWeight:900,textAlign:'center',marginBottom:12,textTransform:'uppercase',color:col}}>Registra tu Asistencia</p>
        {ok?(
          <div style={{background:'#f0fdf4',color:'#166534',padding:12,borderRadius:12,textAlign:'center',fontSize:13,fontWeight:700}}>Asistencia registrada! Gracias!</div>
        ):(
          <form onSubmit={conf} style={{display:'flex',flexDirection:'column',gap:8}}>
            <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Tu nombre" required style={{...S.input,border:'1px solid '+col+'66',fontSize:14}}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div><label style={{fontSize:11,color:'#888',display:'block',marginBottom:2}}>Ninos</label>
                <input type="number" value={ni} onChange={e=>setNi(e.target.value)} min={0} style={{...S.input,border:'1px solid '+col+'66',textAlign:'center',fontSize:14}}/></div>
              <div><label style={{fontSize:11,color:'#888',display:'block',marginBottom:2}}>Adultos</label>
                <input type="number" value={ad} onChange={e=>setAd(e.target.value)} min={1} style={{...S.input,border:'1px solid '+col+'66',textAlign:'center',fontSize:14}}/></div>
            </div>
            <input value={cel} onChange={e=>setCel(e.target.value)} placeholder="Tu celular" required style={{...S.input,border:'1px solid '+col+'66',fontSize:14}}/>
            <button type="submit" style={{...S.btn,background:col,color:'white',padding:12,fontSize:14,width:'100%'}}>Confirmar Asistencia</button>
          </form>
        )}
      </div>

      {/* 14. COMPARTIR */}
      <div style={{margin:'0 16px 16px'}}>
        <button onClick={()=>{
          const baseUrl2=(window.location.href.split('?')[0]);
          const evData2={id:ev.id,sucId:ev.sucId,nombre:ev.nombre,tipo:ev.tipo||'Cumpleanos',edad:ev.edad,dia:ev.dia,mes:ev.mes,anio:ev.anio,hIni:ev.hIni,hFin:ev.hFin,celPapa:ev.celPapa,nomPapa:ev.nomPapa,temId:ev.temId};
          const link=baseUrl2+'?inv='+ev.id;
          const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
          const fecha=ev.dia+' de '+(meses[(+ev.mes)-1]||'')+' de '+ev.anio;
          const lineas=[ev.nombre+' te invita a su '+ev.tipo,'El dia '+fecha,'en '+suc.nombre,'','Abri la invitacion:',link];
          window.open('https://wa.me/?text='+encodeURIComponent(lineas.join('\n')),'_blank');
        }} style={{...S.btn,width:'100%',background:'#25d366',color:'white',padding:12,fontSize:14}}>
          Compartir por WhatsApp
        </button>
      </div>

      {/* 14b. REDES (Instagram / WhatsApp del salón) */}
      {(suc.instagram||suc.tel)&&(
        <div style={{display:'flex',justifyContent:'center',gap:18,padding:'20px 16px 4px'}}>
          {suc.instagram&&<a href={igUrl(suc.instagram)} target="_blank" title="Instagram" style={{width:54,height:54,borderRadius:'50%',background:'linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,textDecoration:'none',boxShadow:'0 3px 10px rgba(0,0,0,.18)'}}>📷</a>}
          {suc.tel&&<a href={'https://wa.me/'+waNum(suc.tel)} target="_blank" title="WhatsApp" style={{width:54,height:54,borderRadius:'50%',background:'#25d366',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,textDecoration:'none',boxShadow:'0 3px 10px rgba(0,0,0,.18)'}}>💬</a>}
        </div>
      )}

      {/* 15. FOOTER */}
      <div style={{background:col,color:'white',padding:'20px 16px',textAlign:'center'}}>
        <p style={{fontSize:12,fontWeight:700,margin:'0 0 4px',opacity:.9}}>Invitaciones Virtuales Interactivas</p>
        <p style={{fontSize:14,fontWeight:900,margin:0}}>{'by '+suc.nombre+'®'}</p>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
