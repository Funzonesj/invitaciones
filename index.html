    return { eventos:(ev.data||[]).map(r=>r.data), confs:(cf.data||[]).map(r=>r.data) };
  }catch(e){ return null; }
}

function genUser(nombre) {
  const base = nombre.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9]/g,'').slice(0,8);
  const nums = Math.floor(100+Math.random()*900);
  return base + nums;
}
function genPass() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789@#!';
  let p='';for(let i=0;i<10;i++) p+=chars[Math.floor(Math.random()*chars.length)];
  return p;
}
// Normaliza un celular argentino al formato internacional que necesita WhatsApp (54 9 + area + numero)
function waNum(n){
  let d=(n||'').toString().replace(/\D/g,'');     // dejar solo dígitos
  if(!d) return '';
  if(d.startsWith('549')) return d;                // ya está completo
  if(d.startsWith('54'))  return '549'+d.slice(2); // tiene país pero falta el 9 de celular
  if(d.startsWith('0'))   d=d.slice(1);            // sacar 0 inicial (ej: 0264...)
  return '549'+d;                                  // agregar código país Argentina + 9 móvil
}
// Devuelve el formato de tarjeta (mostrar edad, título, dirigido) según el tipo de evento
function fmtTipo(tipo, iaConfig){
  const t=((iaConfig&&iaConfig.tiposEvento)||[]).find(x=>x.nombre===tipo);
  return t ? {fmtEdad:!!t.edad, fmtTitulo:t.titulo||'', fmtDirigido:t.dirigido||''}

}

              <button onClick={()=>{setVista('admin-dashboard');setMenuOpen(false);}} style={{width:'100%',textAlign:'left',padding:'12px 14px',background:isAdmin?'#1e3a5f':'transparent',border:'none',color:isAdmin?'#06b6d4':'#94a3b8',borderRadius:10,cursor:'pointer',fontSize:14,fontWeight:isAdmin?900:400,marginBottom:2}}>💼 Panel Admin</button>

                ))}

                <button onClick={()=>{logoutAdmin();setMenuOpen(false);}} style={{width:'100%',padding:'11px',background:'#1e293b',border:'1px solid #334155',color:'#f87171',borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:700}}>⏻ Cerrar sesión</button>
              </div>
            )}
          </div>
        </div>
      )}

      <main style={{flex:1}}>
        {vista==='admin-login'       && <AdminLogin     onLogin={loginAdmin}/>}
        {vista==='admin-dashboard'   && <AdminDashboard setVista={setVista} sucAct={sucAct} evsLocal={evsLocal} tematicas={tematicas}/>}
        {vista==='admin-eventos'     && <AdminEventos   setVista={setVista} sucAct={sucAct} evsLocal={evsLocal} eventos={eventos} setEventos={setEventos} tematicas={tematicas} setInvEvId={setInvEvId} confs={confs} iaConfig={iaConfig}/>}
        {vista==='admin-tematicas'   && <AdminTematicas setVista={setVista} tematicas={tematicas} setTematicas={setTematicas}/>}
        {vista==='admin-excel'       && <AdminExcel     setVista={setVista} sucActId={sucActId} eventos={eventos} setEventos={setEventos}/>}
        {vista==='admin-asistencias' && <AdminAsistencias setVista={setVista} evsLocal={evsLocal} confs={confs}/>}
        {vista==='admin-remarketing' && <AdminRemarketing setVista={setVista} evsLocal={evsLocal} sucAct={sucAct}/>}
        {vista==='admin-usuarios'    && <AdminUsuarios  setVista={setVista} usuarios={usuarios} setUsuarios={setUsuarios} sucursales={sucursales} setSucursales={setSucursales}/>}
        {vista==='admin-ia'          && <AdminIA setVista={setVista} iaConfig={iaConfig} setIaConfig={setIaConfig}/>}
        {vista==='admin-config'      && <AdminConfig setVista={setVista} iaConfig={iaConfig} setIaConfig={setIaConfig}/>}
        {vista==='admin-menu'        && <AdminMenu setVista={setVista} iaConfig={iaConfig} setIaConfig={setIaConfig}/>}
        {vista==='admin-formatos'    && <AdminFormatos setVista={setVista} iaConfig={iaConfig} setIaConfig={setIaConfig}/>}
        {vista==='papa-login'        && <PapaLogin      setVista={setVista} eventos={eventos} setPapaSesion={setPapaSesion} setInvEvId={setInvEvId}/>}
        {vista==='papa-creador'      && papaSesion&&<PapaCreador setVista={setVista} papaSesion={papaSesion} setPapaSesion={setPapaSesion} eventos={eventos} setEventos={setEventos} tematicas={tematicas} sucursales={sucursales} setInvEvId={setInvEvId} iaConfig={iaConfig} confs={confs} setConfs={setConfs}/>}
        {vista==='invitado-portada'  && <InvPortada    setVista={setVista} eventos={eventos} invEvId={invEvId} setInvEvId={setInvEvId} sucursales={sucursales} tematicas={tematicas} volverInv={adminSesion?'admin-eventos':(papaSesion?'papa-creador':null)}/>}
        {vista==='invitado-web'      && <InvWeb        setVista={setVista} eventos={eventos} invEvId={invEvId} setInvEvId={setInvEvId} sucursales={sucursales} tematicas={tematicas} confs={confs} setConfs={setConfs} volverInv={adminSesion?'admin-eventos':(papaSesion?'papa-creador':null)}/>}
      </main>

      {vista!=='invitado-portada'&&vista!=='invitado-web'&&(
        <footer style={{background:'#0f172a',color:'#475569',textAlign:'center',padding:'10px',fontSize:11,borderTop:'1px solid #1e293b'}}>
          © 2026 Fun Zone & Play Point · Sistema de Invitaciones Digitales
        </footer>
      )}
    </div>
  );
}

/* ── ADMIN LOGIN ─────────────────────────────────────────── */
function AdminLogin({onLogin}){
  const [u,setU]=useState(''); const [p,setP]=useState(''); const [err,setErr]=useState(''); const [showP,setShowP]=useState(false); const [cargando,setCargando]=useState(false);
  async function sub(e){e.preventDefault();setCargando(true);const r=await onLogin(u,p);setCargando(false);if(r)setErr(r);}
  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'80vh',padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,boxShadow:'0 8px 32px rgba(0,0,0,0.10)'}}>
        <div style={{textAlign:'center',marginBottom:24}}><div style={{fontSize:48}}>🔐</div>
          <h2 style={{fontWeight:900,fontSize:22,marginTop:8}}>Panel Administrativo</h2>
          <p style={{color:'#64748b',fontSize:12,marginTop:4}}>Ingreso seguro</p>
        </div>
        {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:12,fontSize:12,marginBottom:14}}>{err}</div>}
        <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
          <input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} placeholder="Email" autoComplete="username" required/>
          <div style={{position:'relative'}}>
            <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="Contraseña" autoComplete="current-password" required/>
            <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8'}}>
              {showP?'🙈':'👁️'}
            </button>
          </div>
          <button disabled={cargando} style={{...S.btn,background:cargando?'#94a3b8':'linear-gradient(135deg,#06b6d4,#7c3aed)',color:'white',padding:'13px',fontSize:14}}>{cargando?'Ingresando...':'Ingresar al Sistema'}</button>
        </form>
      </div>
    </div>
  );
}

/* ── ADMIN EVENTOS ───────────────────────────────────────── */
function AdminEventos({setVista,sucAct,evsLocal,eventos,setEventos,tematicas,setInvEvId,confs,iaConfig}){
  function enviarCredsWA(ev){
    const salon=sucAct.nombre;
    const base=window.location.href.split('?')[0];
    const loginLink=base+'?papa='+ev.id;
    const lineas=[
      'Hola '+ev.nomPapa+'!',
      '',
      'Te enviamos el acceso a las *Invitaciones Digitales* de *'+salon+'*',
      'para el '+(ev.tipo||'Cumpleanos')+' de *'+ev.nombre+'*.',
      '',
      '*Ingresa con tu link personal:*',
      loginLink,
      '',
      '(Si el link no abre directo, ingresa manualmente:)',
      '*Usuario:* '+ev.user,
      '*Contrasena:* '+ev.pass,
      '',
      '_El acceso vence al dia siguiente del evento._',
      '- '+salon,
    ];
    window.open('https://wa.me/'+waNum(ev.celPapa)+'?text='+encodeURIComponent(lineas.join('\n')),'_blank');
  }
  const ef={nombre:'',tipo:'Cumpleaños',edad:'',dia:'',mes:'',anio:String((iaConfig&&iaConfig.anioVigente)||2026),hIni:'',hFin:'',celPapa:'',nomPapa:'',user:'',pass:'',temId:'t-3',doble:false,nombre2:'',edad2:'',temId2:'t-1',nomPapa2:'',celPapa2:''};
  const [form,setForm]=useState(ef); const [editId,setEditId]=useState(null); const [open,setOpen]=useState(false);
  const [fMes,setFMes]=useState(''); const [fDia,setFDia]=useState('');

  function autoCredenciales(){
    if(!form.nombre) return alert('Ingresá primero el nombre del agasajado.');
    setForm(f=>({...f, user: genUser(f.nombre), pass: genPass()}));
  }
  const listFiltrada=evsLocal.filter(e=>(!fMes||e.mes===fMes)&&(!fDia||e.dia===fDia));

  const [alertaSup,setAlertaSup]=useState(null); // {ev, accion}
  function sub(e){
    e.preventDefault();
    // Detectar superposición de horarios en la misma sucursal y día
    const conflicto=eventos.find(x=>
      x.sucId===sucAct.id &&
      x.id!==editId &&
      x.dia===form.dia && x.mes===form.mes && x.anio===form.anio &&
      !(form.hFin<=x.hIni || form.hIni>=x.hFin)
    );
    if(conflicto){
      setAlertaSup({ev:conflicto,accion:()=>{
        guardarEvento();
        setAlertaSup(null);
      }});
      return;
    }
    guardarEvento();
  }
  function guardarEvento(){
    const fmt=fmtTipo(form.tipo,iaConfig);
    if(editId){setEventos(eventos.map(x=>x.id===editId?{...x,...form,...fmt}:x));setEditId(null);}
    else{setEventos(prev=>[...prev,{...form,...fmt,id:'ev-'+Date.now().toString(16),sucId:sucAct.id}]);}
    setForm(ef);setOpen(false);
  }
  function copiarLink(id){navigator.clipboard?.writeText(window.location.href.split('?')[0]+'?inv='+id);alert('¡Enlace copiado!');}

  return(
    <div className="fade-in" style={{maxWidth:900,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <div style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:18}}>
        <div><h1 style={{fontWeight:900,fontSize:22}}>Eventos — {sucAct.nombre}</h1><p style={{fontSize:11,color:'#64748b'}}>{evsLocal.length} cumpleaños</p></div>
        <button style={{...S.btn,background:'#06b6d4',color:'#0f172a'}} onClick={()=>{setOpen(!open);setEditId(null);setForm(ef);}}>{open?'✕ Cancelar':'+ Cargar Cumpleaños'}</button>
      </div>

      {/* Filtros */}
      <div style={{...S.card,display:'flex',gap:12,flexWrap:'wrap',alignItems:'center',marginBottom:14,padding:'10px 16px'}}>
        <span style={{fontSize:11,fontWeight:700,color:'#64748b'}}>🔍 Filtrar:</span>
        <select value={fMes} onChange={e=>setFMes(e.target.value)} style={{padding:'6px 10px',border:'1px solid #e2e8f0',borderRadius:10,fontSize:12,fontWeight:700}}>
          <option value=''>— Todos los meses —</option>
          {MESES.slice(1).map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
        </select>
        <input placeholder="Día" value={fDia} onChange={e=>setFDia(e.target.value)} style={{...S.input,width:90,padding:'6px 10px'}}/>
        <span style={{fontSize:11,color:'#94a3b8'}}>{listFiltrada.length} resultado(s)</span>
      </div>

      {/* Formulario */}
      {open&&(
        <div className="fade-in" style={{...S.card,border:'2px solid #06b6d4',marginBottom:18}}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:14}}>{editId?'✏️ Editar Evento':'+ Nuevo Cumpleaños'}</h3>
          <form onSubmit={sub}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:14}}>
              {[['Nombre','nombre','text',''],['Edad','edad','number','']].map(([l,k,t,ph])=>(
                <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} autoComplete="off" onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input} required={['nombre','edad'].includes(k)}/></label>
              ))}
              <label><span style={S.label}>Día</span><input type="number" placeholder="" value={form.dia} autoComplete="off" onChange={e=>setForm({...form,dia:e.target.value})} style={S.input} required/></label>
              <label><span style={S.label}>Mes</span>
                <select value={form.mes} onChange={e=>setForm({...form,mes:e.target.value})} style={{...S.input}} required>
                  <option value="">Mes</option>
                  {MESES.slice(1).map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
                </select>
              </label>
              <label><span style={S.label}>Año</span><input type="number" placeholder="" value={form.anio} autoComplete="off" onChange={e=>setForm({...form,anio:e.target.value})} style={S.input} required/></label>
              {[['Hora Inicio','hIni','text',''],['Hora Fin','hFin','text',''],['Celular papá','celPapa','text',''],['Nombre padre/madre','nomPapa','text',''],['Usuario papás','user','text','']].map(([l,k,t,ph])=>(
                <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} autoComplete="off" onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input} required={['hIni','hFin','celPapa'].includes(k)}/></label>
              ))}
              <label><span style={S.label}>Tipo</span>
                <select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})} style={{...S.input}}>
                  {((iaConfig&&iaConfig.tiposEvento)||[]).map(t=><option key={t.id||t.nombre} value={t.nombre}>{t.nombre}</option>)}
                </select>
              </label>
              <label><span style={S.label}>Temática inicial</span>
                <select value={form.temId} onChange={e=>setForm({...form,temId:e.target.value})} style={{...S.input}}>
                  {tematicas.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.nombre}</option>)}
                </select>
              </label>
            </div>
            {/* Credenciales con auto-generador */}
            <div style={{background:'#f0fdf4',borderRadius:12,padding:12,border:'1px solid #bbf7d0',marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:11,fontWeight:700,color:'#166534'}}>🔐 Credenciales del Papá</span>
                <button type="button" onClick={autoCredenciales} style={{...S.btn,background:'#16a34a',color:'white',padding:'5px 12px',fontSize:11}}>✨ Auto-generar seguras</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <label><span style={S.label}>Usuario</span><input value={form.user} onChange={e=>setForm({...form,user:e.target.value})} style={S.input} placeholder="Se genera automático" required/></label>
                <label><span style={S.label}>Contraseña</span><input value={form.pass} onChange={e=>setForm({...form,pass:e.target.value})} style={S.input} placeholder="Se genera automático" required/></label>
              </div>
              {form.user&&form.pass&&<p style={{fontSize:10,color:'#15803d',marginTop:6,fontWeight:600}}>✓ Credenciales listas — vencen al día siguiente del cumpleaños</p>}
            </div>
            {/* ── Cumpleaños Doble ── */}
            <label style={{display:'flex',alignItems:'center',gap:10,background:'#fefce8',border:'1px solid #fde68a',borderRadius:12,padding:'10px 14px',marginBottom:12,cursor:'pointer'}}>
              <input type="checkbox" checked={form.doble} onChange={e=>setForm({...form,doble:e.target.checked})} style={{width:18,height:18,accentColor:'#f97316',cursor:'pointer'}}/>
              <div>
                <span style={{fontWeight:800,fontSize:13,color:'#92400e'}}>🎂🎂 Cumpleaños Doble</span>
                <div style={{fontSize:10,color:'#a16207'}}>Dos homenajeados en el mismo evento — se generarán dos tarjetas y listas de asistencia independientes</div>
              </div>
            </label>
            {form.doble&&(
              <div className="fade-in" style={{background:'#fff7ed',border:'2px solid #fb923c',borderRadius:14,padding:14,marginBottom:12}}>
                <div style={{fontWeight:900,fontSize:13,color:'#c2410c',marginBottom:12}}>🎉 Segundo Cumpleañero/a</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:10}}>
                  {[['Nombre','nombre2','text',''],['Edad','edad2','number',''],['Nombre padre/madre','nomPapa2','text',''],['Celular papá','celPapa2','text','']].map(([l,k,t,ph])=>(
                    <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input}/></label>
                  ))}
                  <label><span style={S.label}>Temática</span>
                    <select value={form.temId2} onChange={e=>setForm({...form,temId2:e.target.value})} style={{...S.input}}>
                      {tematicas.map(t=><option key={t.id} value={t.id}>{t.emoji} {t.nombre}</option>)}
                    </select>
                  </label>
                </div>
                <div style={{background:'#fff',borderRadius:10,padding:10,border:'1px solid #fed7aa',fontSize:11,color:'#92400e'}}>
                  <span style={{fontSize:13}}>🔐</span> <b>Acceso compartido:</b> El papá/mamá del segundo cumpleañero ingresa con las <b>mismas credenciales</b> del primer evento. En su panel podrá alternar entre las dos tarjetas con un botón.
                </div>
              </div>
            )}
            <button type="submit" style={{...S.btn,background:'#06b6d4',color:'#0f172a'}}>{editId?'✓ Guardar Cambios':'✓ Registrar'}</button>
          </form>
        </div>
      )}
      {/* ── Modal Alerta Superposición ── */}
      {alertaSup&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
          <div className="fade-in" style={{...S.card,maxWidth:420,width:'100%',padding:28}}>

/* ── ADMIN TEMATICAS ─────────────────────────────────────── */
function AdminTematicas({setVista,tematicas,setTematicas}){
  const [form,setForm]=useState({nombre:'',emoji:'🎨',img:'',prev:'',cats:['INFANTILES']});
  const [nuevaCat,setNuevaCat]=useState('');
  const [allCats,setAllCats]=useState([...CATS]);
  const [msg,setMsg]=useState('');
  const fRef=useRef();

  function onFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setForm(x=>({...x,img:ev.target.result,prev:ev.target.result}));r.readAsDataURL(f);}
  function toggleCat(c){setForm(f=>({...f,cats:f.cats.includes(c)?f.cats.filter(x=>x!==c):[...f.cats,c]}))}
  function addCat(e){e.preventDefault();if(!nuevaCat.trim())return;const c=nuevaCat.trim().toUpperCase();if(!allCats.includes(c))setAllCats(p=>[...p,c]);setForm(f=>({...f,cats:[...f.cats,c]}));setNuevaCat('');}
  function sub(e){
    e.preventDefault();
    if(!form.nombre||!form.img){setMsg('Completá nombre e imagen.');return;}
    const c=form.cats.includes('TODOS')?form.cats:['TODOS',...form.cats];
    setTematicas(p=>[...p,{id:'t-'+Date.now(),nombre:form.nombre,cats:c,img:form.img,emoji:form.emoji}]);
    setForm({nombre:'',emoji:'🎨',img:'',prev:'',cats:['INFANTILES']});
    setMsg('¡Portada cargada!');setTimeout(()=>setMsg(''),3000);
  }

  return(
    <div className="fade-in" style={{maxWidth:900,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:20,marginBottom:18}}>🖼️ Portadas y Temáticas</h1>
      <div style={{display:'grid',gridTemplateColumns:'min(300px,100%) 1fr',gap:20,alignItems:'start'}} className="admin-tematicas-grid">
        <div style={S.card}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:14}}>Cargar Nueva Portada</h3>
          {msg&&<div style={{background:'#f0fdf4',color:'#166534',padding:10,borderRadius:10,fontSize:12,fontWeight:700,marginBottom:10}}>{msg}</div>}
          <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
            <label><span style={S.label}>Nombre</span><input value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} style={S.input} placeholder="Ej: Spiderman" required/></label>
            <label><span style={S.label}>Emoji</span><input value={form.emoji} onChange={e=>setForm({...form,emoji:e.target.value})} maxLength={2} style={{...S.input,width:60,fontSize:24,textAlign:'center'}}/></label>
            <div>
              <span style={S.label}>Imagen (formato 9:16 ideal)</span>
              <div onClick={()=>fRef.current.click()} style={{border:'2px dashed #c4b5fd',borderRadius:12,padding:14,textAlign:'center',cursor:'pointer',background:'#faf5ff'}}>
                {form.prev
                  ?<img src={form.prev} alt="" style={{width:'100%',aspectRatio:'9/16',objectFit:'cover',borderRadius:8}}/>
                  :<div style={{color:'#7c3aed',fontSize:12,fontWeight:700}}>📤 Subir imagen<br/><span style={{fontSize:10,color:'#94a3b8',fontWeight:400}}>1080×1920px ideal · 9:16</span></div>}
              </div>
              <input ref={fRef} type="file" accept="image/*" onChange={onFile} style={{display:'none'}}/>
              <input value={form.img.startsWith('data:')?'':form.img} onChange={e=>setForm({...form,img:e.target.value,prev:''})} placeholder="O pegá una URL" style={{...S.input,marginTop:6,fontSize:11}}/>
            </div>
            <div>
              <span style={S.label}>Categorías</span>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
                {allCats.map(c=><button type="button" key={c} onClick={()=>toggleCat(c)} style={{padding:'3px 10px',borderRadius:99,fontSize:10,fontWeight:700,border:'none',cursor:'pointer',background:form.cats.includes(c)?'#7c3aed':'#f1f5f9',color:form.cats.includes(c)?'white':'#64748b'}}>{c}</button>)}
              </div>
              <form onSubmit={addCat} style={{display:'flex',gap:6}}>
                <input value={nuevaCat} onChange={e=>setNuevaCat(e.target.value)} placeholder="Nueva categoría..." style={{...S.input,flex:1,padding:'7px 10px',fontSize:11}}/>
                <button type="submit" style={{...S.btn,background:'#7c3aed',color:'white',padding:'7px 12px'}}>+</button>
              </form>
            </div>
            <button type="submit" style={{...S.btn,background:'#7c3aed',color:'white',width:'100%',padding:12}}>✓ Guardar Portada</button>
          </form>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10}}>
          {tematicas.map(t=>(
            <div key={t.id} style={{background:'#fff',borderRadius:14,overflow:'hidden',border:'1px solid #e2e8f0'}}>
              <div style={{aspectRatio:'9/16',background:'#0f172a',position:'relative',overflow:'hidden'}}>
                <img src={t.img} alt={t.nombre} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                <span style={{position:'absolute',bottom:5,left:5,background:'rgba(0,0,0,.75)',color:'white',fontSize:9,padding:'2px 5px',borderRadius:5,fontWeight:700}}>{t.nombre}</span>
                <span style={{position:'absolute',top:5,left:6,fontSize:16}}>{t.emoji}</span>
              </div>
              <button onClick={()=>setTematicas(tematicas.filter(x=>x.id!==t.id))} style={{width:'100%',padding:6,background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:11,fontWeight:700,borderTop:'1px solid #fee2e2'}}>🗑 Eliminar</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── ADMIN EXCEL ─────────────────────────────────────────── */
function AdminExcel({setVista,sucActId,eventos,setEventos}){
  const [txt,setTxt]=useState(''); const [msg,setMsg]=useState('');
  function sub(e){
    e.preventDefault();
    if(!txt.trim()){setMsg('Pega el texto de tu planilla.');return;}
    const filas=txt.split('\n').filter(l=>l.trim());
    let n=0;const nuevo=[...eventos];
    filas.forEach((f,i)=>{
      const c=f.split(/\t|;/).map(x=>x.trim());
      if(c.length>=3&&c[0]){
        nuevo.push({id:'ev-xl-'+Date.now()+i,sucId:sucActId,nombre:c[0],edad:c[1]||'5',dia:c[2],mes:c[3]||'05',anio:c[4]||'2026',hIni:c[5]||'17:00',hFin:c[6]||'22:00',nomPapa:c[7]||'',celPapa:c[8]||'',user:c[9]||(c[0].toLowerCase().replace(/\s/g,'')+'2026'),pass:c[10]||'1234',temId:'t-3',tipo:'Cumpleaños'});
        n++;
      }
    });
    setEventos(nuevo);setMsg(`✅ Se importaron ${n} cumpleaños.`);setTxt('');setTimeout(()=>setMsg(''),5000);
  }
  return(
    <div className="fade-in" style={{maxWidth:620,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <div style={S.card}>
        <h1 style={{fontWeight:900,fontSize:20,marginBottom:6}}>📊 Carga Excel Semanal</h1>
        <p style={{fontSize:12,color:'#64748b',marginBottom:16}}>Copiá las filas de tu planilla y pegálas acá.</p>
        {msg&&<div style={{background:'#f0fdf4',color:'#166534',padding:12,borderRadius:12,fontSize:12,fontWeight:700,marginBottom:14}}>{msg}</div>}
        <div style={{background:'#f8fafc',borderRadius:12,padding:12,fontSize:11,color:'#64748b',marginBottom:14,border:'1px dashed #e2e8f0'}}>
          <b>Columnas:</b> Nombre · Edad · Día · Mes · Año · HoraInicio · HoraFin · Padre/Madre · Celular · Usuario · Clave
        </div>
        <form onSubmit={sub}>
          <textarea rows={7} value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Pegá las filas acá..." style={{...S.input,fontFamily:'monospace',resize:'vertical'}}/>
          <button type="submit" style={{...S.btn,background:'#10b981',color:'white',width:'100%',padding:14,marginTop:12,fontSize:14}}>📤 Importar Fiestas</button>
        </form>
      </div>
    </div>
  );
}

              <div style={{display:'flex',alignItems:'center',gap:14}}>
                <div style={{background:sel?'#f59e0b':'#0088cc',color:'white',borderRadius:12,padding:'4px 10px',textAlign:'center',minWidth:50}}>
                  <div style={{fontWeight:900,fontSize:20,lineHeight:1}}>{ev.dia}</div>
                  <div style={{fontSize:8,textTransform:'uppercase'}}>{MESES[+ev.mes]?.slice(0,3)}</div>
                </div>
                <div><div style={{fontWeight:800,fontSize:14}}>{ev.nombre}</div><div style={{fontSize:11,color:'#64748b'}}>{ev.hIni} a {ev.hFin} · {ev.tipo}</div></div>
              </div>
              <div style={{textAlign:'right'}}><div style={{fontSize:28,fontWeight:900,color:sel?'#d97706':'#7c3aed'}}>{cnt}</div><div style={{fontSize:9,color:'#94a3b8'}}>confirmados</div></div>
            </div>
          );
        })}
      </div>
      {selId&&(
        <div className="fade-in">

          </div>

            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead><tr style={{background:'#f8fafc',borderBottom:'1px solid #e2e8f0'}}>
                {['Nombre','Adultos','Niños','Celular'].map(h=><th key={h} style={{padding:'10px 14px',textAlign:'left',fontWeight:700,color:'#64748b'}}>{h}</th>)}

            </select>
            <input value={fAnio} onChange={e=>setFAnio(e.target.value)} placeholder="Año" maxLength={4} style={{...S.input,width:80,padding:'8px 10px'}}/>
          </div>
          <p style={{fontSize:11,color:'#64748b',marginBottom:10,fontWeight:700}}>{targets.length} contacto(s)</p>
          <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:320,overflowY:'auto'}} className="scrollbar-none">
            {targets.length===0?<p style={{color:'#94a3b8',textAlign:'center',padding:20,fontSize:12}}>Sin contactos para ese período.</p>
              :targets.map(ev=>(
                <div key={ev.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#f8fafc',borderRadius:12,padding:'10px 14px',gap:8}}>
                  <div><div style={{fontWeight:800,fontSize:13}}>{ev.nomPapa}</div><div style={{fontSize:10,color:'#64748b'}}>Cumple de {ev.nombre} · {ev.dia}/{ev.mes}</div></div>
                  <button onClick={()=>enviar(ev)} style={{...S.btn,background:'#22c55e',color:'white',padding:'7px 14px',fontSize:11,whiteSpace:'nowrap'}}>💬 Enviar</button>
                </div>
              ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ADMIN FORMATOS DE TARJETA ───────────────────────────── */
function AdminFormatos({setVista,iaConfig,setIaConfig}){
  const [tipos,setTipos]=useState(()=>(iaConfig.tiposEvento&&iaConfig.tiposEvento.length)?iaConfig.tiposEvento:[]);
  const [msg,setMsg]=useState('');
  function upd(i,k,v){setTipos(ts=>ts.map((t,idx)=>idx===i?{...t,[k]:v}:t));}
  function quitar(i){setTipos(ts=>ts.filter((_,idx)=>idx!==i));}
  function agregar(){setTipos(ts=>[...ts,{id:'tipo-'+Math.floor(Math.random()*1e6),nombre:'Nuevo evento',edad:false,titulo:'¡Te esperamos!',dirigido:''}]);}
  function guardar(){setIaConfig(c=>({...c,tiposEvento:tipos}));setMsg('✓ Formatos guardados');setTimeout(()=>setMsg(''),2500);}
  return(
    <div className="fade-in" style={{maxWidth:760,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>

      <p style={{fontSize:11,color:'#64748b',marginBottom:16}}>Definí cómo se arma la invitación según el tipo de evento. Al cargar un evento, la tarjeta toma este formato automáticamente.</p>

      {tipos.map((t,i)=>(
        <div key={t.id||i} style={{...S.card,marginBottom:14,borderLeft:'4px solid #ec4899'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:11,fontWeight:900,color:'#ec4899',textTransform:'uppercase'}}>Tipo de evento</span>
            <button onClick={()=>quitar(i)} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:12,fontWeight:700}}>🗑 Quitar</button>
          </div>
          <label style={{display:'block',marginBottom:10}}><span style={S.label}>Nombre del tipo</span>
            <input value={t.nombre} onChange={e=>upd(i,'nombre',e.target.value)} style={S.input} placeholder="Ej: Bautismo"/>
          </label>
          <label style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,cursor:'pointer'}}>
            <input type="checkbox" checked={!!t.edad} onChange={e=>upd(i,'edad',e.target.checked)} style={{width:18,height:18,accentColor:'#ec4899'}}/>
            <span style={{fontSize:13,fontWeight:700,color:'#1e293b'}}>Mostrar la edad en la tarjeta</span>
          </label>
          <label style={{display:'block',marginBottom:10}}><span style={S.label}>Mensaje de la invitación</span>
            <input value={t.titulo} onChange={e=>upd(i,'titulo',e.target.value)} style={S.input} placeholder="Ej: ¡Te invitamos al Bautismo de {nombre}!"/>
            <span style={{fontSize:10,color:'#94a3b8'}}>Podés usar {'{nombre}'} y se reemplaza por el nombre del agasajado.</span>
          </label>
          <label style={{display:'block'}}><span style={S.label}>Dirigido a (opcional)</span>
            <input value={t.dirigido||''} onChange={e=>upd(i,'dirigido',e.target.value)} style={S.input} placeholder="Ej: Estimada maestra"/>
          </label>
        </div>

        <p style={{fontSize:11,color:'#64748b',marginBottom:10}}>Instrucción para calcular las cantidades según invitados, horas y estación.</p>
        <textarea value={cfg.prompt||''} onChange={e=>setCfg(c=>({...c,prompt:e.target.value}))} rows={5} style={{...S.input,resize:'vertical',fontFamily:'inherit'}} placeholder="Ej: Calculá las cantidades considerando estación, horas de fiesta y tipo de menú. Niños consumen más dulce que salado..."/>

                <span>{it.emoji}</span>{it.nombre}

              </span>
            ))}
            {(!cfg[k]||cfg[k].length===0)&&<span style={{fontSize:11,color:'#94a3b8'}}>Sin opciones todavía.</span>}
          </div>

            <input value={(nuevo[k]||{}).nombre||''} onChange={e=>setNuevo(x=>({...x,[k]:{...(x[k]||{}),nombre:e.target.value}}))} placeholder="Nombre de la comida" style={{...S.input,flex:1}}/>

function PapaLogin({setVista,eventos,setPapaSesion,setInvEvId}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');const [showP,setShowP]=useState(false);
  function sub(e){
    e.preventDefault();
    // Try to find event in local list first
    let ev=eventos.find(x=>x.user&&x.user.toLowerCase()===u.toLowerCase()&&x.pass===p);
    // If not found, try URL param papa (encoded credentials + event data)
    if(!ev){
      try{
        const papaParam=new URLSearchParams(window.location.search).get('papa');
        if(papaParam){const d=JSON.parse(atob(papaParam));if(d.user&&d.user.toLowerCase()===u.toLowerCase()&&d.pass===p)ev=d;}
      }catch(ex){}
    }
    if(!ev){setErr('Datos incorrectos. Verifica usuario y contrasena.');return;}
    const fF=new Date(+ev.anio,+ev.mes-1,+ev.dia);
    const fV=new Date(fF);fV.setDate(fF.getDate()+2);fV.setHours(0,0,0,0);
    const hoy=new Date();hoy.setHours(0,0,0,0);
    if(hoy>=fV){setErr('El acceso para este evento ha vencido.');return;}
    setPapaSesion(ev);setInvEvId(ev.id);setVista('papa-creador');
  }
  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'80vh',padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,boxShadow:'0 8px 32px rgba(0,0,0,0.10)'}}>
        <div style={{textAlign:'center',marginBottom:22}}><div style={{fontSize:48}}>🎂</div>
          <h2 style={{fontWeight:900,fontSize:20,marginTop:8}}>Acceso para Padres</h2>
          <p style={{color:'#64748b',fontSize:12,marginTop:4}}>Personalizá tu invitación digital</p>
        </div>
        {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:12,fontSize:12,marginBottom:12}}>{err}</div>}
        <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
          <input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} placeholder="Usuario" autoComplete="username" required/>
          <div style={{position:'relative'}}>
            <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="Contraseña" autoComplete="current-password" required/>
            <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8'}}>
              {showP?'🙈':'👁️'}
            </button>
          </div>
          <button style={{...S.btn,background:'#f97316',color:'white',padding:14,fontSize:14}}>Ingresar</button>
        </form>
      </div>
    </div>
  );
}

        <h3 style={{fontWeight:900,fontSize:17,marginBottom:4,textAlign:'center'}}>🎉 ¡{tipo==='imagen'?'Imágenes':'Videos'} listos!</h3>

  const [ftxt,setFtxt]=useState('');const [fcat,setFcat]=useState('TODOS');

  const [mejora,setMejora]=useState({brillo:110,contraste:115,saturacion:120,calidez:0,aplicado:false});

  const [shortLinkLoading,setShortLinkLoading]=useState(false);

    const lineas=[
      '*'+nombre+' te invita!*',
      'El dia '+fecha+' en '+salon,

  }
  // Menu IA
  const [menuAdultos,setMenuAdultos]=useState('');
  const [menuNinos,setMenuNinos]=useState('');
  const [menuResult,setMenuResult]=useState(null);
  const [menuGen,setMenuGen]=useState(false);
  const [menuEstacion,setMenuEstacion]=useState('Primavera');
  const [menuHoras,setMenuHoras]=useState('');
  const [menuSel,setMenuSel]=useState({ninos:{},adultos:{},snacks:{},postres:{},bebidas:{}});
  // FAQ chat
  const [faqQ,setFaqQ]=useState('');

  const suc=sucursales.find(s=>s.id===papaSesion.sucId)||sucursales[0];
  const temA=tematicas.find(t=>t.id===form.temId)||tematicas[0];
  const tFilt=tematicas.filter(t=>t.nombre.toLowerCase().includes(ftxt.toLowerCase())&&(fcat==='TODOS'||t.cats.includes(fcat)));
  const cssFilter=`brightness(${mejora.brillo}%) contrast(${mejora.contraste}%) saturate(${mejora.saturacion}%) sepia(${mejora.calidez}%)`;
  const fotoElegida=(form.usarMejorada&&form.fotoMejorada)?form.fotoMejorada:form.fotoNino;
  const portadaImg=modoPortada==='foto'&&fotoElegida?fotoElegida:temA.img;
  const esDoble=papaSesion.doble&&papaSesion.nombre2;
  const confsEv=(confs||[]).filter(c=>c.evId===papaSesion.id);

  function onFotoNino(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setForm(x=>({...x,fotoNino:ev.target.result,fotoMejorada:'',usarFoto:true}));r.readAsDataURL(f);}
  function aplicarMejora(){if(!form.fotoNino)return;const canvas=canvasRef.current;const img=new Image();img.onload=()=>{canvas.width=img.width;canvas.height=img.height;const ctx=canvas.getContext('2d');ctx.filter=cssFilter;ctx.drawImage(img,0,0);setForm(x=>({...x,fotoMejorada:canvas.toDataURL('image/jpeg',0.95)}));setMejora(m=>({...m,aplicado:true}));};img.src=form.fotoNino;}
  function guardar(e){e.preventDefault();const fmt=fmtTipo(form.tipo,iaConfig);setEventos(eventos.map(x=>x.id===papaSesion.id?{...x,...form,...fmt}:x));setPapaSesion({...papaSesion,...form,...fmt});setInvGuardada(true);alert('¡Invitación guardada! Los recursos exclusivos ya están disponibles.');}
  function descargarInvitacion(){
    const W=540,H=960;
    const canvas=document.createElement('canvas');
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');
    const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const fecha=papaSesion.dia+' de '+(meses[(+papaSesion.mes)-1]||'')+' de '+papaSesion.anio;
    // Fondo degradado (no depende de imágenes externas)
    const grad=ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0,'#1e0a4e');
    grad.addColorStop(0.5,'#7c3aed');
    grad.addColorStop(1,'#c2410c');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Círculos decorativos
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.beginPath();ctx.arc(W*0.8,H*0.2,180,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(W*0.1,H*0.7,140,0,Math.PI*2);ctx.fill();
    // Badge superior
    ctx.fillStyle='#f43f5e';
    ctx.beginPath();ctx.roundRect(W/2-90,44,180,40,20);ctx.fill();
    ctx.fillStyle='white';ctx.font='bold 18px Arial';ctx.textAlign='center';
    ctx.fillText('TE INVITO!',W/2,71);
    // Salon name
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='16px Arial';
    ctx.fillText(suc.nombre,W/2,140);
    // Nombre del festejado
    const nombre=form.nombre||papaSesion.nombre||'';
    ctx.fillStyle='#fef9c3';ctx.font='bold 70px Arial';ctx.textAlign='center';
    // Wrap if long
    if(ctx.measureText(nombre).width>480){ctx.font='bold 50px Arial';}
    ctx.fillText(nombre,W/2,H/2-60);
    // tipo + edad
    ctx.fillStyle='white';ctx.font='bold 26px Arial';
    ctx.fillText(fmtTipo(form.tipo,iaConfig).fmtEdad ? ((form.tipo||'Cumpleanos')+' · '+(form.edad||papaSesion.edad)+' anos') : (form.tipo||'Evento'),W/2,H/2);
    // Línea divisora
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(60,H/2+30,W-120,1);
    // Detalles del evento
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='22px Arial';
    ctx.fillText(fecha,W/2,H/2+80);
    ctx.fillText(papaSesion.hIni+' a '+papaSesion.hFin+' hs',W/2,H/2+115);
    // Caja lugar
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath();ctx.roundRect(40,H/2+148,W-80,100,20);ctx.fill();
    ctx.fillStyle='white';ctx.font='bold 24px Arial';
    ctx.fillText(suc.nombre,W/2,H/2+195);
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='17px Arial';
    const dir=suc.direccion||'';
    if(ctx.measureText(dir).width>440){ctx.font='14px Arial';}
    ctx.fillText(dir,W/2,H/2+225);
    // Footer
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='13px Arial';
    ctx.fillText('Invitaciones Digitales · '+suc.nombre,W/2,H-30);
    // Descargar
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',0.93);
    a.download='invitacion-'+(nombre||'evento').replace(/\s/g,'-')+'.jpg';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  function calcularMenu(){
    const a=+menuAdultos||0;const n=+menuNinos||0;const t=a+n;
    if(!t)return alert('Ingresá la cantidad de adultos y niños.');
    const h=+menuHoras||4;
    const cfg=iaConfig.menuConfig||{};
    // Season multipliers
    const bMult=menuEstacion==='Verano'?1.3:menuEstacion==='Invierno'?0.8:1.0;
    const hMult=h<=3?0.85:h===4?1.0:h===5?1.15:1.3;
    setMenuGen(true);

      const results=[];
      const shopping=[];
      // Helper: calc per item

/* ── INVITADO PORTADA ────────────────────────────────────── */
function InvPortada({setVista,eventos,invEvId,sucursales,volverInv}){
  const ev=eventos.find(e=>e.id===invEvId)||eventos[0];
  const suc=sucursales.find(s=>s.id===ev?.sucId)||sucursales[0];
  const col=suc.color||'#f97316';
  React.useEffect(()=>{
    const container=document.getElementById('confetti-container');
    if(!container)return;
    const colors=['#fff','#fde68a','#fed7aa','#fecdd3','#ffffff','#fef3c7'];
    for(let i=0;i<60;i++){
      const el=document.createElement('div');
      const size=Math.random()*8+4;
      el.style.cssText='position:absolute;width:'+size+'px;height:'+size+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:'+(Math.random()>0.5?'50%':'2px')+';left:'+Math.random()*100+'%;top:-20px;opacity:0;animation:fall '+(Math.random()*3+2)+'s '+(Math.random()*3)+'s infinite;';
      container.appendChild(el);
    }
    const style=document.createElement('style');
    style.textContent='@keyframes fall{0%{top:-20px;opacity:1;transform:rotate(0deg) translateX(0)}100%{top:110%;opacity:0;transform:rotate(360deg) translateX('+(Math.random()>0.5?'':'-')+'50px)}}';
    document.head.appendChild(style);
    return()=>{if(container)container.innerHTML='';};
  },[]);
  return(
    <div style={{minHeight:'100vh',background:col,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',position:'relative',overflow:'hidden'}}>
      {volverInv&&<button onClick={()=>setVista(volverInv)} style={{position:'fixed',top:12,left:12,zIndex:20,background:'rgba(0,0,0,.55)',color:'white',border:'none',borderRadius:99,padding:'8px 14px',fontSize:13,fontWeight:800,cursor:'pointer'}}>← Volver al panel</button>}
      <div id="confetti-container" style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:0}}></div>
      <div style={{position:'absolute',top:'10%',left:'10%',width:200,height:200,borderRadius:'50%',background:'rgba(255,255,255,.12)',filter:'blur(40px)'}}></div>
      <div style={{position:'absolute',bottom:'15%',right:'5%',width:160,height:160,borderRadius:'50%',background:'rgba(255,255,255,.10)',filter:'blur(30px)'}}></div>
      <div style={{position:'relative',zIndex:1}}>
        {suc.logo?<img src={suc.logo} alt={suc.nombre} style={{width:90,height:90,borderRadius:'50%',objectFit:'cover',border:'4px solid white',boxShadow:'0 4px 20px rgba(0,0,0,.2)',marginBottom:24}}/>:<div style={{fontSize:52,marginBottom:20}}>{'🎉'}</div>}
        <p style={{color:'rgba(255,255,255,.9)',fontSize:13,fontWeight:600,letterSpacing:2,textTransform:'uppercase',margin:'0 0 10px'}}>{suc.portadaFrase||'Recibiste una invitacion de'}</p>
        <h1 style={{color:'white',fontSize:40,fontWeight:900,margin:'0 0 24px',textShadow:'0 2px 16px rgba(0,0,0,.25)',lineHeight:1.1}}>{ev?ev.nombre:'...'}</h1>
        <p style={{color:'rgba(255,255,255,.8)',fontSize:15,margin:'0 0 28px'}}>Descubri donde es el evento?</p>
        <button onClick={()=>setVista('invitado-web')} style={{background:'white',color:col,fontWeight:800,fontSize:16,border:'none',borderRadius:99,padding:'16px 48px',cursor:'pointer',boxShadow:'0 8px 32px rgba(0,0,0,.15)'}}>
          Abrir Invitacion
        </button>
        <p style={{marginTop:36,color:'rgba(255,255,255,.35)',fontSize:11}}>{'by '+suc.nombre+' - Invitaciones Digitales'}</p>
      </div>
    </div>
  );
}

/* ── INVITADO WEB ─────────────────────────────────────────── */
function InvWeb({setVista,eventos,invEvId,sucursales,tematicas,confs,setConfs,volverInv}){
  const ev=eventos.find(e=>e.id===invEvId)||eventos[0];
  const suc=sucursales.find(s=>s.id===ev?.sucId)||sucursales[0];
  const tem=tematicas.find(t=>t.id===ev?.temId)||tematicas[0];
  const col=suc.color||'#f97316';
  // Formato según tipo de evento (viaja guardado en el evento)
  const fEdad = (ev && ev.fmtEdad!==undefined) ? ev.fmtEdad : true;
  const fTitulo = (ev && ev.fmtTitulo) ? ev.fmtTitulo.replace(/\{nombre\}/g, ev.nombre||'') : 'Quiero invitarte a festejar mi cumple!';
  const fDirigido = (ev && ev.fmtDirigido) || '';
  const fotos=(suc.fotos||[]).filter(f=>f&&f.length>0);
  const [nom,setNom]=useState('');
  const [ad,setAd]=useState(1);
  const [ni,setNi]=useState(1);
  const [cel,setCel]=useState('');
  const [ok,setOk]=useState(false);
  const [countdown,setCountdown]=useState({dias:0,horas:0,mins:0,segs:0,llego:false});

  React.useEffect(()=>{
    function calcular(){
      if(!ev)return;
      const hoy=new Date();
      const fecha=new Date(ev.anio,ev.mes-1,ev.dia,+(ev.hFin||'23').split(':')[0],0,0);
      const diff=fecha-hoy;
      if(diff<=0){setCountdown({dias:0,horas:0,mins:0,segs:0,llego:true});return;}
      const dias=Math.floor(diff/86400000);
      const horas=Math.floor((diff%86400000)/3600000);
      const mins=Math.floor((diff%3600000)/60000);
      const segs=Math.floor((diff%60000)/1000);
      setCountdown({dias,horas,mins,segs,llego:false});
    }
    calcular();
    const t=setInterval(calcular,1000);
    return()=>clearInterval(t);
  },[ev]);

  function conf(e){
    e.preventDefault();
    setConfs(prev=>{
      const updated=[...prev,{id:'c-'+Date.now(),evId:ev.id,invitado:nom,adultos:ad,ninos:ni,cel}];
      try{localStorage.setItem('fz_confs',JSON.stringify(updated));}catch(err){}
      return updated;
    });
    setOk(true);
    const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const fecha=ev.dia+' de '+(meses[(+ev.mes)-1]||'')+' de '+ev.anio;
    const link=window.location.href;
    const lineas=[
      'Hola '+ev.nomPapa+'!',
      '',
      nom+' confirma asistencia al '+ev.tipo+' de '+ev.nombre,
      'Fecha: '+fecha,
      '',
      'Asistimos: '+ni+' ninos y '+ad+' adultos',
      '',
      'Invitacion: '+link,
    ];
    setTimeout(()=>{
      window.open('https://wa.me/'+waNum(ev.celPapa)+'?text='+encodeURIComponent(lineas.join('\n')),'_blank');
      setNom('');setCel('');setAd(1);setNi(1);setOk(false);
    },1800);
  }

  const diaStr=ev?(ev.dia+'/'+ev.mes+'/'+ev.anio):'';
  const horario=ev?('de '+ev.hIni+' a '+ev.hFin+'hs'):'';

  return(
    <div style={{background:'white',minHeight:'100vh',fontFamily:'Arial,sans-serif',maxWidth:480,margin:'0 auto'}}>
      {volverInv&&<button onClick={()=>setVista(volverInv)} style={{position:'fixed',top:12,left:12,zIndex:20,background:'rgba(0,0,0,.6)',color:'white',border:'none',borderRadius:99,padding:'8px 14px',fontSize:13,fontWeight:800,cursor:'pointer'}}>← Volver al panel</button>}

      {/* 1. IMAGEN TEMATICA FULL */}
      <div style={{position:'relative',width:'100%'}}>
        <img src={tem.img} alt={tem.nombre} style={{width:'100%',display:'block',maxHeight:500,objectFit:'cover'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 55%)'}}></div>
        <span style={{position:'absolute',top:14,left:14,background:'#f43f5e',color:'white',fontSize:12,padding:'5px 16px',borderRadius:99,fontWeight:900,letterSpacing:1}}>TE INVITO!</span>
      </div>

      {/* 2. LOGO centrado sobre la imagen */}
      <div style={{display:'flex',justifyContent:'center',marginTop:-50,marginBottom:8,position:'relative',zIndex:2}}>
        {suc.logo?(
          <div style={{width:100,height:100,borderRadius:'50%',border:'5px solid '+col,overflow:'hidden',background:'white',boxShadow:'0 4px 20px rgba(0,0,0,.18)'}}>
            <img src={suc.logo} alt={suc.nombre} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          </div>
        ):(
          <div style={{width:100,height:100,borderRadius:'50%',border:'5px solid '+col,background:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,boxShadow:'0 4px 20px rgba(0,0,0,.18)'}}>
            {suc.emoji||'🎪'}
          </div>
        )}
      </div>

      {/* 3. NOMBRE */}
      <div style={{textAlign:'center',padding:'0 20px 12px'}}>
        <h1 style={{color:col,fontSize:44,fontWeight:900,margin:'0 0 8px',lineHeight:1}}>{ev?ev.nombre:''}</h1>

        {/* 4. FRASE (según formato del tipo de evento) */}
        {fDirigido&&<p style={{color:'#888',fontSize:15,margin:'0 0 4px',fontWeight:700}}>{fDirigido}</p>}
        <p style={{color:'#333',fontSize:18,margin:'0 0 8px'}}>{fTitulo}</p>

        {/* 5. EDAD (solo si el formato lo indica) */}
        {fEdad&&<p style={{color:col,fontSize:72,fontWeight:900,margin:'0 0 8px',lineHeight:1}}>{ev?ev.edad:''}</p>}

        {/* 6. FECHA */}
        <p style={{color:'#555',fontSize:17,margin:'0 0 2px'}}>Te espero el dia</p>
        <p style={{color:'#1e293b',fontSize:22,fontWeight:900,margin:'0 0 2px'}}>{diaStr}</p>
        <p style={{color:'#555',fontSize:16,margin:'0 0 20px'}}>{horario}</p>

        {/* 7. COUNTDOWN o LLEGO EL DIA */}
        {countdown.llego?(
          <div className="bounce" style={{textAlign:'center',padding:'16px 0'}}>
            <p style={{color:col,fontSize:32,fontWeight:900,margin:0,animation:'pulse 0.8s infinite alternate'}}>LLEGO EL DIA!</p>
          </div>
        ):(
          <div style={{background:'#f8fafc',borderRadius:16,padding:'14px 10px',marginBottom:8}}>
            <p style={{fontSize:12,color:'#888',margin:'0 0 8px',fontWeight:600}}>Cuenta regresiva</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
              {[['dias',countdown.dias],['horas',countdown.horas],['min',countdown.mins],['seg',countdown.segs]].map(([lbl,val])=>(
                <div key={lbl} style={{background:'white',borderRadius:12,padding:'10px 4px',boxShadow:'0 2px 8px rgba(0,0,0,.08)'}}>
                  <div style={{fontSize:28,fontWeight:900,color:col,lineHeight:1}}>{String(val).padStart(2,'0')}</div>
                  <div style={{fontSize:10,color:'#888',marginTop:2}}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 8. FESTEJO EN EL SALON */}
      <div style={{textAlign:'center',padding:'16px 20px',borderTop:'1px solid #f0f0f0',borderBottom:'1px solid #f0f0f0'}}>
        <p style={{color:'#333',fontSize:22,margin:'0 0 4px',fontWeight:400}}>Festejo en el salon</p>
        <p style={{color:col,fontSize:28,fontWeight:900,margin:0,textTransform:'uppercase'}}>{suc.nombre}</p>
      </div>

      {/* 9. FOTOS 2x2 */}
      {fotos.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:3,margin:'3px 0'}}>
          {fotos.slice(0,4).map((f,i)=>(
            <div key={i} style={{aspectRatio:'1',overflow:'hidden',background:'#e2e8f0'}}>
              <img src={f} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            </div>
          ))}
        </div>
      )}

      {/* 10. DIRECCIÓN */}
      <div style={{padding:'20px',textAlign:'center',borderBottom:'1px solid #f0f0f0'}}>
        <p style={{color:'#888',fontSize:14,margin:'0 0 4px'}}>se encuentra ubicado en</p>
        <a href={'https://maps.google.com/?q='+encodeURIComponent(suc.direccion||'')} target="_blank"
          style={{color:'#1e293b',fontSize:17,fontWeight:700,textDecoration:'underline',textDecorationColor:col,display:'block'}}>
          {suc.direccion}
        </a>
      </div>

      {/* 11. BOTONES */}
      <div style={{padding:'16px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        <button onClick={()=>document.getElementById('conf-form-'+ev.id)&&document.getElementById('conf-form-'+ev.id).scrollIntoView({behavior:'smooth'})}
          style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'👥'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>CONFIRMAR</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>ASISTENCIA</span>
        </button>
        <a href={'https://maps.google.com/?q='+encodeURIComponent(suc.direccion||'')} target="_blank"
          style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,textDecoration:'none',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'📍'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>COMO</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>LLEGAR</span>
        </a>
        <button onClick={()=>{
            if(suc.web){window.open(suc.web,'_blank');}
            else{alert(suc.nombre+'\n'+suc.direccion+(suc.tel?'\nTel: '+suc.tel:''));}
          }} style={{border:'2px solid '+col,borderRadius:14,padding:'14px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',background:col+'0d'}}>
          <span style={{fontSize:22}}>{'🎪'}</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>INFO DEL</span>
          <span style={{fontSize:9,fontWeight:900,color:'#1e293b',textAlign:'center'}}>SALON</span>
        </button>
      </div>

      {/* 12. CONFIRMAR ASISTENCIA */}
      <div style={{margin:'0 16px 12px',border:'2px dashed '+col,borderRadius:18,padding:'16px',textAlign:'center'}}>
        <p style={{fontSize:24,fontWeight:900,color:'#1e293b',margin:'0 0 4px'}}>Confirmar tu asistencia</p>
        <p style={{fontSize:14,color:'#888',margin:0}}>es muy importante. Muchas Gracias.</p>
      </div>

      {/* 13. FORM */}
      <div id={'conf-form-'+ev.id} style={{margin:'0 16px 16px',background:'#fff',borderRadius:18,padding:16,border:'1px solid '+col+'44'}}>
        <p style={{fontSize:13,fontWeight:900,textAlign:'center',marginBottom:12,textTransform:'uppercase',color:col}}>Registra tu Asistencia</p>
        {ok?(
          <div style={{background:'#f0fdf4',color:'#166534',padding:12,borderRadius:12,textAlign:'center',fontSize:13,fontWeight:700}}>Asistencia registrada! Gracias!</div>
        ):(
          <form onSubmit={conf} style={{display:'flex',flexDirection:'column',gap:8}}>
            <input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Tu nombre" required style={{...S.input,border:'1px solid '+col+'66',fontSize:14}}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div><label style={{fontSize:11,color:'#888',display:'block',marginBottom:2}}>Ninos</label>
                <input type="number" value={ni} onChange={e=>setNi(e.target.value)} min={0} style={{...S.input,border:'1px solid '+col+'66',textAlign:'center',fontSize:14}}/></div>
              <div><label style={{fontSize:11,color:'#888',display:'block',marginBottom:2}}>Adultos</label>
                <input type="number" value={ad} onChange={e=>setAd(e.target.value)} min={1} style={{...S.input,border:'1px solid '+col+'66',textAlign:'center',fontSize:14}}/></div>
            </div>
            <input value={cel} onChange={e=>setCel(e.target.value)} placeholder="Tu celular" required style={{...S.input,border:'1px solid '+col+'66',fontSize:14}}/>
            <button type="submit" style={{...S.btn,background:col,color:'white',padding:12,fontSize:14,width:'100%'}}>Confirmar Asistencia</button>
          </form>
        )}
      </div>

      {/* 14. COMPARTIR */}
      <div style={{margin:'0 16px 16px'}}>
        <button onClick={()=>{
          const baseUrl2=(window.location.href.split('?')[0]);
          const evData2={id:ev.id,sucId:ev.sucId,nombre:ev.nombre,tipo:ev.tipo||'Cumpleanos',edad:ev.edad,dia:ev.dia,mes:ev.mes,anio:ev.anio,hIni:ev.hIni,hFin:ev.hFin,celPapa:ev.celPapa,nomPapa:ev.nomPapa,temId:ev.temId};
          const link=baseUrl2+'?inv='+ev.id;
          const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
          const fecha=ev.dia+' de '+(meses[(+ev.mes)-1]||'')+' de '+ev.anio;
          const lineas=[ev.nombre+' te invita a su '+ev.tipo,'El dia '+fecha,'en '+suc.nombre,'','Abri la invitacion:',link];
          window.open('https://wa.me/?text='+encodeURIComponent(lineas.join('\n')),'_blank');
        }} style={{...S.btn,width:'100%',background:'#25d366',color:'white',padding:12,fontSize:14}}>
          Compartir por WhatsApp
        </button>
      </div>

      {/* 15. FOOTER */}
      <div style={{background:col,color:'white',padding:'20px 16px',textAlign:'center'}}>
        <p style={{fontSize:12,fontWeight:700,margin:'0 0 4px',opacity:.9}}>Invitaciones Virtuales Interactivas</p>
        <p style={{fontSize:14,fontWeight:900,margin:0}}>{'by '+suc.nombre+'®'}</p>
      </div>

    </div>
  );
}

/* ── RENDER ──────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
