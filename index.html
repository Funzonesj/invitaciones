// ¿El acceso del evento está vencido?
// La tarjeta sigue viva el día del cumple + 1 semana completa después (para subir
// las fotos del cumple y que los invitados las vean). Recién al 8º día se cierra.
function estaVencido(ev){
  if(!ev||!ev.anio||!ev.mes||!ev.dia) return false;
  const fF=new Date(+ev.anio,+ev.mes-1,+ev.dia);
  const fV=new Date(fF);fV.setDate(fF.getDate()+8);fV.setHours(0,0,0,0);
  const hoy=new Date();hoy.setHours(0,0,0,0);
  return hoy>=fV;
}
// Normaliza un celular argentino al formato internacional que necesita WhatsApp (54 9 + area + numero)
function waNum(n){
  let d=(n||'').toString().replace(/\D/g,'');     // dejar solo dígitos
  if(!d) return '';
  if(d.startsWith('549')) return d;                // ya está completo
  if(d.startsWith('54'))  return '549'+d.slice(2); // tiene país pero falta el 9 de celular
  if(d.startsWith('0'))   d=d.slice(1);            // sacar 0 inicial (ej: 0264...)
  return '549'+d;                                  // agregar código país Argentina + 9 móvil
}
// ¿Estamos en una compu (no celular)? Para abrir WhatsApp de la mejor forma en cada caso.
function esEscritorioWA(){ try{ return !/Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent); }catch(e){ return false; } }
// Abre WhatsApp con un mensaje (y opcionalmente un número). En la COMPU abre WhatsApp WEB
// (web.whatsapp.com) en una pestaña — así usa la cuenta vinculada en el navegador (p.ej. Business),
// y NO abre la app de escritorio del WhatsApp normal. En el CELULAR usa wa.me (abre la app).
function abrirWA(phone, text){
  const t = text ? encodeURIComponent(text) : '';
  const p = phone ? String(phone) : '';
  if(esEscritorioWA()){
    const url = 'https://web.whatsapp.com/send?'+(p?('phone='+p):'')+(p&&t?'&':'')+(t?('text='+t):'');
    window.open(url,'_blank');
  } else {
    window.open('https://wa.me/'+p+(t?('?text='+t):''),'_blank');
  }
}

}

function resizeImg(file, maxW, cb){

  r.readAsDataURL(file);
}

// Ordena temáticas con las MÁS RECIENTES primero (por la fecha guardada en el id "t-<fecha>...",
// o por el campo .ts si existe; como desempate, lo último cargado va primero).
function ordenarRecientes(arr){
  return (arr||[]).map((t,i)=>[t,i]).sort((A,B)=>{
    const a=A[0],b=B[0];
    const fa=(a&&a.ts)||parseInt(String((a&&a.id)||'').replace(/^t-/,'').split('-')[0].replace(/[^0-9]/g,''))||0;
    const fb=(b&&b.ts)||parseInt(String((b&&b.id)||'').replace(/^t-/,'').split('-')[0].replace(/[^0-9]/g,''))||0;
    if(fb!==fa)return fb-fa;
    return B[1]-A[1];
  }).map(x=>x[0]);
}

function generarTarjetaImagen(ev, suc, tematicas, iaConfig, accion){
  if(!ev) return;
  const W=540,H=960;
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const fecha=ev.dia+' de '+(meses[(+ev.mes)-1]||'')+' de '+ev.anio;
  const nombre=ev.nombre||'';
  const col=(suc&&suc.color)||'#7c3aed';
  const F=fmtTipo(ev.tipo,iaConfig);
  const portadaImg=ev.portadaSrc||((((tematicas||[]).find(t=>t.id===ev.temId))||{}).img)||'';
  function dibujar(imgEl){
    const canvas=document.createElement('canvas');canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');
    ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
    if(imgEl){const iw=imgEl.width,ih=imgEl.height,sc=Math.max(W/iw,H/ih),dw=iw*sc,dh=ih*sc;ctx.drawImage(imgEl,(W-dw)/2,0,dw,dh);}
    else{const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#1e0a4e');g.addColorStop(1,col);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    const og=ctx.createLinearGradient(0,H*0.4,0,H);og.addColorStop(0,'rgba(0,0,0,0)');og.addColorStop(1,'rgba(0,0,0,0.88)');ctx.fillStyle=og;ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#f43f5e';ctx.beginPath();ctx.roundRect(W/2-90,40,180,40,20);ctx.fill();ctx.fillStyle='white';ctx.font='bold 18px Arial';ctx.fillText('TE INVITO!',W/2,67);
    let y=H-320;
    if(F.fmtNombre!==false&&nombre){ctx.fillStyle='#fff';ctx.font='bold 64px Arial';if(ctx.measureText(nombre).width>490)ctx.font='bold 44px Arial';ctx.fillText(nombre,W/2,y);y+=54;}
    const _u=(ev.edadUnidad||'años');
    const tipoTxt=(F.fmtEdad&&_u!=='noaplica'&&ev.edad)?((ev.tipo||'')+' · '+ev.edad+' '+(_u==='meses'?'meses':'años')):(ev.tipo||'');
    ctx.fillStyle='#fde68a';ctx.font='bold 24px Arial';ctx.fillText(tipoTxt,W/2,y);y+=46;
    ctx.fillStyle='#fff';ctx.font='22px Arial';ctx.fillText(fecha,W/2,y);y+=32;ctx.fillText((ev.hIni||'')+' a '+(ev.hFin||'')+' hs',W/2,y);y+=42;
    ctx.fillStyle='#fff';ctx.font='bold 26px Arial';ctx.fillText((suc&&suc.nombre)||'',W/2,y);y+=30;
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='16px Arial';const dir=(suc&&suc.direccion)||'';if(ctx.measureText(dir).width>490)ctx.font='13px Arial';ctx.fillText(dir,W/2,y);
    canvas.toBlob(function(blob){
      if(!blob){alert('No se pudo crear la imagen.');return;}
      const fname='tarjeta-'+((nombre||'evento').toLowerCase().replace(/[^a-z0-9]/g,'')||'evento')+'.jpg';
      const file=new File([blob],fname,{type:'image/jpeg'});
      if(accion==='compartir'&&/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Invitación',text:'¡Te invito!'}).catch(function(){});}
      else{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);if(accion==='compartir')alert('📷 La tarjeta se descargó como imagen en tu compu. Ahora abrí WhatsApp (o WhatsApp Web) y adjuntá esa imagen para enviarla.');}
    },'image/jpeg',0.92);

}

/* ── ADMIN LOGIN ─────────────────────────────────────────── */
function AdminLogin({onLogin}){
  const [u,setU]=useState(''); const [p,setP]=useState(''); const [err,setErr]=useState(''); const [showP,setShowP]=useState(false); const [cargando,setCargando]=useState(false);
  async function sub(e){e.preventDefault();setCargando(true);const r=await onLogin(u,p);setCargando(false);if(r)setErr(r);}
  return(
    <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'80vh',padding:16}}>
      <div className="fade-in" style={{...S.card,maxWidth:360,width:'100%',padding:32,boxShadow:'0 8px 32px rgba(0,0,0,0.10)'}}>
        <div style={{textAlign:'center',marginBottom:24}}><div style={{fontSize:48}}>🔐</div>
          <h2 style={{fontWeight:900,fontSize:22,marginTop:8}}>Panel Administrativo</h2>
          <p style={{color:'#64748b',fontSize:12,marginTop:4}}>Ingreso seguro</p>
        </div>
        {err&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',padding:'10px 14px',borderRadius:12,fontSize:12,marginBottom:14}}>{err}</div>}
        <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
          <input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} placeholder="Email (dueña) o usuario (encargada)" autoComplete="username" required/>
          <div style={{position:'relative'}}>
            <input style={{...S.input,paddingRight:44}} type={showP?'text':'password'} value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="Contraseña" autoComplete="current-password" required/>
            <button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:18,color:'#94a3b8'}}>
              {showP?'🙈':'👁️'}
            </button>
          </div>
          <button disabled={cargando} style={{...S.btn,background:cargando?'#94a3b8':'linear-gradient(135deg,#06b6d4,#7c3aed)',color:'white',padding:'13px',fontSize:14}}>{cargando?'Ingresando...':'Ingresar al Sistema'}</button>
        </form>
        <p style={{color:'#94a3b8',fontSize:11,marginTop:14,lineHeight:1.5,textAlign:'center'}}>👑 <b>Dueña:</b> entrá con tu <b>email</b> y contraseña.<br/>🧑‍💼 <b>Encargada:</b> entra con el <b>usuario</b> que le creó la dueña.</p>
      </div>
    </div>
  );
}

/* ── ADMIN GENERADOR DE CATÁLOGO (fal.ai) ────────────────── */
function AdminCatalogo({setVista,tematicas,setTematicas,modo}){
  const esMejorador = modo==='mejorador';
  const PURPLE='#534AB7';
  const [img,setImg]=useState('');
  const [opt,setOpt]=useState(esMejorador?'enhance':'3d');
  const [model,setModel]=useState(esMejorador?'fal-ai/flux-pro/kontext':'fal-ai/flux-pro/kontext/text-to-image');
  const [ratio,setRatio]=useState('9:16');
  const [cargando,setCargando]=useState(false);
  const [err,setErr]=useState('');
  const [resultUrl,setResultUrl]=useState('');
  const [prompt,setPrompt]=useState('');
  const [copiado,setCopiado]=useState(false);
  const [msg,setMsg]=useState('');
  const [guardarOpen,setGuardarOpen]=useState(false);
  const [gNombre,setGNombre]=useState('');
  const [gCats,setGCats]=useState(['TODOS']);
  const fileRef=useRef();
  function toggleGCat(c){setGCats(cs=>cs.includes(c)?cs.filter(x=>x!==c):[...cs,c]);}

  const prompt3D='Hyper realistic 3D render, NOT cartoon, NOT anime, NOT illustration, NOT 2D,\nphotorealistic 3D Pixar movie quality, cinematic lighting, ultra high quality,\n8K resolution, full body portrait, vertical 9:16 format,\nwarm welcoming smile, arms slightly open as if inviting someone for a hug,\nleave extra empty clean space at the top of the image for text overlay,\nno text, no watermark, clean background behind character.';
  const promptEnhance='Enhance this image quality only.\nKeep the exact same art style as the original.\nDo NOT change to 3D, do NOT change to photorealistic.\nDo NOT modify the art style in any way.\nKeep exact same character design, colors, pose and composition.\nOnly improve: sharpness, resolution, color vibrancy, lighting and details.\nRemove any noise, blur or artifacts.\nFill the whole vertical 9:16 portrait frame with the character, tight/close framing, NO empty space at the top, the character fills the image edge to edge.\nUltra high quality, 8K resolution. No text, no watermark.';

  function selectOption(o){setOpt(o);setModel(o==='enhance'?'fal-ai/flux-pro/kontext':'fal-ai/flux-pro/kontext/text-to-image');}
  function onFile(e){const f=e.target.files[0];if(!f)return;resizeImg(f,1024,data=>setImg(data));}
  async function pegarImagen(){
    setErr('');
    try{
      const items=await navigator.clipboard.read();
      for(const it of items){
        const tipo=it.types.find(t=>t.startsWith('image/'));
        if(tipo){const blob=await it.getType(tipo);resizeImg(blob,1024,data=>setImg(data));return;}
      }
      setErr('No hay ninguna imagen en el portapapeles. Copiá una imagen primero.');
    }catch(e){setErr('No se pudo leer el portapapeles. Probá con Ctrl+V o subí el archivo.');}
  }
  // Pegar con Ctrl+V en cualquier parte de la sección
  useEffect(()=>{
    function onPaste(e){
      const items=e.clipboardData&&e.clipboardData.items;if(!items)return;
      for(const it of items){if(it.type&&it.type.startsWith('image/')){const f=it.getAsFile();if(f){resizeImg(f,1024,data=>setImg(data));e.preventDefault();}break;}}
    }
    document.addEventListener('paste',onPaste);
    return ()=>document.removeEventListener('paste',onPaste);
  },[]);

  async function generar(){
    setErr('');setMsg('');
    if(!img){setErr('Subí una imagen primero');return;}
    const esTresD=opt==='3d';
    const p=esTresD?prompt3D:promptEnhance;
    setPrompt(p);setCargando(true);setResultUrl('');
    try{
      const size=ratio==='9:16'?{width:768,height:1366}:ratio==='1:1'?{width:1024,height:1024}:{width:1024,height:768};
      // 3D: describir la imagen + flux text-to-image (esquiva restricciones). Mejorar: flux imagen→imagen.
      const body=esTresD
        ?{prompt:p,image:img,model:'fal-ai/flux-pro/kontext/text-to-image',size,describir:true,isI2I:false}
        :{prompt:p,image:img,model:'fal-ai/flux-pro/kontext',size,isI2I:true};
      const resp=await fetch('/api/generar-catalogo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await resp.json().catch(()=>({error:'Respuesta inválida del servidor.'}));
      if(!resp.ok)throw new Error(data.error||'No se pudo generar.');
      if(!data.url)throw new Error('No se recibió imagen. Probá de nuevo.');
      setResultUrl(data.url);
    }catch(e){setErr(String((e&&e.message)||e));}
    finally{setCargando(false);}
  }
  function copiar(){if(navigator.clipboard)navigator.clipboard.writeText(prompt).then(()=>{setCopiado(true);setTimeout(()=>setCopiado(false),2000);});}
  function guardarEnCatalogo(){
    if(!gNombre.trim()){setErr('Poné un nombre para el personaje.');return;}
    const cats=gCats.includes('TODOS')?gCats:['TODOS',...gCats];
    setErr('');setMsg('Guardando…');
    // Bajar y achicar la imagen para guardarla liviana
    fetch(resultUrl).then(r=>r.blob()).then(blob=>{
      const burl=URL.createObjectURL(blob);const im=new Image();
      im.onload=()=>{try{const sc=Math.min(1,500/im.width);const cv=document.createElement('canvas');cv.width=Math.round(im.width*sc);cv.height=Math.round(im.height*sc);cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);const data=cv.toDataURL('image/jpeg',0.72);setTematicas(p=>[...p,{id:'t-'+Date.now(),nombre:gNombre.trim(),cats,img:data,emoji:'🎨',ia:true}]);setMsg('✅ Guardado en el Catálogo IA');flashOk('✓ ¡Guardado en el catálogo!');setGuardarOpen(false);setGNombre('');setGCats(['TODOS']);setTimeout(()=>setMsg(''),3500);}catch(err){setMsg('No se pudo guardar. Descargala y subila manualmente en Portadas.');}URL.revokeObjectURL(burl);};
      im.onerror=()=>{setMsg('No se pudo guardar. Descargala y subila manualmente en Portadas.');};
      im.src=burl;
    }).catch(()=>setMsg('No se pudo descargar la imagen. Usá el botón Descargar y subila en Portadas.'));
  }

  const optBtn=(o,emoji,titulo,desc)=>(
    <div onClick={()=>selectOption(o)} style={{flex:1,padding:'12px',borderRadius:12,cursor:'pointer',border:opt===o?('2px solid '+PURPLE):'1px solid #e2e8f0',background:opt===o?'#EEEDFE':'#fff',transition:'all .15s'}}>
      <div style={{fontSize:22,marginBottom:4}}>{emoji}</div>
      <div style={{fontSize:13,fontWeight:800,color:opt===o?'#3C3489':'#1e293b'}}>{titulo}</div>
      <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{desc}</div>
    </div>
  );

  return(
    <div className="fade-in" style={{maxWidth:560,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>{esMejorador?'🪄 Mejorador de imagen':'🎨 Generador de imagen IA'}</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:18}}>{esMejorador?'Subí una foto y mejorá su calidad (nitidez, color, resolución) con IA, sin cambiar el estilo.':'Subí un personaje y generá su versión en 3D estilo Pixar para el catálogo.'}</p>

      <label style={S.label}>Imagen del personaje</label>
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFile}/>
      <div style={{position:'relative',border:img?('2px solid '+PURPLE):'2px dashed #cbd5e1',borderRadius:12,padding:img?0:'28px',textAlign:'center',cursor:'pointer',background:'#fff',marginBottom:14,overflow:'hidden'}} onClick={()=>{if(!img)fileRef.current.click();}}>
        {img
          ?<img src={img} alt="" style={{width:'100%',maxHeight:280,objectFit:'contain',borderRadius:10,display:'block'}}/>
          :<div><div style={{fontSize:34,marginBottom:6}}>🖼️</div><div style={{fontSize:14,color:'#64748b',fontWeight:700}}>Hacé clic para subir la imagen</div><div style={{fontSize:11,color:'#94a3b8',marginTop:4}}>JPG, PNG, WEBP · o pegá con Ctrl+V</div></div>}
        {img&&<button type="button" onClick={(e)=>{e.stopPropagation();setImg('');setResultUrl('');setGuardarOpen(false);}} style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,.6)',color:'white',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center'}}>🗑</button>}
      </div>
      {img&&<button type="button" onClick={()=>{setImg('');setResultUrl('');setGuardarOpen(false);fileRef.current.click();}} style={{...S.btn,width:'100%',background:'#f1f5f9',color:'#334155',marginBottom:14}}>🔄 Cambiar por otra imagen</button>}
      <button type="button" onClick={pegarImagen} style={{...S.btn,width:'100%',background:'#f1f5f9',color:'#334155',marginBottom:14}}>📋 Pegar imagen del portapapeles</button>

      <label style={S.label}>¿Qué querés hacer?</label>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {optBtn('3d','🧊','Crear en 3D','Estilo Pixar HD')}
        {optBtn('enhance','✨','Mejorar calidad','Mantiene el estilo')}
      </div>

      <label style={{display:'block',marginBottom:14}}><span style={S.label}>Formato</span>
        <select value={ratio} onChange={e=>setRatio(e.target.value)} style={S.input}>
          <option value="9:16">9:16 vertical ✅</option>
          <option value="1:1">1:1 cuadrado</option>
          <option value="4:3">4:3 horizontal</option>
        </select>
      </label>

      {err&&<div style={{background:'#FCEBEB',border:'1px solid #F09595',color:'#a32d2d',padding:'10px 14px',borderRadius:10,fontSize:12,marginBottom:12}}>{err}</div>}
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:10,fontSize:12,marginBottom:12,fontWeight:700}}>{msg}</div>}

      <button onClick={generar} disabled={cargando||!img} style={{...S.btn,width:'100%',padding:14,fontSize:15,background:(cargando||!img)?'#cbd5e1':PURPLE,color:'white',marginBottom:14}}>
        {cargando?'⏳ Generando en fal.ai…':'✨ Generar imagen'}
      </button>

      {resultUrl&&(
        <div className="fade-in">
          <label style={S.label}>Resultado</label>
          <p style={{fontSize:11,color:'#94a3b8',textAlign:'center',marginBottom:6}}>⬆ Espacio libre arriba para el nombre del cumpleañero</p>
          <img src={resultUrl} alt="" style={{width:'100%',borderRadius:12,border:'1px solid #e2e8f0',marginBottom:12}}/>
          <div style={{background:'#f1f5f9',borderRadius:10,padding:12,marginBottom:12,position:'relative'}}>
            <pre style={{fontSize:11,color:'#334155',whiteSpace:'pre-wrap',wordBreak:'break-word',fontFamily:'monospace',lineHeight:1.5,margin:0,paddingRight:70}}>{prompt}</pre>
            <button onClick={copiar} style={{position:'absolute',top:8,right:8,...S.btn,padding:'5px 10px',fontSize:11,background:'#fff',border:'1px solid #e2e8f0',color:'#475569'}}>{copiado?'✓ Copiado':'📋 Copiar'}</button>
          </div>
          <button onClick={()=>{fetch(resultUrl).then(r=>r.blob()).then(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='personaje_catalogo.png';document.body.appendChild(a);a.click();document.body.removeChild(a);}).catch(()=>window.open(resultUrl,'_blank'));}} style={{...S.btn,width:'100%',background:'#fff',border:'1px solid #e2e8f0',color:'#1e293b',marginBottom:8}}>⬇️ Descargar imagen</button>
          {!guardarOpen&&<button onClick={()=>setGuardarOpen(true)} style={{...S.btn,width:'100%',background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white'}}>➕ Guardar en el catálogo</button>}
          {guardarOpen&&(
            <div style={{...S.card,marginTop:4,borderLeft:'4px solid '+PURPLE}}>
              <label style={{display:'block',marginBottom:10}}><span style={S.label}>Nombre del personaje</span>
                <input value={gNombre} onChange={e=>setGNombre(e.target.value)} style={S.input} placeholder="Ej: Sirenita" autoFocus/>
              </label>
              <span style={S.label}>Categorías (para que aparezca al filtrar)</span>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,margin:'6px 0 12px'}}>
                {CATS.map(c=><button key={c} type="button" onClick={()=>toggleGCat(c)} style={{padding:'4px 11px',borderRadius:99,fontSize:11,fontWeight:700,border:'none',cursor:'pointer',background:gCats.includes(c)?PURPLE:'#f1f5f9',color:gCats.includes(c)?'white':'#64748b'}}>{c}</button>)}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={guardarEnCatalogo} style={{...S.btn,flex:1,background:'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white'}}>✓ Guardar</button>
                <button onClick={()=>setGuardarOpen(false)} style={{...S.btn,background:'#f1f5f9',color:'#64748b'}}>Cancelar</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── ADMIN CATÁLOGO IA ───────────────────────────────────── */
function AdminCatalogoIA({setVista,tematicas,setTematicas}){
  const [cat,setCat]=useState('TODOS');
  const todos=(tematicas||[]).filter(t=>t.ia);
  const items=todos.filter(t=>cat==='TODOS'||(t.cats||[]).includes(cat));
  return(
    <div className="fade-in" style={{maxWidth:760,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>🤖 Catálogo IA</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:14}}>Personajes que los papás pueden elegir para generar su imagen con IA. Agregá más desde 🖼️ Catálogo de imágenes (botón "➕ Catálogo IA") o creando uno en 🎨 Generador de imagen IA.</p>
      <label style={{display:'block',marginBottom:14,maxWidth:260}}><span style={S.label}>Filtrar por categoría</span>
        <select value={cat} onChange={e=>setCat(e.target.value)} style={{...S.input,fontWeight:700}}>
          {CATS.map(c=><option key={c} value={c}>{c==='TODOS'?'📂 Todas las categorías':c}</option>)}
        </select>
      </label>
      {todos.length===0&&<div style={{...S.card,textAlign:'center',color:'#94a3b8',fontSize:13,padding:24}}>Todavía no hay personajes en el Catálogo IA.</div>}
      {todos.length>0&&items.length===0&&<div style={{...S.card,textAlign:'center',color:'#94a3b8',fontSize:13,padding:24}}>No hay personajes en esta categoría.</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10}}>
        {items.map(t=>(

/* ── ADMIN BOTONES DEL PAPÁ ──────────────────────────────── */
function AdminPapaBotones({setVista,iaConfig,setIaConfig}){
  const PT=(iaConfig&&iaConfig.papaTiles)||{};
  const ord=(iaConfig&&iaConfig.papaOrden)||[];
  const base=[
    ['tarjeta','🎨','Editar Tarjeta'],
    ['album','🎞️','Generador de Recuerdos'],
    ['confirmaciones','👥','Confirmados'],
    ['descargables','📦','Descargas'],
    ['menu','🍽️','Menú IA'],
    ['faq','💬','Consultas'],
    ['adicionales','➕','Adicionales'],
    ['reglas','📋','Reglas del Salón'],
    ['recordar','📣','Recordar invitados'],
  ];
  const ordenado=[...base].sort((a,b)=>{const ia=ord.indexOf(a[0]),ib=ord.indexOf(b[0]);if(ia<0&&ib<0)return 0;if(ia<0)return 1;if(ib<0)return -1;return ia-ib;});
  const [msg,setMsg]=useState('');
  function setCampo(v,campo,val){setIaConfig(c=>({...c,papaTiles:{...(c.papaTiles||{}),[v]:{...((c.papaTiles||{})[v]||{}),[campo]:val}}}));setMsg('✓ Guardado');setTimeout(()=>setMsg(''),1200);}
  function restaurar(v){setIaConfig(c=>{const p={...(c.papaTiles||{})};delete p[v];return {...c,papaTiles:p};});setMsg('✓ Restaurado');setTimeout(()=>setMsg(''),1200);}
  function mover(v,dir){const orden=ordenado.map(x=>x[0]);const i=orden.indexOf(v);const j=i+dir;if(i<0||j<0||j>=orden.length)return;const t=orden[i];orden[i]=orden[j];orden[j]=t;setIaConfig(c=>({...c,papaOrden:orden}));setMsg('✓ Movido');setTimeout(()=>setMsg(''),1000);}
  return(
    <div className="fade-in" style={{maxWidth:560,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>👪 Botones del Papá</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:14}}>Cambiá el nombre o el ícono de cada botón, movelos con ▲▼ para ordenarlos, u ocultá los que no uses. Se guarda solo.</p>
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'8px 12px',borderRadius:10,fontSize:12,marginBottom:12,fontWeight:700}}>{msg}</div>}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {ordenado.map(([v,de,dt],idx)=>{
          const e=(PT[v]&&PT[v].e)||de;const t=(PT[v]&&PT[v].t!==undefined&&PT[v].t!=='')?PT[v].t:dt;const oc=!!(PT[v]&&PT[v].oculto);
          return(
            <div key={v} style={{...S.card,display:'flex',alignItems:'center',gap:8,padding:12,opacity:oc?0.55:1}}>
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                <button onClick={()=>mover(v,-1)} disabled={idx===0} title="Subir" style={{...S.btn,background:idx===0?'#f8fafc':'#eef2f7',color:'#475569',padding:'2px 8px',fontSize:12,lineHeight:1.1}}>▲</button>
                <button onClick={()=>mover(v,1)} disabled={idx===ordenado.length-1} title="Bajar" style={{...S.btn,background:idx===ordenado.length-1?'#f8fafc':'#eef2f7',color:'#475569',padding:'2px 8px',fontSize:12,lineHeight:1.1}}>▼</button>
              </div>
              <input value={e} onChange={ev=>setCampo(v,'e',ev.target.value)} maxLength={2} style={{...S.input,width:50,fontSize:22,textAlign:'center',marginBottom:0,padding:'6px'}}/>
              <input value={t} onChange={ev=>setCampo(v,'t',ev.target.value)} style={{...S.input,flex:1,fontWeight:700,marginBottom:0}}/>
              <button onClick={()=>setCampo(v,'oculto',!oc)} title={oc?'Mostrar':'Ocultar'} style={{...S.btn,background:oc?'#fef2f2':'#f0fdf4',color:oc?'#dc2626':'#16a34a',padding:'8px 10px',fontSize:12,fontWeight:800,whiteSpace:'nowrap'}}>{oc?'🙈':'👁'}</button>
              {(PT[v]||ord.indexOf(v)>=0)&&<button onClick={()=>restaurar(v)} title="Restaurar nombre/ícono" style={{...S.btn,background:'#f1f5f9',color:'#64748b',padding:'8px',fontSize:12}}>↺</button>}
            </div>
          );
        })}
      </div>
      <p style={{fontSize:10,color:'#94a3b8',marginTop:14}}>Estos son los accesos que ve el papá en su panel de inicio. El botón "Editar Tarjeta" conviene dejarlo visible. "Generador de Recuerdos" y "Recordar invitados" también se pueden renombrar, mover u ocultar.</p>
    </div>
  );
}

/* ── ADMIN DASHBOARD ─────────────────────────────────────── */
function AdminDashboard({setVista,sucAct,evsLocal,eventos=[],sucursales=[],tematicas,esSA,iaConfig,setIaConfig,pedidos=[],setPedidos,refrescarPedidos}){
  const [edit,setEdit]=useState(false);
  const [editId,setEditId]=useState(null);
  const dragRef=useRef(null);
  const [saldoIA,setSaldoIA]=useState(null); // número o null
  React.useEffect(()=>{fetch('/api/saldo').then(r=>r.json()).then(d=>{if(d&&typeof d.balance==='number')setSaldoIA(d.balance);}).catch(()=>{});},[]);
  // Pedidos de personajes (de los papás): refrescamos al abrir el panel
  const [verPedidos,setVerPedidos]=useState(false);
  React.useEffect(()=>{if(refrescarPedidos)refrescarPedidos();},[]);
  const pedPend=(pedidos||[]).filter(p=>p&&p.estado!=='hecho');
  function pedHecho(id){if(setPedidos)setPedidos((pedidos||[]).map(p=>p.id===id?{...p,estado:'hecho'}:p));}
  function pedBorrar(id){if(setPedidos)setPedidos((pedidos||[]).filter(p=>p.id!==id));}
  const UMBRAL_IA=20;
  const custom=(iaConfig&&iaConfig.dashCustom)||{};
  const orden=(iaConfig&&iaConfig.dashOrden)||[];
  const base=[
    {e:'📅',t:'Eventos Contratados', s:`${evsLocal.length} activos`,   v:'admin-eventos',    bdr:'#06b6d4',badge:'ENTRAR'},
    {e:'📊',t:'Carga Excel Semanal', s:'Autocompletar agenda',          v:'admin-excel',      bdr:'#10b981'},
    {e:'🖼️',t:'Catálogo de imágenes', s:`${tematicas.length} imágenes`, v:'admin-tematicas',  bdr:'#7c3aed'},
    {e:'👥',t:'Ver Asistencias',      s:'Checklist de invitados',       v:'admin-asistencias',bdr:'#f43f5e'},
    {e:'📣',t:'Remarketing',          s:'Envíos masivos',               v:'admin-remarketing',bdr:'#f97316'},
    {e:'⚙️',t:'Usuarios & Sucursales',s:'Cuentas y salones',           v:'admin-usuarios',   bdr:'#94a3b8',ownerOnly:true},
    {e:'🍽️',t:'Menú Interactivo',      s:'Prompt y comidas',            v:'admin-menu',       bdr:'#f59e0b',ownerOnly:true},
    {e:'🧮',t:'Calculador v2 (gramos)', s:'Nuevo · por gramos',          v:'admin-menu2',      bdr:'#f59e0b',ownerOnly:true},
    {e:'🏛️',t:'Info del Salón',         s:'Reglas, adicionales y FAQ',   v:'admin-salon',      bdr:'#0ea5e9',ownerOnly:true},
    {e:'📝',t:'Encuestas',             s:'Respuestas de los papás',     v:'admin-encuestas',  bdr:'#0ea5e9',ownerOnly:true},
    {e:'🎟️',t:'Formatos de Tarjeta',   s:'Por tipo de evento',          v:'admin-formatos',   bdr:'#ec4899',ownerOnly:true},
    {e:'🎴',t:'Diseño de Tarjeta',     s:'Editar textos de la invitación',v:'admin-diseno',    bdr:'#d946ef',ownerOnly:true},
    {e:'📦',t:'Descargables',          s:'Recursos para papás',         v:'admin-descargables',bdr:'#16a34a',ownerOnly:true},
    {e:'🎵',t:'Música de tarjetas',    s:'Genéricas y por personaje',    v:'admin-musica',     bdr:'#db2777',ownerOnly:true},
    {e:'🤖',t:'IA & Precios',          s:'Prompts y API keys',          v:'admin-ia',         bdr:'#8b5cf6',ownerOnly:true},
    {e:'🎨',t:'Generador de imagen IA', s:'Crear en 3D o mejorar',        v:'admin-catalogo',   bdr:'#534AB7',ownerOnly:true},
    {e:'🤖',t:'Catálogo IA',           s:'Personajes para los papás',     v:'admin-catalogo-ia',bdr:'#0ea5e9',ownerOnly:true},
    {e:'👪',t:'Botones del Papá',      s:'Editar la app del papá',        v:'admin-papabotones',bdr:'#f97316',ownerOnly:true},
    {e:'🛠️',t:'Configuración',         s:'Año vigente y sitio',          v:'admin-config',     bdr:'#0ea5e9',ownerOnly:true},
  ].filter(c=>esSA||!c.ownerOnly).map(c=>({...c, e:(custom[c.v]&&custom[c.v].e)||c.e, t:(custom[c.v]&&custom[c.v].t)||c.t}));
  const items=[...base].sort((a,b)=>{const ia=orden.indexOf(a.v),ib=orden.indexOf(b.v);if(ia<0&&ib<0)return 0;if(ia<0)return 1;if(ib<0)return -1;return ia-ib;});
  function guardar(nc,no){setIaConfig(c=>({...c,dashCustom:nc===undefined?(c.dashCustom||{}):nc,dashOrden:no===undefined?(c.dashOrden||[]):no}));}
  function setCampo(v,campo,val){guardar({...custom,[v]:{...(custom[v]||{}),[campo]:val}},undefined);}
  function reordenar(from,to){if(!from||from===to)return;const vis=items.map(x=>x.v);const fi=vis.indexOf(from);if(fi<0)return;vis.splice(fi,1);const ti=vis.indexOf(to);vis.splice(ti<0?vis.length:ti,0,from);guardar(undefined,vis);}
  return(
    <div className="fade-in" style={{maxWidth:700,margin:'0 auto',padding:'24px 16px'}}>
      {/* Alerta de crédito IA bajo (la ven todas apenas abren el panel) */}
      {typeof saldoIA==='number'&&saldoIA<UMBRAL_IA&&(
        <div style={{background:'#fef2f2',border:'2px solid #fecaca',borderRadius:14,padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:30}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:14,color:'#dc2626'}}>¡Crédito de IA bajo! (US${saldoIA.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})})</div>
            <div style={{fontSize:12,color:'#991b1b'}}>Hay que recargar en fal.ai para que sigan andando las imágenes y videos con IA. Avisá a la dueña.</div>
          </div>
        </div>
      )}
      {/* Alerta: pagos extra declarados en encuestas, pendientes de revisar.
          Dueña (esSA): TODOS los salones, aclarando cuál. Encargada: solo su salón (evsLocal). */}
      {(()=>{
        const base=esSA?(eventos||[]):(evsLocal||[]);
        const pp=base.filter(e=>e&&e.encuesta&&e.encuesta.pagoExtra==='si'&&!e.encuesta.pagoRevisado&&!String(e.id||'').startsWith('__config'));
        if(!pp.length)return null;
        const sucNom=id=>{const s=(sucursales||[]).find(x=>x.id===id);return s?(s.nombre||'Salón'):'Salón';};
        // Conteo por salón (para la dueña)
        const porSuc={};pp.forEach(e=>{porSuc[e.sucId]=(porSuc[e.sucId]||0)+1;});
        const detalle=Object.keys(porSuc).map(id=>sucNom(id)+': '+porSuc[id]).join(' · ');
        return(
        <div onClick={()=>{if(esSA)setVista('admin-encuestas');}} style={{cursor:esSA?'pointer':'default',background:'#fffbeb',border:'2px solid #fde68a',borderRadius:14,padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:28}}>💵</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:14,color:'#b45309'}}>⚠️ Revisar pago de encuestas</div>
            <div style={{fontSize:12,color:'#92400e'}}>{pp.length} papá{pp.length>1?'s':''} declararon haber abonado algo extra el día del evento. Verificá que esté registrado.{esSA?' Tocá para ver.':(' ('+sucNom((evsLocal[0]||{}).sucId||sucAct.id)+') Avisale a la dueña.')}</div>
            {esSA&&<div style={{fontSize:12,fontWeight:800,color:'#b45309',marginTop:4}}>📍 {detalle}</div>}
          </div>
          {esSA&&<span style={{background:'#d97706',color:'white',borderRadius:99,padding:'4px 12px',fontSize:13,fontWeight:900}}>Ver</span>}
        </div>
      );})()}
      {/* Notificación: pedidos de personajes de los papás */}
      {pedPend.length>0&&(
        <div onClick={()=>setVerPedidos(true)} style={{cursor:'pointer',background:'#fff7ed',border:'2px solid #fed7aa',borderRadius:14,padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:28}}>🔔</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:14,color:'#9a3412'}}>Tenés {pedPend.length} pedido{pedPend.length>1?'s':''} de personaje{pedPend.length>1?'s':''}</div>
            <div style={{fontSize:12,color:'#9a3412'}}>Un papá pidió un personaje nuevo. Tocá para verlo.</div>
          </div>
          <span style={{background:'#ea580c',color:'white',borderRadius:99,padding:'4px 12px',fontSize:13,fontWeight:900}}>Ver</span>
        </div>
      )}
      {verPedidos&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div className="fade-in" style={{...S.card,maxWidth:440,width:'100%',padding:20,maxHeight:'85vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <h3 style={{fontWeight:900,fontSize:18}}>📩 Pedidos de personajes</h3>
              <button onClick={()=>{if(refrescarPedidos)refrescarPedidos();}} style={{...S.btn,background:'#f1f5f9',color:'#475569',padding:'6px 10px',fontSize:12}}>🔄 Actualizar</button>
            </div>
            {pedPend.length===0?(
              <p style={{fontSize:13,color:'#64748b',textAlign:'center',padding:'20px 0'}}>No hay pedidos pendientes. 🎉</p>

                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:900,fontSize:15}}>{p.nombre}</div>

/* ── ADMIN EVENTOS ───────────────────────────────────────── */
function AdminEventos({setVista,sucAct,evsLocal,eventos,setEventos,tematicas,setInvEvId,confs,iaConfig,setIaConfig,setPapaSesion}){
  function enviarCredsWA(ev){
    const salon=sucAct.nombre;
    const base=window.location.href.split('?')[0];
    const loginLink=base+'?papa='+ev.id;
    let lineaVenc='_El acceso vence a los 7 dias del evento._';
    if(ev.anio&&ev.mes&&ev.dia){
      const fV=new Date(+ev.anio,+ev.mes-1,+ev.dia); fV.setDate(fV.getDate()+7);
      lineaVenc='_El acceso vence a los 7 dias del evento (el '+fV.getDate()+'/'+(fV.getMonth()+1)+'/'+fV.getFullYear()+')._';
    }
    const lineas=[
      'Hola '+ev.nomPapa+'!',
      '',
      'Te enviamos el acceso a las *Invitaciones Digitales* de *'+salon+'*',
      'para el '+(ev.tipo||'Cumpleanos')+' de *'+ev.nombre+'*.',
      '',
      '*Ingresa con tu link personal:*',
      loginLink,
      '',
      '(Si el link no abre directo, ingresa manualmente:)',
      '*Usuario:* '+ev.user,
      '*Contrasena:* '+ev.pass,
      '',
      lineaVenc,
      '- '+salon,
    ];
    abrirWA(waNum(ev.celPapa), lineas.join('\n'));
  }
  const ef={nombre:'',tipo:'Cumpleaños',edad:'',edadUnidad:'años',dia:'',mes:'',anio:String((iaConfig&&iaConfig.anioVigente)||2026),hIni:'',hFin:'',celPapa:'',dni:'',nomPapa:'',user:'',pass:'',temId:((iaConfig&&iaConfig.temDefault)||'t-3'),doble:false,nombre2:'',edad2:'',temId2:'t-1',nomPapa2:'',celPapa2:''};
  const [form,setForm]=useState(ef); const [editId,setEditId]=useState(null); const [open,setOpen]=useState(false);
  const [fMes,setFMes]=useState(''); const [fDia,setFDia]=useState(''); const [fAnio,setFAnio]=useState(''); const [msgOk,setMsgOk]=useState('');
  const [busqTema,setBusqTema]=useState(''); const [catTema,setCatTema]=useState('TODOS'); const [temOpen,setTemOpen]=useState(false);

  function autoCredenciales(){
    if(!form.nombre) return alert('Ingresá primero el nombre del agasajado.');
    setForm(f=>({...f, user: genUser(f.nombre), pass: genPass(f.nombre)}));
  }
  const listFiltrada=evsLocal.filter(e=>(!fMes||e.mes===fMes)&&(!fDia||e.dia===fDia));

  const [alertaSup,setAlertaSup]=useState(null); // {ev, accion}
  const [borrarEv,setBorrarEv]=useState(null); // evento a borrar (pide confirmación)
  const [plazoEv,setPlazoEv]=useState(null); // evento para fijar plazo de encuesta/recuerdos
  const _diasLimAdm=(iaConfig&&+iaConfig.encuestaDiasLimite)||5;
  function _autoVence(ev){try{const d=new Date(+ev.anio,+ev.mes-1,+ev.dia);d.setDate(d.getDate()+_diasLimAdm);return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2);}catch(e){return '';}}
  function _fijarPlazo(ev,fecha){setEventos(evs=>evs.map(x=>x.id===ev.id?{...x,encuestaHasta:fecha||undefined}:x));}
  function _plazoMasDias(ev,n){try{const d=new Date(+ev.anio,+ev.mes-1,+ev.dia);d.setDate(d.getDate()+_diasLimAdm+n);const iso=d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);_fijarPlazo(ev,iso);setPlazoEv({...ev,encuestaHasta:iso});}catch(e){}}
  function confirmarBorrar(){ if(!borrarEv)return; const id=borrarEv.id; setEventos(eventos.filter(x=>x.id!==id)); sbDeleteEvento(id); setBorrarEv(null); flashOk('✓ Tarjeta borrada'); }
  function sub(e){
    e.preventDefault();
    // Detectar superposición de horarios en la misma sucursal y día
    const conflicto=eventos.find(x=>
      x.sucId===sucAct.id &&
      x.id!==editId &&
      x.dia===form.dia && x.mes===form.mes && x.anio===form.anio &&
      !(form.hFin<=x.hIni || form.hIni>=x.hFin)
    );
    if(conflicto){
      setAlertaSup({ev:conflicto,accion:()=>{
        guardarEvento();
        setAlertaSup(null);
      }});
      return;
    }
    guardarEvento();
  }
  function guardarEvento(){
    const fmt=fmtTipo(form.tipo,iaConfig);
    if(editId){setEventos(eventos.map(x=>x.id===editId?{...x,...form,...fmt}:x));setEditId(null);}
    else{setEventos(prev=>[...prev,{...form,...fmt,id:'ev-'+Date.now().toString(16),sucId:sucAct.id,creado:Date.now()}]);}
    setForm(ef);setOpen(false);setTemOpen(false);
    setMsgOk('✅ Se guardó correctamente');flashOk('✓ ¡Guardado!');setTimeout(()=>setMsgOk(''),3500);
    window.scrollTo(0,0);
  }
  function copiarLink(id){navigator.clipboard?.writeText(window.location.href.split('?')[0]+'?inv='+id);alert('¡Enlace copiado!');}
  function compartirLinkInv(ev){const link=window.location.href.split('?')[0]+'?inv='+ev.id;const txt='¡Te invito al '+(ev.tipo||'cumpleaños')+' de '+ev.nombre+'! Abrí la tarjeta acá: '+link;abrirWA('', txt);}

  // ¿Cuándo se creó la tarjeta? (marca 'creado' o la fecha codificada en el id)
  const evCreadoMs=ev=>{ if(ev&&ev.creado) return ev.creado; const m=String((ev&&ev.id)||'').match(/^ev-([0-9a-f]+)$/); return m?parseInt(m[1],16):0; };
  const _hoy=new Date(); const _hoyKey=_hoy.getFullYear()+'-'+_hoy.getMonth()+'-'+_hoy.getDate();
  const esDeHoy=ev=>{ const ms=evCreadoMs(ev); if(!ms) return false; const d=new Date(ms); return (d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate())===_hoyKey; };
  const creadasHoy=evsLocal.filter(esDeHoy).sort((a,b)=>evCreadoMs(b)-evCreadoMs(a));
  const historial=evsLocal.filter(e=>(!fMes||e.mes===fMes)&&(!fAnio||String(e.anio)===String(fAnio))&&(!fDia||String(e.dia)===String(fDia))).sort((a,b)=>evCreadoMs(b)-evCreadoMs(a));
  const _anioActual=new Date().getFullYear();
  const _aniosSet=new Set(evsLocal.map(e=>String(e.anio)).filter(Boolean));
  for(let y=_anioActual+1;y>=2023;y--)_aniosSet.add(String(y));
  const aniosDisp=Array.from(_aniosSet).sort((a,b)=>b-a);
  // Dibuja una tarjeta de evento. small=true => versión chica para el historial (3-4 por hilera)
  function tarjetaEvento(ev, small){
    const tem=tematicas.find(t=>t.id===ev.temId)||tematicas[0]||{};
    const cnt=confs.filter(c=>c.evId===ev.id).length;
    return(
      <div key={ev.id} style={{background:'#fff',borderRadius:16,overflow:'hidden',border:'1px solid #eef1f6',boxShadow:'0 1px 3px rgba(15,23,42,.06)',display:'flex',flexDirection:'column'}}>
        <div style={{background:'#0ea5e9',padding:small?'9px 11px':'14px 16px',color:'white',position:'relative'}}>
          <div style={{position:'absolute',right:small?9:14,top:small?8:12,background:'rgba(255,255,255,.2)',borderRadius:10,width:small?34:46,height:small?34:46,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',border:'1px solid rgba(255,255,255,.3)'}}>
            <span style={{fontWeight:900,fontSize:small?14:18,lineHeight:1}}>{ev.dia}</span>
            <span style={{fontSize:small?7:8,textTransform:'uppercase',fontWeight:700}}>{(MESES[+ev.mes]||'').slice(0,3)}</span>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:small?8:9,background:'rgba(0,0,0,.2)',padding:'2px 8px',borderRadius:99,fontWeight:700}}>{ev.tipo}</span>
            {ev.doble&&<span style={{fontSize:small?8:9,background:'#f97316',color:'white',padding:'2px 8px',borderRadius:99,fontWeight:900}}>🎂🎂</span>}
          </div>
          <div style={{fontWeight:900,fontSize:small?14:20,marginTop:4,paddingRight:small?34:46,lineHeight:1.1}}>{ev.nombre}{ev.doble&&ev.nombre2?<span style={{fontSize:small?10:13,fontWeight:600,opacity:.85}}> & {ev.nombre2}</span>:''}</div>
          <div style={{fontSize:small?9:11,opacity:.85}}>{ev.hIni} a {ev.hFin} hs</div>
        </div>
        <div style={{height:small?60:90,background:'#0f172a',position:'relative',overflow:'hidden'}}>
          <img src={tem.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover',opacity:.85}}/>
          <span style={{position:'absolute',bottom:5,left:8,background:'rgba(0,0,0,.75)',color:'white',fontSize:small?8:9,padding:'2px 6px',borderRadius:5,fontWeight:700}}>{tem.nombre}</span>
        </div>
        {!small&&<div style={{padding:'10px 14px',fontSize:11,flex:1}}>
          <p><b>Papá/Mamá:</b> {ev.nomPapa}</p>
          <p><b>Celular:</b> {ev.celPapa}</p>
          <div style={{background:'#f8fafc',borderRadius:10,padding:'6px 10px',display:'flex',justifyContent:'space-between',marginTop:6}}>
            <span>👤 <b>{ev.user}</b></span><span>🔑 <b>{ev.pass}</b></span>
          </div>
        </div>}
        <div style={{borderTop:'1px solid #f1f5f9',padding:small?'6px 8px':'8px 12px',display:'flex',gap:4,justifyContent:'space-around',background:'#fafafa',flexWrap:'wrap'}}>
          <button onClick={()=>enviarCredsWA(ev)} title="Enviar acceso al papá" style={{padding:5,borderRadius:8,background:'none',border:'none',cursor:'pointer',fontSize:small?15:18}}>🔑</button>
          <button onClick={()=>copiarLink(ev.id)} title="Copiar link invitado" style={{padding:5,borderRadius:8,background:'none',border:'none',cursor:'pointer',fontSize:small?15:18}}>🔗</button>
          <button onClick={()=>{setInvEvId(ev.id);setVista('admin-asistencias');}} title="Ver asistentes" style={{padding:5,borderRadius:8,background:'none',border:'none',cursor:'pointer',fontSize:small?15:18,position:'relative'}}>👥<span style={{position:'absolute',top:0,right:0,background:'#7c3aed',color:'white',fontSize:7,borderRadius:99,width:12,height:12,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}>{cnt}</span></button>
          <button onClick={()=>{setForm({...ev});setEditId(ev.id);setOpen(true);setTemOpen(false);window.scrollTo(0,0);}} title="Editar" style={{padding:5,borderRadius:8,background:'none',border:'none',cursor:'pointer',fontSize:small?15:18}}>✏️</button>
          <button onClick={()=>setPlazoEv(ev)} title="Plazo de encuesta y recuerdos" style={{padding:5,borderRadius:8,background:'none',border:'none',cursor:'pointer',fontSize:small?15:18}}>📅</button>
          <button onClick={()=>setBorrarEv(ev)} title="Borrar tarjeta" style={{padding:5,borderRadius:8,background:'none',border:'none',cursor:'pointer',fontSize:small?15:18}}>🗑</button>
        </div>
        {!small&&<button onClick={()=>enviarCredsWA(ev)} style={{background:'#16a34a',color:'white',border:'none',padding:'7px',fontWeight:700,fontSize:11,cursor:'pointer',borderTop:'1px solid #15803d'}}>🔑 Enviar acceso a papá</button>}
        {!small&&<button onClick={()=>{setInvEvId(ev.id);setVista('invitado-portada');}} style={{background:'#7c3aed',color:'white',border:'none',padding:9,fontWeight:700,fontSize:11,cursor:'pointer'}}>🎁 Ver Invitación</button>}
        {!small&&setPapaSesion&&<button onClick={()=>{setPapaSesion({...ev,optinWA:true});setVista('papa-creador');}} style={{background:'#0f172a',color:'white',border:'none',padding:9,fontWeight:700,fontSize:11,cursor:'pointer'}}>👨‍👦 Entrar como papá (sin contraseña)</button>}
        {!small&&<button onClick={()=>compartirLinkInv(ev)} style={{background:'#25d366',color:'white',border:'none',padding:9,fontWeight:700,fontSize:11,cursor:'pointer',borderTop:'1px solid #1ebe57'}}>🔗 Compartir link (abre solo la tarjeta)</button>}
        {!small&&<button onClick={()=>generarTarjetaImagen(ev,sucAct,tematicas,iaConfig,'compartir')} style={{background:'#0ea5e9',color:'white',border:'none',padding:9,fontWeight:700,fontSize:11,cursor:'pointer',borderTop:'1px solid #0284c7'}}>📷 Compartir tarjeta (imagen, sin link)</button>}
        {small&&<button onClick={()=>{setInvEvId(ev.id);setVista('invitado-portada');}} style={{background:'#7c3aed',color:'white',border:'none',padding:7,fontWeight:700,fontSize:10,cursor:'pointer'}}>🎁 Ver invitación</button>}
      </div>
    );
  }

  return(
    <div className="fade-in" style={{maxWidth:900,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      {msgOk&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msgOk}</div>}

        <button style={{...S.btn,background:open?'#ef4444':'#06b6d4',color:open?'white':'#0f172a',padding:'12px 22px',fontSize:15,fontWeight:900}} onClick={()=>{setOpen(!open);setEditId(null);setForm(ef);setTemOpen(false);}}>{open?'✕ Cancelar':'➕ Crear tarjeta'}</button>
      </div>

      {/* Formulario */}
      {open&&(
        <div className="fade-in" style={{...S.card,border:'2px solid #06b6d4',marginBottom:18}}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:14}}>{editId?'✏️ Editar Evento':'+ Nuevo Evento'}</h3>
          <form onSubmit={sub}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:14}}>
              {[['Nombre','nombre','text','']].map(([l,k,t,ph])=>(
                <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} autoComplete="off" onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input} required/></label>
              ))}
              <label><span style={S.label}>Edad</span>
                <div style={{display:'flex',gap:4}}>
                  <input type="number" value={form.edad} autoComplete="off" disabled={form.edadUnidad==='noaplica'} onChange={e=>setForm({...form,edad:e.target.value})} style={{...S.input,flex:1,background:form.edadUnidad==='noaplica'?'#f1f5f9':'#f8fafc'}} placeholder={form.edadUnidad==='noaplica'?'—':''}/>

                  {MESES.slice(1).map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
                </select>
              </label>
              <label><span style={S.label}>Año</span><input type="number" placeholder="" value={form.anio} autoComplete="off" onChange={e=>setForm({...form,anio:e.target.value})} style={S.input} required/></label>
              {[['Hora Inicio','hIni','text',''],['Hora Fin','hFin','text',''],['Celular papá','celPapa','text',''],['DNI papá','dni','text',''],['Nombre padre/madre','nomPapa','text','']].map(([l,k,t,ph])=>(
                <label key={k}><span style={S.label}>{l}</span><input type={t} placeholder={ph} value={form[k]} autoComplete="off" onChange={e=>setForm({...form,[k]:e.target.value})} style={S.input} required={['hIni','hFin','celPapa','dni'].includes(k)}/></label>
              ))}
              <label><span style={S.label}>Tipo</span>
                <select value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})} style={{...S.input}}>

              {temOpen&&(
              <div style={{marginTop:10}}>

                  <select value={catTema} onChange={e=>setCatTema(e.target.value)} style={{...S.input,maxWidth:200,fontWeight:700}}>

                  </select>
                  <input value={busqTema} onChange={e=>setBusqTema(e.target.value)} placeholder="🔍 Buscar personaje..." style={{...S.input,flex:1,minWidth:140}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:8,maxHeight:230,overflowY:'auto'}} className="scrollbar-none">
                  {ordenarRecientes(tematicas.filter(t=>(catTema==='TODOS'||(t.cats||[]).includes(catTema))&&t.nombre.toLowerCase().includes(busqTema.toLowerCase()))).map(t=>(
                    <div key={t.id} onClick={()=>setForm({...form,temId:t.id})} style={{borderRadius:10,overflow:'hidden',cursor:'pointer',border:form.temId===t.id?'3px solid #06b6d4':'2px solid #e2e8f0'}}>
                      <div style={{aspectRatio:'9/16',maxHeight:120,background:'#0f172a',position:'relative',overflow:'hidden'}}>
                        <img src={t.img} alt={t.nombre} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                        {form.temId===t.id&&<span style={{position:'absolute',top:4,right:4,background:'#06b6d4',color:'white',borderRadius:'50%',width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>✓</span>}
                        {iaConfig&&iaConfig.temDefault===t.id&&<span style={{position:'absolute',top:4,left:4,background:'#f59e0b',color:'white',borderRadius:99,padding:'1px 5px',fontSize:9,fontWeight:900}}>⭐</span>}

            {/* Credenciales con auto-generador */}

            </div>
            {/* ── Cumpleaños Doble ── */}
            <label style={{display:'flex',alignItems:'center',gap:10,background:'#fefce8',border:'1px solid #fde68a',borderRadius:12,padding:'10px 14px',marginBottom:12,cursor:'pointer'}}>

      )}
      {/* ── Modal Alerta Superposición ── */}

        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
          <div className="fade-in" style={{...S.card,maxWidth:420,width:'100%',padding:28}}>
            <div style={{textAlign:'center',marginBottom:16}}>
              <div style={{fontSize:48,marginBottom:8}}>⚠️</div>
              <h3 style={{fontWeight:900,fontSize:18,color:'#dc2626',marginBottom:4}}>¡Superposición de Turnos!</h3>
              <p style={{fontSize:12,color:'#64748b'}}>Se detectó un conflicto de horario con otro cumpleaños</p>
            </div>
            <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:12,padding:14,marginBottom:18}}>
              <p style={{fontSize:12,color:'#1e293b',marginBottom:6}}><b>Evento existente:</b></p>
              <p style={{fontSize:14,fontWeight:900,color:'#dc2626'}}>{alertaSup.ev.nombre} · {alertaSup.ev.dia}/{alertaSup.ev.mes}/{alertaSup.ev.anio}</p>
              <p style={{fontSize:12,color:'#64748b'}}>{alertaSup.ev.hIni} a {alertaSup.ev.hFin} hs</p>
              <p style={{fontSize:11,color:'#ef4444',marginTop:8}}>⚠️ El horario que querés cargar se superpone con este evento. La encargada fue notificada.</p>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setAlertaSup(null)} style={{...S.btn,flex:1,background:'#f1f5f9',color:'#64748b',padding:12}}>← Corregir horario</button>
              <button onClick={alertaSup.accion} style={{...S.btn,flex:1,background:'#dc2626',color:'white',padding:12,fontSize:12}}>Registrar igual</button>
            </div>
          </div>
        </div>
      )}

      {/* Confirmación de borrado de tarjeta */}
      {borrarEv&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}}>
          <div className="fade-in" style={{...S.card,maxWidth:380,width:'100%',padding:26,textAlign:'center'}}>
            <div style={{fontSize:46,marginBottom:8}}>🗑️</div>
            <h3 style={{fontWeight:900,fontSize:18,marginBottom:6}}>¿Borrar esta tarjeta?</h3>
            <p style={{fontSize:13,color:'#475569',marginBottom:4}}><b>{borrarEv.nombre}</b> · {borrarEv.dia}/{borrarEv.mes}/{borrarEv.anio}</p>
            <p style={{fontSize:12,color:'#dc2626',marginBottom:18}}>Esta acción no se puede deshacer.</p>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setBorrarEv(null)} style={{...S.btn,flex:1,background:'#f1f5f9',color:'#64748b',padding:12}}>Cancelar</button>
              <button onClick={confirmarBorrar} style={{...S.btn,flex:1,background:'#dc2626',color:'white',padding:12,fontWeight:900}}>Sí, borrar</button>
            </div>
          </div>
        </div>
      )}

      {plazoEv&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999,padding:16}} onClick={()=>setPlazoEv(null)}>
          <div className="fade-in" style={{...S.card,maxWidth:400,width:'100%',padding:22}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:900,fontSize:17,marginBottom:4}}>📅 Plazo de encuesta y recuerdos</h3>
            <p style={{fontSize:12,color:'#64748b',marginBottom:12}}><b>{plazoEv.nombre}</b> · {plazoEv.dia}/{plazoEv.mes}/{plazoEv.anio}</p>
            <div style={{background:'#f8fafc',border:'1px solid #eef1f6',borderRadius:10,padding:'10px 12px',fontSize:12,color:'#475569',marginBottom:14}}>
              Por defecto el papá tiene hasta <b>{_autoVence(plazoEv)}</b> (evento + {_diasLimAdm} días) para completar la encuesta y subir las fotos. Acá podés darle más tiempo.
            </div>
            <div style={{fontSize:12,fontWeight:700,color:'#334155',marginBottom:6}}>Sumar días extra:</div>
            <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
              {[2,3,5,7].map(n=>(<button key={n} onClick={()=>_plazoMasDias(plazoEv,n)} style={{...S.btn,background:'#eef2ff',color:'#4338ca',border:'1px solid #c7d2fe',padding:'8px 14px',fontSize:13,fontWeight:800}}>+{n} días</button>))}
            </div>
            <label style={S.label}>…o habilitar hasta una fecha exacta:</label>
            <input type="date" value={plazoEv.encuestaHasta||''} onChange={e=>{_fijarPlazo(plazoEv,e.target.value);setPlazoEv({...plazoEv,encuestaHasta:e.target.value});}} style={{...S.input,marginBottom:10}}/>
            {plazoEv.encuestaHasta&&<div style={{fontSize:12,color:'#16a34a',fontWeight:700,marginBottom:10}}>✓ Habilitado hasta el {(()=>{const[a,m,d]=plazoEv.encuestaHasta.split('-');return d+'/'+m;})()}</div>}
            <div style={{display:'flex',gap:8}}>
              {plazoEv.encuestaHasta&&<button onClick={()=>{_fijarPlazo(plazoEv,'');setPlazoEv(null);flashOk('✓ Volvió al plazo automático');}} style={{...S.btn,flex:1,background:'#fef2f2',color:'#dc2626',padding:11}}>Volver a automático</button>}
              <button onClick={()=>{setPlazoEv(null);flashOk('✓ Plazo guardado');}} style={{...S.btn,flex:1,background:'#16a34a',color:'white',padding:11,fontWeight:900}}>Listo</button>
            </div>
          </div>
        </div>
      )}

      {/* ── TARJETAS CREADAS HOY ── */}
      <div style={{marginBottom:10,fontSize:14,fontWeight:900,color:'#0ea5e9',letterSpacing:.3}}>📅 CREADAS HOY {creadasHoy.length>0&&<span style={{color:'#94a3b8',fontWeight:700,fontSize:12}}>({creadasHoy.length})</span>}</div>
      {creadasHoy.length===0
        ?<div style={{textAlign:'center',color:'#94a3b8',padding:'26px 16px',background:'#fff',border:'1px dashed #e2e8f0',borderRadius:14,marginBottom:26,fontSize:13}}>Todavía no creaste ninguna tarjeta hoy. Tocá <b>➕ Crear tarjeta</b> arriba.</div>
        :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:16,marginBottom:26}}>
          {creadasHoy.map(ev=>tarjetaEvento(ev,false))}
        </div>
      }

      {/* ── HISTORIAL POR MES / AÑO ── */}
      <div style={{...S.card,marginBottom:14,padding:'14px 16px'}}>
        <div style={{fontSize:14,fontWeight:900,color:'#0ea5e9',letterSpacing:.3,marginBottom:4}}>🔎 HISTORIAL DE TARJETAS</div>
        <div style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>Buscá por mes y/o año. Aparecen como tarjetitas más chicas.</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <select value={fMes} onChange={e=>setFMes(e.target.value)} style={{...S.input,width:'auto',fontWeight:700,fontSize:12,padding:'8px 10px'}}>
            <option value=''>📅 Todos los meses</option>
            {MESES.slice(1).map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}
          </select>
          <select value={fAnio} onChange={e=>setFAnio(e.target.value)} style={{...S.input,width:'auto',fontWeight:700,fontSize:12,padding:'8px 10px'}}>
            <option value=''>📆 Todos los años</option>
            {aniosDisp.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
          <input placeholder="Día" value={fDia} onChange={e=>setFDia(e.target.value)} style={{...S.input,width:80,padding:'8px 10px'}}/>

          <span style={{fontSize:11,color:'#94a3b8',marginLeft:'auto'}}>{historial.length} resultado(s)</span>
        </div>
      </div>
      {historial.length===0
        ?<div style={{textAlign:'center',color:'#94a3b8',padding:40}}>No hay tarjetas para esa búsqueda.</div>
        :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(165px,1fr))',gap:12}}>
          {historial.map(ev=>tarjetaEvento(ev,true))}
        </div>
      }
    </div>
  );
}

/* ── ADMIN TEMATICAS ─────────────────────────────────────── */
function AdminTematicas({setVista,tematicas,setTematicas}){
  const [form,setForm]=useState({nombre:'',emoji:'🎨',imgs:[],cats:['TODOS']});
  const [nuevaCat,setNuevaCat]=useState('');
  const [urlInput,setUrlInput]=useState('');
  const [allCats,setAllCats]=useState([...CATS]);
  const [msg,setMsg]=useState('');
  const [editCat,setEditCat]=useState(null); // id de la imagen a la que se le editan categorías
  const [filtCat,setFiltCat]=useState('RECIENTES'); // filtro de la grilla
  const fRef=useRef();
  // Lista a mostrar: más nuevas primero. "RECIENTES" = 10, una por personaje.
  const _bn=n=>String(n||'').replace(/\s*\d+$/,'').trim();
  let listaMostrar=ordenarRecientes(tematicas);
  if(filtCat==='RECIENTES'){const seen=new Set();const out=[];for(const t of listaMostrar){const b=_bn(t.nombre);if(!seen.has(b)){seen.add(b);out.push(t);}if(out.length>=10)break;}listaMostrar=out;}
  else if(filtCat!=='TODOS'){listaMostrar=listaMostrar.filter(t=>(t.cats||[]).includes(filtCat));}

  // Carga MÚLTIPLE: varias imágenes del mismo personaje de una sola vez (achicadas para que se puedan guardar)
  function onFile(e){
    const files=Array.from(e.target.files||[]);if(!files.length)return;
    files.forEach(f=>resizeImg(f,520,data=>setForm(x=>({...x,imgs:[...x.imgs,data]}))));
  }
  function quitarImg(i){setForm(x=>({...x,imgs:x.imgs.filter((_,idx)=>idx!==i)}));}
  function addUrl(){const u=urlInput.trim();if(!u)return;setForm(x=>({...x,imgs:[...x.imgs,u]}));setUrlInput('');}
  function toggleCat(c){setForm(f=>({...f,cats:f.cats.includes(c)?f.cats.filter(x=>x!==c):[...f.cats,c]}))}
  function addCat(e){if(e&&e.preventDefault)e.preventDefault();if(!nuevaCat.trim())return;const c=nuevaCat.trim().toUpperCase();if(!allCats.includes(c))setAllCats(p=>[...p,c]);setForm(f=>({...f,cats:[...f.cats,c]}));setNuevaCat('');}
  // Editar categorías de una imagen ya cargada (siempre conserva TODOS)
  function toggleCatTem(id,c){setTematicas(p=>p.map(x=>{if(x.id!==id)return x;const cur=x.cats||['TODOS'];const next=cur.includes(c)?cur.filter(y=>y!==c):[...cur,c];return {...x,cats:next.includes('TODOS')?next:['TODOS',...next]};}));}
  async function sub(e){
    e.preventDefault();
    if(!form.nombre||!form.imgs.length){setMsg('Completá el nombre y subí al menos una imagen.');return;}
    const c=form.cats.includes('TODOS')?form.cats:['TODOS',...form.cats];
    const base=Date.now();
    const nom=form.nombre, emo=form.emoji, imgs=form.imgs.slice();
    // Subimos cada imagen a la nube y guardamos el ENLACE (liviano). Si falla, queda la imagen igual.
    const urls=[];
    for(let i=0;i<imgs.length;i++){
      setMsg('Subiendo imágenes… '+(i+1)+'/'+imgs.length);
      let u=imgs[i];
      try{const r=await fetch('/api/subir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:imgs[i]})});const d=await r.json().catch(()=>({}));if(r.ok&&d.url)u=d.url;}catch(err){}
      urls.push(u);
    }
    setTematicas(p=>[...p,...urls.map((u,i)=>({id:'t-'+base+'-'+i,nombre:nom+(urls.length>1?(' '+(i+1)):''),cats:c,img:u,emoji:emo}))]);
    setMsg('✅ '+urls.length+' imagen'+(urls.length>1?'es':'')+' guardada'+(urls.length>1?'s':''));flashOk('✓ ¡Imágenes guardadas!');
    setForm({nombre:'',emoji:'🎨',imgs:[],cats:['TODOS']});setTimeout(()=>setMsg(''),4000);
  }

  return(
    <div className="fade-in" style={{maxWidth:900,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:20,marginBottom:18}}>🖼️ Catálogo de imágenes <span style={{fontSize:14,color:'#7c3aed'}}>({(tematicas||[]).length.toLocaleString('es-AR')} en total)</span></h1>
      <div style={{display:'grid',gridTemplateColumns:'min(300px,100%) 1fr',gap:20,alignItems:'start'}} className="admin-tematicas-grid">
        <div style={S.card}>
          <h3 style={{fontWeight:900,fontSize:14,marginBottom:14}}>Cargar imágenes</h3>
          {msg&&<div style={{background:'#f0fdf4',color:'#166534',padding:10,borderRadius:10,fontSize:12,fontWeight:700,marginBottom:10}}>{msg}</div>}
          <form onSubmit={sub} style={{display:'flex',flexDirection:'column',gap:12}}>
            <label><span style={S.label}>Nombre del personaje</span><input value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} style={S.input} placeholder="Ej: Spiderman" required/></label>
            <label><span style={S.label}>Emoji</span><input value={form.emoji} onChange={e=>setForm({...form,emoji:e.target.value})} maxLength={2} style={{...S.input,width:60,fontSize:24,textAlign:'center'}}/></label>
            <div>
              <span style={S.label}>Imágenes (podés subir VARIAS del mismo personaje · 9:16 ideal)</span>
              <div onClick={()=>fRef.current.click()} style={{border:'2px dashed #c4b5fd',borderRadius:12,padding:14,textAlign:'center',cursor:'pointer',background:'#faf5ff'}}>
                <div style={{color:'#7c3aed',fontSize:12,fontWeight:700}}>📤 Subir imágenes (varias a la vez)<br/><span style={{fontSize:10,color:'#94a3b8',fontWeight:400}}>Seleccioná todas las que quieras · 1080×1920 ideal</span></div>
              </div>
              <input ref={fRef} type="file" accept="image/*" multiple onChange={onFile} style={{display:'none'}}/>
              <div style={{display:'flex',gap:6,marginTop:6}}>
                <input value={urlInput} onChange={e=>setUrlInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addUrl();}}} placeholder="O pegá una URL y +" style={{...S.input,flex:1,marginTop:0,fontSize:11}}/>
                <button type="button" onClick={addUrl} style={{...S.btn,background:'#7c3aed',color:'white',padding:'7px 12px'}}>+</button>
              </div>
              {form.imgs.length>0&&(
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6,marginTop:8}}>
                  {form.imgs.map((im,i)=>(
                    <div key={i} style={{position:'relative',aspectRatio:'9/16',borderRadius:8,overflow:'hidden',background:'#0f172a'}}>
                      <img src={im} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                      <button type="button" onClick={()=>quitarImg(i)} style={{position:'absolute',top:2,right:2,background:'rgba(220,38,38,.92)',color:'white',border:'none',borderRadius:'50%',width:18,height:18,fontSize:10,cursor:'pointer',lineHeight:1}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
              {form.imgs.length>0&&<div style={{fontSize:10,color:'#16a34a',fontWeight:700,marginTop:4}}>{form.imgs.length} imagen{form.imgs.length>1?'es':''} lista{form.imgs.length>1?'s':''} para cargar</div>}
            </div>
            <div>
              <span style={S.label}>Categorías <span style={{color:'#94a3b8',fontWeight:400}}>(por defecto: TODAS)</span></span>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>

/* ── ADMIN EXCEL ─────────────────────────────────────────── */
function AdminExcel({setVista,sucActId,eventos,setEventos}){
  const [txt,setTxt]=useState(''); const [msg,setMsg]=useState('');
  function sub(e){
    e.preventDefault();
    if(!txt.trim()){setMsg('Pega el texto de tu planilla.');return;}
    const filas=txt.split('\n').filter(l=>l.trim());
    let n=0;const nuevo=[...eventos];
    filas.forEach((f,i)=>{
      const c=f.split(/\t|;/).map(x=>x.trim());
      const primera=(c[0]||'').toLowerCase();
      if(primera==='nombre'||primera==='nombre ') return; // saltear fila de titulos
      if(c.length>=3&&c[0]){
        nuevo.push({id:'ev-xl-'+Date.now()+i,sucId:sucActId,nombre:c[0],edad:c[1]||'5',dia:c[2],mes:c[3]||'05',anio:c[4]||'2026',hIni:c[5]||'17:00',hFin:c[6]||'22:00',nomPapa:c[7]||'',dni:c[8]||'',celPapa:c[9]||'',user:c[10]||(c[0].toLowerCase().replace(/\s/g,'')+'2026'),pass:c[11]||'1234',temId:'t-3',tipo:'Cumpleaños'});
        n++;
      }
    });
    setEventos(nuevo);setMsg(`✅ Se importaron ${n} cumpleaños.`);setTxt('');setTimeout(()=>setMsg(''),5000);
  }
  function descargarPlantilla(){
    const filas=[
      ['Nombre','Edad','Dia','Mes','Anio','Hora Inicio','Hora Fin','Padre/Madre','DNI','Celular','Usuario','Clave'],
      ['Mia Gonzalez','5','15','06','2026','17:00','21:00','Laura Gonzalez','30111222','2645522081','miagonzalez2026','1234'],
      ['Thiago Perez','7','22','06','2026','18:00','22:00','Marcos Perez','28999888','2644567890','thiagoperez2026','5678'],
    ];
    const csv='﻿'+filas.map(f=>f.join(';')).join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Plantilla_Eventos_FunZone.csv';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }
  return(
    <div className="fade-in" style={{maxWidth:620,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <div style={S.card}>
        <h1 style={{fontWeight:900,fontSize:20,marginBottom:6}}>📊 Carga Excel Semanal</h1>
        <p style={{fontSize:12,color:'#64748b',marginBottom:16}}>Copiá las filas de tu planilla y pegálas acá.</p>
        {msg&&<div style={{background:'#f0fdf4',color:'#166534',padding:12,borderRadius:12,fontSize:12,fontWeight:700,marginBottom:14}}>{msg}</div>}
        <div style={{background:'#f8fafc',borderRadius:12,padding:12,fontSize:11,color:'#64748b',marginBottom:12,border:'1px dashed #e2e8f0'}}>
          <b>Columnas:</b> Nombre · Edad · Día · Mes · Año · HoraInicio · HoraFin · Padre/Madre · DNI · Celular · Usuario · Clave
        </div>
        <button type="button" onClick={descargarPlantilla} style={{...S.btn,background:'#eef2ff',color:'#4338ca',width:'100%',padding:12,marginBottom:14,fontSize:13,fontWeight:800}}>⬇️ Descargar plantilla Excel</button>
        <p style={{fontSize:11,color:'#94a3b8',marginBottom:14,lineHeight:1.5}}>💡 Descargá la plantilla, completála en Excel, después copiá las filas (sin los títulos) y pegálas acá abajo.</p>
        <form onSubmit={sub}>
          <textarea rows={7} value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Pegá las filas acá..." style={{...S.input,fontFamily:'monospace',resize:'vertical'}}/>
          <button type="submit" style={{...S.btn,background:'#10b981',color:'white',width:'100%',padding:14,marginTop:12,fontSize:14}}>📤 Importar Fiestas</button>
        </form>
      </div>
    </div>
  );
}

                          </div>

                        <div style={{flex:1}}>

                              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const file=e.target.files[0];if(!file)return;resizeImg(file,260,data=>setEd(prev=>({...prev,logo:data})));}}/>

                          </div>

                      </div>

                    {/* PRIMERA PORTADA */}
                    <div style={{background:'white',borderRadius:10,padding:12,marginBottom:12,border:'2px solid '+(ed.color||'#f97316')}}>
                      <div style={{fontWeight:800,fontSize:11,color:'#64748b',marginBottom:10,textTransform:'uppercase'}}>Primera Portada</div>
                      <label style={{display:'block',marginBottom:10}}>
                        <span style={S.label}>Frase de bienvenida</span>

                      </label>

                      <div style={{background:ed.color||'#f97316',borderRadius:10,padding:'10px 14px',marginBottom:12,textAlign:'center'}}>

                      </div>
                      <span style={S.label}>Color de fondo</span>
                      {/* Paleta de colores predefinidos */}
                      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
                        {['#f97316','#ef4444','#ec4899','#a855f7','#7c3aed','#3b82f6','#06b6d4','#10b981','#84cc16','#eab308','#f59e0b','#0f172a'].map(c=>(

                      </label>
                    </div>

                    {/* Fotos */}
                    <div style={{background:'white',borderRadius:10,padding:12,marginBottom:12,border:'1px solid #e2e8f0'}}>

                      {[0,1,2,3].map(i=>{

                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>

                          <label style={{...S.btn,background:'#0f172a',color:'white',padding:'8px 12px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>📷 {foto?'Cambiar':'Subir'}
                            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const file=e.target.files[0];if(!file)return;resizeImg(file,640,data=>{const f=[...(ed.fotos||['','','',''])];f[i]=data;setEd({...ed,fotos:f});});}}/>
                          </label>
                          {foto&&<button type="button" onClick={()=>{const f=[...(ed.fotos||['','','',''])];f[i]='';setEd({...ed,fotos:f});}} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16}}>🗑</button>}

                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>{setSucursales(sucursales.map(x=>x.id===s.id?{...x,...ed}:x));setEditing(false);flashOk('✓ ¡Guardado!');}} style={{...S.btn,background:'#16a34a',color:'white',flex:1,padding:'10px'}}>Guardar</button>
                      <button onClick={()=>setEditing(false)} style={{...S.btn,background:'#f1f5f9',color:'#64748b',padding:'10px'}}>Cancelar</button>
                    </div>
                  </div>
                )}
              </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );

/* ── ADMIN IA & PRECIOS ──────────────────────────────────── */
function AdminIA({setVista,iaConfig,setIaConfig}){
  const [cfg,setCfg]=useState(iaConfig);
  const [msg,setMsg]=useState('');
  const [editando,setEditando]=useState(false);
  const [saldo,setSaldo]=useState(null);   // {balance,currency} | null
  const [saldoErr,setSaldoErr]=useState('');
  const [saldoCargando,setSaldoCargando]=useState(true);
  function cargarSaldo(){setSaldoCargando(true);setSaldoErr('');fetch('/api/saldo').then(r=>r.json()).then(d=>{if(d&&typeof d.balance==='number'){setSaldo(d);}else{setSaldoErr((d&&d.error)||'No disponible');}}).catch(()=>setSaldoErr('No se pudo consultar')).finally(()=>setSaldoCargando(false));}
  React.useEffect(()=>{cargarSaldo();},[]);
  const [vozMsg,setVozMsg]=useState('');
  function probarVoz(g){setVozMsg('Probando la voz…');fetch('/api/voz',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'Hola, soy una prueba de voz para Fun Zone. ¡Va a ser una fiesta increíble!',genero:g})}).then(async r=>{const d=await r.json().catch(()=>({}));if(r.ok&&d&&d.audio){try{const a=new Audio(d.audio);a.play();}catch(e){}setVozMsg('✅ Voz '+(g==='f'?'femenina':'masculina')+' OK — deberías escucharla. ¡ElevenLabs anda!');}else if(d&&d.configured===false){setVozMsg('⚠️ Falta cargar ELEVENLABS_API_KEY en Vercel y hacer Redeploy.');}else{setVozMsg('⚠️ '+((d&&d.error)||'No funcionó. Fijate que la clave tenga permiso de "Texto a voz".'));}}).catch(()=>setVozMsg('⚠️ No se pudo consultar el servicio de voz.'));}
  function set(k,v){setCfg(c=>({...c,[k]:v}));}
  function guardar(){setIaConfig(cfg);setEditando(false);setMsg('✓ Cambios guardados');flashOk('✓ ¡Cambios guardados!');setTimeout(()=>setMsg(''),2500);}
  const lockStyle=editando?{}:{background:'#f1f5f9',color:'#475569',cursor:'not-allowed'};
  const servicio=(titulo,emoji,kPrompt,kApi,kPrecio,phPrompt)=>(
    <div style={{...S.card,marginBottom:14}}>
      <h3 style={{fontWeight:900,fontSize:15,marginBottom:12}}>{emoji} {titulo}</h3>
      <label style={{display:'block',marginBottom:10}}><span style={S.label}>Prompt (instrucción para la IA)</span>
        <textarea value={cfg[kPrompt]||''} readOnly={!editando} onChange={e=>set(kPrompt,e.target.value)} rows={4} style={{...S.input,resize:'vertical',fontFamily:'inherit',...lockStyle}} placeholder={phPrompt}/>
        <span style={{fontSize:10,color:'#94a3b8'}}>Variables disponibles: {'{nombre}'}, {'{edad}'}, {'{personaje}'}. <b>No hace falta pedir el cartel ni el formato</b>: el sistema lo agrega solo.</span>
      </label>
      <label style={{display:'block',marginBottom:10}}><span style={S.label}>🔑 API Key</span>
        <input value={cfg[kApi]||''} onChange={e=>set(kApi,e.target.value)} style={S.input} placeholder="Pegá aquí la API key del servicio" autoComplete="off"/>
      </label>
      <label style={{display:'block',maxWidth:220}}><span style={S.label}>💲 Precio al papá ($)</span>
        <input type="number" value={cfg[kPrecio]==null?'':cfg[kPrecio]} onChange={e=>set(kPrecio,e.target.value===''?'':+e.target.value)} style={S.input}/>
      </label>
    </div>
  );
  return(
    <div className="fade-in" style={{maxWidth:700,margin:'0 auto',padding:'20px 16px'}}>
      <button style={S.back} onClick={()=>setVista('admin-dashboard')}>← Volver</button>
      <h1 style={{fontWeight:900,fontSize:22,marginBottom:4}}>🤖 IA & Precios</h1>
      <p style={{fontSize:11,color:'#64748b',marginBottom:18}}>Prompts, API keys y precios de los servicios de IA</p>

      {/* Saldo de crédito IA (fal.ai) con alerta */}
      {(()=>{const bal=saldo&&saldo.balance;const bajo=typeof bal==='number'&&bal<20;const col=bajo?'#dc2626':'#16a34a';const bg=bajo?'#fef2f2':'#f0fdf4';const bd=bajo?'#fecaca':'#bbf7d0';
        return(
        <div style={{background:bg,border:'1px solid '+bd,borderRadius:14,padding:'12px 14px',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:11,fontWeight:800,color:'#64748b'}}>💳 Crédito disponible en IA (fal.ai)</div>
              {saldoCargando?(
                <div style={{fontSize:14,fontWeight:900,color:'#64748b'}}>Consultando…</div>
              ):typeof bal==='number'?(
                <div style={{fontSize:24,fontWeight:900,color:col}}>US${bal.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              ):(
                <div style={{fontSize:12,fontWeight:700,color:'#b45309'}}>No disponible {saldoErr?('· '+saldoErr):''}</div>
              )}
            </div>
            <button onClick={cargarSaldo} style={{...S.btn,background:'#fff',color:'#334155',border:'1px solid #e2e8f0',padding:'7px 12px',fontSize:12}}>↻ Actualizar</button>
          </div>
          {bajo&&<div style={{marginTop:8,fontSize:12,color:'#dc2626',fontWeight:800}}>⚠️ Crédito bajo. Recargá en fal.ai para no quedarte sin generaciones.</div>}
          {typeof bal==='number'&&!bajo&&<div style={{marginTop:6,fontSize:10,color:'#94a3b8'}}>Aprox.: ~{Math.floor(bal/0.04)} imágenes o ~{Math.floor(bal/0.9)} videos con este saldo.</div>}
        </div>
        );})()}

      {msg&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',color:'#166534',padding:'10px 14px',borderRadius:12,fontSize:13,marginBottom:14,fontWeight:700}}>{msg}</div>}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,background:editando?'#fef9c3':'#f1f5f9',border:'1px solid '+(editando?'#fde047':'#e2e8f0'),borderRadius:12,padding:'10px 14px',marginBottom:14}}>
        <span style={{fontSize:12,fontWeight:700,color:editando?'#854d0e':'#64748b'}}>{editando?'✏️ Modo edición activado — ya podés modificar los prompts.':'🔒 Los prompts están protegidos para que no se borren sin querer.'}</span>
        <button onClick={()=>setEditando(e=>!e)} style={{...S.btn,background:editando?'#64748b':'#0ea5e9',color:'white',padding:'7px 14px',fontSize:12,whiteSpace:'nowrap'}}>{editando?'🔒 Bloquear':'✏️ Editar'}</button>
      </div>

      {servicio('Imagen IA — Estilo "Amigos" (Prompt 1)','🤝','promptImagen','apiImagen','precioImagen','El niño/a junto a su personaje favorito...')}

      <div style={{...S.card,marginBottom:14,border:'1px solid #bae6fd'}}>
