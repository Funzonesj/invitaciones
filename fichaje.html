async function gwPingF() {

        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        action: 'ping'

    _FGW = r.status !== 503;
  } catch (e) {
    _FGW = false;

}
async function gwF(action, payload) {
  const h = {
    'Content-Type': 'application/json'
  };
  if (_FTOK) h['x-fichaje-token'] = _FTOK;
  const r = await fetch('/api/fichaje', {
    method: 'POST',
    headers: h,
    body: JSON.stringify(Object.assign({
      action: action
    }, payload || {}))
  });
  if (!r.ok) throw new Error('gwF ' + r.status);
  return r.json();
}
async function dbAll(tabla) {
  if (await gwPingF()) {
    try {

    return data || [];
  } catch (e) {
    return [];

async function dbInsert(tabla, row) {
  if (await gwPingF()) {
    try {
      const d = await gwF('insert', {
        tabla: tabla,

      if (d && d.ok) return d.row;
    } catch (e) {}
  }

}
