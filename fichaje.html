<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  html,body{margin:0;padding:0;background:#1A1A1A;color:#F5F5F5;font-family:'Inter',system-ui,sans-serif;font-size:15px}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Supabase (misma instancia que el salón) ── */
const SB_URL = 'https://tnubhbtihssubnfpwuvu.supabase.co';
const SB_KEY = 'sb_publishable_ZLLncEbfaSqZz15N6-MrXQ_g4K_ndB-';
const SB = (window.supabase && SB_URL && SB_KEY) ? window.supabase.createClient(SB_URL, SB_KEY) : null;

/* ── Estilos compartidos ── */
const C = { bg:'#1A1A1A', surf:'#242424', surf2:'#2e2e2e', oro:'#E8A838', rojo:'#E84040', amar:'#F0C040', verde:'#4CAF7D', tx:'#F5F5F5', tx2:'#9E9E9E', bd:'#3a3a3a' };
const S = {
  card:{background:C.surf,borderRadius:16,padding:16,border:'1px solid '+C.bd},
  input:{width:'100%',background:C.surf2,border:'1px solid '+C.bd,borderRadius:10,padding:'12px 13px',color:C.tx,fontSize:15,outline:'none'},
  label:{display:'block',fontSize:12,color:C.tx2,marginBottom:6,fontWeight:500},
  btn:{border:'none',borderRadius:12,padding:'13px 16px',fontWeight:700,fontSize:15,cursor:'pointer',minHeight:48},
  btnOro:{background:C.oro,color:'#1A1A1A'},
  btnGhost:{background:C.surf2,color:C.tx,border:'1px solid '+C.bd},
  chip:{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700},
};

/* ── Helpers DB ── */
async function dbAll(tabla){ if(!SB)return[]; try{const{data}=await SB.from(tabla).select('*');return data||[];}catch(e){return[];} }
async function dbInsert(tabla,row){ try{const{data,error}=await SB.from(tabla).insert(row).select();if(error)throw error;return data&&data[0];}catch(e){alert('Error al guardar: '+(e.message||e));return null;} }
async function dbUpdate(tabla,id,row){ try{const{error}=await SB.from(tabla).update(row).eq('id',id);if(error)throw error;return true;}catch(e){alert('Error al actualizar: '+(e.message||e));return false;} }
async function dbDelete(tabla,id){ try{const{error}=await SB.from(tabla).delete().eq('id',id);if(error)throw error;return true;}catch(e){alert('Error al borrar: '+(e.message||e));return false;} }
async function subirFoto(dataUri){ try{const r=await fetch('/api/subir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:dataUri})});const d=await r.json().catch(()=>({}));return (r.ok&&d.url)?d.url:dataUri;}catch(e){return dataUri;} }
async function subirPDF(file){ try{ const r=await fetch('/api/subir-init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content_type:'application/pdf',ext:'pdf'})}); const d=await r.json().catch(()=>({})); if(!r.ok||!d.upload_url||!d.file_url)return null; const up=await fetch(d.upload_url,{method:'PUT',headers:{'Content-Type':'application/pdf'},body:file}); if(!up.ok)return null; return d.file_url; }catch(e){return null;} }
function distancia(la1,lo1,la2,lo2){const R=6371000,t=x=>x*Math.PI/180;const d1=t(la2-la1),d2=t(lo2-lo1);const a=Math.sin(d1/2)**2+Math.cos(t(la1))*Math.cos(t(la2))*Math.sin(d2/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

/* ════════════════════════════════════════════ */
function App(){
  const [boot,setBoot]=useState(true);
  const [sesion,setSesion]=useState(()=>{try{return JSON.parse(localStorage.getItem('fichaje_sesion')||'null');}catch(e){return null;}});
  const [vista,setVista]=useState('dashboard');
  const [sucursales,setSucursales]=useState([]);
  const [empleados,setEmpleados]=useState([]);
  const [sucActiva,setSucActiva]=useState(''); // para la dueña: '' = todas

  async function recargar(){
    const [su,em]=await Promise.all([dbAll('fichaje_sucursales'),dbAll('fichaje_empleados')]);
    setSucursales(su); setEmpleados(em);
  }
  useEffect(()=>{ (async()=>{ await recargar(); setBoot(false); })(); },[]);
  useEffect(()=>{ if(sesion) localStorage.setItem('fichaje_sesion',JSON.stringify(sesion)); else localStorage.removeItem('fichaje_sesion'); },[sesion]);

  function salir(){ setSesion(null); setVista('dashboard'); }

  if(boot) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><span className="spin"></span></div>;
  if(!SB) return <div style={{padding:24}}>No se pudo conectar a la base de datos.</div>;
  if(!sesion) return <Login empleados={empleados} onLogin={setSesion}/>;

  const rol = sesion.rol_sistema || 'empleado';
  const esDuena = rol==='dueno';
  // sucursal en contexto (empleado/encargada: la suya; dueña: la elegida o todas)
  const sucCtx = esDuena ? sucActiva : (sesion.sucursal_encargada || (sesion.sucursales&&sesion.sucursales[0]) || '');

  return (
    <div style={{minHeight:'100vh',paddingBottom:78}}>
      <Header sesion={sesion} esDuena={esDuena} sucursales={sucursales} sucActiva={sucActiva} setSucActiva={setSucActiva} onSalir={salir}/>
      <div className="fade" style={{maxWidth:560,margin:'0 auto',padding:'14px 14px 0'}}>
        {vista==='dashboard'   && <Dashboard sesion={sesion} rol={rol} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx} setVista={setVista}/>}
        {vista==='fichar'      && <Fichar sesion={sesion} sucursales={sucursales}/>}
        {vista==='mishorarios' && <MisHorarios sesion={sesion}/>}
        {vista==='miplanilla'  && <MiPlanilla sesion={sesion} sucursales={sucursales}/>}
        {vista==='horarios'    && (esDuena||rol==='encargada') && <Horarios sesion={sesion} esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='registros'   && (esDuena||rol==='encargada') && <Registros esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='pagos'       && (esDuena||rol==='encargada') && <Pagos sesion={sesion} esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='alertas'     && (esDuena||rol==='encargada') && <Alertas esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
        {vista==='empleados'   && esDuena && <Empleados empleados={empleados} sucursales={sucursales} recargar={recargar}/>}
        {vista==='sucursales'  && esDuena && <Sucursales sucursales={sucursales} recargar={recargar}/>}
        {vista==='config'      && esDuena && <Configuracion sucursales={sucursales} empleados={empleados} recargar={recargar}/>}
      </div>
      <BottomNav rol={rol} vista={vista} setVista={setVista}/>
    </div>
  );
}

/* ── Header ── */
function Header({sesion,esDuena,sucursales,sucActiva,setSucActiva,onSalir}){
  return (
    <div style={{position:'sticky',top:0,zIndex:50,background:C.bg,borderBottom:'1px solid '+C.bd}}>
      <div style={{maxWidth:560,margin:'0 auto',padding:'12px 14px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:34,height:34,borderRadius:9,background:C.oro,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🕒</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,lineHeight:1.1}}>{sesion.nombre}</div>
          <div style={{fontSize:11,color:C.tx2}}>{sesion.rol_sistema==='dueno'?'Dueña':sesion.rol_sistema==='encargada'?'Encargada':'Empleado'}</div>
        </div>
        {esDuena && (
          <select value={sucActiva} onChange={e=>setSucActiva(e.target.value)} style={{...S.input,width:'auto',padding:'8px 10px',fontSize:13}}>
            <option value="">Todas</option>
            {sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
          </select>
        )}
        <button onClick={onSalir} style={{...S.btn,...S.btnGhost,padding:'8px 12px',minHeight:0,fontSize:13}}>Salir</button>
      </div>
    </div>
  );
}

/* ── Bottom nav (según rol) ── */
function BottomNav({rol,vista,setVista}){
  const items = rol==='dueno'
    ? [['dashboard','🏠','Inicio'],['horarios','🗓️','Horarios'],['pagos','💰','Pagos'],['empleados','👥','Empleados'],['sucursales','🏢','Salones'],['config','⚙️','Config']]
    : rol==='encargada'
    ? [['dashboard','🏠','Inicio'],['horarios','🗓️','Horarios'],['registros','📋','Fichajes'],['pagos','💰','Pagos'],['alertas','🔔','Alertas']]
    : [['dashboard','🏠','Inicio'],['fichar','📍','Fichar'],['mishorarios','📅','Mis horarios'],['miplanilla','📝','Mi planilla']];
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:C.surf,borderTop:'1px solid '+C.bd,zIndex:50}}>
      <div style={{maxWidth:560,margin:'0 auto',display:'flex'}}>
        {items.map(([v,e,l])=>(
          <button key={v} onClick={()=>setVista(v)} style={{flex:1,background:'none',border:'none',padding:'9px 2px 7px',cursor:'pointer',color:vista===v?C.oro:C.tx2}}>
            <div style={{fontSize:20,lineHeight:1}}>{e}</div>
            <div style={{fontSize:10,marginTop:3,fontWeight:vista===v?700:500}}>{l}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ── Login ── */
function Login({empleados,onLogin}){
  const [u,setU]=useState(''); const [p,setP]=useState(''); const [err,setErr]=useState('');
  function entrar(e){ e.preventDefault();
    const found=(empleados||[]).find(x=>x.activo!==false && ((x.usuario||'').toLowerCase()===u.trim().toLowerCase()) && String(x.clave||'')===p);
    if(!found){ setErr('Usuario o contraseña incorrectos.'); return; }
    onLogin(found);
  }
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <form onSubmit={entrar} className="fade" style={{width:'100%',maxWidth:360}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{fontSize:44}}>🕒</div>
          <h1 style={{fontSize:24,marginTop:6}}>Control de Horarios</h1>
          <div style={{color:C.tx2,fontSize:13,marginTop:4}}>Asistencia del personal</div>
        </div>
        <div style={{...S.card,display:'flex',flexDirection:'column',gap:12}}>
          <div><label style={S.label}>Usuario</label><input style={S.input} value={u} onChange={e=>{setU(e.target.value);setErr('');}} autoCapitalize="none" placeholder="usuario" required/></div>
          <div><label style={S.label}>Contraseña</label><input style={S.input} type="password" value={p} onChange={e=>{setP(e.target.value);setErr('');}} placeholder="••••••" required/></div>
          {err && <div style={{color:C.rojo,fontSize:13,fontWeight:500}}>{err}</div>}
          <button style={{...S.btn,...S.btnOro}}>Ingresar</button>
        </div>
        <p style={{color:C.tx2,fontSize:11,textAlign:'center',marginTop:14}}>Solo la dueña crea los usuarios. Si no tenés acceso, pedíselo a ella.</p>
      </form>
    </div>
  );
}

/* ── Dashboard ── */
function Metric({n,l,col}){ return (
  <div style={{...S.card,flex:1,minWidth:130}}>
    <div className="num" style={{fontSize:30,color:col||C.oro,lineHeight:1}}>{n}</div>
    <div style={{fontSize:12,color:C.tx2,marginTop:6}}>{l}</div>
  </div>
);}
function Dashboard({sesion,rol,sucursales,empleados,sucCtx,setVista}){
  const empSuc = sucCtx ? empleados.filter(e=>(e.sucursales||[]).includes(sucCtx)) : empleados;
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:4}}>Hola, {String(sesion.nombre||'').split(' ')[0]} 👋</h2>
      <p style={{color:C.tx2,fontSize:13,marginBottom:14}}>{rol==='dueno'?'Vista general':rol==='encargada'?'Tu sucursal':'Tu actividad'}</p>
      {rol==='empleado' ? (
        <div style={{...S.card,textAlign:'center',padding:'26px 16px'}}>
          <div style={{fontSize:40}}>📍</div>
          <p style={{fontWeight:700,marginTop:8}}>¿Listo para fichar?</p>
          <p style={{color:C.tx2,fontSize:13,margin:'6px 0 14px'}}>Tocá el botón y seguí los pasos (ubicación + foto).</p>
          <button onClick={()=>setVista('fichar')} style={{...S.btn,...S.btnOro,width:'100%'}}>📍 Fichar ahora</button>
        </div>
      ) : (
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <Metric n={empSuc.length} l="Empleados activos"/>
          <Metric n={sucCtx?1:sucursales.length} l={sucCtx?'Sucursal en foco':'Sucursales'} col={C.verde}/>
          <Metric n="0" l="Eventos hoy" col={C.amar}/>
          <Metric n="0" l="Alertas" col={C.rojo}/>
        </div>
      )}
      <div style={{...S.card,marginTop:14,background:'#2a2418',border:'1px solid #4a3d1c'}}>
        <div style={{fontWeight:700,color:C.oro,fontSize:13}}>🚧 App en construcción</div>
        <div style={{fontSize:12,color:C.tx2,marginTop:4,lineHeight:1.5}}>Ya funcionan: login, roles, <b style={{color:C.tx}}>Sucursales</b> y <b style={{color:C.tx}}>Empleados</b>. En las próximas etapas: horarios + lector de PDF, fichaje con cámara y pagos.</div>
      </div>
    </div>

}

/* ── Placeholder ── */
function Placeholder({titulo,txt}){ return (

    <h2 style={{fontSize:20,marginBottom:12}}>{titulo}</h2>
    <div style={{...S.card,textAlign:'center',padding:'30px 18px'}}>
      <div style={{fontSize:38}}>🚧</div>

);}

/* ── Sucursales (dueña) ── */
function Sucursales({sucursales,recargar}){
  const vacio={nombre:'',direccion:'',lat:'',lng:'',radio_metros:80,activa:true};
  const [form,setForm]=useState(vacio); const [editId,setEditId]=useState(null);
  const [geoMsg,setGeoMsg]=useState('');
  function editar(s){ setEditId(s.id); setForm({nombre:s.nombre||'',direccion:s.direccion||'',lat:s.lat??'',lng:s.lng??'',radio_metros:s.radio_metros||80,activa:s.activa!==false}); window.scrollTo(0,0); }
  function limpiar(){ setEditId(null); setForm(vacio); setGeoMsg(''); }
  function usarUbicacion(){
    if(!navigator.geolocation){ setGeoMsg('Este dispositivo no tiene GPS.'); return; }
    setGeoMsg('Obteniendo ubicación…');
    navigator.geolocation.getCurrentPosition(
      pos=>{ setForm(f=>({...f,lat:+pos.coords.latitude.toFixed(6),lng:+pos.coords.longitude.toFixed(6)})); setGeoMsg('✓ Ubicación tomada (precisión '+Math.round(pos.coords.accuracy)+' m). Hacelo parada en la puerta del salón.'); },
      err=>{ setGeoMsg('No se pudo: '+err.message); },
      {enableHighAccuracy:true,timeout:10000}
    );
  }
  async function guardar(){
    if(!form.nombre.trim()){ alert('Poné el nombre del salón.'); return; }
    const row={ nombre:form.nombre.trim(), direccion:form.direccion.trim(), lat:form.lat===''?null:+form.lat, lng:form.lng===''?null:+form.lng, radio_metros:+form.radio_metros||80, activa:form.activa };
    let ok;
    if(editId) ok=await dbUpdate('fichaje_sucursales',editId,row); else ok=!!(await dbInsert('fichaje_sucursales',row));
    if(ok){ await recargar(); limpiar(); }
  }
  async function borrar(s){ if(!window.confirm('¿Borrar '+s.nombre+'?'))return; if(await dbDelete('fichaje_sucursales',s.id)) await recargar(); }
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>🏢 Sucursales</h2>
      <div style={{...S.card,display:'flex',flexDirection:'column',gap:12,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14}}>{editId?'Editar salón':'Nuevo salón'}</div>
        <div><label style={S.label}>Nombre</label><input style={S.input} value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} placeholder="Fun Zone"/></div>
        <div><label style={S.label}>Dirección</label><input style={S.input} value={form.direccion} onChange={e=>setForm({...form,direccion:e.target.value})} placeholder="Calle 123, San Juan"/></div>
        <div style={{background:C.surf2,borderRadius:10,padding:12,border:'1px solid '+C.bd}}>
          <div style={{fontSize:12,color:C.tx2,marginBottom:8}}>📍 Ubicación (para validar el fichaje por GPS)</div>
          <button onClick={usarUbicacion} style={{...S.btn,...S.btnGhost,width:'100%',marginBottom:8}}>📍 Usar mi ubicación actual</button>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><label style={S.label}>Latitud</label><input style={S.input} value={form.lat} onChange={e=>setForm({...form,lat:e.target.value})} placeholder="(vacío)"/></div>
            <div style={{flex:1}}><label style={S.label}>Longitud</label><input style={S.input} value={form.lng} onChange={e=>setForm({...form,lng:e.target.value})} placeholder="(vacío)"/></div>
          </div>
          {geoMsg && <div style={{fontSize:11,color:C.verde,marginTop:8}}>{geoMsg}</div>}
        </div>
        <div><label style={S.label}>Radio permitido (metros)</label><input style={S.input} type="number" value={form.radio_metros} onChange={e=>setForm({...form,radio_metros:e.target.value})}/></div>
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:14}}><input type="checkbox" checked={form.activa} onChange={e=>setForm({...form,activa:e.target.checked})}/> Activa</label>
        <div style={{display:'flex',gap:8}}>
          <button onClick={guardar} style={{...S.btn,...S.btnOro,flex:1}}>{editId?'Guardar cambios':'Crear salón'}</button>
          {editId && <button onClick={limpiar} style={{...S.btn,...S.btnGhost}}>Cancelar</button>}
        </div>
      </div>
      {sucursales.map(s=>(
        <div key={s.id} style={{...S.card,marginBottom:10,display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700}}>{s.nombre} {s.activa===false&&<span style={{...S.chip,background:'#3a2020',color:C.rojo}}>inactiva</span>}</div>
            <div style={{fontSize:12,color:C.tx2}}>{s.direccion||'—'}</div>
            <div style={{fontSize:11,color:(s.lat!=null?C.verde:C.amar),marginTop:2}}>{s.lat!=null?('📍 GPS cargado · radio '+(s.radio_metros||80)+'m'):'⚠️ Sin GPS (cargalo parada en el salón)'}</div>
          </div>
          <button onClick={()=>editar(s)} style={{...S.btn,...S.btnGhost,padding:'8px 12px',minHeight:0,fontSize:13}}>Editar</button>
          <button onClick={()=>borrar(s)} style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'8px 11px',minHeight:0,fontSize:13}}>🗑</button>
        </div>
      ))}
    </div>
  );
}

/* ── Empleados (dueña) ── */
function Empleados({empleados,sucursales,recargar}){
  const vacio={legajo:'',nombre:'',rol_habitual:[],valor_hora:'',sucursales:[],foto_url:'',usuario:'',clave:'',rol_sistema:'empleado',sucursal_encargada:''};
  const [form,setForm]=useState(vacio); const [editId,setEditId]=useState(null); const [subiendo,setSubiendo]=useState(false);
  const parseRoles=v=>Array.isArray(v)?v:(v?String(v).split(',').map(s=>s.trim()).filter(Boolean):[]);

/* ════════ HORARIOS: lector de PDF + regla de ingreso ════════ */
function toMin(hhmm){ const m=String(hhmm||'').match(/(\d{1,2}):(\d{2})/); return m?(+m[1]*60+ +m[2]):0; }
function fmtMin(t){ t=((t%1440)+1440)%1440; const h=Math.floor(t/60),m=t%60; return ('0'+h).slice(-2)+':'+('0'+m).slice(-2); }
function restarMin(hhmm,min){ return fmtMin(toMin(hhmm)-min); }
const DOW=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
function fechaLinda(iso){ try{const[a,m,d]=iso.split('-');const dt=new Date(+a,+m-1,+d);return DOW[dt.getDay()]+' '+d+'/'+m;}catch(e){return iso;} }

// Lee el texto del PDF (pdf.js), reconstruyendo líneas por posición vertical
async function leerLineasPdf(file){
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  const lineas=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const byY={};
    tc.items.forEach(it=>{ const y=Math.round(it.transform[5]); let key=y; for(const k in byY){ if(Math.abs(k-y)<=3){key=+k;break;} } (byY[key]=byY[key]||[]).push(it); });
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const ln=byY[y].sort((a,b)=>a.transform[4]-b.transform[4]).map(i=>i.str).join(' ').replace(/\s+/g,' ').trim();
      if(ln) lineas.push(ln);
    });
  }
  return lineas;
}

// Interpreta las líneas → eventos
function parseHorarios(lineas){
  const eventos=[]; let dia=null; let buf=[];
  const reDia=/^(LUN|MAR|MI[EÉ]|JUE|VIE|S[AÁ]B|DOM)\.?\s/i;
  const reFecha=/(\d{2})\/(\d{2})\/(\d{4})/;
  const reTime=/(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/;
  const reRolG=/(Cocinero|Mozo|Auxiliar)(\s*\d+\s*hs)?\s*-\s*\d{1,2}:\d{2}/gi;
  const reSoloNum=/^\d{1,3}$/;
  const reNoAsig=/No Asignado/i;
  function parseCliente(txt,ev){
    if(!txt) return;
    const mm=txt.match(/^(.*?)\s*\((Madre|Padre|Tutor[a]?)\)\s*(.*)$/i);
    if(mm){ let pre=mm[1].trim().replace(/^No registra adicionales\s*/i,''); ev.cliente=pre; ev.festejado=mm[3].replace(/,\s*$/,'').trim(); }
    else if(!/^No registra adicionales/i.test(txt)) ev.adicionales=txt.trim();
  }
  for(let i=0;i<lineas.length;i++){
    const ln=lineas[i];
    if(reDia.test(ln)){ const m=ln.match(reFecha); if(m) dia=m[3]+'-'+m[2]+'-'+m[1]; buf=[]; continue; }
    if(/Listado de horarios|Generado:|Indentif|Identif|Personal a/i.test(ln)) continue;
    if(reSoloNum.test(ln)){ buf.push(+ln); continue; }
    if(reNoAsig.test(ln)){ buf.push(null); continue; }
    const mt=ln.match(reTime);
    if(mt && dia){
      const before=ln.slice(0,mt.index).trim();
      let leadNums=[], pkg=before;
      const lead=before.match(/^([\d\s]+?)\s+([A-Za-zÁÉÍÓÚáéíóúñ].*)$/);
      if(lead){ leadNums=lead[1].trim().split(/\s+/).map(Number); pkg=lead[2].trim(); }
      const legajos=[...buf,...leadNums]; buf=[];
      const ev={ dia, paquete:pkg, hora_inicio:mt[1], hora_fin:mt[2], roles:[], cliente:'', festejado:'', adicionales:'' };
      let rest=ln.slice(mt.index+mt[0].length).trim();
      const rolesTxt=[];
      if(rest){
        let m2, last=0; reRolG.lastIndex=0;
        while((m2=reRolG.exec(rest))){ rolesTxt.push((m2[1]+(m2[2]||'')).replace(/\s+/g,' ').trim()); last=m2.index+m2[0].length; }
        parseCliente(rest.slice(last).trim(),ev);
      } else {
        while(i+1<lineas.length && /^(Cocinero|Mozo|Auxiliar)(\s*\d+\s*hs)?\s*-\s*\d{1,2}:\d{2}/i.test(lineas[i+1])){
          rolesTxt.push(lineas[++i].replace(/\s*-\s*\d{1,2}:\d{2}.*$/,'').replace(/\s+/g,' ').trim());
        }
        if(i+1<lineas.length){ const nx=lineas[i+1]; if(!reDia.test(nx)&&!reSoloNum.test(nx)&&!reNoAsig.test(nx)&&!reTime.test(nx)){ parseCliente(lineas[++i],ev); } }
      }
      rolesTxt.forEach((rt,idx)=>{ const leg=legajos[idx]; if(leg!=null && !isNaN(leg)) ev.roles.push({rol:rt,legajo:leg}); });
      if(ev.roles.length) eventos.push(ev);
    }
  }
  return eventos;
}

// Regla de ingreso: depende del EVENTO, no del empleado. Minutos configurables por posición.
// 1º evento del día → p1 antes · 2º → p2 antes · 3º y más → p3 antes.
function calcularIngresos(eventos, preps){
  const p1=+(preps&&preps.p1)||90, p2=+(preps&&preps.p2)||30, p3=+(preps&&preps.p3)||30;
  const byDia={}; eventos.forEach(e=>{(byDia[e.dia]=byDia[e.dia]||[]).push(e);});
  Object.values(byDia).forEach(list=>{
    list.sort((a,b)=>toMin(a.hora_inicio)-toMin(b.hora_inicio));
    list.forEach((e,idx)=>{
      e.orden_dia=idx+1;
      const mins = idx===0?p1 : idx===1?p2 : p3;
      e.roles.forEach(r=>{ r.ingreso=restarMin(e.hora_inicio,mins); });
    });
  });
  return eventos;
}

function Horarios({sesion,esDuena,sucursales,empleados,sucCtx}){
  const [tab,setTab]=useState('ver');
  const [sucSel,setSucSel]=useState(esDuena ? (sucCtx||(sucursales[0]||{}).id||'') : (sucCtx||''));
  const [eventos,setEventos]=useState([]); const [asign,setAsign]=useState([]); const [cargando,setCargando]=useState(false);
  const [previa,setPrevia]=useState(null); const [leyendo,setLeyendo]=useState(false); const [reempl,setReempl]=useState(null); const pdfFileRef=useRef(null);
  const [cfgGen,setCfgGen]=useState({p1:90,p2:30,p3:30,figuras:[]});
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfgGen({p1:+g.data.prep_1||90,p2:+g.data.prep_2||30,p3:+g.data.prep_3||30,figuras:g.data.figuras_hora||[]});})();},[]);
  const empByLegajo=l=>empleados.find(e=>e.legajo===l);
  const nomLegajo=l=>{const e=empByLegajo(l);return e?e.nombre:('#'+l+' (sin cargar)');};
  const sucNom=id=>{const s=sucursales.find(x=>x.id===id);return s?s.nombre:'';};

  async function cargar(){ if(!sucSel)return; setCargando(true);
    const ev=await dbAll('fichaje_eventos'); const ee=await dbAll('fichaje_evento_empleados');
    setEventos(ev.filter(e=>e.sucursal_id===sucSel).sort((a,b)=>(a.fecha+a.hora_inicio).localeCompare(b.fecha+b.hora_inicio)));
    setAsign(ee); setCargando(false);
  }
  useEffect(()=>{ if(tab==='ver') cargar(); },[tab,sucSel]);

  async function elegirPdf(e){ const file=e.target.files[0]; if(!file)return; setLeyendo(true); pdfFileRef.current=file;
    try{
      const lineas=await leerLineasPdf(file);
      let evs=parseHorarios(lineas);
      evs=calcularIngresos(evs,cfgGen);
      // autodetectar sucursal por paquetes
      const txt=evs.map(x=>x.paquete).join(' ').toLowerCase();
      let sucAuto=sucSel;
      if(/point/.test(txt)){ const pp=sucursales.find(s=>/play/i.test(s.nombre)); if(pp)sucAuto=pp.id; }
      else if(/estrella|deluxe|express/.test(txt)){ const fz=sucursales.find(s=>/fun/i.test(s.nombre)); if(fz)sucAuto=fz.id; }
      if(!evs.length){ alert('No pude leer eventos de ese PDF. Probá con la carga manual o avisame.'); }
      setPrevia({sucursal_id:sucAuto, eventos:evs}); setTab('pdf');
    }catch(err){ alert('No se pudo leer el PDF: '+(err.message||err)); }
    setLeyendo(false); e.target.value='';
  }

  async function guardarPrevia(){
    if(!previa||!previa.sucursal_id){ alert('Elegí la sucursal.'); return; }
    setCargando(true);
    for(const ev of previa.eventos){
      const row=await dbInsert('fichaje_eventos',{ sucursal_id:previa.sucursal_id, fecha:ev.dia, paquete:ev.paquete, hora_inicio:ev.hora_inicio, hora_fin:ev.hora_fin, orden_dia:ev.orden_dia||1, cliente:ev.cliente||null, festejado:ev.festejado||null, adicionales:ev.adicionales||null, origen:'pdf', creado_por:sesion.id });
      if(row){ for(const r of ev.roles){ const emp=empByLegajo(r.legajo); await dbInsert('fichaje_evento_empleados',{ evento_id:row.id, empleado_id:emp?emp.id:null, legajo:r.legajo, rol_en_evento:r.rol, hora_ingreso_esperada:r.ingreso||null }); } }
    }
    // Guardar el PDF en el historial (no reemplaza: queda la lista por semana)
    if(pdfFileRef.current){ try{ const url=await subirPDF(pdfFileRef.current); if(url){
      const fechas=previa.eventos.map(e=>e.dia).filter(Boolean).sort();
      const fmt=iso=>{try{const p=iso.split('-');return p[2]+'/'+p[1];}catch(e){return iso;}};
      const entry={url,subido:fechaHoyISO(),desde:fechas[0]?fmt(fechas[0]):'',hasta:fechas.length?fmt(fechas[fechas.length-1]):''};
      const cfgs=await dbAll('fichaje_config'); const ex=cfgs.find(c=>c.id==='pdf_'+previa.sucursal_id);
      let lista=(ex&&ex.data&&ex.data.lista)?ex.data.lista:((ex&&ex.data&&ex.data.url)?[{url:ex.data.url,subido:ex.data.subido}]:[]);
      lista=[entry,...lista].slice(0,8);
      await SB.from('fichaje_config').upsert({id:'pdf_'+previa.sucursal_id,data:{lista}});
    } }catch(e){} pdfFileRef.current=null; }
    setCargando(false); setPrevia(null); setTab('ver');
    alert('✓ Horarios guardados');
  }

  async function borrarEvento(id){ if(!window.confirm('¿Borrar este evento?'))return; await dbDelete('fichaje_evento_empleados','00000000-0000-0000-0000-000000000000'); /*noop*/ const lst=asign.filter(a=>a.evento_id===id); for(const a of lst) await dbDelete('fichaje_evento_empleados',a.id); await dbDelete('fichaje_eventos',id); cargar(); }
  async function hacerReemplazo(asgId, nuevoEmpId){ const emp=empleados.find(e=>e.id===nuevoEmpId); if(!emp)return; await dbUpdate('fichaje_evento_empleados',asgId,{empleado_id:emp.id,legajo:emp.legajo,fue_reemplazo:true}); setReempl(null); cargar(); }

  const tabBtn=(id,t)=>(<button onClick={()=>setTab(id)} style={{...S.btn,flex:1,minHeight:0,padding:'10px',fontSize:13,...(tab===id?S.btnOro:S.btnGhost)}}>{t}</button>);
  const porDia={}; eventos.forEach(e=>{(porDia[e.fecha]=porDia[e.fecha]||[]).push(e);});

  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>🗓️ Horarios</h2>
      {esDuena && (
        <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={{...S.input,marginBottom:12}}>

      {tab==='ver' && (cargando ? <div style={{textAlign:'center',padding:30}}><span className="spin"></span></div> :
        Object.keys(porDia).length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:'26px'}}>No hay horarios cargados para {sucNom(sucSel)}.<br/>Subí un PDF o cargá manual.</div> :

            <div style={{fontWeight:700,color:C.oro,fontSize:14,marginBottom:6,fontFamily:'Syne'}}>{fechaLinda(f)}</div>
            {porDia[f].map(ev=>{ const rs=asign.filter(a=>a.evento_id===ev.id); return (
              <div key={ev.id} style={{...S.card,marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                  <div><div style={{fontWeight:700}}>{ev.paquete}</div><div style={{fontSize:12,color:C.tx2}}>{ev.hora_inicio} - {ev.hora_fin}{ev.orden_dia>1?' · 2º evento':''}</div></div>
                  <button onClick={()=>borrarEvento(ev.id)} style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'6px 10px',minHeight:0,fontSize:12}}>🗑</button>
                </div>
                <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:5}}>
                  {rs.map(a=>(
                    <div key={a.id} style={{display:'flex',alignItems:'center',gap:8,fontSize:13,background:C.surf2,borderRadius:8,padding:'7px 9px'}}>
                      <span style={{...S.chip,background:'#2a2418',color:C.oro,flexShrink:0}}>{a.rol_en_evento}</span>
                      <span style={{flex:1,minWidth:0}}>{a.empleado_id?nomLegajo(a.legajo):('#'+a.legajo+' (sin cargar)')}{a.fue_reemplazo&&<span style={{color:C.amar,fontSize:10}}> ↺</span>}</span>
                      {a.hora_ingreso_esperada && <span style={{fontSize:11,color:C.verde,flexShrink:0}}>entra {a.hora_ingreso_esperada}</span>}
                      <button onClick={()=>setReempl(a)} style={{...S.btn,...S.btnGhost,padding:'4px 8px',minHeight:0,fontSize:11}}>cambiar</button>
                    </div>
                  ))}
                </div>
                {ev.cliente && <div style={{fontSize:11,color:C.tx2,marginTop:6}}>👤 {ev.cliente}{ev.festejado?(' · 🎂 '+ev.festejado):''}</div>}
              </div>
            );})}
          </div>
        ))
      )}

      {tab==='pdf' && (
        !previa ? (
          <div style={{...S.card,textAlign:'center',padding:'28px 16px'}}>
            <div style={{fontSize:38}}>📄</div>
            <p style={{color:C.tx2,fontSize:13,margin:'10px 0 16px',lineHeight:1.5}}>Subí el PDF de horarios (Fun Zone o Play Point). Lo leo y te muestro todo para confirmar antes de guardar.</p>
            <label style={{...S.btn,...S.btnOro,cursor:'pointer',display:'inline-block'}}>{leyendo?'Leyendo…':'📄 Elegir PDF'}<input type="file" accept="application/pdf" style={{display:'none'}} onChange={elegirPdf}/></label>

        ) : (
          <div>
            <div style={{...S.card,marginBottom:12}}>
              <label style={S.label}>Guardar en sucursal</label>
              <select value={previa.sucursal_id} onChange={e=>setPrevia({...previa,sucursal_id:e.target.value})} style={S.input}>
                <option value="">Elegí…</option>
                {sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
              </select>
              <div style={{fontSize:12,color:C.tx2,marginTop:8}}>{previa.eventos.length} eventos leídos. Revisá y guardá. ⤵</div>
            </div>
            {previa.eventos.map((ev,i)=>(
              <div key={i} style={{...S.card,marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:13}}>{fechaLinda(ev.dia)} · {ev.paquete} <span style={{color:C.tx2,fontWeight:400}}>{ev.hora_inicio}-{ev.hora_fin}{ev.orden_dia>1?' · 2º':''}</span></div>
                <div style={{marginTop:6,display:'flex',flexDirection:'column',gap:4}}>
                  {ev.roles.map((r,j)=>(<div key={j} style={{fontSize:12.5,display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{...S.chip,background:'#2a2418',color:C.oro}}>{r.rol}</span>
                    <span style={{flex:1}}>{nomLegajo(r.legajo)}</span>
                    {r.ingreso?<span style={{color:C.verde,fontSize:11}}>entra {r.ingreso}</span>:<span style={{color:C.tx2,fontSize:11}}>sigue</span>}
                  </div>))}
                </div>
              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button onClick={guardarPrevia} disabled={cargando} style={{...S.btn,...S.btnOro,flex:1}}>{cargando?'Guardando…':'✓ Guardar todo'}</button>
              <button onClick={()=>setPrevia(null)} style={{...S.btn,...S.btnGhost}}>Cancelar</button>
            </div>
          </div>
        )
      )}

      {tab==='manual' && <ManualEvento sesion={sesion} sucSel={sucSel} empleados={empleados} figuras={cfgGen.figuras||[]} onGuardado={()=>setTab('ver')}/>}

      {reempl && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:18}} onClick={()=>setReempl(null)}>
          <div style={{...S.card,maxWidth:360,width:'100%'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,marginBottom:4}}>Reemplazar empleado</div>
            <div style={{fontSize:12,color:C.tx2,marginBottom:12}}>Puesto: {reempl.rol_en_evento}. Elegí quién lo cubre:</div>
            <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:'50vh',overflowY:'auto'}}>
              {empleados.filter(e=>e.activo!==false).map(e=>(
                <button key={e.id} onClick={()=>hacerReemplazo(reempl.id,e.id)} style={{...S.btn,...S.btnGhost,textAlign:'left'}}>{e.legajo!=null?('#'+e.legajo+' '):''}{e.nombre}</button>
              ))}
            </div>
            <button onClick={()=>setReempl(null)} style={{...S.btn,...S.btnGhost,width:'100%',marginTop:10}}>Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ManualEvento({sesion,sucSel,empleados,figuras,onGuardado}){
  const opcionesRol=['Cocinero','Mozo','Auxiliar',...((figuras||[]).map(f=>f.nombre))];
  const [f,setF]=useState({fecha:'',paquete:'',hora_inicio:'',hora_fin:'',cliente:'',festejado:''});
  const [roles,setRoles]=useState([{rol:'Cocinero',legajo:''}]);
  const [guard,setGuard]=useState(false);
  function setRol(i,k,v){ setRoles(rs=>rs.map((r,j)=>j===i?{...r,[k]:v}:r)); }
  async function guardar(){
    if(!sucSel){alert('Elegí la sucursal arriba.');return;}
    if(!f.fecha||!f.paquete||!f.hora_inicio){alert('Completá fecha, paquete y hora de inicio.');return;}
    setGuard(true);
    const row=await dbInsert('fichaje_eventos',{sucursal_id:sucSel,fecha:f.fecha,paquete:f.paquete,hora_inicio:f.hora_inicio,hora_fin:f.hora_fin,orden_dia:1,cliente:f.cliente||null,festejado:f.festejado||null,origen:'manual',creado_por:sesion.id});
    if(row){ for(const r of roles){ if(!r.legajo)continue; const emp=empleados.find(e=>e.legajo===+r.legajo); await dbInsert('fichaje_evento_empleados',{evento_id:row.id,empleado_id:emp?emp.id:null,legajo:+r.legajo,rol_en_evento:r.rol,hora_ingreso_esperada:restarMin(f.hora_inicio,90)}); } }
    setGuard(false); alert('✓ Evento guardado'); onGuardado();
  }
  return (
    <div style={{...S.card,display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:8}}>
        <div style={{flex:1}}><label style={S.label}>Fecha</label><input type="date" style={S.input} value={f.fecha} onChange={e=>setF({...f,fecha:e.target.value})}/></div>
        <div style={{flex:1}}><label style={S.label}>Paquete</label><input style={S.input} value={f.paquete} onChange={e=>setF({...f,paquete:e.target.value})} placeholder="Estrella"/></div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <div style={{flex:1}}><label style={S.label}>Hora inicio</label><input style={S.input} value={f.hora_inicio} onChange={e=>setF({...f,hora_inicio:e.target.value})} placeholder="16:30"/></div>
        <div style={{flex:1}}><label style={S.label}>Hora fin</label><input style={S.input} value={f.hora_fin} onChange={e=>setF({...f,hora_fin:e.target.value})} placeholder="19:30"/></div>
      </div>
      <div>
        <label style={S.label}>Personal (rol + legajo)</label>
        {roles.map((r,i)=>(
          <div key={i} style={{display:'flex',gap:8,marginBottom:6}}>
            <select style={{...S.input,flex:1}} value={r.rol} onChange={e=>setRol(i,'rol',e.target.value)}>{opcionesRol.map(x=><option key={x}>{x}</option>)}</select>
            <input style={{...S.input,width:80}} type="number" value={r.legajo} onChange={e=>setRol(i,'legajo',e.target.value)} placeholder="N°"/>
            <button onClick={()=>setRoles(rs=>rs.filter((_,j)=>j!==i))} style={{...S.btn,background:'#3a2020',color:C.rojo,padding:'0 12px',minHeight:0}}>−</button>
          </div>
        ))}
        <button onClick={()=>setRoles([...roles,{rol:'Mozo',legajo:''}])} style={{...S.btn,...S.btnGhost,fontSize:13,padding:'8px 12px',minHeight:0}}>+ Agregar puesto</button>
      </div>
      <div style={{display:'flex',gap:8}}>
        <div style={{flex:1}}><label style={S.label}>Cliente (opc.)</label><input style={S.input} value={f.cliente} onChange={e=>setF({...f,cliente:e.target.value})}/></div>
        <div style={{flex:1}}><label style={S.label}>Festejado (opc.)</label><input style={S.input} value={f.festejado} onChange={e=>setF({...f,festejado:e.target.value})}/></div>
      </div>
      <button onClick={guardar} disabled={guard} style={{...S.btn,...S.btnOro}}>{guard?'Guardando…':'Guardar evento'}</button>
    </div>
  );
}

/* ════════ PAGOS ════════ */
function Pagos({sesion,esDuena,sucursales,empleados,sucCtx}){
  const [sucSel,setSucSel]=useState(esDuena?(sucCtx||(sucursales[0]||{}).id||''):(sucCtx||''));
  const [desde,setDesde]=useState(''); const [hasta,setHasta]=useState('');
  const [cfg,setCfg]=useState({horas_simple:4.5,horas_doble:8,horas_triple:12,gap_horas:2,bonus_excelente:7000});
  const [res,setRes]=useState(null); const [cargando,setCargando]=useState(false); const [tab,setTab]=useState('liq');
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfg(v=>({...v,...g.data}));})();},[]);
  const sucNom=id=>{const s=sucursales.find(x=>x.id===id);return s?s.nombre:'';};
  const money=n=>'$'+Math.round(n).toLocaleString('es-AR');

  async function calcular(){
    if(!sucSel||!desde||!hasta){alert('Elegí sucursal y rango de fechas.');return;}
    setCargando(true); setRes(null);
    const evs=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===sucSel && e.fecha>=desde && e.fecha<=hasta);
    const ids=new Set(evs.map(e=>e.id)); const evById={}; evs.forEach(e=>evById[e.id]=e);
    const ee=(await dbAll('fichaje_evento_empleados')).filter(a=>ids.has(a.evento_id));
    const porEmp={}; ee.forEach(a=>{ const key=a.empleado_id||('leg:'+a.legajo); (porEmp[key]=porEmp[key]||[]).push(a); });
    // Bonus encuesta "Excelente": cruzar con las encuestas del salón (por fecha + hora + salón)
    const sucNombreSel=(sucNom(sucSel)||'').toLowerCase();
    const encs=await cargarEncuestasSalon();
    const excByKey={}; encs.forEach(e=>{ if((e._sucNombre||'').toLowerCase()!==sucNombreSel)return; const exc=e.encuesta&&(e.encuesta.personal==='excelente'||e.encuesta.encargada==='excelente'); if(!exc)return; const fecha=(e.anio||'')+'-'+_pad2(e.mes)+'-'+_pad2(e.dia); excByKey[fecha+'|'+String(e.hIni||'').trim()]=true; });
    const figMap={}; (cfg.figuras_hora||[]).forEach(f=>{ figMap[String(f.nombre||'').toLowerCase()]=!!f.bonus; });
    const bonusRolOk=rol=>{ if(!/\d+\s*hs/i.test(rol||''))return true; return figMap[String(rol||'').toLowerCase()]===true; };
    const bonusMonto=+cfg.bonus_excelente||0;
    // Penalización por llegadas tarde: cada día tarde no cobra ese día; a las N tardanzas del mes, suspensión de X días.
    const maxT=+cfg.tarde_max_mes||5, suspD=+cfg.tarde_suspension_dias||30;
    const allEv=await dbAll('fichaje_eventos'); const evDate={}; allEv.forEach(e=>evDate[e.id]=e.fecha);
    const fichajes=await dbAll('fichaje_fichajes');
    const lateByEmp={}; fichajes.forEach(f=>{ if(f.tipo==='entrada'&&f.estado==='tarde'){ const d=f.evento_id?evDate[f.evento_id]:String(f.ts||'').slice(0,10); if(d)(lateByEmp[f.empleado_id]=lateByEmp[f.empleado_id]||[]).push(d); } });
    const _sumarDias=(iso,n)=>{const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);};
    function bonusBloqueado(empId,fecha){ const ds=lateByEmp[empId]||[]; if(ds.indexOf(fecha)>=0)return true; const byM={}; ds.forEach(d=>(byM[d.slice(0,7)]=byM[d.slice(0,7)]||[]).push(d)); return Object.values(byM).some(arr=>{ arr.sort(); if(arr.length<maxT)return false; const ini=arr[maxT-1]; return fecha>=ini && fecha<=_sumarDias(ini,suspD); }); }
    const filas=[];
    Object.keys(porEmp).forEach(key=>{
      const asigs=porEmp[key];
      const emp=empleados.find(e=>e.id===asigs[0].empleado_id)||empleados.find(e=>e.legajo===asigs[0].legajo);
      const valorHora=emp?+(emp.valor_hora||0):0;
      const nombre=emp?emp.nombre:('#'+asigs[0].legajo+' (sin cargar)');
      const byDia={}; asigs.forEach(a=>{ const e=evById[a.evento_id]; if(e)(byDia[e.fecha]=byDia[e.fecha]||[]).push({a,e}); });
      const detalle=[];
      Object.keys(byDia).sort().forEach(dia=>{
        const xhs=[], normal=[];
        byDia[dia].forEach(it=>{ const m=String(it.a.rol_en_evento||'').match(/(\d+)\s*hs/i); if(m)xhs.push({...it,horas:+m[1]}); else normal.push(it); });
        xhs.forEach(it=>detalle.push({dia,desc:it.a.rol_en_evento+' · '+it.e.paquete,horas:it.horas}));
        normal.sort((p,q)=>toMin(p.e.hora_inicio)-toMin(q.e.hora_inicio));
        let grupo=[], finPrev=null;
        const cerrar=()=>{ if(!grupo.length)return; const n=grupo.length; let horas=n===1?+cfg.horas_simple:n===2?+cfg.horas_doble:+cfg.horas_triple; const tipo=n===1?'Evento simple':n===2?'Evento doble':(n+' eventos'); const deluxe=grupo.filter(g=>/deluxe/i.test(g.e.paquete||'')).length; const extra=deluxe*(+cfg.horas_extra_deluxe||0); if(extra)horas+=extra; detalle.push({dia,desc:tipo+' ('+grupo.map(g=>g.e.paquete).join(' + ')+')'+(extra?(' +'+extra+'h Deluxe'):''),horas}); grupo=[]; };
        normal.forEach(it=>{ const ini=toMin(it.e.hora_inicio); if(finPrev!==null && (ini-finPrev)/60 >= +cfg.gap_horas) cerrar(); grupo.push(it); let fin=toMin(it.e.hora_fin); if(fin<ini)fin+=1440; finPrev=fin; });
        cerrar();
      });
      const horasTot=detalle.reduce((s,d)=>s+d.horas,0);
      let bonusCount=0, bonusPerdido=0; const empId=emp?emp.id:null;
      asigs.forEach(a=>{ const e=evById[a.evento_id]; if(!e)return; if(excByKey[e.fecha+'|'+String(e.hora_inicio||'').trim()] && bonusRolOk(a.rol_en_evento)){ if(empId && bonusBloqueado(empId,e.fecha)) bonusPerdido++; else bonusCount++; } });
      const bonusTot=bonusCount*bonusMonto;
      filas.push({key,nombre,legajo:asigs[0].legajo,valorHora,detalle,horasTot,montoHoras:horasTot*valorHora,bonusCount,bonusTot,bonusPerdido,monto:horasTot*valorHora+bonusTot,sinValor:valorHora===0});
    });
    filas.sort((a,b)=>(a.legajo||999)-(b.legajo||999));
    setRes({filas,total:filas.reduce((s,f)=>s+f.monto,0),totalBonus:filas.reduce((s,f)=>s+f.bonusTot,0)}); setCargando(false);
  }

  function exportarPDF(){
    if(!res)return; const {jsPDF}=window.jspdf; const doc=new jsPDF();
    let y=16; doc.setFontSize(15); doc.text('Liquidación — '+sucNom(sucSel),14,y); y+=7;
    doc.setFontSize(10); doc.text('Período: '+desde+' al '+hasta,14,y); y+=8;
    res.filas.forEach(f=>{
      if(y>270){doc.addPage();y=16;}
      doc.setFontSize(11); doc.text((f.legajo!=null?('#'+f.legajo+' '):'')+f.nombre+'  ('+money(f.valorHora)+'/h)',14,y); y+=5;
      doc.setFontSize(9);
      f.detalle.forEach(d=>{ if(y>280){doc.addPage();y=16;} doc.text('  '+d.dia+'  '+d.desc+'  '+d.horas+'hs = '+money(d.horas*f.valorHora),16,y); y+=4.5; });
      if(f.bonusTot>0){ if(y>280){doc.addPage();y=16;} doc.text('  Bonus encuesta Excelente x'+f.bonusCount+' = '+money(f.bonusTot),16,y); y+=4.5; }
      doc.setFontSize(10); doc.text('  TOTAL: '+f.horasTot+'hs'+(f.bonusTot?(' + bonus'):'')+' = '+money(f.monto),16,y); y+=8;
    });
    if(y>275){doc.addPage();y=16;} doc.setFontSize(13); doc.text('TOTAL A PAGAR: '+money(res.total),14,y);
    doc.save('liquidacion_'+desde+'_'+hasta+'.pdf');
  }

  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>💰 Pagos</h2>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button onClick={()=>setTab('liq')} style={{...S.btn,flex:1,minHeight:0,padding:'10px',fontSize:13,...(tab==='liq'?S.btnOro:S.btnGhost)}}>💵 Liquidación</button>
        <button onClick={()=>setTab('comp')} style={{...S.btn,flex:1,minHeight:0,padding:'10px',fontSize:13,...(tab==='comp'?S.btnOro:S.btnGhost)}}>🔍 Comparar</button>
      </div>
      {tab==='comp' && <Comparacion esDuena={esDuena} sucursales={sucursales} empleados={empleados} sucCtx={sucCtx}/>}
      {tab==='liq' && (<React.Fragment>
      <div style={{...S.card,marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
        {esDuena && <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={S.input}>{sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select>}
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><label style={S.label}>Desde</label><input type="date" style={S.input} value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div style={{flex:1}}><label style={S.label}>Hasta</label><input type="date" style={S.input} value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
        </div>
        <button onClick={calcular} disabled={cargando} style={{...S.btn,...S.btnOro}}>{cargando?'Calculando…':'Calcular pagos'}</button>
      </div>

      {res && (res.filas.length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:24}}>No hay horarios cargados en ese rango.</div> : (
        <div>
          <div style={{...S.card,marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:12,color:C.tx2}}>Total a pagar</div><div className="num" style={{fontSize:26,color:C.verde}}>{money(res.total)}</div></div>
            <button onClick={exportarPDF} style={{...S.btn,...S.btnGhost}}>⬇ PDF</button>
          </div>
          {res.filas.map(f=>(
            <div key={f.key} style={{...S.card,marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                <div style={{fontWeight:700}}>{f.legajo!=null&&<span className="num" style={{color:C.oro}}>#{f.legajo} </span>}{f.nombre}</div>
                <div className="num" style={{fontSize:18,color:C.verde}}>{money(f.monto)}</div>
              </div>
              <div style={{fontSize:11,color:C.tx2,marginBottom:6}}>{f.sinValor?<span style={{color:C.amar}}>⚠️ Falta cargar el valor hora</span>:(money(f.valorHora)+'/h · '+f.horasTot+'hs'+(f.bonusTot?(' + bonus'):''))}</div>
              <div style={{display:'flex',flexDirection:'column',gap:3}}>
                {f.detalle.map((d,i)=>(<div key={i} style={{fontSize:12,color:C.tx2,display:'flex',justifyContent:'space-between',gap:8}}><span>{fechaLinda(d.dia)} · {d.desc}</span><span style={{whiteSpace:'nowrap'}}>{d.horas}hs</span></div>))}
                {f.bonusTot>0 && <div style={{fontSize:12,color:C.oro,fontWeight:700,display:'flex',justifyContent:'space-between',gap:8}}><span>💜 Bonus encuesta Excelente ×{f.bonusCount}</span><span style={{whiteSpace:'nowrap'}}>+{money(f.bonusTot)}</span></div>}
                {f.bonusPerdido>0 && <div style={{fontSize:11,color:C.rojo,fontWeight:700}}>⏰ Perdió {f.bonusPerdido} bonus por llegadas tarde</div>}
              </div>
            </div>
          ))}
          <div style={{...S.card,background:'#2a2418',border:'1px solid #4a3d1c',fontSize:12,color:C.tx2}}>💜 <b style={{color:C.oro}}>Bonus "Excelente"</b>: ${(+cfg.bonus_excelente).toLocaleString('es-AR')} por cada evento que el papá calificó Excelente. Total bonus del período: <b style={{color:C.oro}}>{money(res.totalBonus||0)}</b>. {(res.totalBonus===0)&&'(Si no aparece, revisá que la encuesta esté Excelente y que la fecha/hora del evento coincida con la cargada en el salón.)'}</div>
        </div>
      ))}
      </React.Fragment>)}
    </div>
  );
}

/* ════════ COMPARACIÓN: sistema vs lo que declaró el empleado ════════ */
function Comparacion({esDuena,sucursales,empleados,sucCtx}){
  const [sucSel,setSucSel]=useState(esDuena?(sucCtx||(sucursales[0]||{}).id||''):(sucCtx||''));
  const [desde,setDesde]=useState(''); const [hasta,setHasta]=useState('');
  const [gapH,setGapH]=useState(2); const [res,setRes]=useState(null); const [cargando,setCargando]=useState(false);
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data&&g.data.gap_horas)setGapH(+g.data.gap_horas);})();},[]);
  const TL={simple:'Simple',doble:'Doble','2simples':'2 simples',triple:'Triple',varios:'Varios'};
  const tl=t=>t?TL[t]||t:'—';
  function tipoSistema(evs){
    const norm=evs.slice().sort((a,b)=>toMin(a.hora_inicio)-toMin(b.hora_inicio));
    const groups=[]; let cur=[],finPrev=null;
    norm.forEach(ev=>{const ini=toMin(ev.hora_inicio); if(finPrev!==null && (ini-finPrev)/60>=gapH){groups.push(cur);cur=[];} cur.push(ev); let fin=toMin(ev.hora_fin); if(fin<ini)fin+=1440; finPrev=fin;});
    if(cur.length)groups.push(cur);
    if(groups.length===0)return null;
    if(groups.length===1){const n=groups[0].length;return n===1?'simple':n===2?'doble':'triple';}
    if(groups.length===2&&groups[0].length===1&&groups[1].length===1)return '2simples';
    return 'varios';
  }
  async function calcular(){
    if(!sucSel||!desde||!hasta){alert('Elegí sucursal y rango de fechas.');return;}
    setCargando(true); setRes(null);
    const empById={}; empleados.forEach(e=>empById[e.id]=e);
    const evs=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===sucSel && e.fecha>=desde && e.fecha<=hasta);
    const evById={}; evs.forEach(e=>evById[e.id]=e); const ids=new Set(evs.map(e=>e.id));
    const ee=(await dbAll('fichaje_evento_empleados')).filter(a=>ids.has(a.evento_id));
    const cfgs=await dbAll('fichaje_config');
    const declByEmp={}; cfgs.forEach(c=>{ if(String(c.id).indexOf('auto_')===0&&c.data) declByEmp[String(c.id).slice(5)]=c.data; });
    const sys={}; // empId -> {fecha:[ev]}
    ee.forEach(a=>{ const e=evById[a.evento_id]; if(!e)return; const emp=empById[a.empleado_id]||empleados.find(x=>x.legajo===a.legajo); const key=emp?emp.id:('leg:'+a.legajo); const esFig=/\d+\s*hs/i.test(a.rol_en_evento||''); (sys[key]=sys[key]||{}); (sys[key][e.fecha]=sys[key][e.fecha]||[]); if(!esFig) sys[key][e.fecha].push({hora_inicio:e.hora_inicio,hora_fin:e.hora_fin}); });
    const keys=new Set([...Object.keys(sys),...Object.keys(declByEmp)]);
    const filas=[];
    keys.forEach(key=>{
      const emp=empById[key]; const nombre=emp?emp.nombre:(key.indexOf('leg:')===0?('#'+key.slice(4)+' (sin cargar)'):'(?)'); const legajo=emp?emp.legajo:null;
      const sDias=sys[key]||{}; const dDataAll=declByEmp[key]||{};
      const dDias={}; Object.keys(dDataAll).forEach(f=>{ if(f>=desde&&f<=hasta) dDias[f]=dDataAll[f]; });
      const fechas=[...new Set([...Object.keys(sDias),...Object.keys(dDias)])].sort();
      if(!fechas.length)return;
      const rows=fechas.map(f=>{ const st=sDias[f]?tipoSistema(sDias[f]):null; const dt=dDias[f]?dDias[f].tipo:null;
        let estado; if(st&&dt) estado=(st===dt)?'ok':'dif'; else if(st&&!dt) estado='noDecl'; else estado='noSis';
        return {f,st,dt,estado}; });
      const difs=rows.filter(r=>r.estado!=='ok').length;
      filas.push({key,nombre,legajo,rows,difs});
    });
    filas.sort((a,b)=>(b.difs-a.difs)||((a.legajo||999)-(b.legajo||999)));
    setRes(filas); setCargando(false);
  }
  const ic={ok:['✅',C.verde],dif:['⚠️',C.amar],noSis:['❓',C.rojo],noDecl:['〰️',C.tx2]};
  const txtEstado={ok:'Coincide',dif:'Distinto',noSis:'Dice que trabajó, no está cargado',noDecl:'Cargado, no lo confirmó'};
  return (
    <div>
      <div style={{...S.card,marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
        {esDuena && <select value={sucSel} onChange={e=>setSucSel(e.target.value)} style={S.input}>{sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select>}
        <div style={{display:'flex',gap:8}}>
          <div style={{flex:1}}><label style={S.label}>Desde</label><input type="date" style={S.input} value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div style={{flex:1}}><label style={S.label}>Hasta</label><input type="date" style={S.input} value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
        </div>
        <button onClick={calcular} disabled={cargando} style={{...S.btn,...S.btnOro}}>{cargando?'Comparando…':'Comparar'}</button>
        <div style={{fontSize:11,color:C.tx2}}>Cruza lo cargado (horarios) con lo que cada empleado anotó en "Mi planilla".</div>
      </div>
      {res && (res.length===0 ? <div style={{...S.card,textAlign:'center',color:C.tx2,padding:24}}>No hay datos en ese rango.</div> :
        res.map(f=>(
          <div key={f.key} style={{...S.card,marginBottom:10,border:'1px solid '+(f.difs?'#4a3d1c':C.bd)}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
              <div style={{fontWeight:700}}>{f.legajo!=null&&<span className="num" style={{color:C.oro}}>#{f.legajo} </span>}{f.nombre}</div>
              {f.difs?<span style={{...S.chip,background:'#3a3320',color:C.amar}}>⚠️ {f.difs} a revisar</span>:<span style={{...S.chip,background:'#16331f',color:C.verde}}>✅ Todo coincide</span>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}>
              {f.rows.map((r,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:12,background:r.estado!=='ok'?'#2a241833':'transparent',borderRadius:6,padding:'4px 6px'}}>
                  <span style={{flexShrink:0}}>{ic[r.estado][0]}</span>
                  <span style={{width:64,flexShrink:0,color:C.tx2}}>{fechaLinda(r.f)}</span>
                  <span style={{flex:1}}>Sistema: <b style={{color:C.tx}}>{tl(r.st)}</b> · Él: <b style={{color:ic[r.estado][1]}}>{tl(r.dt)}</b></span>
                </div>
              ))}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

const _pad2=n=>('0'+(n||'')).slice(-2);
async function cargarEncuestasSalon(){
  try{
    const r=await SB.from('eventos').select('id,data'); const rows=r.data||[];
    const cfgSuc=(rows.find(x=>x.id==='__config_suc__')||{}).data||[];
    const nameById={}; (cfgSuc||[]).forEach(s=>{nameById[s.id]=s.nombre;});
    return rows.filter(x=>x.data&&x.data.encuesta&&!String(x.id).startsWith('__config'))
      .map(x=>({...x.data,_id:x.id,_sucNombre:nameById[x.data.sucId]||''}))
      .sort((a,b)=>((b.encuesta&&b.encuesta.ts)||0)-((a.encuesta&&a.encuesta.ts)||0));
  }catch(e){return [];}
}

    const f=await dbAll('fichaje_fichajes'); const evs=await dbAll('fichaje_eventos'); const evById={}; evs.forEach(e=>evById[e.id]=e);

          <div style={{flex:1}}><label style={S.label}>Hasta</label><input type="date" style={S.input} value={hasta} onChange={e=>setHasta(e.target.value)}/></div>

              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3,flexShrink:0}}>

/* ════════ FICHAJE (empleado: GPS + cámara + reconocimiento facial) ════════ */
function fechaHoyISO(){ const d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function ahoraMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function cargarImg(url){ return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=()=>rej(new Error('img')); i.src=url; }); }
let _faceReady=false, _faceFail=false;
async function ensureFace(){ if(_faceReady)return true; if(_faceFail||!window.faceapi)return false;
  try{ const M='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    await faceapi.nets.tinyFaceDetector.loadFromUri(M);
    await faceapi.nets.faceLandmark68Net.loadFromUri(M);
    await faceapi.nets.faceRecognitionNet.loadFromUri(M);
    _faceReady=true; return true;
  }catch(e){ _faceFail=true; return false; }
}
async function descriptorDe(el){ try{ const d=await faceapi.detectSingleFace(el,new faceapi.TinyFaceDetectorOptions({inputSize:320,scoreThreshold:0.4})).withFaceLandmarks().withFaceDescriptor(); return d?d.descriptor:null; }catch(e){ return null; } }
async function verificarCara(canvas,fotoUrl){
  if(!fotoUrl) return {ok:null,msg:'Sin foto de perfil para comparar'};
  const ok=await ensureFace(); if(!ok) return {ok:null,msg:'Reconocimiento facial no disponible'};
  const live=await descriptorDe(canvas); if(!live) return {ok:false,msg:'No se detectó tu cara'};
  let reg=null; try{ const img=await cargarImg(fotoUrl); reg=await descriptorDe(img); }catch(e){}
  if(!reg) return {ok:null,msg:'No se pudo leer tu foto de perfil'};
  const dist=faceapi.euclideanDistance(live,reg);
  return {ok:dist<0.55, msg:dist<0.55?'Cara verificada ✓':'La cara no coincide'};
}
function Fichar({sesion,sucursales}){
  const [paso,setPaso]=useState('inicio'); const [tipo,setTipo]=useState('entrada'); const [msg,setMsg]=useState(''); const [res,setRes]=useState(null);
  const [cfg,setCfg]=useState({tarde_tolerancia_min:5,tarde_max_mes:5,tarde_suspension_dias:30});
  useEffect(()=>{(async()=>{const c=await dbAll('fichaje_config');const g=c.find(x=>x.id==='general');if(g&&g.data)setCfg(v=>({...v,...g.data}));})();},[]);
  const sucOkRef=useRef(null); const geoRef=useRef(null); const videoRef=useRef(); const canvasRef=useRef(); const streamRef=useRef();
  const misSucs=((sesion.sucursales)||[]).map(id=>sucursales.find(s=>s.id===id)).filter(Boolean);
  function pararCamara(){try{streamRef.current&&streamRef.current.getTracks().forEach(t=>t.stop());}catch(e){}}
  useEffect(()=>()=>pararCamara(),[]);
  function comenzar(t){ setTipo(t); setRes(null); setMsg('Obteniendo tu ubicación…'); setPaso('cargando');
    if(!navigator.geolocation){ setMsg('Tu teléfono no permite ubicación.'); setPaso('error'); return; }
    navigator.geolocation.getCurrentPosition(pos=>{
      const la=pos.coords.latitude, lo=pos.coords.longitude; geoRef.current={la,lo};
      let ok=null,best=1e12,hayCoords=false;
      misSucs.forEach(s=>{ if(s.lat==null||s.lng==null)return; hayCoords=true; const d=distancia(la,lo,s.lat,s.lng); if(d<=(s.radio_metros||80)&&d<best){best=d;ok=s;} });
      if(!hayCoords){ setMsg('El salón todavía no tiene la ubicación GPS cargada. Avisale a la dueña.'); setPaso('error'); return; }
      if(!ok){ setMsg('Estás lejos del salón 📍. Acercate para poder fichar.'); setPaso('error'); return; }
      sucOkRef.current=ok; abrirCamara();
    }, err=>{ setMsg('No pudimos obtener tu ubicación. Activá el GPS y dale permiso al navegador.'); setPaso('error'); }, {enableHighAccuracy:true,timeout:12000});
  }
  async function abrirCamara(){ setPaso('camara'); setMsg('');
    try{ const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false}); streamRef.current=st; setTimeout(()=>{ if(videoRef.current){videoRef.current.srcObject=st;videoRef.current.play().catch(()=>{});} },80); }
    catch(e){ setMsg('No pudimos abrir la cámara. Dale permiso a la cámara y probá de nuevo.'); setPaso('error'); }
  }
  async function capturar(){
    const v=videoRef.current,cv=canvasRef.current; if(!v||!cv)return;
    cv.width=v.videoWidth||320; cv.height=v.videoHeight||240; cv.getContext('2d').drawImage(v,0,0,cv.width,cv.height);
    const dataUrl=cv.toDataURL('image/jpeg',0.85);
    setPaso('procesando'); setMsg('Verificando tu cara…');
    let facialOk=null, facialMsg='';
    try{ const r=await verificarCara(cv,sesion.foto_url); facialOk=r.ok; facialMsg=r.msg; }catch(e){ facialOk=null; facialMsg='No se pudo verificar'; }
    if(facialOk===false){ pararCamara(); setMsg(facialMsg+'. Probá de nuevo, de frente y con buena luz.'); setPaso('error'); return; }
    pararCamara(); setMsg('Guardando…');
    let fotoUrl=dataUrl; try{ fotoUrl=await subirFoto(dataUrl); }catch(e){}
    const sucOk=sucOkRef.current; const hoy=fechaHoyISO(); const tol=+cfg.tarde_tolerancia_min||5;
    let eventoId=null, estado='sin_horario', coincide=false, eventoDesc='', ingreso='', minTarde=0;
    try{
      const evs=(await dbAll('fichaje_eventos')).filter(e=>e.sucursal_id===sucOk.id&&e.fecha===hoy);
      const ids=evs.map(e=>e.id); const evById={}; evs.forEach(e=>evById[e.id]=e);
      const mis=(await dbAll('fichaje_evento_empleados')).filter(a=>ids.indexOf(a.evento_id)>=0&&(a.empleado_id===sesion.id||(sesion.legajo!=null&&a.legajo===sesion.legajo)));
      if(mis.length){ coincide=true; const now=ahoraMin();
        mis.sort((a,b)=>Math.abs(toMin(a.hora_ingreso_esperada||evById[a.evento_id].hora_inicio)-now)-Math.abs(toMin(b.hora_ingreso_esperada||evById[b.evento_id].hora_inicio)-now));
        const a=mis[0]; eventoId=a.evento_id; const ev=evById[eventoId]; eventoDesc=ev.paquete+' '+ev.hora_inicio+'-'+ev.hora_fin; ingreso=a.hora_ingreso_esperada||'';
        if(tipo==='entrada'){ const esp=toMin(a.hora_ingreso_esperada||ev.hora_inicio); minTarde=Math.max(0,now-esp); estado=(minTarde<=tol)?'en_hora':'tarde'; } else { estado='salida'; }
      }
    }catch(e){}
    await dbInsert('fichaje_fichajes',{empleado_id:sesion.id,sucursal_id:sucOk.id,evento_id:eventoId,tipo,lat:geoRef.current.la,lng:geoRef.current.lo,foto_url:fotoUrl,facial_ok:facialOk,estado});
    // penalización por tardanza
    let tardeInfo=null;
    if(estado==='tarde'){
      try{ const ym=hoy.slice(0,7); const fs=(await dbAll('fichaje_fichajes')).filter(x=>x.empleado_id===sesion.id&&x.tipo==='entrada'&&x.estado==='tarde'&&String(x.ts||'').slice(0,7)===ym);
        const cnt=fs.length, max=+cfg.tarde_max_mes||5, susp=+cfg.tarde_suspension_dias||30;
        tardeInfo={minTarde,cnt,max,susp,reach:cnt>=max,aviso:cnt===max-1};
      }catch(e){ tardeInfo={minTarde,cnt:0,max:+cfg.tarde_max_mes||5,susp:+cfg.tarde_suspension_dias||30}; }
    }
    if(tipo==='entrada'&&(estado==='tarde'||estado==='sin_horario')){ try{ await dbInsert('fichaje_alertas',{empleado_id:sesion.id,sucursal_id:sucOk.id,evento_id:eventoId,tipo:estado,descripcion:sesion.nombre+(estado==='tarde'?(' fichó '+minTarde+' min tarde'+(tardeInfo&&tardeInfo.reach?(' — '+tardeInfo.cnt+'ª tardanza del mes, suspende encuestas '+tardeInfo.susp+' días'):'')):(' fichó sin estar en el horario'))}); }catch(e){} }
    setRes({tipo,sucNombre:sucOk.nombre,facialOk,facialMsg,coincide,estado,eventoDesc,ingreso,fotoUrl,tardeInfo}); setPaso('listo');
  }
  return (
    <div className="fade">
      <h2 style={{fontSize:20,marginBottom:12}}>📍 Fichar</h2>
      {paso==='inicio' && (
        <div style={{...S.card,textAlign:'center',padding:'24px 16px'}}>
          <div style={{fontSize:40,marginBottom:8}}>🕒</div>
          <p style={{color:C.tx2,fontSize:13,marginBottom:16}}>Vas a fichar con tu ubicación y una foto (reconocimiento facial). Funciona desde cualquier teléfono — te reconoce por la cara.</p>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>comenzar('entrada')} style={{...S.btn,...S.btnOro,flex:1,padding:'15px'}}>➡️ Entrada</button>
            <button onClick={()=>comenzar('salida')} style={{...S.btn,background:C.surf2,color:C.tx,border:'1px solid '+C.bd,flex:1,padding:'15px'}}>⬅️ Salida</button>
          </div>
          {!sesion.foto_url && <div style={{fontSize:11,color:C.amar,marginTop:12}}>⚠️ No tenés foto de perfil cargada — la dueña debe cargarla para el reconocimiento facial.</div>}
        </div>
      )}
      {paso==='cargando' && <div style={{...S.card,textAlign:'center',padding:30}}><span className="spin"></span><p style={{color:C.tx2,fontSize:13,marginTop:12}}>{msg}</p></div>}
      {paso==='camara' && (
        <div style={{...S.card}}>
          <p style={{fontSize:13,color:C.tx2,marginBottom:10,textAlign:'center'}}>📍 Ubicación verificada · Poné tu cara en el centro</p>
          <div style={{borderRadius:14,overflow:'hidden',background:'#000',aspectRatio:'3/4',maxHeight:'56vh',margin:'0 auto'}}>
            <video ref={videoRef} playsInline muted autoPlay style={{width:'100%',height:'100%',objectFit:'cover',transform:'scaleX(-1)'}}></video>
          </div>
          <canvas ref={canvasRef} style={{display:'none'}}></canvas>
          <button onClick={capturar} style={{...S.btn,...S.btnOro,width:'100%',marginTop:12,padding:'15px',fontSize:16}}>📸 Sacar foto y fichar</button>
          <button onClick={()=>{pararCamara();setPaso('inicio');}} style={{...S.btn,background:C.surf2,color:C.tx2,width:'100%',marginTop:8}}>Cancelar</button>
        </div>
      )}
      {paso==='procesando' && <div style={{...S.card,textAlign:'center',padding:30}}><span className="spin"></span><p style={{color:C.tx2,fontSize:13,marginTop:12}}>{msg}</p></div>}
      {paso==='error' && (

          <div style={{fontSize:38,marginBottom:8}}>⚠️</div>

          <div style={{textAlign:'left',background:C.surf2,borderRadius:12,padding:12,marginTop:8,fontSize:13,display:'flex',flexDirection:'column',gap:6}}>
            <div>📍 Ubicación: <b style={{color:C.verde}}>verificada ✓</b></div>
            <div>📸 Cara: <b style={{color:res.facialOk===true?C.verde:res.facialOk===false?C.rojo:C.tx2}}>{res.facialOk===true?'verificada ✓':res.facialMsg}</b></div>

              {res.tardeInfo.reach
                ? <div style={{marginTop:6,color:C.rojo,fontWeight:800}}>🚫 Llevás {res.tardeInfo.cnt} llegadas tarde este mes: no vas a cobrar encuestas por {res.tardeInfo.susp} días.</div>
                : res.tardeInfo.aviso

/* ════════ MI PLANILLA (empleado: doble confirmación) ════════ */
